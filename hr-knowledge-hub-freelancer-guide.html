<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="assets/marco-favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marco Freelancer Guide</title>
<link rel="stylesheet" href="https://fonts.cdnfonts.com/css/euclid-circular-b">
<style>
:root {
  --navy:       #0a1628;
  --navy-mid:   #102040;
  --navy-light: #1a3055;
  --blue-bright:#2e7dd1;
  --blue-glow:  #4a9eff;
  --white:      #ffffff;
  --off-white:  #f0f4f8;
  --text-muted: #8aa0b8;
  --border:     #1e3a5f;
  --sb-pad-x:   16px;
  --sb-code-w:  34px;
  --sb-full-w:  280px;
  --sb-collapsed-w: 56px;
  --banner-h:   90px;
  --filter-h:   53px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: 'Euclid Circular B', sans-serif;
  background: var(--navy);
  color: #1a2a3a;
  display: flex; flex-direction: column;
}

/* â”€â”€ BANNER â”€â”€ */
.banner {
  background: var(--navy);
  position: relative; overflow: hidden;
  padding: 0 24px; height: 90px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.banner::before {
  content: ""; position: absolute; right: -60px; top: -60px;
  width: 280px; height: 280px; border-radius: 50%;
  border: 1.5px solid rgba(74,158,255,0.12);
  box-shadow: 0 0 0 28px rgba(74,158,255,0.04), 0 0 0 56px rgba(74,158,255,0.03);
  pointer-events: none;
}
.banner-left { display:flex; align-items:center; gap:16px; z-index:1; }
.banner-logo { height:44px; width:auto; display:block; flex-shrink:0; }
.banner-divider { width:1px; height:32px; background:rgba(255,255,255,0.2); flex-shrink:0; }
.banner-title { font-size:17px; font-weight:700; color:var(--white); }
.banner-subtitle { font-size:12px; color:var(--text-muted); margin-top:2px; }
.banner-right { z-index:1; display:flex; align-items:center; gap:12px; }

/* â”€â”€ FILTER BAR â”€â”€ */
.filter-bar {
  background: var(--navy-mid);
  border-bottom: 1px solid var(--border);
  padding: 0 16px; height: 53px;
  flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
}
.filter-label {
  font-size:11px; font-weight:600;
  color:var(--text-muted);
  text-transform:uppercase; letter-spacing:1px; white-space:nowrap;
}
.search-wrap { position:relative; flex:1; min-width:180px; max-width:320px; }
.search-icon {
  position:absolute; left:10px; top:50%;
  transform:translateY(-50%);
  width:16px; height:16px; pointer-events:none;
  color:var(--text-muted);
}
.search-input {
  width:100%; padding:8px 10px 8px 32px;
  background:rgba(255,255,255,0.07);
  border:1px solid var(--border); border-radius:8px;
  color:var(--white); font-size:13px;
  font-family:'Euclid Circular B', sans-serif;
  outline:none; transition:border-color .2s,background .2s;
}
.search-input::placeholder { color:var(--text-muted); }
.search-input:focus { border-color:var(--blue-bright); background:rgba(255,255,255,0.1); }

.select-wrap { position:relative; min-width:150px; flex-shrink:0; }
.select-wrap select {
  width:100%; padding:8px 28px 8px 11px;
  background:rgba(255,255,255,0.07);
  border:1px solid var(--border); border-radius:8px;
  color:var(--white); font-size:13px;
  font-family:'Euclid Circular B', sans-serif;
  appearance:none; cursor:pointer; outline:none;
}
.select-wrap select option { background:#1a2a3a; color:#fff; }
.select-wrap select:focus { border-color:var(--blue-bright); }
.select-wrap::after {
  content:"▾"; position:absolute; right:10px; top:50%;
  transform:translateY(-50%);
  color:var(--text-muted); pointer-events:none; font-size:12px;
}
.btn-clear {
  padding:8px 14px;
  background:rgba(255,60,60,0.12);
  border:1px solid rgba(255,60,60,0.25); border-radius:8px;
  color:#ff8888; font-size:12px; font-weight:600;
  font-family:'Euclid Circular B', sans-serif;
  cursor:pointer; transition:all .2s; white-space:nowrap; flex-shrink:0;
}
.btn-clear:hover { background:rgba(255,60,60,0.22); color:#ffbbbb; }

/* â”€â”€ LAYOUT â”€â”€ */
.layout { display:flex; flex:1; overflow:hidden; }

/* â”€â”€ SIDEBAR â”€â”€ */
.sidebar {
  width:var(--sb-full-w); min-width:var(--sb-full-w);
  background:var(--navy);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
  transition:width 0.25s ease, min-width 0.25s ease;
  flex-shrink:0; z-index:10;
  position:relative;
}
.sidebar-header {
  padding:11px var(--sb-pad-x);
  font-size:11px; font-weight:600;
  color:var(--text-muted);
  text-transform:uppercase; letter-spacing:1px;
  border-bottom:1px solid var(--border);
  background:var(--navy-mid); flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  overflow:hidden;
}
.sidebar-header-text {
  white-space:nowrap; overflow:hidden;
  transition:opacity 0.2s;
}
.sidebar-scroll { flex:1; overflow-y:auto; overflow-x:hidden; }
.sidebar-scroll::-webkit-scrollbar { width:4px; }
.sidebar-scroll::-webkit-scrollbar-track { background:transparent; }
.sidebar-scroll::-webkit-scrollbar-thumb { background:rgba(74,158,255,0.2); border-radius:2px; }

.sb-row {
  display:flex; align-items:center;
  padding:9px var(--sb-pad-x);
  border-left:3px solid transparent;
  cursor:pointer;
  transition:background .13s, border-color .13s;
  user-select:none;
  gap:8px;
}
.sb-row:hover { background:rgba(74,158,255,0.09); }
.sb-row.active {
  background:rgba(46,125,209,0.16);
  border-left-color:var(--blue-bright);
}
.sb-code {
  width:var(--sb-code-w); flex-shrink:0;
  font-size:10.5px; font-weight:700;
  color:#8aa0b8; letter-spacing:.8px;
  font-family:'Euclid Circular B', sans-serif;
  text-align:left; line-height:1;
}
.sb-label {
  flex:1; font-size:13px; font-weight:500;
  color:#b8cce0; line-height:1.25;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  min-width:0;
  transition:opacity 0.2s, max-width 0.2s;
}
.sb-row:hover .sb-label { color:var(--white); }
.sb-row.active .sb-label { color:var(--white); font-weight:600; }
.sidebar-empty {
  padding:24px 16px; color:var(--text-muted);
  font-size:13px; text-align:center;
}

/* â”€â”€ MAIN CONTENT â”€â”€ */
.main {
  flex:1; overflow-y:auto; overflow-x:hidden;
  background:var(--off-white);
  padding:0;
}
.main::-webkit-scrollbar { width:6px; }
.main::-webkit-scrollbar-track { background:transparent; }
.main::-webkit-scrollbar-thumb { background:rgba(46,125,209,0.25); border-radius:3px; }

/* Empty state */
.empty-state {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100%; gap:16px;
  color:var(--text-muted);
}
.empty-state svg { opacity:.3; }
.empty-state h2 { font-size:20px; font-weight:600; color:#4a6a8a; }
.empty-state p { font-size:14px; text-align:center; max-width:300px; }

/* â”€â”€ HAMBURGER (mobile filter bar) â”€â”€ */
.btn-hamburger {
  display:none;
  align-items:center; justify-content:center;
  width:36px; height:36px; flex-shrink:0;
  background:rgba(255,255,255,0.07);
  border:1px solid var(--border); border-radius:8px;
  color:var(--white); font-size:16px; cursor:pointer;
  transition:background 0.2s;
}
.btn-hamburger:hover { background:rgba(255,255,255,0.14); }

/* â”€â”€ SIDEBAR TOGGLE (tablet header) â”€â”€ */
.btn-sb-toggle {
  display:none;
  align-items:center; justify-content:center;
  flex-shrink:0;
  background:transparent;
  border:none;
  color:var(--text-muted); cursor:pointer;
  padding:6px;
  transition:color 0.2s;
}
.btn-sb-toggle:hover { color:var(--white); }

/* â”€â”€ OVERLAY (mobile backdrop) â”€â”€ */
.sidebar-overlay {
  display:none;
  position:fixed; inset:0; z-index:30;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(2px);
}
.sidebar-overlay.active { display:block; }

/* â”€â”€ BANNER responsive â”€â”€ */
.banner-left { min-width:0; }
.banner-title { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.banner-subtitle { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* â”€â”€ CLEAR button icon variant â”€â”€ */
.btn-clear .clear-icon { display:none; }

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   TABLET  (600px â€“ 1024px)
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
@media (max-width:1024px) and (min-width:600px) {
  .btn-sb-toggle { display:flex; }
  .filter-label  { display:none; }
  .sidebar {
    width:var(--sb-collapsed-w);
    min-width:var(--sb-collapsed-w);
  }
  .sidebar-header-text { opacity:0; width:0; overflow:hidden; }
  .sidebar .sidebar-header { justify-content:center; }
  .sidebar .sb-label  { display:none !important; }
  .sidebar .sb-code   {
    width:var(--sb-collapsed-w) !important;
    text-align:center !important;
    font-size:11px;
  }
  .sidebar .sb-row    { padding:11px 0 !important; border-left:none !important; gap:0; }
  .sidebar .sidebar-empty { padding:10px 4px; font-size:10px; }
  .sidebar.expanded {
    width:var(--sb-full-w);
    min-width:var(--sb-full-w);
  }
  .sidebar.expanded .sidebar-header { justify-content:space-between; }
  .sidebar.expanded .sidebar-header-text { opacity:1; width:auto; }
  .sidebar.expanded .sb-label  { display:block !important; opacity:1; width:auto; pointer-events:auto; }
  .sidebar.expanded .sb-code   { width:var(--sb-code-w) !important; text-align:left !important; font-size:10.5px; }
  .sidebar.expanded .sb-row    { padding:9px var(--sb-pad-x) !important; border-left:3px solid transparent !important; gap:8px; }
  .sidebar.expanded .sb-row.active { border-left-color:var(--blue-bright) !important; }
  .sidebar.expanded .sidebar-empty { padding:24px 16px; font-size:13px; }
}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   MOBILE  (< 600px)
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
@media (max-width:599px) {
  :root {
    --filter-h: 52px;
    --banner-h: auto;
  }
  .banner { padding:12px 16px; height:auto; }
  .banner-logo   { height:32px; margin-top:2px; }
  .banner-divider { height:26px; }
  .banner-title  { font-size:14px; white-space:normal; line-height:1.3; }
  .banner-subtitle { font-size:10.5px; white-space:normal; line-height:1.4; margin-top:3px; }
  .btn-hamburger { display:flex; }
  .filter-label  { display:none; }
  .filter-bar    { gap:8px; padding:0 12px; }
  .search-wrap   { flex:1; min-width:0; max-width:none; }
  .search-input  { font-size:12px; padding:7px 8px 7px 28px; }
  .search-icon   { width:14px; height:14px; left:8px; }
  .select-wrap   { flex-shrink:0; min-width:0; width:100px; }
  .select-wrap select { font-size:12px; padding:7px 20px 7px 8px; }
  .btn-clear .clear-text { display:none; }
  .btn-clear .clear-icon { display:inline; }
  .btn-clear { padding:0; width:36px; height:36px; display:flex; align-items:center; justify-content:center; }
  .sidebar {
    position:fixed;
    top:0; left:0; bottom:0;
    width:min(85vw, 300px);
    min-width:0;
    z-index:40;
    transform:translateX(-110%);
    transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
    box-shadow:4px 0 32px rgba(0,0,0,0.4);
  }
  .sidebar.mobile-open { transform:translateX(0); }
  .btn-sb-toggle { display:flex; }
  .main { padding:0; }
}

/* â”€â”€ FREELANCER GUIDE CONTENT â”€â”€ */
/* ── FREELANCER GUIDE CONTENT ── */
.fg-content {
  padding: 24px 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
/* Country header stays full-width outside the card flow */
.fg-country-header {
  padding: 20px 28px 16px;
  border-bottom: 1px solid #dde4ee;
  background: #ffffff;
  flex-shrink: 0;
}
.fg-country-header h1 {
  font-size: 22px; font-weight: 700; color: #162351;
  font-family: 'Euclid Circular B', sans-serif;
}
.fg-country-meta {
  font-size: 12px; color: #475072; margin-top: 4px;
  font-family: 'Euclid Circular B', sans-serif;
}
/* Section card container */
.fg-card {
  background: #ffffff;
  border: 1px solid #D8E3F0;
  border-radius: 16px;
  padding: 24px 28px;
  box-shadow: 0 2px 8px rgba(15, 30, 70, 0.04);
}
/* Section title — acts as the card header */
.fg-section-title {
  font-size: 11px; font-weight: 700; color: #019DE7;
  text-transform: uppercase; letter-spacing: 1.2px;
  padding-bottom: 14px;
  border-bottom: 1px solid #dde4ee;
  margin: 0 0 16px 0;
  font-family: 'Euclid Circular B', sans-serif;
}
/* Sub-heading inside a card */
.fg-subheading {
  font-size: 13px; font-weight: 600; color: #162351;
  margin: 14px 0 4px 0;
  font-family: 'Euclid Circular B', sans-serif;
}
.fg-subheading:first-child { margin-top: 0; }
/* Body paragraph */
.fg-body {
  font-size: 13px; font-weight: 400; color: #475072;
  line-height: 1.65; margin: 4px 0 6px 0;
  font-family: 'Euclid Circular B', sans-serif;
  white-space: pre-wrap;
}
/* Table inside a card */
.fg-table {
  width: 100%;
  margin-top: 4px;
  border-collapse: collapse;
  font-family: 'Euclid Circular B', sans-serif;
  font-size: 12.5px;
}
.fg-table thead tr { background: rgba(1,157,231,0.06); }
.fg-table th {
  padding: 9px 12px; text-align: left;
  color: #475072; font-weight: 600;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
  border-bottom: 1px solid #dde4ee;
}
.fg-table td {
  padding: 10px 12px; vertical-align: top;
  border-bottom: 1px solid #eef1f6;
  color: #162351; line-height: 1.55;
}
.fg-table td:first-child {
  color: #475072; font-weight: 600; font-size: 12px;
  white-space: nowrap; width: 22%;
}
.fg-table tr:last-child td { border-bottom: none; }
.fg-table tr:hover td { background: rgba(1,157,231,0.03); }
/* Responsive */
@media (max-width: 1024px) and (min-width: 600px) {
  .fg-content { padding: 20px 20px; gap: 16px; }
  .fg-card { padding: 20px 22px; }
}
@media (max-width: 599px) {
  .fg-content { padding: 16px 14px; gap: 14px; }
  .fg-card { padding: 18px 18px; border-radius: 12px; }
  .fg-table td:first-child { white-space: normal; width: auto; }
}

</style>
</head>

  <!-- MAIN PANEL -->

        <line x1="20" y1="24" x2="44" y2="24" stroke="#4a9eff" stroke-width="2"/>
        <line x1="20" y1="32" x2="44" y2="32" stroke="#4a9eff" stroke-width="2"/>

      </svg>
      <h2>Select a Country</h2>
      <p>Select a country from the panel to view its freelancer eligibility guide.</p>

  </main>

</div><!-- /.layout -->

const REGIONS = {
  "Africa": ["Kenya","Nigeria","South Africa"],
  "Americas": ["Argentina","Brazil","Canada","Chile","Colombia","Mexico","USA"],
  "Asia": ["Bangladesh","Cambodia","China","Hong Kong","India","Indonesia","Japan","Malaysia","Pakistan","Philippines","Singapore","South Korea","Sri Lanka","Taiwan","Thailand","Vietnam"],
  "Europe": ["Belgium","Czech Republic","France","Germany","Hungary","Ireland","Italy","Netherlands","Poland","Portugal","Romania","Russia","Spain","Sweden","Switzerland","Turkey","UK","Ukraine"],
  "Middle East": ["Egypt","Israel","Saudi Arabia","United Arab Emirates (UAE)"],
  "Oceania": ["Australia","New Zealand"]
};

function getRegion(country) {
  for (const [region, countries] of Object.entries(REGIONS)) {
    if (countries.includes(country)) return region;
  }
  return "Other";
}

let activeCountry = null;
let allCountries = Object.keys(FREELANCER_DATA).sort();

function buildSidebar(filtered) {
  const list = document.getElementById("countryList");
  list.innerHTML = "";
  if (!filtered.length) {
    list.innerHTML = '<div class="sidebar-empty">No countries match your search.</div>';
    return;
  }
  filtered.forEach(country => {
    const iso = COUNTRY_CODES_EN[country] || "";
    const row = document.createElement("div");
    row.className = "sb-row" + (country === activeCountry ? " active" : "");
    row.innerHTML = `<span class="sb-code">${iso}</span><span class="sb-label">${country}</span>`;
    row.addEventListener("click", () => selectCountry(country));
    list.appendChild(row);
  });
}

function filterSidebar() {
  const query = document.getElementById("sidebarSearch").value.toLowerCase().trim();
  const region = document.getElementById("regionFilter").value;
  const filtered = allCountries.filter(c => {
    const matchQ = !query || c.toLowerCase().includes(query);
    const matchR = !region || getRegion(c) === region;
    return matchQ && matchR;
  });
  buildSidebar(filtered);
}

function clearFilters() {
  document.getElementById("sidebarSearch").value = "";
  document.getElementById("regionFilter").value = "";
  filterSidebar();
}

function selectCountry(country) {
  activeCountry = country;
  filterSidebar();
  renderDetail(country);
  if (window.innerWidth < 600) mobileCloseDrawer();
  setTimeout(() => {
    const active = document.querySelector(".sb-row.active");
    if (active) active.scrollIntoView({ block: "nearest", behavior: "smooth" });
  }, 30);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function renderDetail(country) {
  const rows = FREELANCER_DATA[country] || [];
  const iso = COUNTRY_CODES_EN[country] || "";
  const region = getRegion(country);
  const main = document.getElementById("mainContent");

  // Country header sits outside the card flow
  let html = `<div class="fg-country-header">`;
  html += `<h1>${escHtml(country)}</h1>`;
  html += `<div class="fg-country-meta">${iso ? '<strong>' + iso + '</strong> &middot; ' : ''}${escHtml(region)}</div>`;
  html += `</div>`;

  html += `<div class="fg-content">`;

  let inTable = false;
  let inCard  = false;
  let nextIsTableHeader = false;
  let currentSectionNum = 0;

  // skip row 0 (country title)
  for (let i = 1; i < rows.length; i++) {
    const row  = rows[i];
    const col0 = row[0] || "";
    const col1 = row[1] || "";
    const col2 = row[2] || "";

    const isSectionHeading = /^\d+\.\s/.test(col0) && col1 === "" && col2 === "";
    const isMultiCol = col1 !== "" || col2 !== "";

    if (isSectionHeading) {
      // close any open table then close the current card
      if (inTable) { html += `</tbody></table>`; inTable = false; }
      if (inCard)  { html += `</div>`; }

      // open a new card and put the section title inside as the card header
      html += `<div class="fg-card">`;
      html += `<h2 class="fg-section-title">${escHtml(col0)}</h2>`;
      inCard = true;

      const m = col0.match(/^(\d+)\./);
      currentSectionNum = m ? parseInt(m[1]) : 0;
      nextIsTableHeader = (currentSectionNum === 3 || currentSectionNum === 5);

    } else if (isMultiCol) {
      if (nextIsTableHeader) {
        if (inTable) { html += `</tbody></table>`; }
        const th2 = col2 !== "" ? `<th>${escHtml(col2)}</th>` : "";
        html += `<table class="fg-table"><thead><tr><th>${escHtml(col0)}</th><th>${escHtml(col1)}</th>${th2}</tr></thead><tbody>`;
        inTable = true;
        nextIsTableHeader = false;
      } else if (inTable) {
        const td2 = col2 !== "" ? `<td>${escHtml(col2)}</td>` : `<td></td>`;
        html += `<tr><td>${escHtml(col0)}</td><td>${escHtml(col1)}</td>${td2}</tr>`;
      } else {
        // multi-col outside table context — open a table
        const th2 = col2 !== "" ? `<th>${escHtml(col2)}</th>` : "";
        html += `<table class="fg-table"><thead><tr><th>${escHtml(col0)}</th><th>${escHtml(col1)}</th>${th2}</tr></thead><tbody>`;
        inTable = true;
      }
    } else {
      // single-col row
      if (inTable) { html += `</tbody></table>`; inTable = false; }
      if (col0.trim() === "") continue;
      if (col0.length <= 100) {
        html += `<h3 class="fg-subheading">${escHtml(col0)}</h3>`;
      } else {
        html += `<p class="fg-body">${escHtml(col0)}</p>`;
      }
    }
  }

  // close any remaining open elements
  if (inTable) html += `</tbody></table>`;
  if (inCard)  html += `</div>`;

  html += `</div>`; // close fg-content
  main.innerHTML = html;
  main.scrollTop = 0;
}

// Init — run after DOM is fully parsed
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => buildSidebar(allCountries));
} else {
  buildSidebar(allCountries);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('expanded');
}

function mobileOpenDrawer() {
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('sidebarOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function mobileCloseDrawer() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebarOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

function isTablet() { return window.innerWidth >= 600 && window.innerWidth <= 1024; }
function isMobile()  { return window.innerWidth < 600; }

window.addEventListener('resize', () => {
  const sb = document.getElementById('sidebar');
  if (!isMobile()) {
    sb.classList.remove('mobile-open');
    document.getElementById('sidebarOverlay').classList.remove('active');
    document.body.style.overflow = '';
  }
  if (!isTablet()) {
    sb.classList.remove('expanded');
  }
});
