<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marco | Work Schedule</title>
  <style>
    @import url('https://fonts.cdnfonts.com/css/euclid-circular-b');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0a1628;
      --navy-mid: #102040;
      --navy-light: #1a3055;
      --blue-bright: #2e7dd1;
      --blue-glow: #4a9eff;
      --white: #ffffff;
      --off-white: #f0f4f8;
      --text-muted: #8aa0b8;
      --border: #1e3a5f;
      --sb-pad-x: 16px;
      --sb-code-w: 34px;
      --sb-full-w: 280px;
      --sb-collapsed-w: 56px;
      --banner-h: 90px;
      --filter-h: 53px;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      display: flex; flex-direction: column;
      font-family: 'Euclid Circular B', 'Inter', sans-serif;
      background: var(--navy); color: var(--white);
      font-size: 14px; line-height: 1.5;
    }
    /* ══ BANNER ══ */
    .banner {
      height: var(--banner-h); background: var(--navy);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 24px; flex-shrink: 0; position: relative; z-index: 20;
    }
    .banner-left { display: flex; align-items: center; }
    .banner-logo { height: 40px; display: block; }
    .banner-divider { width: 1px; height: 34px; background: rgba(255,255,255,0.18); margin: 0 20px; flex-shrink: 0; }
    .banner-title { font-size: 15px; font-weight: 700; color: var(--white); letter-spacing: -0.1px; white-space: nowrap; }
    .banner-subtitle { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; }
    .btn-hamburger { display: none; align-items: center; justify-content: center; background: transparent; border: none; color: var(--white); cursor: pointer; padding: 8px; margin-right: 8px; font-size: 20px; }
    /* ══ FILTER BAR ══ */
    .filter-bar { height: var(--filter-h); background: var(--navy-mid); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0; }
    .filter-label { font-size: 10px; font-weight: 700; color: var(--text-muted); flex-shrink: 0; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
    .search-wrap { position: relative; flex: 1; min-width: 0; max-width: 300px; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; pointer-events: none; color: var(--text-muted); }
    .search-input { width: 100%; padding: 8px 10px 8px 32px; background: rgba(255,255,255,0.07); border: 1px solid var(--border); border-radius: 8px; color: var(--white); font-size: 13px; font-family: 'Euclid Circular B', sans-serif; outline: none; transition: border-color 0.2s, background 0.2s; }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--blue-bright); background: rgba(255,255,255,0.1); }
    .select-wrap { position: relative; flex-shrink: 0; min-width: 150px; }
    .select-wrap select { width: 100%; padding: 8px 28px 8px 11px; background: rgba(255,255,255,0.07); border: 1px solid var(--border); border-radius: 8px; color: var(--white); font-size: 13px; font-family: 'Euclid Circular B', sans-serif; appearance: none; cursor: pointer; outline: none; }
    .select-wrap select option { background: #1a2a3a; color: #fff; }
    .select-wrap select:focus { border-color: var(--blue-bright); }
    .select-wrap::after { content: '▾'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; font-size: 12px; }
    .btn-clear { padding: 8px 14px; flex-shrink: 0; background: rgba(255,60,60,0.12); border: 1px solid rgba(255,60,60,0.25); border-radius: 8px; color: #ff8888; font-size: 12px; font-weight: 600; font-family: 'Euclid Circular B', sans-serif; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-clear:hover { background: rgba(255,60,60,0.22); color: #ffbbbb; }
    .btn-clear .clear-icon { display: none; }
    /* ══ LAYOUT ══ */
    .layout { display: flex; flex: 1; overflow: hidden; position: relative; }
    /* ══ SIDEBAR ══ */
    .sidebar { width: var(--sb-full-w); min-width: var(--sb-full-w); background: var(--navy); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: width 0.25s ease, min-width 0.25s ease; flex-shrink: 0; z-index: 10; }
    .sidebar-header { padding: 11px var(--sb-pad-x); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--navy-mid); flex-shrink: 0; overflow: hidden; }
    .sidebar-header-text { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.2px; white-space: nowrap; overflow: hidden; transition: opacity 0.2s; }
    .btn-sb-toggle { display: none; align-items: center; justify-content: center; flex-shrink: 0; background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 6px; transition: color 0.2s; }
    .btn-sb-toggle:hover { color: var(--white); }
    .sidebar-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
    .sidebar-scroll::-webkit-scrollbar { width: 4px; }
    .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(74,158,255,0.2); border-radius: 2px; }
    .sb-row { display: flex; align-items: center; padding: 9px var(--sb-pad-x); border-left: 3px solid transparent; cursor: pointer; transition: background 0.13s, border-color 0.13s; user-select: none; gap: 8px; }
    .sb-row:hover { background: rgba(74,158,255,0.09); }
    .sb-row.active { background: rgba(46,125,209,0.16); border-left-color: var(--blue-bright); }
    .sb-code { width: var(--sb-code-w); flex-shrink: 0; font-size: 10.5px; font-weight: 700; color: #8aa0b8; letter-spacing: 0.8px; font-family: 'Euclid Circular B', sans-serif; text-align: left; line-height: 1; }
    .sb-label { flex: 1; font-size: 13px; font-weight: 500; color: #b8cce0; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .sb-row:hover .sb-label { color: var(--white); }
    .sb-row.active .sb-label { color: var(--white); font-weight: 600; }
    .sidebar-empty { padding: 30px var(--sb-pad-x); text-align: center; color: var(--text-muted); font-size: 13px; }
    /* ══ MOBILE OVERLAY ══ */
    .sidebar-overlay { display: none; position: fixed; inset: 0; z-index: 30; background: rgba(0,0,0,0.55); backdrop-filter: blur(2px); }
    .sidebar-overlay.active { display: block; }
    /* ══ MAIN CONTENT ══ */
    .main { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 24px 28px; background: var(--off-white); }
    .main::-webkit-scrollbar { width: 6px; }
    .main::-webkit-scrollbar-track { background: transparent; }
    .main::-webkit-scrollbar-thumb { background: rgba(0,30,80,0.18); border-radius: 3px; }
    .welcome-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; color: var(--text-muted); padding: 20px; }
    .welcome-state .big-icon { font-size: 48px; margin-bottom: 14px; opacity: 0.6; }
    .welcome-state h2 { font-size: 20px; font-weight: 600; color: #3a5070; margin-bottom: 8px; }
    .welcome-state p { font-size: 14px; max-width: 360px; line-height: 1.6; }
    /* ══ DETAIL HEADER ══ */
    .detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 2px solid #dde5ef; flex-wrap: wrap; gap: 12px; }
    .detail-header h1 { font-size: 22px; font-weight: 700; color: #0e2040; line-height: 1.3; }
    .detail-header .meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .region-tag { background: var(--navy); color: var(--blue-glow); padding: 6px 14px; border-radius: 16px; font-size: 12px; font-weight: 600; font-family: 'Euclid Circular B', sans-serif; white-space: nowrap; flex-shrink: 0; }
    /* ══ SCHEDULE SECTIONS ══ */
    .schedule-section { margin-bottom: 20px; }
    .section-heading { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #6080a0; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid #dde5ef; }
    .fields-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px 12px; }
    .field-card { background: #fff; border: 1px solid #e8eef4; border-radius: 8px; padding: 12px 14px; grid-column: 1 / -1; transition: box-shadow 0.15s; }
    .field-card:hover { box-shadow: 0 1px 6px rgba(0,30,80,0.07); }
    .field-card.half { grid-column: auto; }
    .field-card.highlight { background: #fffbf0; border-color: #f0e0b0; }
    .field-label { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #9ab0c8; margin-bottom: 4px; }
    .field-value { font-size: 13px; color: #2a3a4a; line-height: 1.6; }
    /* ══ SOURCES ══ */
    .sources-section { margin-top: 8px; padding: 14px 0 4px; border-top: 1px solid #dde5ef; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .sources-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #9ab0c8; flex-shrink: 0; }
    .source-link { font-size: 12px; font-weight: 500; color: var(--blue-bright); text-decoration: none; padding: 4px 10px; border: 1px solid rgba(46,125,209,0.25); border-radius: 6px; transition: background 0.15s, color 0.15s; }
    .source-link:hover { background: rgba(46,125,209,0.1); color: #4a9eff; }
    /* ══ TABLET ══ */
    @media (max-width: 1024px) and (min-width: 600px) {
      .btn-sb-toggle { display: flex; }
      .filter-label { display: none; }
      .sidebar { width: var(--sb-collapsed-w); min-width: var(--sb-collapsed-w); }
      .sidebar-header-text { opacity: 0; width: 0; overflow: hidden; }
      .sidebar .sidebar-header { justify-content: center; }
      .sidebar .sb-label { display: none !important; }
      .sidebar .sb-code { width: var(--sb-collapsed-w) !important; text-align: center !important; font-size: 11px; }
      .sidebar .sb-row { padding: 11px 0 !important; border-left: none !important; gap: 0; }
      .sidebar.expanded { width: var(--sb-full-w); min-width: var(--sb-full-w); }
      .sidebar.expanded .sidebar-header { justify-content: space-between; }
      .sidebar.expanded .sidebar-header-text { opacity: 1; width: auto; }
      .sidebar.expanded .sb-label { display: block !important; }
      .sidebar.expanded .sb-code { width: var(--sb-code-w) !important; text-align: left !important; font-size: 10.5px; }
      .sidebar.expanded .sb-row { padding: 9px var(--sb-pad-x) !important; border-left: 3px solid transparent !important; gap: 8px; }
      .sidebar.expanded .sb-row.active { border-left-color: var(--blue-bright) !important; }
      .fields-grid { grid-template-columns: 1fr; }
      .field-card.half { grid-column: 1 / -1; }
    }
    /* ══ MOBILE ══ */
    @media (max-width: 599px) {
      :root { --filter-h: 52px; }
      .banner { padding: 12px 16px; height: auto; align-items: flex-start; }
      .banner-logo { height: 32px; margin-top: 2px; }
      .banner-divider { height: 26px; margin-top: 4px; }
      .banner-title { font-size: 13px; white-space: normal; line-height: 1.35; }
      .banner-subtitle { font-size: 10.5px; white-space: normal; line-height: 1.45; margin-top: 3px; }
      .btn-hamburger { display: flex; }
      .filter-label { display: none; }
      .btn-clear .clear-text { display: none; }
      .btn-clear .clear-icon { display: inline; }
      .btn-clear { padding: 0; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
      .filter-bar { gap: 8px; padding: 0 12px; }
      .search-wrap { flex: 1; min-width: 0; max-width: none; }
      .search-input { font-size: 12px; padding: 7px 8px 7px 28px; }
      .select-wrap { width: 110px; min-width: 0; }
      .select-wrap select { font-size: 12px; padding: 7px 22px 7px 8px; }
      .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: min(85vw, 300px); min-width: 0; z-index: 40; transform: translateX(-110%); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); box-shadow: 4px 0 32px rgba(0,0,0,0.4); }
      .sidebar.mobile-open { transform: translateX(0); }
      .main { padding: 16px; }
      .fields-grid { grid-template-columns: 1fr; }
      .field-card.half { grid-column: 1 / -1; }
    }
  </style>
</head>

      </div>
      <div class="sidebar-scroll" id="countryList"></div>
    </div>
    <div class="main" id="mainContent">
      <div class="welcome-state">
        <div class="big-icon">&#127760;</div>
        <h2>Select a country to view its work schedule</h2>
        <p>Choose any country from the left panel. You can search by name or filter by region.</p>
      </div>
    </div>
  </div>

    };

    var currentKey = null;
    var ALL_KEYS = Object.keys(SCHEDULE_DATA).sort();

    function getRegion(k) { return (SCHEDULE_DATA[k] || {}).region || 'Other'; }
    function getISO(k) { return ISO_MAP[k] || k.substring(0,2).toUpperCase(); }

    function getFilteredKeys() {
      var search = (document.getElementById('sidebarSearch').value || '').toLowerCase();
      var region = document.getElementById('regionFilter').value;
      return ALL_KEYS.filter(function(k) {
        if (search && k.toLowerCase().indexOf(search) === -1) return false;
        if (region && getRegion(k) !== region) return false;
        return true;
      });
    }

    function buildSidebar(keys) {
      var list = document.getElementById('countryList');
      if (!keys.length) {
        list.innerHTML = '<div class="sidebar-empty">No countries found</div>';
        return;
      }
      list.innerHTML = keys.map(function(k) {
        return '<div class="sb-row' + (currentKey === k ? ' active' : '') + '" data-key="' + escHtml(k) + '">' +
          '<span class="sb-code">' + escHtml(getISO(k)) + '</span>' +
          '<span class="sb-label">' + escHtml(k) + '</span>' +
          '</div>';
      }).join('');
    }

    document.getElementById('countryList').addEventListener('click', function(e) {
      var row = e.target.closest('.sb-row[data-key]');
      if (!row) return;
      var key = row.dataset.key;
      currentKey = key;
      buildSidebar(getFilteredKeys());
      renderDetail(key);
      mobileCloseDrawer();
    });

    function filterSidebar() { buildSidebar(getFilteredKeys()); }
    function clearFilters() {
      document.getElementById('sidebarSearch').value = '';
      document.getElementById('regionFilter').value = '';
      buildSidebar(ALL_KEYS);
    }

    function renderDetail(key) {
      var d = SCHEDULE_DATA[key];
      if (!d) return;
      document.getElementById('mainContent').innerHTML =
        '<div class="detail-header">' +
          '<div>' +
            '<h1>' + escHtml(key) + '</h1>' +
            '<div class="meta">' + escHtml(d.region) + ' &middot; Last checked: 2026-06-16</div>' +
          '</div>' +
          '<div class="region-tag">' + escHtml(d.region) + '</div>' +
        '</div>' +
        renderSection('Working Hours', [
          { label: 'Standard Hours / Day', value: d.stdDay, half: true },
          { label: 'Standard Hours / Week', value: d.stdWeek, half: true },
          { label: 'Work Pattern', value: d.pattern },
          { label: 'Maximum Hours', value: d.maxHours }
        ]) +
        renderSection('Overtime', [
          { label: 'OT Threshold', value: d.otThreshold },
          { label: 'OT Rate', value: d.otRate }
        ]) +
        renderSection('Rest &amp; Breaks', [
          { label: 'Weekly Rest', value: d.weeklyRest },
          { label: 'Daily Rest', value: d.dailyRest },
          { label: 'Break / Rest Period', value: d.breakRule }
        ]) +
        renderSection('Special Provisions', [
          { label: 'Night Work', value: d.nightWork },
          { label: 'Weekend &amp; Holiday', value: d.weekendHoliday },
          { label: 'Flexible Work', value: d.flexible }
        ]) +
        renderSection('Compliance', [
          { label: 'Record-Keeping', value: d.records },
          { label: 'Compliance Note', value: d.compliance, highlight: true }
        ]) +
        '<div class="sources-section">' +
          '<span class="sources-label">Sources</span>' +
          (d.primarySource ? '<a href="' + escHtml(d.primarySource) + '" target="_blank" rel="noopener" class="source-link">Primary Source &#8599;</a>' : '') +
          (d.secondarySource && d.secondarySource !== d.primarySource ? '<a href="' + escHtml(d.secondarySource) + '" target="_blank" rel="noopener" class="source-link">Secondary Source &#8599;</a>' : '') +
        '</div>';
    }

    function renderSection(title, fields) {
      return '<div class="schedule-section">' +
        '<div class="section-heading">' + title + '</div>' +
        '<div class="fields-grid">' +
        fields.map(function(f) {
          return '<div class="field-card' + (f.half ? ' half' : '') + (f.highlight ? ' highlight' : '') + '">' +
            '<div class="field-label">' + escHtml(f.label) + '</div>' +
            '<div class="field-value">' + escHtml(f.value || '—') + '</div>' +
            '</div>';
        }).join('') +
        '</div></div>';
    }

    function escHtml(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function mobileOpenDrawer() {
      document.getElementById('sidebar').classList.add('mobile-open');
      document.getElementById('sidebarOverlay').classList.add('active');
    }
    function mobileCloseDrawer() {
      document.getElementById('sidebar').classList.remove('mobile-open');
      document.getElementById('sidebarOverlay').classList.remove('active');
    }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('expanded'); }

    buildSidebar(ALL_KEYS);
  </script>
</body>
