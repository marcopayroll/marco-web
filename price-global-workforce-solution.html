<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marco | Global Workforce Solution</title>
<link rel="stylesheet" href="https://fonts.cdnfonts.com/css/euclid-circular-b">
<style>
/* ─── RESET & BASE ─── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Euclid Circular B', sans-serif;
  background: #f5f6f8;
  color: #1a1a2e;
  font-size: 14px;
  line-height: 1.5;
}

/* ─── BANNER ─── */
.banner {
  background: #0a1628;
  position: relative;
  overflow: hidden;
  padding: 0 24px;
  height: 90px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
}

.banner::before {
  content: '';
  position: absolute;
  right: -60px;
  top: -60px;
  width: 280px;
  height: 280px;
  border-radius: 50%;
  border: 1.5px solid rgba(74,158,255,0.12);
  box-shadow: 0 0 0 28px rgba(74,158,255,0.04), 0 0 0 56px rgba(74,158,255,0.03);
  pointer-events: none;
}

.banner-left {
  display: flex;
  align-items: center;
  gap: 16px;
  z-index: 1;
  min-width: 0;
}

.banner-logo {
  height: 44px;
  width: auto;
  display: block;
  flex-shrink: 0;
}

.banner-divider {
  width: 1px;
  height: 32px;
  background: rgba(255,255,255,0.2);
  flex-shrink: 0;
}

.banner-text { min-width: 0; }

.banner-title {
  font-size: 17px;
  font-weight: 700;
  color: #ffffff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.banner-subtitle {
  font-size: 11px;
  color: #8aa0b8;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ─── APP SHELL ─── */
.app-shell {
  display: flex;
  height: calc(100vh - 90px);
  overflow: hidden;
}

/* ─── SIDEBAR ─── */
.sidebar {
  width: 258px;
  flex-shrink: 0;
  background: #0a1628;
  border-right: 1px solid #1e3a5f;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-inner {
  overflow-y: auto;
  flex: 1;
  padding: 24px 0 32px;
}

.sidebar-inner::-webkit-scrollbar { width: 4px; }
.sidebar-inner::-webkit-scrollbar-track { background: transparent; }
.sidebar-inner::-webkit-scrollbar-thumb { background: rgba(74,158,255,0.2); border-radius: 2px; }

/* Version block */
.version-block {
  padding: 0 16px 20px;
  border-bottom: 1px solid #1e3a5f;
  margin-bottom: 8px;
}

.version-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.3px;
  text-transform: uppercase;
  color: #8aa0b8;
  margin-bottom: 10px;
}

/* Styled dropdown */
.version-dropdown {
  width: 100%;
  height: 36px;
  background: rgba(255,255,255,0.06);
  border: 1px solid #1e3a5f;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  cursor: pointer;
  user-select: none;
  position: relative;
  transition: border-color 0.15s;
}

.version-dropdown:hover { border-color: rgba(74,158,255,0.4); }
.version-dropdown.open { border-color: #2e7dd1; box-shadow: 0 0 0 3px rgba(46,125,209,0.15); }

.version-dropdown-label {
  font-size: 13.5px;
  font-weight: 500;
  color: #ffffff;
}

.version-dropdown-chevron {
  font-size: 11px;
  color: #8aa0b8;
  transition: transform 0.2s;
  flex-shrink: 0;
}
.version-dropdown.open .version-dropdown-chevron { transform: rotate(180deg); }

/* Dropdown menu */
.version-menu {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  width: 100%;
  background: #102040;
  border: 1px solid #1e3a5f;
  border-radius: 6px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  overflow: hidden;
  z-index: 100;
  display: none;
}
.version-dropdown.open .version-menu { display: block; }

.version-option {
  padding: 9px 12px;
  font-size: 13.5px;
  font-weight: 400;
  color: #b8cce0;
  cursor: pointer;
  transition: background 0.1s;
}
.version-option:hover { background: rgba(74,158,255,0.1); color: #ffffff; }
.version-option.selected { font-weight: 600; color: #4a9eff; background: rgba(46,125,209,0.15); }

/* Nav groups — no collapsing, just category label */
.nav-group { padding: 16px 0 4px; }

.nav-group-header {
  padding: 0 16px 8px;
}

.nav-group-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: #8aa0b8;
}

.nav-group-divider {
  height: 1px;
  background: #1e3a5f;
  margin: 0 16px 8px;
}

.nav-link {
  display: block;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  color: #b8cce0;
  text-decoration: none;
  cursor: pointer;
  transition: color 0.12s, background 0.12s;
  border-left: 3px solid transparent;
  line-height: 1.4;
}

.nav-link:hover { color: #ffffff; background: rgba(74,158,255,0.09); }

.nav-link.active {
  color: #ffffff;
  font-weight: 600;
  border-left-color: #2e7dd1;
  background: rgba(46,125,209,0.16);
}

/* ─── CONTENT AREA ─── */
.content-area {
  flex: 1;
  overflow-y: auto;
  background: #f5f6f8;
}

.content-area::-webkit-scrollbar { width: 6px; }
.content-area::-webkit-scrollbar-thumb { background: #c8d0dc; border-radius: 3px; }
.content-area::-webkit-scrollbar-track { background: transparent; }

.content-inner {
  width: 100%;
  padding: 40px 48px 80px;
}


/* ─── PAGE META BAR ─── */
.page-meta {
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-rows: auto auto;
  column-gap: 24px;
  margin-bottom: 20px;
}
.page-meta .page-title {
  grid-column: 1;
  grid-row: 1;
  margin-bottom: 0;
}
.page-meta-type {
  display: none;
  grid-column: 2;
  grid-row: 1;
  font-size: 13px;
  color: #8c95a6;
  font-weight: 400;
  text-align: right;
  white-space: nowrap;
  align-self: center;
}
.page-meta-version {
  grid-column: 1;
  grid-row: 2;
  font-size: 12px;
  color: #8c95a6;
  font-weight: 400;
  margin-top: 3px;
}
.page-meta-validity {
  grid-column: 2;
  grid-row: 2;
  font-size: 12px;
  color: #8c95a6;
  font-weight: 400;
  text-align: right;
  white-space: nowrap;
  margin-top: 3px;
}

/* ─── PAGE HEADER ─── */
.page-title {
  font-size: 26px;
  font-weight: 700;
  color: #111827;
  letter-spacing: -0.3px;
  margin-bottom: 0;
}

.page-divider {
  height: 1px;
  background: #d0d5dd;
  margin-bottom: 36px;
}

/* ─── SECTION ─── */
.pricing-section { margin-bottom: 40px; }

.section-title {
  font-size: 15px;
  font-weight: 700;
  color: #111827;
  margin-bottom: 16px;
}

/* ─── TABLE ─── */
.table-wrap { width: 100%; margin-bottom: 0; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13.5px;
  table-layout: fixed;
}

/*
  Column width system — mirrors PDF proportions:
  .col-service  = fills all remaining space (Service Scope — always widest)
  .col-price    = clamp(160px, 13vw, 280px) — scales with viewport
  .col-comments = clamp(160px, 14vw, 300px) — scales with viewport
  .col-num      = fixed 36px  — # column in HRO table
  These are set on <th> and inherited by <td> in the same column.
*/
.col-service  { width: auto; }
.col-price    { width: clamp(160px, 13vw, 280px); }
.col-comments { width: clamp(160px, 14vw, 300px); }
.col-price-wide { width: clamp(200px, 18vw, 360px); } /* Payroll Processing — no Comments col */
.col-eor        { width: clamp(160px, 14vw, 300px); } /* EOR tables — One-time Fee / Monthly Fee cols */
.col-num      { width: 44px; white-space: nowrap; text-align: center; }

/* Column header row (light blue-grey shaded) */
.col-header-row th {
  background: #dce6f5;
  color: #2c3e6b;
  font-size: 12px;
  font-weight: 600;
  padding: 9px 16px;
  text-align: left;
  white-space: normal;
  word-break: normal;
  overflow-wrap: break-word;
  border: none;
  vertical-align: bottom;
}

/* Sub-group label row */
.subgroup-row td {
  font-size: 13px;
  font-weight: 700;
  color: #1a1a2e;
  padding: 12px 16px 6px;
  background: transparent;
  border: none;
}

/* Data rows */
.data-row td {
  padding: 9px 16px;
  border-bottom: 1px solid #edf0f5;
  color: #2d3748;
  font-size: 13.5px;
  vertical-align: top;
  text-align: left;
  word-break: normal;
  overflow-wrap: break-word;
  white-space: normal;
}

.data-row:last-child td { border-bottom: none; }

.data-row td.label { color: #374151; }
.data-row td.note  { font-size: 12.5px; color: #6b7280; font-style: italic; }

/* Footnote text below table */
.table-footnote {
  font-size: 12px;
  color: #6b7280;
  margin-top: 8px;
  line-height: 1.5;
  text-align: left;
  width: 100%;
  display: block;
}

/* Notes section */
.notes-block {
  background: #f9fafb;
  border: 1px solid #e4e7ec;
  border-radius: 6px;
  padding: 14px 18px;
  margin-top: 12px;
}

.notes-block p {
  font-size: 12.5px;
  color: #4a5568;
  line-height: 1.65;
  margin-bottom: 6px;
}
.notes-block p:last-child { margin-bottom: 0; }

/* Section spacing */
.section-gap { margin-bottom: 48px; }

/* HRO numbered table */
.hro-num {
  font-size: 12px;
  color: #9ca3af;
  text-align: center;
  vertical-align: top;
  padding-top: 10px;
}
.data-row td.hro-num { white-space: nowrap; overflow: hidden; }

/* Free label */
.free-label { color: #15803d; font-weight: 600; }

/* Quoted label */
.quoted-label { color: #6b7280; font-style: italic; }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 300px;
  color: #9ca3af;
  text-align: center;
}
.empty-state p { margin-top: 8px; font-size: 13px; }

/* ════════════════════════════════════════
   RESPONSIVE — tablet & mobile
════════════════════════════════════════ */

/* Tablet: 768px–1024px — shrink sidebar slightly */
@media (max-width: 1024px) {
  .sidebar { width: 220px; }
  .content-inner { padding: 32px 32px 60px; }
  .banner { padding: 0 20px; }
  .banner-logo { height: 38px; }
  .banner-divider { height: 28px; }
  .banner-title { font-size: 15px; }
}

/* Small tablet / large phone: hide sidebar, show toggle */
@media (max-width: 768px) {
  html, body { overflow: auto; }

  .app-shell {
    flex-direction: column;
    height: auto;
    min-height: calc(100vh - 90px);
  }

  /* Banner compact */
  .banner {
    height: 60px;
    padding: 0 16px;
    gap: 12px;
  }
  .banner-logo { height: 32px; }
  .banner-divider { height: 24px; }
  .banner-title { font-size: 15px; }
  .banner-subtitle { display: none; }

  /* Sidebar becomes a top horizontal strip */
  .sidebar {
    width: 100%;
    height: auto;
    border-right: none;
    border-bottom: 1px solid #1e3a5f;
    flex-direction: row;
    overflow-x: auto;
    overflow-y: hidden;
    flex-shrink: 0;
  }

  .sidebar-inner {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 0;
    padding: 0;
    overflow-x: auto;
    overflow-y: hidden;
    width: 100%;
    flex-wrap: nowrap;
  }

  .sidebar-inner::-webkit-scrollbar { height: 3px; width: 0; }

  /* Version block inline */
  .version-block {
    padding: 10px 14px;
    border-bottom: none;
    border-right: 1px solid #1e3a5f;
    flex-shrink: 0;
    margin-bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .version-label { margin-bottom: 5px; white-space: nowrap; }
  .version-dropdown { width: 90px; height: 30px; }
  .version-dropdown-label { font-size: 12px; }
  .version-menu { top: calc(100% + 2px); width: 110px; }

  /* Nav groups horizontal */
  .nav-group {
    padding: 0;
    display: flex;
    flex-direction: row;
    align-items: stretch;
    flex-shrink: 0;
  }

  .nav-group-header { display: none; }
  .nav-group-divider { display: none; }

  .nav-group-items {
    display: flex;
    flex-direction: row;
    align-items: stretch;
  }

  .nav-link {
    padding: 0 14px;
    height: 100%;
    min-height: 52px;
    display: flex;
    align-items: center;
    border-left: none;
    border-bottom: 3px solid transparent;
    font-size: 12px;
    white-space: nowrap;
  }

  .nav-link:hover { border-bottom-color: rgba(74,158,255,0.4); }
  .nav-link.active {
    border-left: none;
    border-bottom-color: #2e7dd1;
    background: rgba(46,125,209,0.16);
  }

  /* Content */
  .content-area { overflow-y: auto; height: auto; }
  .content-inner { padding: 24px 20px 48px; }

  /* Page meta stack on mobile */
  .page-meta {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto auto;
    gap: 2px;
    margin-bottom: 16px;
  }
  .page-meta .page-title { grid-column: 1; grid-row: 1; }
  .page-meta-version { grid-column: 1; grid-row: 2; }
  .page-meta-type { grid-column: 1; grid-row: 3; text-align: left; margin-top: 6px; }
  .page-meta-validity { grid-column: 1; grid-row: 4; text-align: left; }

  /* Tables scroll horizontally on small screens */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  table { font-size: 12.5px; }

  .col-header-row th { padding: 8px 12px; font-size: 11px; }
  .col-price       { width: 160px; }
  .col-comments    { width: 150px; }
  .col-price-wide  { width: 200px; }
  .data-row td { padding: 8px 12px; }
  .subgroup-row td { padding: 10px 12px 5px; }

  .section-title { font-size: 14px; }
  .page-title { font-size: 20px; }
}

/* Phone: 480px and below */
@media (max-width: 480px) {
  .banner { padding: 12px 16px; height: auto; align-items: flex-start; }
  .banner-left { align-items: flex-start; gap: 12px; }
  .banner-logo { height: 32px; margin-top: 2px; }
  .banner-divider { height: 26px; margin-top: 4px; }
  .banner-title { font-size: 13px; font-weight: 700; white-space: normal; line-height: 1.35; }
  .banner-subtitle { font-size: 10.5px; white-space: normal; line-height: 1.45; margin-top: 3px; }
  .content-inner { padding: 20px 14px 40px; }
  .version-dropdown { width: 76px; }
  table { font-size: 12px; }
  .col-header-row th { padding: 7px 10px; }
  .col-price       { width: 130px; }
  .col-comments    { width: 120px; }
  .col-price-wide  { width: 160px; }
  .data-row td { padding: 7px 10px; }
}
</style>
</head>

<!-- ─── BANNER ─── -->
<header class="banner">
  <div class="banner-left">
    <a href="index.html"><img class="banner-logo" src="https://marcowallpaper.s3.ap-southeast-1.amazonaws.com/Marco+logo+white+(tall).png" alt="Marco"></a>
    <div class="banner-divider"></div>
    <div class="banner-text">
      <div class="banner-title">Global Workforce Solution</div>
      <div class="banner-subtitle">Service pricing for global workforce administration</div>
    </div>
  </div>
</header>

<!-- ─── APP SHELL ─── -->
<div class="app-shell">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-inner">

      <!-- Version -->
      <div class="version-block">
        <div class="version-label">Version</div>
        <div class="version-dropdown" id="versionDropdown">
          <span class="version-dropdown-label" id="versionDropdownLabel">2026.2</span>

      <!-- Nav -->
      <div id="sidebarNav"></div>

    </div>

  <!-- CONTENT -->
  <main class="content-area">
    <div class="content-inner" id="contentInner"></div>
  </main>

</div>

<script>
/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
const state = {
  version: '2026.2.3',
  category: 'Fixed Price',
  section: 'Employer of Record (EOR)'
};

/* ══════════════════════════════════════════
   NAV STRUCTURE
══════════════════════════════════════════ */
const versionValidity = {
  '2026.2.3': '1 April 2026 to 30 June 2026',
  '2026.2.2': '1 April 2026 to 30 June 2026',
  '2026.2.1': '1 April 2026 to 30 June 2026',
  '2026.1.1': '1 January 2026 to 31 March 2026'
};

const navStructure = {
  '2026.2.3': {
    subtitle: 'Service pricing for global workforce administration',
    categories: {
      'Fixed Price': [
        'Employer of Record (EOR)',
        'IC Management',
        'Expense Processing',
        'Marco OS',
        'Global Mobility'
      ],
      'Percentage Price': [
        'Employer of Record (EOR)',
        'IC Management',
        'Expense Processing',
        'Marco OS',
        'Global Mobility'
      ]
    }
  },
  '2026.2.2': {
    subtitle: 'Service pricing for global workforce administration',
    categories: {
      'Customer Pricing': [
        'Employer of Record (EOR)',
        'IC Management',
        'Expense Processing',
        'Marco OS',
        'Global Mobility'
      ]
    }
  },
  '2026.2.1': {
    subtitle: 'Service pricing for global workforce administration',
    categories: {
      'Customer Pricing': [
        'Employer of Record (EOR)',
        'IC Management',
        'Expense Processing',
        'Marco OS',
        'Global Mobility'
      ]
    }
  },
  '2026.1.1': {
    subtitle: 'Service pricing for global workforce administration',
    categories: {
      'Customer Pricing': [
        'Employer of Record (EOR)',
        'IC Management',
        'Expense Processing',
        'Marco OS',
        'Global Mobility'
      ]
    }
  }
};

/* ══════════════════════════════════════════
   HRO ROWS HELPER
══════════════════════════════════════════ */
function hroRows(rate) {
  const services = [
    ['Social Security & Income Tax Account Administrator', rate + ' / hour', 'Min. 2 hours / month'],
    ['Offline Counter Assistance for Social Security & Income Tax Account Setup', rate + ' / hour', 'Min. 4 hours / session'],
    ['Social Security & Income Tax Account Setting Up Authorization Letter and Related Document Assistance', rate + ' / hour', 'Min. 2 hours / session'],
    ['Additional Labor Declaration', rate + ' / hour', 'Min. 1 hour / session'],
    ['Shadow Payroll Advisory Services', rate + ' / hour', 'Min. 1 hour / session'],
    ['Monthly Payroll FAQ', rate + ' / hour', 'Min. 1 hour / session'],
    ['Employee Benefit Calculation (e.g. Car allowance, Fuel allowance etc.)', rate + ' / hour', 'Min. 1 hour / session'],
    ['Payroll Cost Analysis and Estimation', rate + ' / hour', 'Min. 1 hour / session'],
    ['Annual Tax Filing', rate + ' / hour', 'Min. 4 hours / session'],
    ['Issue Social Insurance and Tax Certificate', rate + ' / hour', 'Min. 1 hour / session'],
    ['General Ledger (GL) File and Related Tax Filing', rate + ' / hour', 'Min. 2 hours / session'],
    ['Reserve a Medical Check-up', rate + ' / hour', 'Min. 1 hour / session'],
    ['Issuing Employment Offer (Marco Liaison)', rate + ' / hour', 'Min. 1 hour / session'],
    ['Interpretation of Employment Contract and Company Welfare Policy', rate + ' / hour', 'Min. 1 hour / session'],
    ['Drafting and Signing Employment Contract (Marco Liaison)', rate + ' / hour', 'Min. 2 hours / session'],
    ['Handle Employee Onboarding (Marco Liaisons and Organizing Onboarding Materials)', rate + ' / hour', 'Min. 2 hours / session'],
    ['Managing Employee Termination (Marco Liaison)', rate + ' / hour', 'Min. 2 hours / session'],
    ['Advisory Services and Documentation for Time-off and Attendance Management Policy', rate + ' / hour', 'Min. 2 hours / session'],
    ['Attendance & Overtime Records (Marco Liaison)', rate + ' / hour', 'Min. 2 hours / session'],
    ['Leave & Holiday Record Management (Marco System)', rate + ' / hour', 'Min. 1 hour / session'],
    ['Compensation Reminder Service (Contract Agreed)', rate + ' / hour', 'Min. 1 hour / session'],
    ['On-site HR Service (Quotation Based on Expertise Level)', 'Quoted upon request', 'Based on the on-site employee\'s level'],
    ['Employee Compensation & Benefits Consultation and Setup', rate + ' / hour + external vendor costs', 'Min. 2 hours / session'],
    ['Assistance in Arranging Commercial Insurance', rate + ' / hour + external vendor costs', 'Min. 2 hours / session'],
    ['Assistance in Establishing Private Pension Funds', rate + ' / hour + external vendor costs', 'Min. 2 hours / session'],
    ['Cross-Border Tax Filing and Consultation for Domestic and Expatriate Employees', rate + ' / hour + external vendor costs', 'Min. 2 hours / session'],
    ['Labor Reporting Services', rate + ' / hour + external vendor costs', 'Min. 2 hours / session'],
    ['Privacy and Data Compliance Advisory', rate + ' / hour + external vendor costs', 'Min. 2 hours / session'],
    ['Professional HRO Agent Service (Europe)', rate + ' / hour + external vendor costs', 'Min. 2 hours / session'],
    ['Translation Assistance Services', rate + ' / hour + external vendor costs', 'Min. 2 hours / session'],
    ['Employee Handbook Assistance', 'Quoted upon request', '—'],
    ['Consultation and Documentation on Union related Matters', rate + ' / hour + external vendor costs', 'Min. 2 hours / session'],
  ];
  return services.map((s, i) => `
    <tr class="data-row">
      <td class="hro-num">${i + 1}</td>
      <td class="label">${s[0]}</td>
      <td>${s[1]}</td>
      <td class="note">${s[2]}</td>

/* ══════════════════════════════════════════
   RENDER SIDEBAR
══════════════════════════════════════════ */
function renderSidebar() {
  const versions = Object.keys(navStructure);
  const vd = navStructure[state.version];

  // Version menu options
  document.getElementById('versionMenu').innerHTML = versions.map(v =>
    `<div class="version-option${v === state.version ? ' selected' : ''}" data-version="${v}">${v}</div>`
  ).join('');

  // Label
  document.getElementById('versionDropdownLabel').textContent = state.version;

  // Nav groups
  const multiCat = Object.keys(vd.categories).length > 1;
  document.getElementById('sidebarNav').innerHTML = Object.entries(vd.categories).map(([cat, sections]) => `
    <div class="nav-group" data-cat="${cat}">
      ${multiCat ? `
        <div class="nav-group-header">
          <span class="nav-group-title">${cat}</span>
        </div>
        <div class="nav-group-divider"></div>` : ''}
      <div class="nav-group-items">
        ${sections.map(sec => `
          <div class="nav-link${state.category === cat && state.section === sec ? ' active' : ''}"
               data-cat="${cat}" data-section="${sec}">
            ${sec}
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

/* ══════════════════════════════════════════
   RENDER CONTENT
══════════════════════════════════════════ */
function renderContent() {
  const key = `${state.version}|${state.category}|${state.section}`;
  const renderer = contentRenderers[key];
  document.getElementById('contentInner').innerHTML = renderer
    ? renderer()
    : `<div class="empty-state"><p>Content for this section is not yet available for version ${state.version}.</p></div>`;
  document.querySelector('.content-area').scrollTop = 0;
}

/* ══════════════════════════════════════════
   EVENT BINDING
══════════════════════════════════════════ */
function bindEvents() {
  // Version dropdown toggle
  const dropdown = document.getElementById('versionDropdown');
  dropdown.addEventListener('click', (e) => {
    e.stopPropagation();
    dropdown.classList.toggle('open');
  });

  // Version option select — use event delegation on the dropdown container
  // so it survives renderSidebar() re-rendering the inner HTML
  dropdown.addEventListener('click', (e) => {
    const opt = e.target.closest('.version-option');
    if (!opt) return;
    e.stopPropagation();
    state.version = opt.dataset.version;
    const cats = navStructure[state.version].categories;
    state.category = Object.keys(cats)[0];
    state.section = cats[state.category][0];
    dropdown.classList.remove('open');
    renderSidebar();
    renderContent();
    bindNavEvents();
  });

  // Close dropdown on outside click
  document.addEventListener('click', () => {
    dropdown.classList.remove('open');
  });

  bindNavEvents();
}

function bindNavEvents() {
  // Nav link click
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
      state.category = link.dataset.cat;
      state.section = link.dataset.section;
      renderSidebar();
      renderContent();
      bindNavEvents();
    });
  });
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
renderSidebar();
renderContent();
bindEvents();
</script>
