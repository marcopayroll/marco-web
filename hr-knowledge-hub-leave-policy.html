<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marco Leave Policy</title>
<link rel="stylesheet" href="https://fonts.cdnfonts.com/css/euclid-circular-b">
<style>
:root {
  --navy:       #0a1628;
  --navy-mid:   #102040;
  --navy-light: #1a3055;
  --blue-bright:#2e7dd1;
  --blue-glow:  #4a9eff;
  --white:      #ffffff;
  --off-white:  #f0f4f8;
  --text-muted: #8aa0b8;
  --border:     #1e3a5f;
  --sb-pad-x:   16px;
  --sb-code-w:  34px;
  --sb-full-w:  280px;
  --sb-collapsed-w: 56px;
  --banner-h:   90px;
  --filter-h:   53px;

  /* leave-type tag colours */
  --tag-annual-bg:    #e6f4ec; --tag-annual:    #1a6b3a;
  --tag-sick-bg:      #fff3e6; --tag-sick:      #b05a00;
  --tag-maternity-bg: #f5e6f8; --tag-maternity: #6b1a7a;
  --tag-paternity-bg: #e6eef8; --tag-paternity: #1a4a8a;
  --tag-parental-bg:  #e4f5ec; --tag-parental:  #1a5a3a;
  --tag-other-bg:     #e8f0f4; --tag-other:     #3d5a6b;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: 'Euclid Circular B', sans-serif;
  background: var(--off-white);
  color: #1a2a3a;
  display: flex; flex-direction: column;
}

/* ── BANNER ── */
.banner {
  background: var(--navy);
  position: relative; overflow: hidden;
  padding: 0 24px; height: 90px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.banner::before {
  content: ""; position: absolute; right: -60px; top: -60px;
  width: 280px; height: 280px; border-radius: 50%;
  border: 1.5px solid rgba(74,158,255,0.12);
  box-shadow: 0 0 0 28px rgba(74,158,255,0.04), 0 0 0 56px rgba(74,158,255,0.03);
  pointer-events: none;
}
.banner-left { display:flex; align-items:center; gap:16px; z-index:1; }
.banner-logo { height:44px; width:auto; display:block; flex-shrink:0; }
.banner-divider { width:1px; height:32px; background:rgba(255,255,255,0.2); flex-shrink:0; }
.banner-title { font-size:17px; font-weight:700; color:var(--white); }
.banner-subtitle { font-size:12px; color:var(--text-muted); margin-top:2px; }
.banner-right { z-index:1; display:flex; align-items:center; gap:12px; }
.banner-stat {
  text-align:right;
  font-size:11px; color:var(--text-muted); letter-spacing:.5px; font-family:'Euclid Circular B', sans-serif;
}
.banner-stat strong { display:block; font-size:22px; color:var(--blue-glow); font-weight:700; letter-spacing:0; }

/* ── FILTER BAR ── */
.filter-bar {
  background: var(--navy-mid);
  border-bottom: 1px solid var(--border);
  padding: 0 16px; height: 53px;
  flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
}
.filter-label {
  font-size:11px; font-weight:600;
  color:var(--text-muted);
  text-transform:uppercase; letter-spacing:1px; white-space:nowrap;
}
.search-wrap { position:relative; flex:1; min-width:180px; max-width:320px; }
.search-icon {
  position:absolute; left:10px; top:50%;
  transform:translateY(-50%);
  width:16px; height:16px; pointer-events:none;
  color:var(--text-muted);
}
.search-input {
  width:100%; padding:8px 10px 8px 32px;
  background:rgba(255,255,255,0.07);
  border:1px solid var(--border); border-radius:8px;
  color:var(--white); font-size:13px;
  font-family:'Euclid Circular B', sans-serif;
  outline:none; transition:border-color .2s,background .2s;
}
.search-input::placeholder { color:var(--text-muted); }
.search-input:focus { border-color:var(--blue-bright); background:rgba(255,255,255,0.1); }

.select-wrap { position:relative; min-width:150px; flex-shrink:0; }
.select-wrap select {
  width:100%; padding:8px 28px 8px 11px;
  background:rgba(255,255,255,0.07);
  border:1px solid var(--border); border-radius:8px;
  color:var(--white); font-size:13px;
  font-family:'Euclid Circular B', sans-serif;
  appearance:none; cursor:pointer; outline:none;
}
.select-wrap select option { background:#1a2a3a; color:#fff; }
.select-wrap select:focus { border-color:var(--blue-bright); }
.select-wrap::after {
  content:"▾"; position:absolute; right:10px; top:50%;
  transform:translateY(-50%);
  color:var(--text-muted); pointer-events:none; font-size:12px;
}
.btn-clear {
  padding:8px 14px;
  background:rgba(255,60,60,0.12);
  border:1px solid rgba(255,60,60,0.25); border-radius:8px;
  color:#ff8888; font-size:12px; font-weight:600;
  font-family:'Euclid Circular B', sans-serif;
  cursor:pointer; transition:all .2s; white-space:nowrap; flex-shrink:0;
}
.btn-clear:hover { background:rgba(255,60,60,0.22); color:#ffbbbb; }

/* ── LAYOUT ── */
.layout { display:flex; flex:1; overflow:hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width:var(--sb-full-w); min-width:var(--sb-full-w);
  background:var(--navy);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
  transition:width 0.25s ease, min-width 0.25s ease;
  flex-shrink:0; z-index:10;
  position:relative;
}
.sidebar-header {
  padding:11px var(--sb-pad-x);
  font-size:11px; font-weight:600;
  color:var(--text-muted);
  text-transform:uppercase; letter-spacing:1px;
  border-bottom:1px solid var(--border);
  background:var(--navy-mid); flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  overflow:hidden;
}
.sidebar-header-text {
  white-space:nowrap; overflow:hidden;
  transition:opacity 0.2s;
}
.sidebar-scroll { flex:1; overflow-y:auto; overflow-x:hidden; }
.sidebar-scroll::-webkit-scrollbar { width:4px; }
.sidebar-scroll::-webkit-scrollbar-track { background:transparent; }
.sidebar-scroll::-webkit-scrollbar-thumb { background:rgba(74,158,255,0.2); border-radius:2px; }

.sb-row {
  display:flex; align-items:center;
  padding:9px var(--sb-pad-x);
  border-left:3px solid transparent;
  cursor:pointer;
  transition:background .13s, border-color .13s;
  user-select:none;
  gap:8px;
}
.sb-row:hover { background:rgba(74,158,255,0.09); }
.sb-row.active {
  background:rgba(46,125,209,0.16);
  border-left-color:var(--blue-bright);
}
.sb-code {
  width:var(--sb-code-w); flex-shrink:0;
  font-size:10.5px; font-weight:700;
  color:#8aa0b8; letter-spacing:.8px;
  font-family:'Euclid Circular B', sans-serif;
  text-align:left; line-height:1;
}
.sb-label {
  flex:1; font-size:13px; font-weight:500;
  color:#b8cce0; line-height:1.25;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  min-width:0;
  transition:opacity 0.2s, max-width 0.2s;
}
.sb-row:hover .sb-label { color:var(--white); }
.sb-row.active .sb-label { color:var(--white); font-weight:600; }
.sb-badge {
  font-size:10.5px;
  background:rgba(74,158,255,0.12);
  color:var(--text-muted);
  padding:2px 7px; border-radius:8px;
  font-family:'Euclid Circular B', sans-serif;
  flex-shrink:0;
  transition:opacity 0.2s;
}
.sb-row.active .sb-badge { background:rgba(46,125,209,0.3); color:var(--blue-glow); }
.sidebar-empty {
  padding:24px 16px; color:var(--text-muted);
  font-size:13px; text-align:center;
}

/* ── MAIN CONTENT ── */
.main {
  flex:1; overflow-y:auto; overflow-x:hidden;
  background:var(--off-white);
  padding:32px 40px;
}
.main::-webkit-scrollbar { width:6px; }
.main::-webkit-scrollbar-track { background:transparent; }
.main::-webkit-scrollbar-thumb { background:rgba(46,125,209,0.25); border-radius:3px; }

/* Empty state */
.empty-state {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100%; gap:16px;
  color:var(--text-muted);
}
.empty-state svg { opacity:.3; }
.empty-state h2 { font-size:20px; font-weight:600; color:#4a6a8a; }
.empty-state p { font-size:14px; text-align:center; max-width:300px; }

/* Detail header */
.detail-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:24px;
  padding:18px 28px;
  background:var(--navy);
  border-radius:12px;
  box-shadow:0 2px 8px rgba(10,22,40,0.18);
}
.detail-header h1 { font-size:24px; font-weight:700; color:var(--white); line-height:1.2; }
.detail-meta { font-size:12px; color:var(--text-muted); margin-top:4px; font-family:'Euclid Circular B', sans-serif; letter-spacing:.4px; }
.leave-count-badge {
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.18);
  color:var(--white);
  border-radius:12px; padding:8px 18px;
  text-align:center; flex-shrink:0;
  font-family:'Euclid Circular B', sans-serif;
}
.leave-count-badge .num { font-size:24px; font-weight:700; color:var(--blue-glow); display:block; }
.leave-count-badge .lbl { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.8px; }

/* Leave cards */
.leave-card {
  background:#fff;
  border:1px solid #d8e6f0;
  border-radius:12px;
  margin-bottom:16px;
  overflow:hidden;
  box-shadow:0 1px 4px rgba(10,22,40,0.06);
  transition:box-shadow .2s;
}
.leave-card:hover { box-shadow:0 4px 16px rgba(10,22,40,0.1); }
.leave-card-header {
  display:flex; align-items:center; gap:12px;
  padding:16px 20px;
  background:#f8fbfd;
  border-bottom:1px solid #e8f0f8;
  cursor:pointer;
  user-select:none;
}
.leave-card-header:hover { background:#f0f6fc; }
.leave-type-tag {
  font-size:11.5px; font-weight:600;
  padding:4px 12px; border-radius:20px;
  font-family:'Euclid Circular B', sans-serif;
  letter-spacing:.3px; white-space:nowrap;
  border:1px solid rgba(0,0,0,0.08);
}
.tag-annual    { background:var(--tag-annual-bg);    color:var(--tag-annual); }
.tag-sick      { background:var(--tag-sick-bg);      color:var(--tag-sick); }
.tag-maternity { background:var(--tag-maternity-bg); color:var(--tag-maternity); }
.tag-paternity { background:var(--tag-paternity-bg); color:var(--tag-paternity); }
.tag-parental  { background:var(--tag-parental-bg);  color:var(--tag-parental); }
.tag-other     { background:var(--tag-other-bg);     color:var(--tag-other); }
.leave-card-title {
  flex:1; font-size:14px; font-weight:600; color:#1a2a3a;
}
.card-chevron {
  font-size:11px; color:#8aa0b8;
  transition:transform .2s; flex-shrink:0;
}
.leave-card.open .card-chevron { transform:rotate(180deg); }

.leave-card-body {
  display:none;
  padding:0;
}
.leave-card.open .leave-card-body { display:block; }

/* 4-column table inside card */
.policy-grid {
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  border-top:1px solid #e8f0f8;
}
.policy-col {
  padding:16px 18px;
  border-right:1px solid #eef4f9;
}
.policy-col:last-child { border-right:none; }
.policy-col-label {
  font-size:10px; font-weight:700;
  text-transform:uppercase; letter-spacing:.8px;
  color:#7a9ab8; margin-bottom:10px;
  font-family:'Euclid Circular B', sans-serif;
}
.policy-col ul {
  list-style:none; margin:0; padding:0;
}
.policy-col ul li {
  font-size:12.5px; color:#2a3a4a;
  padding:2px 0 2px 14px;
  position:relative;
  line-height:1.5;
}
.policy-col ul li::before {
  content:'·';
  position:absolute; left:0;
  color:var(--blue-bright);
  font-weight:700; font-size:16px;
  line-height:1.2;
}

/* Responsive: collapse grid on narrow */
@media (max-width: 1100px) {
  .policy-grid { grid-template-columns:1fr 1fr; }
  .policy-col { border-right:none; border-bottom:1px solid #eef4f9; }
  .policy-col:nth-child(even) { border-left:1px solid #eef4f9; }
}

/* ── HAMBURGER (mobile filter bar) — hidden on desktop ── */
.btn-hamburger {
  display:none;
  align-items:center; justify-content:center;
  width:36px; height:36px; flex-shrink:0;
  background:rgba(255,255,255,0.07);
  border:1px solid var(--border); border-radius:8px;
  color:var(--white); font-size:16px; cursor:pointer;
  transition:background 0.2s;
}
.btn-hamburger:hover { background:rgba(255,255,255,0.14); }

/* ── SIDEBAR TOGGLE (tablet header) — hidden on desktop ── */
.btn-sb-toggle {
  display:none;
  align-items:center; justify-content:center;
  flex-shrink:0;
  background:transparent;
  border:none;
  color:var(--text-muted); cursor:pointer;
  padding:6px;
  transition:color 0.2s;
}
.btn-sb-toggle:hover { color:var(--white); }

/* ── OVERLAY (mobile backdrop) ── */
.sidebar-overlay {
  display:none;
  position:fixed; inset:0; z-index:30;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(2px);
}
.sidebar-overlay.active { display:block; }

/* ── BANNER responsive ── */
.banner-left { min-width:0; }
.banner-title { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.banner-subtitle { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ── CLEAR button icon variant ── */
.btn-clear .clear-text {}
.btn-clear .clear-icon { display:none; }

/* ══════════════════════════════════════════════════
   TABLET  (600px – 1024px)
   Sidebar collapses to ISO-code strip (56px).
   ≡ button inside sidebar header toggles expand.
══════════════════════════════════════════════════ */
@media (max-width:1024px) and (min-width:600px) {
  .btn-sb-toggle { display:flex; }
  .filter-label  { display:none; }

  /* Collapsed by default */
  .sidebar {
    width:var(--sb-collapsed-w);
    min-width:var(--sb-collapsed-w);
  }
  .sidebar-header-text { opacity:0; width:0; overflow:hidden; }
  .sidebar .sidebar-header { justify-content:center; }
  /* Remove label & badge from flex layout entirely so they don't steal space */
  .sidebar .sb-label,
  .sidebar .sb-badge  { display:none !important; }
  /* Give code the full sidebar width so text-align:center always works */
  .sidebar .sb-code   {
    width:var(--sb-collapsed-w) !important;
    text-align:center !important;
    font-size:11px;
  }
  /* Strip all row padding & border-left so nothing shifts the code off-center */
  .sidebar .sb-row    { padding:11px 0 !important; border-left:none !important; gap:0; }
  .sidebar .sidebar-empty { padding:10px 4px; font-size:10px; }

  /* Expanded state */
  .sidebar.expanded {
    width:var(--sb-full-w);
    min-width:var(--sb-full-w);
  }
  .sidebar.expanded .sidebar-header { justify-content:space-between; }
  .sidebar.expanded .sidebar-header-text { opacity:1; width:auto; }
  .sidebar.expanded .sb-label,
  .sidebar.expanded .sb-badge  { display:flex !important; opacity:1; width:auto; pointer-events:auto; }
  .sidebar.expanded .sb-label  { display:block !important; }
  .sidebar.expanded .sb-code   { width:var(--sb-code-w) !important; text-align:left !important; font-size:10.5px; }
  .sidebar.expanded .sb-row    { padding:9px var(--sb-pad-x) !important; border-left:3px solid transparent !important; gap:8px; }
  .sidebar.expanded .sb-row.active { border-left-color:var(--blue-bright) !important; }
  .sidebar.expanded .sidebar-empty { padding:24px 16px; font-size:13px; }

  /* Content grid: 2-col on tablet */
  .policy-grid { grid-template-columns:1fr 1fr; }
  .policy-col  { border-right:none; border-bottom:1px solid #eef4f9; }
  .policy-col:nth-child(odd) { border-right:1px solid #eef4f9; }
  .policy-col:last-child     { border-bottom:none; }

  .main { padding:24px 28px; }
  .detail-header { flex-wrap:wrap; gap:12px; padding:16px 20px; }
  .detail-header h1 { font-size:20px; }
}

/* ══════════════════════════════════════════════════
   MOBILE  (< 600px)
   Sidebar is a fixed slide-in drawer.
   ≡ hamburger in filter bar opens it.
══════════════════════════════════════════════════ */
@media (max-width:599px) {
  :root {
    --filter-h: 52px;
    --banner-h: auto;
  }

  /* Banner */
  .banner { padding:12px 16px; height:auto; }
  .banner-logo   { height:32px; margin-top:2px; }
  .banner-divider { height:26px; }
  .banner-title  { font-size:14px; white-space:normal; line-height:1.3; }
  .banner-subtitle { font-size:10.5px; white-space:normal; line-height:1.4; margin-top:3px; }

  /* Filter bar */
  .btn-hamburger { display:flex; }
  .filter-label  { display:none; }
  .filter-bar    { gap:8px; padding:0 12px; }
  .search-wrap   { flex:1; min-width:0; max-width:none; }
  .search-input  { font-size:12px; padding:7px 8px 7px 28px; }
  .search-icon   { width:14px; height:14px; left:8px; }
  .select-wrap   { flex-shrink:0; min-width:0; width:100px; }
  .select-wrap select { font-size:12px; padding:7px 20px 7px 8px; }

  /* Clear: icon only */
  .btn-clear .clear-text { display:none; }
  .btn-clear .clear-icon { display:inline; }
  .btn-clear { padding:0; width:36px; height:36px; display:flex; align-items:center; justify-content:center; }

  /* Sidebar: fixed overlay drawer */
  .sidebar {
    position:fixed;
    top:0; left:0; bottom:0;
    width:min(85vw, 300px);
    min-width:0;
    z-index:40;
    transform:translateX(-110%);
    transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
    box-shadow:4px 0 32px rgba(0,0,0,0.4);
  }
  .sidebar.mobile-open { transform:translateX(0); }
  .btn-sb-toggle { display:flex; }

  /* Content */
  .main { padding:16px; }
  /* Detail header: row layout on mobile — name+badge same row, meta below */
  /* Mobile detail header:
     Row 1 — country name (left) + leave-count badge (right)
     Row 2 — detail-meta full width below
     Achieved with flex-wrap: the inner div holds h1 (flex:1),
     badge sits inline, then detail-meta breaks to its own row */
  /* Mobile detail header: row 1 = name + badge, row 2 = meta */
  .detail-header {
    flex-direction:row;
    flex-wrap:wrap;
    align-items:center;
    gap:0;
    padding:14px 16px 12px;
  }
  .detail-header > div:first-child {
    display:contents;
  }
  .detail-header h1 {
    flex:1; min-width:0;
    font-size:20px;
    order:1;
  }
  .leave-count-badge {
    order:2;
    margin-left:12px;
  }
  .detail-meta {
    order:3;
    width:100%;
    margin-top:8px;
  }

  /* Cards: 1-column policy grid */
  .policy-grid { grid-template-columns:1fr; }
  .policy-col  { border-right:none; border-bottom:1px solid #eef4f9; }
  .policy-col:last-child { border-bottom:none; }

  .leave-card-header { padding:12px 16px; gap:10px; }
  .leave-type-tag    { font-size:10.5px; padding:3px 10px; }
}

</style>
</head>
<body>


<!-- BANNER -->
<header class="banner">
  <div class="banner-left">
    <a href="index.html"><img class="banner-logo"
         src="https://marcowallpaper.s3.ap-southeast-1.amazonaws.com/Marco+logo+white+(tall).png"
         alt="Marco" onerror="this.style.display='none'"></a>
    <div class="banner-divider"></div>
    <div class="banner-text">
      <div class="banner-title">Leave Policy</div>
      <div class="banner-subtitle">Global Employee Leave Entitlements</div>
    </div>
  </div>
</header>

<!-- FILTER BAR -->
<div class="filter-bar">
  <button class="btn-hamburger" id="btnMobileOpen" onclick="mobileOpenDrawer()" aria-label="Open menu">&#9776;</button>
  <span class="filter-label">Filter</span>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M21 21L16.65 16.65M19 11C19 15.4183 15.4183 19 11 19C6.58172 19 3 15.4183 3 11C3 6.58172 6.58172 3 11 3C15.4183 3 19 6.58172 19 11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <input class="search-input" id="sidebarSearch" type="text"
           placeholder="Search countries…" oninput="filterSidebar()">
  </div>
  <div class="select-wrap">
    <select id="regionFilter" onchange="filterSidebar()">
      <option value="">All regions</option>
      <option value="Asia Pacific">Asia Pacific</option>
      <option value="Europe">Europe</option>
      <option value="Americas">Americas</option>
      <option value="Middle East &amp; Africa">Middle East &amp; Africa</option>
    </select>
  </div>
  <button class="btn-clear" onclick="clearFilters()"><span class="clear-text">Clear ✕</span><span class="clear-icon">✕</span></button>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- Mobile overlay backdrop -->

const REGIONS = {
  "Asia Pacific": ["Australia","Bangladesh","Cambodia","China","Hong Kong","India","Indonesia","Japan","Laos","Malaysia","New Zealand","Pakistan","Philippines","Singapore","South Korea","Taiwan","Thailand","Vietnam"],
  "Europe": ["Austria","Belgium","Bulgaria","Croatia","Czech Republic","Denmark","Estonia","Finland","France","Georgia","Germany","Greece","Hungary","Ireland","Italy","Kyrgyzstan","Latvia","Lithuania","Luxembourg","Netherlands","Norway","Poland","Portugal","Romania","Serbia","Slovenia","Spain","Sweden","Switzerland","Ukraine","United Kingdom"],
  "Americas": ["Argentina","Brazil","Canada","Chile","Colombia","Mexico","Panama","Peru","United States"],
  "Middle East & Africa": ["Algeria","Egypt","Jordan","Kazakhstan","Morocco","Nigeria","Qatar","Saudi Arabia","South Africa","Turkey","United Arab Emirates"]
};

function getRegion(country) {
  for (const [region, countries] of Object.entries(REGIONS)) {
    if (countries.includes(country)) return region;
  }
  return "Other";
}

function getTagClass(leaveType) {
  const lt = leaveType.toLowerCase();
  if (lt.includes("annual") || lt.includes("vacation") || lt.includes("holiday leave") || lt.includes("holiday replacement") || lt.includes("paid time off") || lt.includes("pto") || lt.includes("service incentive") || lt.includes("casual leave") || lt.includes("long service") || lt.includes("community service") || lt.includes("jury") || lt.includes("national service") || lt.includes("military") || lt.includes("special leave") || lt.includes("force majeure") || lt.includes("hajj") || lt.includes("time off for dependents") || lt.includes("family and medical") || lt.includes("fmla")) return "tag-annual";
  if (lt.includes("sick") || lt.includes("disability") || lt.includes("menstrual") || lt.includes("menstruation") || lt.includes("sterilization") || lt.includes("hospitalization") || lt.includes("post-maternity childcare medical") || lt.includes("work-related injury") || lt.includes("personal/carer")) return "tag-sick";
  if (lt.includes("maternity") || lt.includes("pregnancy") || lt.includes("pregnanc")) return "tag-maternity";
  if (lt.includes("paternity") || lt.includes("partner") || lt.includes("birth & childcare") || lt.includes("birth-time childcare") || lt.includes("leave for the other parent") || lt.includes("pregnancy checkup accompaniment")) return "tag-paternity";
  if (lt.includes("parental") || lt.includes("childcare") || lt.includes("shared parental") || lt.includes("adoption") || lt.includes("neonatal") || lt.includes("unpaid infant") || lt.includes("family caregiver") || lt.includes("family responsibility") || lt.includes("family violence") || lt.includes("family & domestic") || lt.includes("carer")) return "tag-parental";
  if (lt.includes("bereavement") || lt.includes("compassionate") || lt.includes("kibiki")) return "tag-bereavement";
  if (lt.includes("marriage")) return "tag-marriage";
  return "tag-other";
}

let activeCountry = null;
let allCountries = Object.keys(EN_DATA).sort();

function buildSidebar(filtered) {
  const list = document.getElementById("countryList");
  list.innerHTML = "";


  if (!filtered.length) {
    list.innerHTML = '<div class="sidebar-empty">No countries match your search.</div>';
    return;
  }

  filtered.forEach(country => {
    const iso = COUNTRY_CODES_EN[country] || "";
    const count = EN_DATA[country].length;
    const row = document.createElement("div");
    row.className = "sb-row" + (country === activeCountry ? " active" : "");
    row.innerHTML = `
      <span class="sb-code">${iso}</span>
      <span class="sb-label">${country}</span>
      <span class="sb-badge">${count}</span>
    `;
    row.addEventListener("click", () => selectCountry(country));
    list.appendChild(row);
  });
}

function filterSidebar() {
  const query = document.getElementById("sidebarSearch").value.toLowerCase().trim();
  const region = document.getElementById("regionFilter").value;
  const filtered = allCountries.filter(c => {
    const matchQ = !query || c.toLowerCase().includes(query);
    const matchR = !region || getRegion(c) === region;
    return matchQ && matchR;
  });
  buildSidebar(filtered);
  // keep active highlighted if still in filtered
  if (activeCountry && !filtered.includes(activeCountry)) {
    // active country filtered out — keep detail visible but deactivate sidebar highlight
  }
}

function clearFilters() {
  document.getElementById("sidebarSearch").value = "";
  document.getElementById("regionFilter").value = "";
  filterSidebar();
}

function selectCountry(country) {
  activeCountry = country;
  filterSidebar();
  renderDetail(country);
  if (window.innerWidth < 600) mobileCloseDrawer();
  setTimeout(() => {
    const active = document.querySelector(".sb-row.active");
    if (active) active.scrollIntoView({ block: "nearest", behavior: "smooth" });
  }, 30);
}

function renderDetail(country) {
  const leaves = EN_DATA[country] || [];
  const iso = COUNTRY_CODES_EN[country] || "";
  const region = getRegion(country);
  const main = document.getElementById("mainContent");

  let html = `
    <div class="detail-header">
      <div>
        <h1>${country}</h1>
        <div class="detail-meta">${iso ? '<strong>' + iso + '</strong> &middot; ' : ""}${region} &middot; Leave Policy Reference</div>
      </div>
      <div class="leave-count-badge">
        <span class="num">${leaves.length}</span>
        <span class="lbl">Leave Type${leaves.length !== 1 ? "s" : ""}</span>
      </div>
    </div>
  `;

  leaves.forEach((leave, idx) => {
    const tagClass = getTagClass(leave.leaveType);
    const cardId = `card-${idx}`;
    html += `
    <div class="leave-card open" id="${cardId}">
      <div class="leave-card-header" onclick="toggleCard('${cardId}')">
        <span class="leave-type-tag ${tagClass}">${leave.leaveType}</span>
        <span class="card-chevron">▾</span>
      </div>
      <div class="leave-card-body">
        <div class="policy-grid">
          <div class="policy-col">
            <div class="policy-col-label">Entitlement</div>
            <ul>${(leave.entitlement || []).map(i => `<li>${escHtml(i)}</li>`).join("")}</ul>
          </div>
          <div class="policy-col">
            <div class="policy-col-label">Eligibility</div>
            <ul>${(leave.eligibility || []).map(i => `<li>${escHtml(i)}</li>`).join("")}</ul>
          </div>
          <div class="policy-col">
            <div class="policy-col-label">Validity / Expiry</div>
            <ul>${(leave.validity || []).map(i => `<li>${escHtml(i)}</li>`).join("")}</ul>
          </div>
          <div class="policy-col">
            <div class="policy-col-label">Requests &amp; Docs</div>
            <ul>${(leave.request || []).map(i => `<li>${escHtml(i)}</li>`).join("")}</ul>
          </div>
        </div>
      </div>
    </div>`;
  });

  main.innerHTML = html;
  main.scrollTop = 0;
}

function toggleCard(id) {
  const card = document.getElementById(id);
  if (card) card.classList.toggle("open");
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// Init
buildSidebar(allCountries);

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('expanded');
}

function mobileOpenDrawer() {
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('sidebarOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function mobileCloseDrawer() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebarOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

function isTablet() { return window.innerWidth >= 600 && window.innerWidth <= 1024; }
function isMobile()  { return window.innerWidth < 600; }

// On resize: clean up state classes so overlay/drawer don't get stuck
window.addEventListener('resize', () => {
  const sb = document.getElementById('sidebar');
  if (!isMobile()) {
    sb.classList.remove('mobile-open');
    document.getElementById('sidebarOverlay').classList.remove('active');
    document.body.style.overflow = '';
  }
  if (!isTablet()) {
    sb.classList.remove('expanded');
  }
});
</script>
