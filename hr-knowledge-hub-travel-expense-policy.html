<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel &amp; Expense Policy — Global Per Diem Rates | Marco</title>
<link rel="stylesheet" href="https://fonts.cdnfonts.com/css/euclid-circular-b">
<style>
:root {
  --navy:       #0a1628;
  --navy-mid:   #102040;
  --navy-light: #1a3055;
  --blue-bright:#2e7dd1;
  --blue-glow:  #4a9eff;
  --white:      #ffffff;
  --off-white:  #f0f4f8;
  --text-muted: #8aa0b8;
  --border:     #1e3a5f;
  --sb-pad-x:   16px;
  --sb-code-w:  34px;
  --sb-full-w:  280px;
  --sb-collapsed-w: 56px;
  --banner-h:   90px;
  --filter-h:   53px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: 'Euclid Circular B', sans-serif;
  background: var(--navy);
  color: #1a2a3a;
  display: flex; flex-direction: column;
}

/* ── BANNER ── */
.banner {
  background: var(--navy);
  position: relative; overflow: hidden;
  padding: 0 24px; height: 90px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.banner::before {
  content: ""; position: absolute; right: -60px; top: -60px;
  width: 280px; height: 280px; border-radius: 50%;
  border: 1.5px solid rgba(74,158,255,0.12);
  box-shadow: 0 0 0 28px rgba(74,158,255,0.04), 0 0 0 56px rgba(74,158,255,0.03);
  pointer-events: none;
}
.banner-left { display:flex; align-items:center; gap:16px; z-index:1; }
.banner-logo { height:44px; width:auto; display:block; flex-shrink:0; }
.banner-divider { width:1px; height:32px; background:rgba(255,255,255,0.2); flex-shrink:0; }
.banner-title { font-size:17px; font-weight:700; color:var(--white); }
.banner-subtitle { font-size:12px; color:var(--text-muted); margin-top:2px; }
.banner-right { z-index:1; display:flex; align-items:center; gap:12px; }

/* ── FILTER BAR ── */
.filter-bar {
  background: var(--navy-mid);
  border-bottom: 1px solid var(--border);
  padding: 0 16px; height: 53px;
  flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
}
.filter-label {
  font-size:11px; font-weight:600;
  color:var(--text-muted);
  text-transform:uppercase; letter-spacing:1px; white-space:nowrap;
}
.search-wrap { position:relative; flex:1; min-width:180px; max-width:320px; }
.search-icon {
  position:absolute; left:10px; top:50%;
  transform:translateY(-50%);
  width:16px; height:16px; pointer-events:none;
  color:var(--text-muted);
}
.search-input {
  width:100%; padding:8px 10px 8px 32px;
  background:rgba(255,255,255,0.07);
  border:1px solid var(--border); border-radius:8px;
  color:var(--white); font-size:13px;
  font-family:'Euclid Circular B', sans-serif;
  outline:none; transition:border-color .2s,background .2s;
}
.search-input::placeholder { color:var(--text-muted); }
.search-input:focus { border-color:var(--blue-bright); background:rgba(255,255,255,0.1); }
.select-wrap { position:relative; min-width:150px; flex-shrink:0; }
.select-wrap select {
  width:100%; padding:8px 28px 8px 11px;
  background:rgba(255,255,255,0.07);
  border:1px solid var(--border); border-radius:8px;
  color:var(--white); font-size:13px;
  font-family:'Euclid Circular B', sans-serif;
  appearance:none; cursor:pointer; outline:none;
}
.select-wrap select option { background:#1a2a3a; color:#fff; }
.select-wrap select:focus { border-color:var(--blue-bright); }
.select-wrap::after {
  content:"▾"; position:absolute; right:10px; top:50%;
  transform:translateY(-50%);
  color:var(--text-muted); pointer-events:none; font-size:12px;
}
.btn-clear {
  padding:8px 14px;
  background:rgba(255,60,60,0.12);
  border:1px solid rgba(255,60,60,0.25); border-radius:8px;
  color:#ff8888; font-size:12px; font-weight:600;
  font-family:'Euclid Circular B', sans-serif;
  cursor:pointer; transition:all .2s; white-space:nowrap; flex-shrink:0;
}
.btn-clear:hover { background:rgba(255,60,60,0.22); color:#ffbbbb; }

/* ── LAYOUT ── */
.layout { display:flex; flex:1; overflow:hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width:var(--sb-full-w); min-width:var(--sb-full-w);
  background:var(--navy);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
  transition:width 0.25s ease, min-width 0.25s ease;
  flex-shrink:0; z-index:10; position:relative;
}
.sidebar-header {
  padding:11px var(--sb-pad-x);
  font-size:11px; font-weight:600;
  color:var(--text-muted);
  text-transform:uppercase; letter-spacing:1px;
  border-bottom:1px solid var(--border);
  background:var(--navy-mid); flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  overflow:hidden;
}
.sidebar-header-text { white-space:nowrap; overflow:hidden; transition:opacity 0.2s; }
.sidebar-scroll { flex:1; overflow-y:auto; overflow-x:hidden; }
.sidebar-scroll::-webkit-scrollbar { width:4px; }
.sidebar-scroll::-webkit-scrollbar-track { background:transparent; }
.sidebar-scroll::-webkit-scrollbar-thumb { background:rgba(74,158,255,0.2); border-radius:2px; }

.sb-row {
  display:flex; align-items:center;
  padding:9px var(--sb-pad-x);
  border-left:3px solid transparent;
  cursor:pointer; transition:background .13s, border-color .13s;
  user-select:none; gap:8px;
}
.sb-row:hover { background:rgba(74,158,255,0.09); }
.sb-row.active { background:rgba(46,125,209,0.16); border-left-color:var(--blue-bright); }
.sb-code {
  width:var(--sb-code-w); flex-shrink:0;
  font-size:10.5px; font-weight:700;
  color:#8aa0b8; letter-spacing:.8px;
  font-family:'Euclid Circular B', sans-serif;
  text-align:left; line-height:1;
}
.sb-label {
  flex:1; font-size:13px; font-weight:500;
  color:#b8cce0; line-height:1.25;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  min-width:0; transition:opacity 0.2s, max-width 0.2s;
}
.sb-row:hover .sb-label { color:var(--white); }
.sb-row.active .sb-label { color:var(--white); font-weight:600; }
.sidebar-empty { padding:24px 16px; color:var(--text-muted); font-size:13px; text-align:center; }

/* ── MAIN CONTENT ── */
.main {
  flex:1; overflow-y:auto; overflow-x:hidden;
  background:var(--off-white); padding:0;
}
.main::-webkit-scrollbar { width:6px; }
.main::-webkit-scrollbar-track { background:transparent; }
.main::-webkit-scrollbar-thumb { background:rgba(46,125,209,0.25); border-radius:3px; }

/* Empty state */
.empty-state {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100%; gap:16px; color:var(--text-muted);
}
.empty-state svg { opacity:.3; }
.empty-state h2 { font-size:20px; font-weight:600; color:#4a6a8a; }
.empty-state p { font-size:14px; text-align:center; max-width:300px; }

/* ── HAMBURGER ── */
.btn-hamburger {
  display:none; align-items:center; justify-content:center;
  width:36px; height:36px; flex-shrink:0;
  background:rgba(255,255,255,0.07);
  border:1px solid var(--border); border-radius:8px;
  color:var(--white); font-size:16px; cursor:pointer;
  transition:background 0.2s;
}
.btn-hamburger:hover { background:rgba(255,255,255,0.14); }

/* ── SIDEBAR TOGGLE ── */
.btn-sb-toggle {
  display:none; align-items:center; justify-content:center;
  flex-shrink:0; background:transparent; border:none;
  color:var(--text-muted); cursor:pointer; padding:6px;
  transition:color 0.2s;
}
.btn-sb-toggle:hover { color:var(--white); }

/* ── OVERLAY ── */
.sidebar-overlay {
  display:none; position:fixed; inset:0; z-index:30;
  background:rgba(0,0,0,0.55); backdrop-filter:blur(2px);
}
.sidebar-overlay.active { display:block; }

/* ── BANNER responsive ── */
.banner-left { min-width:0; }
.banner-title { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.banner-subtitle { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.btn-clear .clear-icon { display:none; }

/* ══ TABLET ══ */
@media (max-width:1024px) and (min-width:600px) {
  .btn-sb-toggle { display:flex; }
  .filter-label  { display:none; }
  .sidebar { width:var(--sb-collapsed-w); min-width:var(--sb-collapsed-w); }
  .sidebar-header-text { opacity:0; width:0; overflow:hidden; }
  .sidebar .sidebar-header { justify-content:center; }
  .sidebar .sb-label  { display:none !important; }
  .sidebar .sb-code   { width:var(--sb-collapsed-w) !important; text-align:center !important; font-size:11px; }
  .sidebar .sb-row    { padding:11px 0 !important; border-left:none !important; gap:0; }
  .sidebar.expanded { width:var(--sb-full-w); min-width:var(--sb-full-w); }
  .sidebar.expanded .sidebar-header { justify-content:space-between; }
  .sidebar.expanded .sidebar-header-text { opacity:1; width:auto; }
  .sidebar.expanded .sb-label  { display:block !important; opacity:1; width:auto; pointer-events:auto; }
  .sidebar.expanded .sb-code   { width:var(--sb-code-w) !important; text-align:left !important; font-size:10.5px; }
  .sidebar.expanded .sb-row    { padding:9px var(--sb-pad-x) !important; border-left:3px solid transparent !important; gap:8px; }
  .sidebar.expanded .sb-row.active { border-left-color:var(--blue-bright) !important; }
}

/* ══ MOBILE ══ */
@media (max-width:599px) {
  :root { --filter-h: 52px; --banner-h: auto; }
  .banner { padding:12px 16px; height:auto; }
  .banner-logo { height:32px; margin-top:2px; }
  .banner-divider { height:26px; }
  .banner-title  { font-size:14px; white-space:normal; line-height:1.3; }
  .banner-subtitle { font-size:10.5px; white-space:normal; line-height:1.4; margin-top:3px; }
  .btn-hamburger { display:flex; }
  .filter-label  { display:none; }
  .filter-bar    { gap:8px; padding:0 12px; }
  .search-wrap   { flex:1; min-width:0; max-width:none; }
  .search-input  { font-size:12px; padding:7px 8px 7px 28px; }
  .search-icon   { width:14px; height:14px; left:8px; }
  .select-wrap   { flex-shrink:0; min-width:0; width:100px; }
  .select-wrap select { font-size:12px; padding:7px 20px 7px 8px; }
  .btn-clear .clear-text { display:none; }
  .btn-clear .clear-icon { display:inline; }
  .btn-clear { padding:0; width:36px; height:36px; display:flex; align-items:center; justify-content:center; }
  .sidebar {
    position:fixed; top:0; left:0; bottom:0;
    width:min(85vw, 300px); min-width:0; z-index:40;
    transform:translateX(-110%);
    transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
    box-shadow:4px 0 32px rgba(0,0,0,0.4);
  }
  .sidebar.mobile-open { transform:translateX(0); }
  .btn-sb-toggle { display:flex; }
  .main { padding:0; }
}

/* ── T&E CONTENT STYLES ── */
.fg-content {
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.fg-country-header {
  padding: 20px 28px 16px;
  border-bottom: 1px solid #dde4ee;
  background: #ffffff;
  flex-shrink: 0;
}
.fg-country-header h1 {
  font-size: 22px; font-weight: 700; color: #162351;
  font-family: 'Euclid Circular B', sans-serif;
}
.fg-country-meta {
  font-size: 12px; color: #475072; margin-top: 4px;
  font-family: 'Euclid Circular B', sans-serif;
}
.fg-card {
  background: #ffffff;
  border: 1px solid #D8E3F0;
  border-radius: 16px;
  padding: 24px 28px;
  box-shadow: 0 2px 8px rgba(15, 30, 70, 0.04);
}
.fg-section-title {
  font-size: 11px; font-weight: 700; color: #019DE7;
  text-transform: uppercase; letter-spacing: 1.2px;
  padding-bottom: 14px;
  border-bottom: 1px solid #dde4ee;
  margin: 0 0 16px 0;
  font-family: 'Euclid Circular B', sans-serif;
}
.fg-body {
  font-size: 13px; font-weight: 400; color: #475072;
  line-height: 1.65; margin: 4px 0 14px 0;
  font-family: 'Euclid Circular B', sans-serif;
  white-space: pre-wrap;
}
.fg-table {
  width: 100%; margin-top: 4px;
  border-collapse: collapse;
  font-family: 'Euclid Circular B', sans-serif;
  font-size: 12.5px;
}
.fg-table thead tr { background: rgba(1,157,231,0.06); }
.fg-table th {
  padding: 9px 12px; text-align: left;
  color: #475072; font-weight: 600;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
  border-bottom: 1px solid #dde4ee;
}
.fg-table td {
  padding: 10px 12px; vertical-align: top;
  border-bottom: 1px solid #eef1f6;
  color: #162351; line-height: 1.55;
}
.fg-table td:first-child {
  color: #475072; font-weight: 600; font-size: 12px;
  white-space: nowrap; width: 30%;
}
.fg-table tr:last-child td { border-bottom: none; }
.fg-table tr:hover td { background: rgba(1,157,231,0.03); }
.fg-table-title {
  font-size: 12.5px; font-weight: 700; color: #0a1628;
  font-family: 'Euclid Circular B', sans-serif;
  background: rgba(1,157,231,0.07); border: 1px solid #D8E3F0;
  border-radius: 8px 8px 0 0; padding: 9px 14px;
  margin-top: 20px; margin-bottom: 0;
}
.fg-table-note {
  font-size: 12px; color: #475072; background: #f8fbff;
  border: 1px solid #D8E3F0; border-top: none;
  padding: 8px 14px; margin: 0; line-height: 1.5;
  font-family: 'Euclid Circular B', sans-serif;
}
.fg-multi-table { display: flex; flex-direction: column; }
.fg-source {
  margin-top: 14px; padding: 10px 14px;
  background: #f4f7fc; border-radius: 8px;
  display: flex; flex-direction: column; gap: 4px;
}
.fg-source-label {
  font-size: 10px; font-weight: 700; color: #8F98B5;
  text-transform: uppercase; letter-spacing: 0.8px;
  font-family: 'Euclid Circular B', sans-serif;
}
.fg-source-text {
  font-size: 11.5px; color: #475072;
  font-family: 'Euclid Circular B', sans-serif;
  line-height: 1.5;
}
.fg-source-link {
  font-size: 11.5px; color: #019DE7;
  font-family: 'Euclid Circular B', sans-serif;
  text-decoration: none;
  word-break: break-all;
}
.fg-source-link:hover { text-decoration: underline; }

@media (max-width: 1024px) and (min-width: 600px) {
  .fg-content { padding: 20px; gap: 16px; }
  .fg-card { padding: 20px 22px; }
}
@media (max-width: 599px) {
  .fg-content { padding: 16px 14px; gap: 14px; }
  .fg-card { padding: 18px 18px; border-radius: 12px; }
  .fg-table td:first-child { white-space: normal; width: auto; }
}
</style>
</head>

  <div class="banner-left">

         alt="Marco" onerror="this.style.display='none'"></a>

      <div class="banner-subtitle">Global Per Diem Rates</div>

</header>

<!-- FILTER BAR -->
<div class="filter-bar">
  <button class="btn-hamburger" id="btnMobileOpen" onclick="mobileOpenDrawer()" aria-label="Open menu">&#9776;</button>

  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">

  <div class="select-wrap">
    <select id="regionFilter" onchange="filterSidebar()">

      <option value="Europe">Europe</option>

<!-- LAYOUT -->
<div class="layout">

          <path d="M2 8H14M2 4H14M2 12H14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="sidebar-scroll" id="countryList"></div>
  </nav>

  <!-- MAIN PANEL -->
  <main class="main" id="mainContent">
    <div class="empty-state">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <rect x="8" y="8" width="48" height="48" rx="8" stroke="#4a9eff" stroke-width="2" fill="none"/>
        <path d="M20 32 H44 M20 24 H36 M20 40 H30" stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
        <circle cx="46" cy="38" r="6" stroke="#4a9eff" stroke-width="2" fill="none"/>

      </svg>
      <h2>Select a Country</h2>
      <p>Choose a country from the panel to view its per diem rates and travel expense policy.</p>
    </div>
  </main>

</div>

      description: "Austria does not have a single national per diem rate. Instead, rates are governed by collective agreements (Kollektivvertrag) which vary by industry.\n\nUnder the most commonly referenced agreement (Information & Consulting), the minimum daily allowance is \u20ac18.40, and the maximum tax-free amount under the Austrian Income Tax Act is \u20ac26.40 per day.\n\nThe 'one-twelfth rule': the daily rate (max \u20ac26.40) is divided into 12 equal parts. You earn one part for each hour (or part thereof) of travel beyond 3 hours. Trips of 3 hours or less receive nothing.\n\nTax note: The tax-free cap is \u20ac30/day as of 2025 under income tax law. Many collective agreements set a lower practical ceiling (e.g. \u20ac26.40). Amounts above the tax-free cap are subject to income tax.\n\nAccommodation: Reimbursed at actual cost with receipts. Without receipts, a flat overnight allowance of \u20ac15 is tax-free.",

  "Brazil": {
    domestic:     {
      section_title: "Domestic Business Trip",
      description: "Brazil has NO mandatory per diem rate for private sector employers. Each company sets its own rates.\n\nTax treatment (CLT Art. 457 §2, amended 2017): Per diem (diárias) paid to employees for business travel are NOT considered part of salary and are FULLY exempt from income tax — with NO cap on the amount. This was changed in 2017; the previous rule that capped tax-free per diem at 50% of monthly salary was abolished.\n\nImportant: This tax exemption only applies if the payment is genuinely for travel expenses and not structured as disguised salary. If the payment exceeds actual travel costs or is not linked to genuine travel, it can be reclassified as salary by the tax authority (Receita Federal).\n\nFederal public sector rates (Decreto 12.417/2024) are shown for reference. Private employers commonly use these as a benchmark.",

      description: "Bulgaria has statutory minimum per diem rates for domestic business trips. These apply to ALL employers and are set by government ordinance.\n\nRates (effective since 27 March 2023):\n  • With overnight stay: BGN 40 per day (minimum)\n  • Day trip only (no overnight): BGN 20 per day (50% of full rate)\n\nTax treatment (PITA Art. 24(2)(5b)):\nPer diem is tax-free up to 200% of the statutory minimum:\n  • With overnight: up to BGN 80/day tax-free (200% × BGN 40)\n  • Day trip: up to BGN 40/day tax-free (200% × BGN 20)\nAmounts above 200% are treated as taxable employment income.\n\nAccommodation: Reimbursed at actual cost with receipts. Without receipts, maximum BGN 35/night tax-free.\n\nImportant: As of 1 January 2026, Bulgaria joined the Eurozone. Rates may be converted to EUR. Always verify current denomination with the NRA (NAP).",

      description: "Italy sets statutory tax-free ceilings for travel allowances (indennità di trasferta) under TUIR Art. 51(5). These apply to ALL employers — public and private.\n\nThree reimbursement systems exist (employer chooses one):\n\n1. Flat-rate allowance (sistema forfettario) — no receipts needed for the allowance itself:\n   • Domestic trips (outside the employee's home municipality): up to €46.48/day tax-free\n   • Above €46.48/day: the EXCESS is taxable as employment income (IRPEF + INPS)\n\n2. Mixed reimbursement (sistema misto) — flat allowance + some receipted costs:\n   • If employer also pays meals: flat allowance ceiling drops to €30.99/day (1/3 reduction)\n   • If employer also pays accommodation: drops to €30.99/day\n   • If both meals and accommodation covered: drops to €15.49/day (2/3 reduction)\n   • Actual meal/accommodation costs reimbursed: fully tax-free (no ceiling)\n\n3. Analytical reimbursement (sistema analitico — a piè di lista) — all costs receipted:\n   • Meals, accommodation, travel, transport: fully tax-free with valid receipts\n   • Ancillary costs (laundry, calls, tips): tax-free up to €15.49/day\n\nIMPORTANT — Tracciability rule from 1 January 2025 (Legge di Bilancio 2025, confirmed by Circolare 15/E/2025):\n   • For domestic trips: meal, accommodation, and taxi/NCC costs must be paid by traceable means (card, bank transfer, digital payment) to remain tax-free for the employee\n   • Cash payments for these domestic expenses may cause the reimbursement to become taxable. Note: Public transport (trains, planes, buses) is EXCLUDED from this rule\n   • For foreign trips: tracability rule does NOT apply — can still use cash abroad",

  "Pakistan": {

      section_title: "Domestic Business Trip — T.A./D.A.",
      description: "Pakistan has NO government-mandated per diem rate for private sector employers. Companies set their own T.A./D.A. (Travelling Allowance / Daily Allowance) policies.\n\nTax treatment under Income Tax Ordinance 2001 (Section 12):\n  • Any allowance or benefit (not being entertainment or conveyance allowance) granted to an employee to meet expenses WHOLLY AND NECESSARILY incurred in the performance of the duties of their employment is TAX-EXEMPT\n  • T.A./D.A. (Travelling Allowance and Daily Allowance) is explicitly cited as an example of such exempt allowances under the Ordinance\n  • The allowance must be for genuine, employment-related travel\n  • Amounts in excess of actual need or not for business purposes may be taxable\n\nOther exempt allowances (Section 12 and Second Schedule):\n  • Medical allowance: up to 10% of basic salary (or PKR 10,000/month, whichever is lower)\n  • Conveyance allowance: provided vehicle used for BUSINESS USE ONLY — no taxable benefit\n  • House rent allowance: 45% of basic salary (standard market practice, may differ)\n\nIncome tax (IT Ordinance 2001, Tax Year 2025-26 — July 2025 to June 2026):\n  • Up to PKR 600,000: 0%\n  • PKR 600,001–1,200,000: 1% on amount exceeding PKR 600,000\n  • PKR 1,200,001–2,200,000: PKR 6,000 + 11%\n  • PKR 2,200,001–3,200,000: PKR 116,000 + 23%\n  • PKR 3,200,001–4,100,000: PKR 346,000 + 30%\n  • Above PKR 4,100,000: PKR 616,000 + 35%\n\nTax year: 1 July to 30 June. PKR exchange rate: USD 1 ≈ PKR 278–285 (2025).",

      description: "Peru regulates viaticos (business travel expenses) under tax law and a separate public sector decree. Private sector follows SUNAT income tax rules; there is NO fixed mandatory per diem rate for private employers.\n\nTax treatment under Ley del Impuesto a la Renta (Income Tax Law):\n  • Business travel expenses (viaticos — accommodation, meals, transport) are NOT considered taxable income for the employee IF:\n    1. Exclusively used to cover necessary expenses in the performance of duties\n    2. Properly documented with comprobantes de pago (tax receipts / e-invoices)\n    3. Amounts are reasonable and not designed to evade tax\n\nSUNAT documentation requirement:\n  • Private sector: viaticos for domestic travel must be supported by comprobantes de pago (SUNAT-authorized receipts). Without receipts, expenses cannot be deducted by the employer (corporate income tax) and may be treated as taxable for the employee\n  • Mobility (movilidad) expense without receipts: capped at 4% of the monthly Remuneracion Minima Vital (RMV) per worker per day (2025: 4% of PEN 1,130 = PEN 45.20/day)\n\nPublic sector reference (Decreto Supremo No. 007-2013-EF):\n  • PEN 320/day — maximum viatico for domestic government employee travel\n  • Applies to all public servants for comisiones de servicio within Peru\n\nUIT (Unidad Impositiva Tributaria) 2025: PEN 5,350\nIncome tax exemption (Fifth Category — Quinta Categoria):\n  • First 7 UIT of annual employment income exempt: 7 x PEN 5,350 = PEN 37,450/year\n  • PIT rates above: 8% / 14% / 17% / 20% / 30%\nMinimum wage (RMV) from 1 Jan 2025: PEN 1,130/month",

      description: "Poland has statutory minimum per diem (dieta) rates for employee business trips under the Labour Code (Art. 775) and the Ministerial Regulation of 29 January 2013 (Rozporzadzenie MPiPS, Dz.U. 2023, poz. 2190). The regulation is mandatory as a floor for public sector and serves as the tax-free reference for private sector.\n\nCurrent domestic dieta (from 1 January 2023):\n  • PLN 45/day — minimum mandatory rate; also the PIT and ZUS (social insurance) exempt ceiling for private sector employers\n  • PROPOSED INCREASE: Ministry of Labour draft regulation proposes raising the domestic dieta to PLN 60/day. As of mid-2026, this was in legislative process — verify current amount before applying\n\nTrip duration thresholds:\n  • Up to 8 hours: 50% of dieta = PLN 22.50 (proposed: PLN 30)\n  • 8 to 12 hours: full dieta = PLN 45 (proposed: PLN 60)\n  • Over 12 hours: full dieta = PLN 45 (proposed: PLN 60)\n\nIf employer provides free meals, dieta is reduced:\n  • Free breakfast: −25% reduction on full dieta\n  • Free lunch: −50% reduction\n  • Free dinner: −25% reduction\n\nAccommodation (nocleg):\n  • Reimbursed at actual receipted cost OR flat 150% of dieta per night if no receipt = PLN 67.50/night (proposed: PLN 90)\n\nTax/ZUS treatment:\n  • Within PLN 45/day ceiling: fully exempt from PIT and ZUS contributions\n  • Above PLN 45/day: excess is taxable income and subject to ZUS contributions\n  • Private sector may pay above — but only up to PLN 45 is tax/ZUS-free\n\nKm allowance: PLN 0.89/km for car (up to 900cc), PLN 1.15/km for car (over 900cc).",

      description: "Switzerland has NO government-mandated per diem rate. Under Article 327a of the Code of Obligations (Obligationenrecht / Code des obligations), employers MUST reimburse employees for all expenses necessarily incurred in performance of work, including necessary living expenses when working away from the employer's premises.\n\nTwo reimbursement methods:\n  1. Effective reimbursement (Effektive Spesenverguetung): actual documented costs with receipts\n  2. Flat-rate allowances (Pauschalspesen): fixed amounts per the company's approved expense regulations (Spesenreglement)\n\nESTV (Federal Tax Administration) reference limits for flat-rate expenses (not statutory but widely used as the tax-safe benchmark):\n  • Lunch/dinner (no receipt): CHF 30/meal\n  • Lunch/dinner (with receipt): up to CHF 35/meal (effective reimbursement)\n  • Small daily expenses (incidentals): CHF 20/day\n  • Private vehicle: CHF 0.70/km (tax-free)\n\nApproved Spesenreglement (expense regulations):\n  • Companies can apply to the relevant cantonal tax authority for an approved Spesenreglement with higher flat-rate amounts\n  • Typical approved lump-sum: 3–5% of employee's net salary, max CHF 24,000/year\n  • Without approved regulations, only ESTV reference limits are tax-safe\n\nIncome tax: Federal rate max 11.5%; total cantonal + municipal burden varies widely:\n  • Zug: ~16–18% | Zurich: ~24–26% | Bern: ~27–29% | Geneva: ~31–34%\nAHV/AVS social contributions: ~8.7% employee + ~8.7% employer (2025 rates).",

let currentCountry = null;

/* ── Render sidebar ── */
function renderSidebar(list) {
  const el = document.getElementById('countryList');
  if (!list.length) {
    el.innerHTML = '<div class="sidebar-empty">No countries match your filter.</div>';
    return;
  }
  el.innerHTML = list.map((c, i) => `
    <div class="sb-row${currentCountry === c.name ? ' active' : ''}"
         onclick="selectCountry('${c.name.replace(/'/g,"\'")}', this)">
      <span class="sb-code">${c.code}</span>
      <span class="sb-label">${c.name}</span>
    </div>`).join('');
}

/* ── Filter sidebar ── */
function filterSidebar() {
  const q = document.getElementById('sidebarSearch').value.trim().toLowerCase();
  const r = document.getElementById('regionFilter').value;
  const filtered = COUNTRIES.filter(c =>
    (!q || c.name.toLowerCase().includes(q)) &&
    (!r || c.region === r)
  );
  renderSidebar(filtered);
}

function clearFilters() {
  document.getElementById('sidebarSearch').value = '';
  document.getElementById('regionFilter').value = '';
  filterSidebar();
}

/* ── Build table HTML ── */
function buildTable(headers, rates) {
  if (!rates || !rates.length) return '';
  const thead = '<thead><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead>';
  const tbody = '<tbody>' + rates.map(row =>
    '<tr>' + row.map(cell => `<td>${cell}</td>`).join('') + '</tr>'
  ).join('') + '</tbody>';
  return `<div style="overflow-x:auto"><table class="fg-table">${thead}${tbody}</table></div>`;
}

/* ── Build source box ── */
function buildTables(tables) {
  if (!tables || !tables.length) return '';
  return '<div class="fg-multi-table">' + tables.map(function(t) {
    var h = '';
    if (t.title) h += '<div class="fg-table-title">' + t.title + '</div>';
    if (t.note) h += '<p class="fg-table-note">' + t.note + '</p>';
    var thead = '<thead><tr>' + t.headers.map(function(x) { return '<th>' + x + '</th>'; }).join('') + '</tr></thead>';
    var tbody = '<tbody>' + t.rows.map(function(row) {
      return '<tr>' + row.map(function(cell) { return '<td>' + (cell || '') + '</td>'; }).join('') + '</tr>';
    }).join('') + '</tbody>';
    h += '<div style="overflow-x:auto"><table class="fg-table">' + thead + tbody + '</table></div>';
    return h;
  }).join('') + '</div>';
}

function buildSource(section) {
  if (!section.legal_source && !section.reference_url) return '';
  let html = '<div class="fg-source"><span class="fg-source-label">Legal Source</span>';
  if (section.legal_source) html += `<span class="fg-source-text">${section.legal_source}</span>`;
  if (section.reference_url && section.reference_url !== '#') {
    html += `<a class="fg-source-link" href="${section.reference_url}" target="_blank" rel="noopener noreferrer">${section.reference_url}</a>`;
  }
  html += '</div>';
  return html;
}

/* ── Select a country ── */
function selectCountry(name, el) {
  currentCountry = name;
  document.querySelectorAll('.sb-row').forEach(r => r.classList.remove('active'));
  if (el) el.classList.add('active');

  const data = PERDIEM_DATA[name];
  if (!data) {
    document.getElementById('mainContent').innerHTML =
      '<div class="empty-state"><h2>No data available</h2><p>Per diem data for ' + name + ' is not yet available.</p></div>';
    return;
  }

  const flag = FLAGS[name] || '';
  const dom = data.domestic;
  const intl = data.international;

  let html = `
    <div class="fg-country-header">
      <h1>${name}</h1>
      <div class="fg-country-meta">Travel &amp; Expense Policy &nbsp;·&nbsp; Domestic &amp; International rates &nbsp;·&nbsp; Reference year 2025–2026</div>
    </div>
    <div class="fg-content">`;

  // Domestic card
  if (dom) {
    html += `
      <div class="fg-card">
        <div class="fg-section-title">${dom.section_title || 'Domestic Business Trip'}</div>
        <p class="fg-body">${dom.description || ''}</p>
        ${dom.tables ? buildTables(dom.tables) : buildTable(dom.headers || [], dom.rates || [])}
        ${buildSource(dom)}
      </div>`;
  }

  // International card
  if (intl) {
    html += `
      <div class="fg-card">
        <div class="fg-section-title">${intl.section_title || 'International Business Trips'}</div>
        <p class="fg-body">${intl.description || ''}</p>
        ${intl.tables ? buildTables(intl.tables) : buildTable(intl.headers || [], intl.rates || [])}
        ${buildSource(intl)}
      </div>`;
  }

  html += '</div>';

  const main = document.getElementById('mainContent');
  main.innerHTML = html;
  main.scrollTop = 0;

  // Close mobile drawer
  mobileCloseDrawer();
}

/* ── Mobile drawer ── */
function mobileOpenDrawer() {
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('sidebarOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function mobileCloseDrawer() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebarOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

/* ── Tablet sidebar toggle ── */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('expanded');
}
