supervisor to enter and track occupational injury/disease details.","employerResp":"Maintain GOSI coverage, report the injury/disease and cooperate with GOSI investigation.","employeeResp":"Report injury and attend GOSI-approved medical assessment/treatment.","payrollImpact":"Classify absence as occupational injury and coordinate wage/benefit treatment with GOSI.","authority":"General Organization for Social Insurance (GOSI)","sourceUrl":"https://www.gosi.gov.sa/GOSIOnline/Occupational_Hazard%26locale%3Den_US | https://www.gosi.gov.sa/GOSIOnline/OH_Branch_Benefits?locale=en_US","notes":"Use GOSI outcome for payroll and leave treatment; do not estimate compensation without GOSI decision."},{"category":"Hiring / Wage Subsidy","schemeName":"HRDF Employment Support Program","claimableBy":"Employer","eligible":"Private-sector establishment hiring eligible Saudi jobseekers / employees under HRDF employment support criteria and portal approval.","amount":"HRDF covers a percentage of the employee salary; exact percentage, cap and duration depend on programme rules and approval.","duration":"According to HRDF employment support approval and programme terms.","howToClaim":"Submit employment support application through HRDF/Hadaf establishment service.","documents":"Establishment registration, employee details, employment contract, salary records, GOSI registration and HRDF portal documents.","deadline":"According to HRDF programme application rules and portal deadlines.","employerResp":"Apply before/according to programme rules, maintain qualifying employment and submit payroll/support evidence.","employeeResp":"Provide required personal/employment documents and meet Saudi jobseeker eligibility.","payrollImpact":"Direct wage-support impact; payroll must retain salary and support records for HRDF audit.","authority":"Human Resources Development Fund (HRDF/Hadaf)","sourceUrl":"https://www.hrdf.org.sa/en/products-and-services/programs/establishments/enable/employment-support/apply/","notes":"Official HRDF page states the programme supports private-sector hiring by covering a percentage of employee salary."},{"category":"Training / Graduate Development","schemeName":"Tamheer Graduate Development allowance","claimableBy":"Trainee; establishment hosts/manages opportunity","eligible":"Saudi graduate/eligible trainee registered with HRDF; establishment must have HRDF account and create/manage training opportunity.","amount":"HRDF contributes monthly stipend of SAR 3,000 to eligible trainees under the graduate development product.","duration":"Training duration generally 3 to 6 months, according to HRDF product page.","howToClaim":"Establishment creates/manages training opportunities through HRDF; trainee applies through HRDF.","documents":"Trainee qualification documents, HRDF registration, training opportunity details, establishment account and HRDF forms.","deadline":"According to HRDF Tamheer service rules and portal workflow.","employerResp":"Create/manage training opportunity and comply with HRDF training requirements; this is not normal payroll salary.","employeeResp":"Apply for training opportunity and meet attendance/training conditions.","payrollImpact":"Treat as HRDF trainee support, not standard employment salary unless a separate employment contract exists.","authority":"Human Resources Development Fund (HRDF/Hadaf)","sourceUrl":"https://www.hrdf.org.sa/en/products-and-services/programs/establishments/training/graduate-development/ | https://www.hrdf.org.sa/en/products-and-services/programs/individuals/training/graduate-development/","notes":"Useful for HR planning but it is a training/allowance scheme, not a wage reimbursement for an ordinary employee."},{"category":"Training / Professional Certification","schemeName":"Professional Certificates direct support","claimableBy":"Individual employee / Saudi beneficiary","eligible":"Saudi beneficiary who obtains an HRDF-approved professional certificate/license and satisfies HRDF eligibility; employer must not have paid the cost.","amount":"HRDF reimburses supported training/exam costs after certificate; user manual indicates support can cover up to SAR 2,000 for the support cost.","duration":"Up to two uses per person according to HRDF eligibility; certificate approval/validity limits apply.","howToClaim":"Submit direct support request through HRDF/Taqat product page with documents.","documents":"Professional certificate/license, invoice/fee evidence, authorization form, identity and HRDF portal data.","deadline":"Certificate/license must meet HRDF timing/validity rules; submit within HRDF portal requirements.","employerResp":"Do not claim as employer-paid cost where HRDF requires acknowledgement that employer did not pay.","employeeResp":"Submit certificate, invoice and authorization through HRDF.","payrollImpact":"Employee-facing development reimbursement; payroll normally unaffected unless employer gives separate support.","authority":"Human Resources Development Fund (HRDF/Hadaf)","sourceUrl":"https://www.hrdf.org.sa/en/products-and-services/programs/individuals/training/professional-certificates/ | https://www.hrdf.org.sa/en/products-and-services/programs/individuals/training/professional-certificates/direct-support/","notes":"Included as employee development claim; check approved certificate list before advising an employee."}],"Serbia":[{"category":"Maternity / Parental","schemeName":"Maternity salary compensation reimbursement","claimableBy":"Employer / employee benefit administered through state system","eligible":"Employee on maternity/childcare/special childcare leave under Serbian law; employer may be reimbursed for salary compensation paid where procedure applies.","amount":"State-funded salary compensation/reimbursement; amount depends on statutory calculation and employee contribution/salary base.","duration":"For statutory maternity/childcare/special childcare leave period.","howToClaim":"Employer submits proper refund request / leave compensation file to competent ministry/local administration process.","documents":"Leave decision, employee salary records, employment details, birth/medical documents and refund request forms.","deadline":"According to competent authority reimbursement procedure after payment/leave approval.","employerResp":"Pay/process leave compensation correctly and submit orderly reimbursement request.","employeeResp":"Provide pregnancy/birth/childcare documents and leave request.","payrollImpact":"Payroll must separate maternity compensation from ordinary salary and track reimbursable amounts.","authority":"Ministry of Labour, Employment, Veteran and Social Affairs","sourceUrl":"https://www.minrzs.gov.rs/srb-lat/aktuelnosti/saopstenja/naknada-zarad%D0%B5-porodiljama | https://www.minrzs.gov.rs/sr/socijalna-davanja","notes":"Official ministry notice states employers are regularly reimbursed for paid funds based on duly submitted refund requests."},{"category":"Sick Leave / Health Insurance","schemeName":"RFZO salary compensation for sickness leave","claimableBy":"Employer / employee","eligible":"Insured employee with temporary incapacity for work under compulsory health insurance rules; RFZO handles sickness compensation claims/status after employer processing.","amount":"Compensation amount depends on sickness reason, statutory percentage and health insurance rules.","duration":"For approved temporary incapacity period under medical certificate and RFZO rules.","howToClaim":"Employer submits/monitors sickness compensation claim with RFZO; RFZO provides status review for salary compensation requests.","documents":"Medical certificate, employer statement/forms, payroll records, insurance data and RFZO forms.","deadline":"According to RFZO filing procedure and forms.","employerResp":"Process sick leave, provide RFZO documents and track claim status.","employeeResp":"Submit medical evidence to employer/doctor and comply with medical absence rules.","payrollImpact":"Payroll must distinguish employer-funded and RFZO-funded/recoverable sickness periods.","authority":"Republic Health Insurance Fund (RFZO)","sourceUrl":"https://www.rfzo.rs/index.php/osiguranalica/pregled-naknada-zarade | https://rfzo.rs/index.php/obrasci","notes":"Official RFZO site provides forms and a status check for salary compensation sickness claims."},{"category":"Work Injury / Occupational Disease","schemeName":"Work injury report to RFZO","claimableBy":"Employer","eligible":"Employer of an insured worker who suffers workplace injury; RFZO forms include employer submission for work injury report.","amount":"Medical/insurance compensation depends on compulsory health insurance and work injury assessment.","duration":"For covered work injury treatment/absence and related compensation process.","howToClaim":"Submit work injury report/form to RFZO and other competent authorities as required.","documents":"Work injury report, accident facts, medical evidence, employee insurance details and employer forms.","deadline":"Report according to RFZO/legal occupational injury procedure; act immediately after incident.","employerResp":"Report injury, keep accident evidence and support RFZO/inspection process.","employeeResp":"Report accident and attend medical evaluation.","payrollImpact":"Work injury leave may affect payroll coding, health insurance compensation and occupational safety records.","authority":"Republic Health Insurance Fund (RFZO) / Ministry of Labour","sourceUrl":"https://rfzo.rs/index.php/obrasci | https://www.minrzs.gov.rs/sites/default/files/2019-02/%D0%97%D0%B0%D0%BA%D0%BE%D0%BD%20%D0%BE%20%D1%80%D0%B0%D0%B4%D1%83_%2024_2005-3%2C%2061_2005-69%2C%2054_2009-26%2C%2032_2013-13%2C%2075_2014-3%2C%2013_2017-64%20%28%D0%A3%D0%A1%29%2C%20113_2017-273%2C%2095_2018-441%20%28%D0%90%D1%83%D1%82%D0%B5%D0%BD%D1%82%D0%B8%D1%87%D0%BD%D0%BE%20%D1%82%D1%83%D0%BC%D0%B0%D1%87%D0%B5%D1%9A%D0%B5%29.docx","notes":"RFZO form list includes workplace injury report for employers."},{"category":"Hiring / Disability Employment","schemeName":"NES wage subsidy for persons with disabilities without work experience","claimableBy":"Employer","eligible":"Employer hiring an unemployed person with disability without work experience under National Employment Service public call criteria.","amount":"Subsidised salary/support amount depends on the current NES public call budget and terms.","duration":"According to public call; usually tied to supported employment period and retention conditions.","howToClaim":"Apply to National Employment Service public call and submit required employer/candidate documents.","documents":"Application form, employer registration/tax evidence, candidate disability/unemployment records, employment contract and payroll evidence.","deadline":"By the public call deadline and until funds are exhausted if applicable.","employerResp":"Hire eligible candidate, maintain employment and submit required reports/payroll evidence.","employeeResp":"Register with NES and provide disability/unemployment proof.","payrollImpact":"Employer-facing wage subsidy; payroll must track subsidy-supported worker and retention obligations.","authority":"National Employment Service (NES/NSZ)","sourceUrl":"https://nsz.gov.rs/filemanager/Files/Dokumenta/Javni%20pozivi/2024/Javni%20pozivi%20OSI/Subvencija%20zarade%20za%20OSI%20bez%20radnog%20iskustva/Javni%20poziv%20za%20subvenciju%20zarade%20za%20OSI%20bez%20radnog%20iskustva%20u%202024.%20godini.pdf | https://www.nsz.gov.rs/","notes":"Amounts and eligibility change by annual public call; do not reuse an expired call amount without rechecking current NSZ notices."},{"category":"Employment Support / Youth","schemeName":"Youth Guarantee / active labour market support measures","claimableBy":"Employer / jobseeker depending on measure","eligible":"Young unemployed persons and employers participating in active labour market measures under NES Youth Guarantee/Employment Strategy framework.","amount":"Support depends on measure, public call and annual plan; may include training, internships, employment subsidies or counselling.","duration":"According to the specific public call or active labour market measure.","howToClaim":"Apply/participate through National Employment Service office or online public call.","documents":"NES registration, identity, education/employment status, employer application and measure-specific evidence.","deadline":"According to public call deadlines and NES programme windows.","employerResp":"Apply only for active open measures and maintain terms after approval.","employeeResp":"Register with NES and participate in counselling/training/employment activities.","payrollImpact":"May create subsidised employment/training rows in HR budget; verify live call before payroll planning.","authority":"National Employment Service (NES/NSZ) / Ministry of Labour","sourceUrl":"https://nsz.gov.rs/filemanager/Files/Dokumenta/Garancija%20za%20mlade/Youth%20Guarantee%20Implementation%20Plan%202023-2026.pdf | https://www.nsz.gov.rs/","notes":"Included as official programme route; specific claim amounts must be taken from the current NES call."}],"Singapore":[{"category":"Maternity / Parental","schemeName":"Government-Paid Maternity Leave (GPML)","claimableBy":"Employer; self-employed parent can claim directly","eligible":"Eligible working mother whose child meets Singapore citizenship and service/employment conditions under Government-Paid Leave Schemes.","amount":"Government reimburses eligible maternity leave pay under GPML; use GPL calculator/portal for exact reimbursement amount and caps.","duration":"Up to eligible GPML weeks depending on statutory conditions and child order/scheme rules.","howToClaim":"Submit claim through Government-Paid Leave (GPL) Portal after paying leave to employee.","documents":"Employee details, child details, leave dates, payroll records, bank details and GPL portal declarations.","deadline":"Submit according to GPL Portal claim windows/service standards.","employerResp":"Pay eligible leave, keep payroll records and submit claim online.","employeeResp":"Provide required family/child and leave information.","payrollImpact":"Direct employer reimbursement; payroll must code GPML and CPF treatment correctly.","authority":"Government-Paid Leave Portal / Ministry of Social and Family Development","sourceUrl":"https://www.profamilyleave.msf.gov.sg/schemes/maternity-leave | https://www.profamilyleave.msf.gov.sg/ | https://www.profamilyleave.msf.gov.sg/calculate","notes":"Use the GPL calculator for exact amount because reimbursement depends on wage, leave dates and scheme caps."},{"category":"Paternity / Parental","schemeName":"Government-Paid Paternity Leave (GPPL)","claimableBy":"Employer; self-employed father can claim directly","eligible":"Eligible working father, including self-employed father, who meets child citizenship and scheme requirements.","amount":"Government reimburses eligible paternity leave pay under GPPL; amount depends on wage and statutory cap.","duration":"Eligible statutory paternity leave period according to scheme rules.","howToClaim":"Submit claim through GPL Portal.","documents":"Employee/father and child details, leave dates, payroll records, bank details and GPL declarations.","deadline":"According to GPL Portal claim deadlines.","employerResp":"Pay paternity leave and claim reimbursement online; keep evidence.","employeeResp":"Provide child/family details and comply with leave conditions.","payrollImpact":"Employer reimbursement; payroll should separate GPPL from ordinary paid leave.","authority":"Government-Paid Leave Portal / Ministry of Social and Family Development","sourceUrl":"https://www.profamilyleave.msf.gov.sg/schemes/paternity-leave | https://www.profamilyleave.msf.gov.sg/faqs/popular-questions","notes":"Official FAQ states employers can submit GPL claims online."},{"category":"Parental / Shared Leave","schemeName":"Shared Parental Leave / Shared Parental Benefit","claimableBy":"Employer or eligible parent depending on scheme","eligible":"Eligible parents of Singapore citizen child meeting Government-Paid Leave scheme conditions; benefit route applies where employee does not qualify for leave due to employment arrangement.","amount":"Government reimburses/ pays eligible shared parental leave or benefit subject to scheme limits and wage caps.","duration":"For eligible SPL/SPB period, especially children born from 1 April 2025 onward for replacement scheme rules.","howToClaim":"Submit through GPL Portal using relevant SPL/SPB scheme.","documents":"Parent and child details, employment/leave arrangement, payroll evidence, bank details and scheme declarations.","deadline":"According to GPL claim windows and scheme rules.","employerResp":"Coordinate leave dates and submit claim if employer route applies.","employeeResp":"Agree leave arrangement and submit direct benefit claim where applicable.","payrollImpact":"Important for payroll from 2025+ because shared leave arrangements may cross employers.","authority":"Government-Paid Leave Portal / MSF","sourceUrl":"https://www.profamilyleave.msf.gov.sg/schemes/shared-parental-leave | https://www.profamilyleave.msf.gov.sg/schemes/shared-parental-leave-benefit","notes":"Official page notes reimbursement limit applies across multiple employment."},{"category":"Training / Skills Grant","schemeName":"SkillsFuture Enterprise Credit (SFEC)","claimableBy":"Employer","eligible":"Eligible employers using approved enterprise/workforce transformation and training programmes under SkillsFuture rules.","amount":"Can offset up to 90% of out-of-pocket costs for eligible skills training needs.","duration":"Credit validity and claim period depend on SFEC allocation and programme rules.","howToClaim":"Use SkillsFuture for Business / relevant programme application and claims process.","documents":"Employer UEN, programme/course approval, invoice/payment evidence, trainee details and portal documents.","deadline":"According to SFEC and approved programme claim deadlines.","employerResp":"Check eligibility, apply for approved programmes and retain invoices/attendance records.","employeeResp":"Attend training where relevant.","payrollImpact":"Reduces employer training cost; payroll may need to track trainee time/absentee payroll separately.","authority":"SkillsFuture Singapore","sourceUrl":"https://www.skillsfuture.gov.sg/initiatives/employers | https://service-portal.skillsfuture.gov.sg/s/employers-homepage","notes":"Official SkillsFuture page states SFEC can offset up to 90% of out-of-pocket skills training costs."},{"category":"Training / Wage Support","schemeName":"Absentee Payroll Funding","claimableBy":"Employer","eligible":"Employer sending eligible employees for SSG-supported training where absentee payroll funding applies.","amount":"Funding helps defray manpower cost when employees attend training; exact rate/cap depends on course and SSG rules.","duration":"For approved training hours/course duration.","howToClaim":"Claim/apply through SkillsFuture/Training Grants System or relevant training provider workflow.","documents":"Course enrolment, attendance, employee details, payroll evidence and employer declaration.","deadline":"According to SkillsFuture/SSG claim timeline for the course.","employerResp":"Ensure employee attends approved course and maintain payroll/attendance evidence.","employeeResp":"Attend and complete training requirements.","payrollImpact":"May offset paid working time spent on training; payroll should keep salary/attendance evidence.","authority":"SkillsFuture Singapore","sourceUrl":"https://service-portal.skillsfuture.gov.sg/s/employers-homepage | https://www.skillsfuture.gov.sg/initiatives/employers","notes":"Official employer portal lists Absentee Payroll Funding among employer funding topics."},{"category":"Career Conversion / Salary Support","schemeName":"WSG Career Conversion Programmes (CCP)","claimableBy":"Employer","eligible":"Employer hiring/reskilling eligible Singapore Citizen or PR mid-career new hires or existing employees into eligible growth job roles.","amount":"Up to 90% course and salary support for eligible cases; higher support for mature or long-term unemployed groups where criteria are met.","duration":"According to CCP mode and programme duration.","howToClaim":"Apply through WSG CCP employer portal/application management system or programme partner.","documents":"Employer registration, job role/training plan, candidate eligibility, employment contract, salary records and CCP forms.","deadline":"According to specific CCP programme timelines.","employerResp":"Co-fund remaining salary, provide structured training and submit claims/evidence.","employeeResp":"Meet mid-career eligibility and complete training.","payrollImpact":"Direct salary support; payroll must retain salary and training records.","authority":"Workforce Singapore (WSG)","sourceUrl":"https://www.wsg.gov.sg/home/employers-industry-partners/workforce-development-job-redesign/career-conversion-programmes-employers | https://www.wsg.gov.sg/home/individuals/attachment-placement-programmes/career-conversion-programmes-for-individuals","notes":"Official WSG pages state CCPs provide up to 90% course/salary support."}],"Slovakia":[{"category":"Maternity / Parental","schemeName":"Maternity benefit","claimableBy":"Employee / insured person","eligible":"Employee, compulsorily insured self-employed person or voluntary sickness-insured person meeting sickness insurance and maternity eligibility conditions.","amount":"Benefit amount is calculated by Social Insurance Agency from assessment base; exact amount depends on insured person contribution history.","duration":"For statutory maternity benefit period according to social insurance rules.","howToClaim":"Apply to Sociálna poisťovňa using maternity benefit application process.","documents":"Doctor-confirmed maternity form/application, identity, insurance/employment data and employer confirmation if required.","deadline":"According to Social Insurance Agency maternity application procedure.","employerResp":"Provide employment/insurance confirmation where required.","employeeResp":"Submit application and required maternity documents.","payrollImpact":"Generally social insurance-paid benefit; payroll must code maternity leave and provide confirmations.","authority":"Sociálna poisťovňa (Social Insurance Agency)","sourceUrl":"https://www.socpoist.sk/en/life-situations/pregnancy-maternity/how-do-i-apply-maternity-benefit | https://www.socpoist.sk/en/navigacia/2163-maternity-benefit","notes":"Official page lists employees, compulsory SEPs and voluntarily insured persons as eligible groups."},{"category":"Sick Leave / Sickness Insurance","schemeName":"Sickness benefit","claimableBy":"Employee / insured person","eligible":"Insured person temporarily incapable for work and meeting sickness insurance conditions.","amount":"Sickness benefit from Social Insurance Agency after employer-paid period; amount depends on daily assessment base and statutory percentage.","duration":"For approved temporary incapacity period under medical certificate and law.","howToClaim":"Apply through ePN/doctor/Social Insurance Agency process; employer provides required data.","documents":"Medical incapacity confirmation, insurance records, employer confirmation and bank/payment data.","deadline":"Employer must handle social insurance tasks for incapacity longer than 10 days within specified timelines.","employerResp":"Pay/record employer-paid period and submit confirmation for sickness benefit where required.","employeeResp":"Follow medical incapacity rules and provide required details.","payrollImpact":"Payroll must separate first employer-paid days from Social Insurance Agency sickness benefit.","authority":"Sociálna poisťovňa / slovensko.sk","sourceUrl":"https://www.socpoist.sk/en/navigacia/2157-sickness-benefit | https://www.slovensko.sk/en/life-situation/life-situation/_social-contributions/","notes":"Slovensko.sk states employer action for work incapacity lasting more than 10 days: confirmation for sickness benefit within 3 days of the 10th day."},{"category":"Work Injury / Accident Insurance","schemeName":"Accident benefits under social insurance","claimableBy":"Employee / insured person; employer reports event","eligible":"Employee who suffers employment accident or occupational disease covered by accident insurance.","amount":"Benefits may include accident supplement, accident rent, lump-sum compensation, vocational rehabilitation and related accident benefits depending on assessment.","duration":"For covered accident/injury consequences under Social Insurance Agency assessment.","howToClaim":"Employer reports insurance event; employee applies/participates through Social Insurance Agency benefit process.","documents":"Accident report/insurance event notice, medical evidence, employment/insurance data and benefit application documents.","deadline":"Formation of employment accident must be notified within 3 days according to slovensko.sk employer responsibility table.","employerResp":"Report employment accident and maintain accident insurance records.","employeeResp":"Report injury and provide medical evidence.","payrollImpact":"Payroll/HR must track occupational injury separately from ordinary sickness.","authority":"Sociálna poisťovňa / slovensko.sk","sourceUrl":"https://www.socpoist.sk/en/navigacia/1904-apply-for-a-benefit | https://www.slovensko.sk/en/life-situation/life-situation/_social-contributions/","notes":"Official Social Insurance Agency benefit page lists accident supplement/rent/lump-sum and rehabilitation-related accident benefits."},{"category":"Unemployment / Social Insurance","schemeName":"Unemployment benefit","claimableBy":"Employee / insured person","eligible":"Insured unemployed person meeting unemployment insurance conditions and registration requirements.","amount":"Benefit amount depends on contribution/assessment base under Social Insurance Agency rules.","duration":"For statutory unemployment benefit period where conditions are met.","howToClaim":"Apply for benefit through Social Insurance Agency after unemployment registration process.","documents":"Unemployment registration, identity, insurance/contribution records, employment termination data and application.","deadline":"According to Social Insurance Agency application rules after unemployment.","employerResp":"Provide termination/contribution data correctly if requested.","employeeResp":"Register as unemployed and apply for benefit.","payrollImpact":"No employer reimbursement; termination reason/data can affect employee claim.","authority":"Sociálna poisťovňa","sourceUrl":"https://www.socpoist.sk/en/navigacia/2212-apply-for-a-benefit | https://www.slovensko.sk/en/life-situation/life-situation/_social-security-rights-and-obl","notes":"Social Insurance Agency official benefit list includes unemployment benefit and EU unemployment benefit."},{"category":"Social Insurance / Insolvency","schemeName":"Guarantee insurance benefit","claimableBy":"Employee; employer/insolvency data required","eligible":"Employee whose employer becomes insolvent and unpaid wage-related claims meet guarantee insurance rules.","amount":"Benefit amount depends on unpaid wage claims and statutory guarantee insurance limits.","duration":"For eligible unpaid claims caused by employer insolvency.","howToClaim":"Apply to Social Insurance Agency; employer/administrator provides insolvency confirmation/data.","documents":"Application, unpaid wage proof, employment contract/payroll records, insolvency confirmation and employer data.","deadline":"Employer insolvency must be announced within 8 days; employee data for guarantee benefit within 10 days of delivery of form.","employerResp":"Notify Social Insurance Agency of insolvency and provide employee wage data.","employeeResp":"Submit unpaid wage claim documents.","payrollImpact":"HR/payroll records are critical for employees to access guarantee insurance benefit.","authority":"Sociálna poisťovňa / slovensko.sk","sourceUrl":"https://www.socpoist.sk/en/navigacia/1904-apply-for-a-benefit | https://www.slovensko.sk/en/life-situation/life-situation/_social-contributions/","notes":"Included because guarantee insurance is a public social insurance route for wage claims when employer is insolvent."}],"Slovenia":[{"category":"Maternity / Parental","schemeName":"Maternity, paternity and parental leave benefit","claimableBy":"Employee / parent","eligible":"Eligible parent under parental protection/social work centre rules, generally applying via social work centre.","amount":"Parental/family benefit amount depends on statutory calculation and insured status; maternity leave lasts 105 days and parental leave follows for 260 days.","duration":"Maternity leave 105 days; parental leave generally further 260 days, according to eUprava page.","howToClaim":"Apply at social work centre / eUprava, normally before or alongside leave start.","documents":"Application, identity, child/pregnancy documents, employer income/employment data and social work centre forms.","deadline":"Maternity procedures can start up to 60 days before expected childbirth; parental leave agreement no later than 30 days before maternity leave ends.","employerResp":"Provide employment/income certificates and arrange leave in HR.","employeeResp":"Apply through social work centre and submit child/family documents.","payrollImpact":"Payroll must code maternity/parental absence and provide certificates; benefit is mainly public/social system claim.","authority":"GOV.SI / eUprava / Ministry of Labour, Family, Social Affairs and Equal Opportunities","sourceUrl":"https://e-uprava.gov.si/en/podrocja/family-children-marriage/family-benifits-and-income/maternity-leave.html | https://e-uprava.gov.si/en/podrocja/family-children-marriage/family-benifits-and-income/parental-leave.html | https://www.gov.si/en/policies/familiy-children-and-marriage/family-rights-and-benefits/","notes":"Official eUprava states maternity leave normally starts 28 days before childbirth and lasts 105 days."},{"category":"Sick Leave / Health Insurance","schemeName":"ZZZS salary compensation reimbursement","claimableBy":"Employer","eligible":"Employer that paid employee salary compensation for temporary absence covered by compulsory health insurance.","amount":"ZZZS reimburses employers upon appropriate claims; amount depends on statutory reason, base and period.","duration":"For eligible temporary absence from work covered by compulsory health insurance.","howToClaim":"Employer submits reimbursement claim to ZZZS via payer portal/procedure.","documents":"Salary compensation claim, medical/eBOL evidence, payroll calculations, employee insurance data and payment proof if required.","deadline":"According to ZZZS claim procedure after payment; submit through official employer portal process.","employerResp":"Pay salary compensation, submit reimbursement claim and maintain records.","employeeResp":"Provide medical absence documents and follow incapacity rules.","payrollImpact":"Direct payroll reimbursement route; HR/payroll must track recoverable sickness/absence compensation.","authority":"Health Insurance Institute of Slovenia (ZZZS)","sourceUrl":"https://www.zzzs.si/en/compulsory-health-insurance/the-extent-of-rights-deriving-from-compulsory-health-insurance/cash-benefits/compensation-for-loss-of-salary-during-temporary-absence-from-work/ | https://zavezanec.zzzs.si/nadomestilo-place-med-zacasno-zadrzanostjo-od-dela/uveljavljanje-refundacije-nadomestila-s-strani-delodajalcev","notes":"Official ZZZS page states ZZZS reimburses employers upon receipt of appropriate claims."},{"category":"Work Injury / Occupational Disease","schemeName":"Compulsory insurance for injury at work and occupational disease","claimableBy":"Employee / employer reporting and contribution route","eligible":"Employee covered by compulsory social/health insurance who suffers injury at work or occupational disease.","amount":"Public insurance covers relevant healthcare/cash benefits; compensation amount depends on health insurance and occupational injury rules.","duration":"For eligible work injury/occupational disease treatment and absence.","howToClaim":"Use employer injury/absence reporting and ZZZS/social insurance procedures.","documents":"Injury report, medical documentation, employment/insurance data and salary compensation evidence.","deadline":"Report/claim according to ZZZS and occupational safety procedures.","employerResp":"Register employee, pay contributions, report injury and submit absence/compensation claims.","employeeResp":"Report injury and follow medical certification.","payrollImpact":"Work injury may shift salary compensation treatment and affects compulsory insurance reporting.","authority":"SPOT / ZZZS","sourceUrl":"https://spot.gov.si/en/info/employees/social-security-and-insurance/ | https://www.zzzs.si/en/","notes":"SPOT lists employer contribution for insurance in case of injury at work and occupational disease."},{"category":"Hiring / Employment Subsidy","schemeName":"Zaposli.me 2026 employment subsidy","claimableBy":"Employer","eligible":"Employer hiring eligible registered unemployed person from target group proposed by Employment Service of Slovenia under the active public invitation.","amount":"Monthly subsidy from EUR 450 to EUR 720; employment must last at least 12 months for full-time work.","duration":"At least 12 months full-time employment; call open from 11 Jun 2026 until funds used, no later than 30 Nov 2026.","howToClaim":"Submit offer/application to Employment Service of Slovenia under the Zaposli.me public invitation.","documents":"Employer application, candidate referral/eligibility, employment contract, payroll records and ESS forms.","deadline":"Open from 11 Jun 2026 to fund exhaustion, latest 30 Nov 2026, according to official ESS page.","employerResp":"Hire/retain eligible worker and submit required records to receive subsidy.","employeeResp":"Be registered/referred by ESS and meet target group criteria.","payrollImpact":"Direct employer wage subsidy; payroll must retain employment and salary evidence.","authority":"Employment Service of Slovenia (ZRSZ/ESS)","sourceUrl":"https://www.ess.gov.si/delodajalci/financne-spodbude/predstavitev-spodbud-za-zaposlitev/zaposlime-2025-1/ | https://www.ess.gov.si/delodajalci/financne-spodbude/","notes":"Official ESS page states EUR 450-720 monthly subsidy and 12-month full-time employment requirement."},{"category":"Healthcare / Expense Reimbursement","schemeName":"ZZZS reimbursement of healthcare costs / travel costs","claimableBy":"Employee / insured person","eligible":"Insured person who paid eligible healthcare service or travel cost and meets ZZZS reimbursement conditions.","amount":"Reimbursement depends on eligible service/travel cost, compulsory insurance rules and evidence provided.","duration":"One-off reimbursement per eligible expense/travel case.","howToClaim":"Submit electronic or paper claim to ZZZS with required invoice/payment and medical documentation.","documents":"Invoice, proof of payment, medical documentation where relevant, travel-cost certificate/form and identity/insurance details.","deadline":"According to ZZZS reimbursement procedure; claim after cost is incurred with required evidence.","employerResp":"Not usually employer claim; provide employment/insurance information if needed.","employeeResp":"Keep receipts, medical evidence and submit claim to ZZZS.","payrollImpact":"Payroll unaffected unless employer separately reimburses costs; useful HR guidance for employees.","authority":"Health Insurance Institute of Slovenia (ZZZS)","sourceUrl":"https://zavarovanec.zzzs.si/pravice-do-zdravstvenih-storitev/povracila-stroskov-zdravstvenih-storitev/ | https://zavarovanec.zzzs.si/denarna-nadomestila/povracilo-potnih-stroskov/","notes":"Official ZZZS page requires invoice and payment proof for healthcare cost reimbursement."}],"South Africa":[{"category":"Unemployment / Social Insurance","schemeName":"UIF unemployment benefit","claimableBy":"Employee","eligible":"UIF contributor who becomes unemployed, has available UIF credits and meets the Unemployment Insurance Fund claim conditions.","amount":"Calculated by UIF using average salary, statutory salary ceiling and income replacement rate; official guidance refers to a sliding scale of 38%-60% for early credit days and lower flat rate later.","duration":"Subject to available credits, up to 365 credit days in a 4-year cycle under UIF guidance.","howToClaim":"Apply through UIF Online / UIF benefit application process or labour centre where applicable.","documents":"13-digit ID/passport/valid foreign national documents, banking details, employment termination/UI forms, salary and contribution records, and UIF-requested evidence.","deadline":"Normal unemployment benefit should be claimed within the official UIF time limit; UIF 2025 compliance guidance states within 12 months from last day of activity at work.","employerResp":"Register and declare employees for UIF, pay contributions and provide accurate termination/remuneration data.","employeeResp":"Apply promptly, provide banking/identity documents and continue required benefit processes.","payrollImpact":"Not employer reimbursement; payroll must keep UIF declarations, contribution records and termination data accurate.","authority":"Department of Employment and Labour / Unemployment Insurance Fund","sourceUrl":"https://uifonline.labour.gov.za/uifOnline/ | https://www.labour.gov.za/DocumentCenter/Publications/Unemployment%20Insurance%20Fund/Fact%20Sheet%20on%20the%20Calculation%20of%20normal%20UIF%20benefit.pdf | https://www.labour.gov.za/DocumentCenter/Publications/Occupational%20Health%20and%20Safety/OHS%20Conference%202025%20-/Day%201%20Presentations/UIF%20Compliance%20Presentation%2026022025.pdf","notes":"Useful for offboarding guidance; benefit amount should not be estimated manually without UIF calculation."},{"category":"Maternity / Parental","schemeName":"UIF maternity benefit","claimableBy":"Employee","eligible":"UIF contributor on maternity leave who satisfies UIF maternity benefit conditions, including contribution/employment requirements.","amount":"Benefit payable is the difference between employer-paid remuneration and the rate prescribed by UIF benefit schedule; UIF rights guide states maternity benefits can also apply to miscarriage/stillbirth for up to 121 days.","duration":"For eligible maternity leave period; exact duration depends on UIF rules and case.","howToClaim":"Apply via UIF Online / UIF benefit application process or labour centre process with maternity documents.","documents":"Banking details UI-2.8, ID/passport/valid foreign national documents, UI-2.7 remuneration declaration, UI-2.3 application, expected confinement doctor certificate or birth certificate, and follow-up UI-4.","deadline":"Apply within UIF benefit filing rules; keep evidence ready before or during maternity leave.","employerResp":"Declare employee correctly for UIF and confirm remuneration paid during maternity leave.","employeeResp":"Submit maternity application and required medical/birth documents.","payrollImpact":"Not an employer reimbursement; employer payments during leave affect UIF benefit difference calculation.","authority":"Department of Employment and Labour / Unemployment Insurance Fund","sourceUrl":"https://ufiling.labour.gov.za/uif/maternity-benefits | https://www.labour.gov.za/uif_how_claim_uif_maternity_benefits | https://www.labour.gov.za/DocumentCenter/Publications/Unemployment%20Insurance%20Fund/KNOW%20YOUR%20UIF%20RIGHTS%202022.pdf","notes":"Maternity is de-linked in some UIF credit guidance; use current UIF portal instructions when processing."},{"category":"Sick Leave / Social Insurance","schemeName":"UIF illness benefit","claimableBy":"Employee","eligible":"UIF contributor who is unable to work because of illness and satisfies UIF benefit conditions.","amount":"Benefit payable is the difference between employer-paid remuneration and the prescribed UIF benefit rate; subject to UIF credits and statutory calculation.","duration":"Subject to available UIF credits; UIF guidance notes benefits can be paid up to 365 days depending on credits.","howToClaim":"Apply via UIF Online / labour centre process using illness benefit application workflow.","documents":"ID/passport/valid foreign national documents, medical certificate or illness proof, banking details, employer remuneration declaration and UI-2.2 illness application documents.","deadline":"Apply according to UIF illness benefit rules after qualifying illness/absence.","employerResp":"Declare whether the employee receives full or partial remuneration while on illness leave and maintain UIF records.","employeeResp":"Submit medical evidence and UIF illness claim documents.","payrollImpact":"Payroll must coordinate employer sick pay/remuneration with UIF claim declarations.","authority":"Department of Employment and Labour / UIF","sourceUrl":"https://ufiling.labour.gov.za/uif/illness-benefits | https://www.labour.gov.za/uif_how_to_claim_uif_illness_benefits | https://www.labour.gov.za/DocumentCenter/Forms/Unemployment%20Insurance%20Fund/UI2-2_application-for-illness-benefits_.pdf","notes":"Use as employee guidance; do not confuse with employer-paid sick leave under employment law."},{"category":"Work Injury / Occupational Disease","schemeName":"Compensation Fund injury on duty / COIDA claim","claimableBy":"Employee; employer reports injury","eligible":"Employee who suffers an occupational injury or disease covered by Compensation for Occupational Injuries and Diseases Act and Compensation Fund procedures.","amount":"Compensation Fund pays medical expenses and disablement/death benefits according to accepted liability and assessment; older guidance shows temporary total disablement was calculated at 75% of earnings subject to caps.","duration":"For accepted temporary/permanent disablement, medical costs or dependants benefits according to COIDA decision.","howToClaim":"Employer reports injury/disease and submits required Compensation Fund documents; claim is processed by Compensation Fund/CompEasy route.","documents":"Accident report, first/progress/final medical reports, employee/employer data, earnings information, witness/incident evidence and Compensation Fund forms.","deadline":"Report injury promptly; progress medical reports should be submitted monthly where prolonged treatment/off-duty continues.","employerResp":"Report injury, maintain COIDA registration/return records and submit medical/earnings documents.","employeeResp":"Report injury and attend medical assessment/treatment.","payrollImpact":"Payroll must code injury on duty separately and track Compensation Fund decisions for wage/absence treatment.","authority":"Department of Employment and Labour / Compensation Fund","sourceUrl":"https://www.labour.gov.za/DocumentCenter/Publications/Compensation%20for%20Occupational%20Injuries%20and%20Diseases/Compensation%20Fund%27s%20injury%20on%20duty%20reporting%20procedures.pdf | https://www.labour.gov.za/DocumentCenter/Publications/Compensation%20for%20Occupational%20Injuries%20and%20Diseases/COIDA_SERVICE_BOOK_VERSION_23.pdf","notes":"Use current Compensation Fund schedule/caps for live calculations; older calculation examples should be treated as method references only."},{"category":"Adoption / Social Insurance","schemeName":"UIF adoption benefit","claimableBy":"Employee","eligible":"UIF contributor taking qualifying adoption leave and meeting UIF adoption benefit requirements.","amount":"UIF benefit amount follows UIF benefit schedule/credits and offsets against employer-paid remuneration where applicable.","duration":"For qualifying adoption leave period under UIF rules.","howToClaim":"Apply through UIF Online / labour centre claim route for adoption benefits.","documents":"Identity/passport documents, adoption order/documents, banking details, remuneration declaration and UIF application forms.","deadline":"Apply according to UIF filing rules for adoption benefit.","employerResp":"Declare UIF contributions and confirm any remuneration paid during adoption leave.","employeeResp":"Submit adoption documents and UIF application.","payrollImpact":"Employee claim; employer supports with UIF declarations and remuneration evidence.","authority":"Department of Employment and Labour / UIF","sourceUrl":"https://www.labour.gov.za/DocumentCenter/Publications/Unemployment%20Insurance%20Fund/Basic%20Guide%20to%20the%20Unemployment%20Insurance%20Fund%20%28UIF%29.pdf | https://www.labour.gov.za/unemployment-insurance-fund%28uif%29 | https://ufiling.labour.gov.za/uif/how-to-apply","notes":"Included because UIF official guide lists adoption benefit as one of the UIF short-term relief routes."}],"South Korea":[{"category":"Maternity / Parental","schemeName":"Employment Insurance childbirth leave benefit","claimableBy":"Employee; employer confirms/provides documents","eligible":"Female employee who has been granted maternity leave/miscarriage/stillbirth leave and satisfies employment insurance insured-period requirements.","amount":"Employment Insurance pays maternity leave benefit according to ordinary wage rules and statutory caps; priority-support employers may have 90 days paid by Employment Insurance, with employer paying any statutory wage difference for early leave period if required.","duration":"Apply from 1 month after leave starts until 12 months after the leave ends; standard childbirth leave is 90 days, multiple births 120 days under official employment insurance guidance.","howToClaim":"Employee applies through Employment Insurance/Gov.kr or employment center with employer-issued leave confirmation.","documents":"Childbirth leave confirmation, wage ledger/employment contract or ordinary wage proof, proof of any employer-paid money during leave, medical certificate for miscarriage/stillbirth where relevant.","deadline":"Application window: from 1 month after maternity leave starts to 12 months after leave ends.","employerResp":"Grant leave, issue confirmation and provide wage/payment evidence.","employeeResp":"Apply within deadline and submit required documents.","payrollImpact":"Employer may be relieved from wage payment obligation up to Employment Insurance benefit amount; payroll must track benefit/wage difference.","authority":"Employment Insurance / Ministry of Employment and Labor / Gov.kr","sourceUrl":"https://edrm.ei.go.kr/ei/eih/eg/pb/pbPersonBnef/retrievePb0301Info.do | https://www.gov.kr/mw/AA020InfoCappView.do?CappBizCD=14900000302&HighCtgCD=A05004","notes":"For large employers, employer-paid first period differs from priority-support employers; check employer category."},{"category":"Parental Leave / Family","schemeName":"Employment Insurance childcare leave benefit","claimableBy":"Employee","eligible":"Employment-insured employee granted childcare leave or reduced working hours for childcare for at least 30 days and meeting insurance conditions.","amount":"Benefit amount depends on Employment Insurance childcare leave formula and caps; official Gov.kr service processes childcare leave/reduced-hours benefit applications.","duration":"For approved childcare leave / reduced-hours period under employment insurance rules.","howToClaim":"Apply online, by visit, fax or mail through Gov.kr/Employment Insurance process.","documents":"Childcare leave or reduced-hours benefit application, employer confirmation, wage proof, child/family documents and any employer payment evidence.","deadline":"According to Employment Insurance claim timing; apply for benefit after qualifying leave/reduced work begins.","employerResp":"Grant childcare leave/reduced hours and issue confirmation/payment information.","employeeResp":"Apply and keep leave/use conditions.","payrollImpact":"Payroll must code childcare leave/reduced hours and coordinate employer-paid amounts with insurance benefit records.","authority":"Gov.kr / Employment Insurance","sourceUrl":"https://www.gov.kr/mw/AA020InfoCappView.do?CappBizCD=14900000303 | https://edrm.ei.go.kr/ei/eih/cm/hm/main.do","notes":"Official service states it applies to insured workers granted childcare leave or reduced working hours for 30 days or more."},{"category":"Employer Advance Payment / Maternity","schemeName":"Employer proxy application for childbirth leave benefit","claimableBy":"Employer","eligible":"Employer that signs a continued-employment contract for eligible fixed-term female workers whose contract ends during pregnancy/maternity leave, or employer that pre-paid spouse childbirth leave benefit to employee.","amount":"Employer may apply to the local employment/labour office for the relevant childbirth/spouse childbirth leave benefit amount it advanced or qualifies for under the service.","duration":"Case-based, according to approved childbirth/spouse childbirth leave benefit period.","howToClaim":"Employer files proxy/subrogation application through Gov.kr or local employment labour office.","documents":"Proxy application, proof of continued employment contract or pre-payment to employee, leave confirmation, payroll/wage evidence and identity/employment data.","deadline":"Gov.kr service processing period is 14 days after receipt, subject to agency review.","employerResp":"Submit accurate application and evidence of payment/contract.","employeeResp":"Provide documents/confirmation where required.","payrollImpact":"Direct employer-facing reimbursement/claim route; payroll proof of pre-payment is important.","authority":"Gov.kr / Ministry of Employment and Labor","sourceUrl":"https://www.gov.kr/mw/AA020InfoCappView.do?CappBizCD=14900000626&HighCtgCD=A09006","notes":"Important because most Korean maternity/childcare benefits are employee-facing, but this is an explicit employer/proxy application route."},{"category":"Work Injury / Occupational Disease","schemeName":"Industrial Accident Compensation Insurance benefits","claimableBy":"Employee / dependant; employer incident information","eligible":"Worker with occupational injury/disease/disability/death covered by Industrial Accident Compensation Insurance.","amount":"Benefits may include medical care, temporary absence benefit, disability benefit, survivor benefit, funeral expense and unpaid benefit, depending on claim type and approval.","duration":"For the approved work injury/disease treatment, absence, disability or survivor claim period.","howToClaim":"Apply/claim through COMWEL/Gov.kr industrial accident insurance claim services.","documents":"Industrial accident claim form, medical reports, employer/incident information, wage/insurance data, disability or survivor evidence depending on benefit.","deadline":"Gov.kr pages list typical processing period around 10 days for several industrial accident benefit claims, subject to case review.","employerResp":"Report/cooperate on workplace accident data and provide wage/employment evidence.","employeeResp":"Submit claim and medical/survivor documents.","payrollImpact":"Payroll must keep wage evidence and separate industrial accident absence from ordinary sickness.","authority":"Gov.kr / Korea Workers Compensation and Welfare Service (COMWEL)","sourceUrl":"https://www.gov.kr/mw/AA020InfoCappView.do?CappBizCD=14900000266 | https://www.gov.kr/mw/AA020InfoCappView.do?CappBizCD=14900000268 | https://www.gov.kr/mw/AA020InfoCappView.do?CappBizCD=14900000282","notes":"Use COMWEL/Gov.kr decision for amounts; do not estimate industrial accident benefits without claim approval."},{"category":"Unemployment / Re-employment","schemeName":"Employment Insurance job-seeking benefit and employment promotion allowances","claimableBy":"Employee / insured person","eligible":"Employment insurance insured person who becomes unemployed, meets qualifying conditions and conducts active re-employment activities.","amount":"Job-seeking benefit and employment promotion allowances are paid according to Employment Insurance rules; benefit days depend on insured period/age and must be within the one-year claim period after leaving employment.","duration":"Official guidance notes benefits cannot be paid after 12 months from the day after leaving work even if remaining payable days exist; maximum payable days can be up to 270 based on conditions.","howToClaim":"Register as jobseeker and apply through Employment Insurance/employment center; complete unemployment recognition steps.","documents":"Separation/insurance history, jobseeker registration, identity, bank data, re-employment activity evidence and employment center documents.","deadline":"Apply without delay after job loss; payment right expires after one-year benefit period.","employerResp":"Submit separation data accurately and close employment insurance correctly.","employeeResp":"Register, apply and prove active job search/re-employment activities.","payrollImpact":"No employer reimbursement; termination data affects employee claim.","authority":"Employment Insurance","sourceUrl":"https://edrm.ei.go.kr/ei/eih/eg/pb/pbPersonBnef/retrievePb0204Info.do | https://edrm.ei.go.kr/ei/eih/eg/pb/pbPersonBnef/retrievePb0201Info.do | https://edrm.ei.go.kr/ei/common/dnfile/unemployment_benefits.pdf","notes":"Useful for offboarding; note that unemployment benefit is not severance or compensation from employer."}],"Spain":[{"category":"Maternity / Paternity / Parental","schemeName":"Nacimiento y cuidado de menor benefit","claimableBy":"Employee / self-employed person","eligible":"Affiliated worker in active or assimilated status who meets conditions for birth/adoption/guardianship/foster care leave benefit.","amount":"Social Security pays economic benefit according to statutory base rules; special non-contributory subsidy may apply where contribution minimum is missing.","duration":"From the day the rest/leave period begins; standard leave period determined by Spanish Social Security rules.","howToClaim":"Worker submits official application through Social Security benefit portal/service.","documents":"Identity document, family book or civil registry/birth/adoption certificate where not automated, employer certificate/payroll contribution data and official application.","deadline":"Apply once the qualifying rest period starts; use Social Security portal deadlines/processing.","employerResp":"Provide company certificate/contribution data and manage leave in payroll.","employeeResp":"Apply through Social Security and provide family/identity documents.","payrollImpact":"Payroll must code leave and company certificate correctly; benefit is public social security payment.","authority":"Instituto Nacional de la Seguridad Social / Seguridad Social","sourceUrl":"https://prestaciones.seg-social.es/servicio/prestacion-nacimiento-adopcion-cuidado-menor.html | https://www.seg-social.es/wps/portal/wss/internet/Trabajadores/PrestacionesPensionesTrabajadores/6b96a085-4dc0-47af-b2cb-97e00716791e/subsidionycm?changeLanguage=es | https://www.seg-social.es/wps/portal/wss/internet/InformacionUtil/44539/43384/75775a96-c87a-4b2d-a34c-f802097357a6/06102021_2","notes":"Official portal covers birth, adoption and foster/guardianship situations."},{"category":"Sick Leave / Social Security","schemeName":"Incapacidad temporal benefit","claimableBy":"Employee / employer delegated payment route","eligible":"Worker temporarily unable to work because of common illness, non-work accident, occupational disease or work accident and receiving healthcare.","amount":"Daily Social Security benefit covers loss of income; exact percentage/base depends on contingency and statutory period.","duration":"For temporary incapacity period, subject to medical and Social Security control.","howToClaim":"Apply/manage through Social Security temporary disability services; employer may operate delegated payment depending on case.","documents":"Medical leave/confirmation reports, contribution base/company certificate, identity and Social Security application where direct payment is needed.","deadline":"According to medical leave and Social Security procedure; direct payment when INSS must pay directly.","employerResp":"Transmit/record sick leave and payroll delegated payment data where applicable.","employeeResp":"Follow medical leave rules and submit any required direct payment application.","payrollImpact":"Payroll must distinguish common illness, accident at work and direct/delegated payment.","authority":"Seguridad Social / INSS","sourceUrl":"https://prestaciones.seg-social.es/prestaciones-enfermedades-accidentes/incapacidad-temporal.html | https://www.seg-social.es/wps/portal/wss/internet/Trabajadores/PrestacionesPensionesTrabajadores/10952?changeLanguage=es | https://prestaciones.seg-social.es/servicio/prestacion-pago-directo-incapacidad-temporal.html%20","notes":"Use official Social Security calculation for amount; do not generalize without contingency and dates."},{"category":"Hiring / Social Security Contribution Incentive","schemeName":"SEPE hiring bonus / reduction guide","claimableBy":"Employer","eligible":"Employer hiring workers under eligible contract modality, worker group and company criteria in force under SEPE official guide.","amount":"Amount depends on contract type and target group; SEPE guide includes examples such as EUR 110/month for certain long-term unemployed male workers under 45, with other amounts by category.","duration":"Duration depends on incentive/category and statutory rules.","howToClaim":"Apply/reflect bonus through employment contract registration and Social Security contribution system as applicable.","documents":"Employment contract, worker registration/unemployment status evidence, company eligibility, Social Security contribution data and any SEPE/TGSS evidence.","deadline":"According to contract registration and Social Security contribution deadlines.","employerResp":"Confirm eligibility before contract start, register contract and apply correct contribution bonus.","employeeResp":"Provide worker status evidence where needed.","payrollImpact":"Direct employer payroll/social contribution impact; incorrect bonus can create contribution debt.","authority":"Servicio Público de Empleo Estatal (SEPE) / Seguridad Social","sourceUrl":"https://www.sepe.es/HomeSepe/que-es-el-sepe/comunicacion-institucional/publicaciones/publicaciones-oficiales/listado-pub-empleo/bonificaciones-reducciones-contratacion-laboral.html | https://www.sepe.es/HomeSepe/que-es-el-sepe/comunicacion-institucional/publicaciones/publicaciones-oficiales/listado-pub-empleo/bonificaciones-reducciones-contrato-indefinido-temporal-ambitos-colectivos-especificos.html","notes":"Amounts change by law and category; always verify the latest SEPE guide before advising employer."},{"category":"Work Injury / Occupational Disease","schemeName":"Work accident / occupational disease Social Security benefits","claimableBy":"Employee","eligible":"Worker who suffers work accident or occupational disease giving rise to temporary incapacity, permanent injury/disability or other Social Security benefit.","amount":"Benefits depend on contingency and recognized incapacity/injury; occupational accident/disease pensions are paid under Social Security rules.","duration":"For recognized medical leave, injury, disability or survivor period.","howToClaim":"Claim/manage through Social Security/INSS or mutual insurance workflow depending on employer coverage.","documents":"Accident/occupational disease documentation, medical reports, wage/contribution certificate, identity and official benefit forms.","deadline":"According to Social Security claim procedure and medical control timeline.","employerResp":"Report work accident/occupational disease, provide wage certificate and cooperate with insurer/INSS.","employeeResp":"Submit medical and claim documents.","payrollImpact":"Payroll must classify contingency correctly because contribution/benefit treatment differs from common illness.","authority":"Seguridad Social / INSS","sourceUrl":"https://prestaciones.seg-social.es/prestaciones-enfermedades-accidentes.html | https://www.seg-social.es/wps/portal/wss/internet/Trabajadores/PrestacionesPensionesTrabajadores/32857/32860 | https://www.seg-social.es/wps/portal/wss/internet/Trabajadores/PrestacionesPensionesTrabajadores/10960/28750/28680/28700/28709/42804?changeLanguage=es","notes":"Use official INSS/mutual decision for payroll and leave treatment."},{"category":"Work Injury / Penalty Claim","schemeName":"Recargo de prestaciones for lack of safety measures","claimableBy":"Employee / beneficiary","eligible":"Employee or beneficiary with recognized work accident/occupational disease benefit where employer failed occupational risk-prevention duties.","amount":"Additional surcharge on economic benefits may be imposed on the employer under Social Security rules; amount depends on authority decision.","duration":"Applies to recognized work accident/occupational disease benefits affected by employer safety breach.","howToClaim":"Submit application for surcharge of benefits to Social Security/INSS using official form/service.","documents":"Recognized accident/disease benefit data, evidence of safety breach, inspection/medical documents and official application.","deadline":"According to official claim/service process.","employerResp":"Employer may be investigated and become liable for surcharge if prevention duties breached.","employeeResp":"Apply and provide evidence where claiming.","payrollImpact":"Not a subsidy; it is a penalty-style benefit surcharge with major employer cost risk.","authority":"Seguridad Social / INSS","sourceUrl":"https://www.seg-social.es/descarga/es/SolicRecargPrestac | https://www.seg-social.es/wps/portal/wss/internet/Pensionistas/Servicios/34887/40968/41025/recargoprestacionesat | https://www.seg-social.es/wps/portal/wss/internet/Pensionistas/Servicios/34887/40968/41028/solicitud%2Bde%2Brecargo","notes":"Included as government-administered claim route relevant to occupational safety and employer risk."}],"Sri Lanka":[{"category":"Provident Fund / Retirement","schemeName":"Employees Provident Fund retirement/refund benefit","claimableBy":"Employee / EPF member","eligible":"EPF member who becomes entitled to refund/withdrawal under EPF rules, commonly retirement/eligible cessation or other approved statutory grounds.","amount":"Refund of member EPF balance according to EPF account and statutory eligibility.","duration":"One-off or part payment depending on claim type; account may close after full payment.","howToClaim":"Apply using EPF member forms through Department of Labour/EPF process; payment by cheque or direct bank credit where available.","documents":"Original EPF forms, identity, member account data, bank account details, employment/cessation evidence and any EPF-requested documents.","deadline":"According to EPF claim process after qualifying event.","employerResp":"Maintain accurate EPF contributions and member records.","employeeResp":"Submit refund/withdrawal application with original forms and supporting documents.","payrollImpact":"Payroll must ensure EPF contributions are updated before claim; late contributions can delay member refund.","authority":"Employees Provident Fund / Central Bank of Sri Lanka / Department of Labour","sourceUrl":"https://epf.lk/?p=218 | https://epf.lk/?page_id=759 | https://epf.lk/?page_id=1080","notes":"Official EPF site says original forms should be obtained from nearest District Labour offices for refund claim."},{"category":"Trust Fund / Cessation","schemeName":"Employees Trust Fund statutory withdrawal claim","claimableBy":"Employee / ETF member","eligible":"ETF member who leaves employment/qualifies for statutory ETF benefit under ETF Board rules.","amount":"Refund/benefit amount depends on ETF member balance and statutory benefit type.","duration":"Normally upon cessation of employment; ETF FAQ states balance cannot be claimed every five years without leaving employment.","howToClaim":"Submit statutory benefit claim to ETF Board; claim status can be checked through ETF e-services.","documents":"ETF claim form, identity, employment cessation evidence, member details, bank/payment documents and any supporting evidence.","deadline":"Special urgency system claims may be paid within 10 working days subject to documentary proof and daily acceptance limits.","employerResp":"Pay ETF contributions and provide accurate employment/member data.","employeeResp":"Submit claim after qualifying cessation or approved statutory event.","payrollImpact":"Payroll contribution accuracy affects employee claim.","authority":"Employees Trust Fund Board","sourceUrl":"https://etfb.lk/statutory-benefits/ | https://etfb.lk/benefits-faqs/ | https://etfb.lk/downloads/","notes":"ETF is Ministry of Finance-linked public fund; not employer reimbursement."},{"category":"Work Injury / Compensation","schemeName":"Workmen compensation claim","claimableBy":"Employee / workman; employer liable","eligible":"Workman suffering injury/death arising out of and in the course of employment under Workmen Compensation Ordinance.","amount":"Compensation amount depends on wage, injury/death/disability category and statutory schedule; employer is liable through official workmen compensation framework.","duration":"For temporary/permanent disablement or death compensation according to law.","howToClaim":"Claim through Office of the Commissioner for Workmen Compensation / Department of Labour process.","documents":"Accident evidence, medical reports, wage/employment proof, identity and claim/legal documents.","deadline":"According to Workmen Compensation Ordinance and Commissioner process.","employerResp":"Report/respond to claim and provide wage/employment/medical examination cooperation.","employeeResp":"Submit injury/medical claim documents and attend examination if required.","payrollImpact":"Not a government subsidy; it is a statutory claim route administered under labour law and can affect employer cost reserves.","authority":"Department of Labour / Office of the Commissioner for Workmen Compensation","sourceUrl":"https://www.labourdept.gov.lk/downloads/labour_code/44.pdf | https://www.labourdept.gov.lk/downloads/labour_code/45.pdf | https://labourdept.gov.lk/","notes":"Official labour code PDF defines workman, wages and disablement and sets the legal framework."},{"category":"Maternity / Statutory Benefit","schemeName":"Maternity benefit under Maternity Benefits Ordinance","claimableBy":"Employee; employer pays statutory benefit","eligible":"Female worker covered by Maternity Benefits Ordinance in private/semi-government sectors.","amount":"Employer-paid maternity benefit; there is no standard government reimbursement identified for ordinary private-sector employers in the official sources reviewed.","duration":"For statutory maternity benefit period under the Ordinance.","howToClaim":"Employee claims maternity benefit/leave from employer; Department of Labour enforces the law.","documents":"Pregnancy/medical documents, employment records and any documents required by employer/labour authority.","deadline":"According to maternity leave/benefit timing under law.","employerResp":"Pay statutory maternity benefit and comply with Department of Labour enforcement.","employeeResp":"Notify employer and provide required medical/pregnancy evidence.","payrollImpact":"Important payroll cost item but not government claim-back; mark as employer liability.","authority":"Department of Labour","sourceUrl":"https://labourdept.gov.lk/downloads/labour_code/36.pdf | https://labourdept.gov.lk/womens-and-childrens-affairs-division/ | https://labourdept.gov.lk/child-labour-night-work-maternity-benefits-2/","notes":"Included as a caution row so users do not assume a government reimbursement exists."}],"Sweden":[{"category":"Sick Leave / Employer Reimbursement","schemeName":"Compensation for high sick pay costs","claimableBy":"Employer","eligible":"Employer that pays sick pay and whose annual sick pay cost exceeds the statutory threshold relative to payroll cost.","amount":"Försäkringskassan decides compensation based on sick pay costs and payroll costs reported through employer declaration; compensation is paid into employer tax account.","duration":"Annual/ongoing automatic calculation based on reported employer declarations.","howToClaim":"No separate claim normally needed; employer reports sick pay cost in monthly employer declaration to Swedish Tax Agency, which notifies Försäkringskassan.","documents":"Employer declaration, sick pay cost and payroll cost data; records supporting sick pay costs.","deadline":"Handled automatically after monthly employer declarations and Försäkringskassan decision.","employerResp":"Report sick pay costs correctly in monthly employer declaration.","employeeResp":"Employee reports sick leave according to employer/medical rules.","payrollImpact":"Direct employer reimbursement through tax account; payroll accuracy is critical.","authority":"Försäkringskassan / Swedish Tax Agency","sourceUrl":"https://www.forsakringskassan.se/english/for-employers/compensations-and-benefits/compensation-for-sick-pay-costs | https://www.forsakringskassan.se/english/for-employers/illness-and-injury/sick-employee-days-1-90/sick-pay","notes":"Official Försäkringskassan page states employer compensation is handled automatically using tax agency employer declaration data."},{"category":"Sick Leave / Social Insurance","schemeName":"Sickness benefit","claimableBy":"Employee","eligible":"Employee who cannot work because of illness, meets Swedish social insurance conditions and has passed employer sick pay stage or otherwise qualifies.","amount":"Sickness benefit amount depends on sickness benefit qualifying income and Försäkringskassan assessment.","duration":"For approved sickness benefit period; continuation depends on medical/work-capacity assessment.","howToClaim":"Employee applies/reports via Försäkringskassan sickness benefit process.","documents":"Medical certificate where required, employer sickness report, income/employment data and Försäkringskassan application.","deadline":"According to Försäkringskassan sickness benefit process and medical certificate timing.","employerResp":"Report employee sickness to Försäkringskassan where required and provide employment/income data.","employeeResp":"Apply, provide medical evidence and follow rehabilitation/work-capacity rules.","payrollImpact":"Payroll must coordinate sick pay days and Försäkringskassan sickness benefit stage.","authority":"Försäkringskassan","sourceUrl":"https://www.forsakringskassan.se/english/sick/employee/sickness-benefit | https://www.forsakringskassan.se/english/sick/employee","notes":"Employee-facing benefit; not an employer claim except employer reporting obligations."},{"category":"Maternity / Parental","schemeName":"Parental benefit","claimableBy":"Employee / parent","eligible":"Parent insured in Sweden who cares for a child instead of working, studying or actively seeking work; child generally must live in Sweden.","amount":"Parental benefit paid by Försäkringskassan; amount depends on income level and benefit-day type.","duration":"480 days of parental benefit for one child according to official Försäkringskassan page.","howToClaim":"Parent applies through Försäkringskassan parental benefit service; employer handles parental leave administration.","documents":"Child/family details, income/employment data, planned leave dates and Försäkringskassan application.","deadline":"Apply according to planned leave/benefit days; update salary/contact details.","employerResp":"Manage parental leave schedule and provide income/employment data where requested.","employeeResp":"Plan leave and apply for parental benefit.","payrollImpact":"Public benefit paid to parent; payroll must code unpaid/parental leave correctly.","authority":"Försäkringskassan","sourceUrl":"https://www.forsakringskassan.se/english/parents/when-the-child-is-born/parental-benefit | https://www.forsakringskassan.se/english/for-employers/parental-leave | https://www.forsakringskassan.se/english/parents/when-the-child-is-born/parental-benefit/parental-benefits---checklist","notes":"Sweden does not use a normal employer claim-back model for parental benefit; employer supports leave/admin."},{"category":"Hiring / Wage Subsidy","schemeName":"Nystartsjobb / New start job employer support","claimableBy":"Employer","eligible":"Employer hiring a person who has been away from working life for a long time or is newly arrived in Sweden and who meets Arbetsförmedlingen conditions.","amount":"Employer receives support as credit to the company tax account; exact amount/duration depends on candidate conditions and decision.","duration":"Time-limited compensation; employment itself does not have to be time-limited.","howToClaim":"Employer submits application to Arbetsförmedlingen before support starts; jobseeker answers eligibility questions through My Pages.","documents":"Employer application, candidate eligibility information, employment terms, collective agreement/equivalent wage information and company tax/debt status checks.","deadline":"Apply before claiming support; decisions handled by Arbetsförmedlingen.","employerResp":"Submit application, meet employer conditions and pay proper wage/terms.","employeeResp":"Confirm eligibility information to Arbetsförmedlingen.","payrollImpact":"Direct wage support via tax account credit; payroll must retain wage/contract records.","authority":"Arbetsförmedlingen / Swedish Public Employment Service","sourceUrl":"https://arbetsformedlingen.se/other-languages/english-engelska/additional-support/support-a-z/new-start-job | https://arbetsformedlingen.se/for-arbetsgivare/kom-igang-med-din-rekrytering/fa-stod-i-rekryteringen/nystartsjobb | https://arbetsformedlingen.se/for-arbetssokande/extra-stod/stod-a-o/nystartsjobb/nystartsjobb---sa-gar-det-till","notes":"Official page says the support is received via credit to the employer tax account."},{"category":"Hiring / Disability Support","schemeName":"Wage subsidy / Lönebidrag","claimableBy":"Employer","eligible":"Employer hiring or employing a person with reduced work capacity due to disability where Arbetsförmedlingen approves support.","amount":"Financial support to employer for wage/workplace adaptation; amount and form depend on Arbetsförmedlingen decision and subsidy type.","duration":"For approved support period; can be development, employment or job-security wage subsidy depending on situation.","howToClaim":"Employer/jobseeker works with Arbetsförmedlingen; application/decision before support can be used.","documents":"Medical/work-capacity assessment, job description, employment terms, workplace adaptation plan and employer/candidate details.","deadline":"According to Arbetsförmedlingen decision and application process.","employerResp":"Adapt work/workplace, meet terms and keep documentation for subsidy.","employeeResp":"Participate in assessment and use support as agreed.","payrollImpact":"Direct payroll/employment support; employer must ensure ordinary employment terms and approved adjustments.","authority":"Arbetsförmedlingen / Swedish Public Employment Service","sourceUrl":"https://arbetsformedlingen.se/other-languages/english-engelska/additional-support/support-a-z/wage-subsidy | https://arbetsformedlingen.se/download/18.75a5a30116b93f40a3fc997/1756214565142/Faktablad%20om%20l%C3%B6nebidrag%20f%C3%B6r%20utveckling%20i%20anst%C3%A4llning.pdf | https://arbetsformedlingen.se/other-languages/english-engelska/additional-support/support-a-z","notes":"Official Arbetsförmedlingen page describes wage subsidy as employer financial support to adapt work/workplace to the employee needs."}],"Switzerland":[{"category":"Maternity / Parental","schemeName":"Maternity allowance / Allocation de maternité / Mutterschaftsentschädigung","claimableBy":"Employee; often paid through employer/payroll after EO compensation route","eligible":"Woman in gainful employment at childbirth who meets Swiss EO/OASI contribution and employment conditions.","amount":"80% of average earned income before birth, capped by EO maximum daily allowance; official OASI/DI guidance states maternity allowance is paid as daily allowances.","duration":"14 weeks / 98 daily allowances after birth; extension possible in limited hospitalisation cases.","howToClaim":"Claim is asserted through the competent compensation office using the official maternity allowance form; payment can be made to employee or employer if employer continues salary.","documents":"Maternity allowance claim form, birth evidence, salary/employment data, OASI/AVS number and employer details.","deadline":"Claim as soon as birth/leave data is available; follow compensation office instructions and limitation rules.","employerResp":"Confirm salary/employment data; coordinate any salary continuation and EO payment routing.","employeeResp":"Submit required personal/birth details if not handled by employer.","payrollImpact":"Payroll must offset EO-funded maternity allowance against salary continuation where employer pays salary.","authority":"FSIO / OASI-AVS compensation offices","sourceUrl":"https://www.bsv.admin.ch/en/income-compensation-parents | https://www.ahv-iv.ch/en/Social-insurances/Income-compensation-allowance-in-the-event-of-service-maternity-other-parent-caring-for-a-sick-child-and-adoption/Maternity-allowance","notes":"Official Swiss sources describe EO parenthood allowances and the maternity allowance claim route."},{"category":"Paternity / Other Parent","schemeName":"Allowance for the other parent / paternity allowance","claimableBy":"Employee; often coordinated by employer/payroll","eligible":"Other parent in gainful employment who meets EO/OASI insurance and contribution conditions.","amount":"80% of average earned income before leave, capped by EO maximum daily allowance.","duration":"14 daily allowances, generally to be taken within the official time limit after birth.","howToClaim":"Submit official other-parent allowance claim to the compensation office; employer confirms salary/employment where needed.","documents":"Claim form, child/birth evidence, salary/employment details, OASI/AVS number.","deadline":"Apply after birth and within the official leave/allowance period.","employerResp":"Provide salary and employment confirmation if requested; coordinate leave and payroll.","employeeResp":"Take leave and provide birth/claim details.","payrollImpact":"Public income replacement reduces employer-funded absence cost if employer continues salary.","authority":"FSIO / OASI-AVS compensation offices","sourceUrl":"https://www.bsv.admin.ch/en/income-compensation-parents | https://www.ahv-iv.ch/en/Social-insurances/Income-compensation-allowance-in-the-event-of-service-maternity-other-parent-caring-for-a-sick-child-and-adoption","notes":"Use official compensation-office calculation for exact cap and payment handling."},{"category":"Family Care / Social Insurance","schemeName":"Care allowance for parents of seriously ill or injured children","claimableBy":"Employee / parent; employer supports leave/payroll data","eligible":"Parent who must interrupt or reduce work to care for a child seriously impaired by illness or accident and meets EO conditions.","amount":"EO allowance based on 80% of average earned income, capped by the statutory maximum.","duration":"Up to 98 daily allowances within the official framework for care leave.","howToClaim":"Apply through the responsible compensation office with medical confirmation and employer/salary data.","documents":"Medical certificate/confirmation, claim form, child details, salary/employment evidence.","deadline":"Apply when care leave starts and according to compensation office instructions.","empl
