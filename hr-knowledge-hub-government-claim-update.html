ed job-search/training conditions.","payrollImpact":"HR must ensure severance deposits and termination documentation are correct.","authority":"Superintendencia Financiera / severance fund administrators / compensation funds","sourceUrl":"https://www.superfinanciera.gov.co/publicaciones/10102819/consumidor-financiero/informacion-general/informacion-al-consumidor-financiero/cesantias-una-ayuda-en-la-etapa-de-desempleo--10102819/ | https://www.superfinanciera.gov.co/publicaciones/10116006/proteccion-al-desempleo/","notes":"This is not an employer payroll subsidy; it is relevant to offboarding guidance and employee claims."}],"Costa Rica":[{"category":"Maternity / Parental","schemeName":"CCSS maternity leave subsidy","claimableBy":"Employee; split cost between CCSS and employer","eligible":"Insured pregnant worker on maternity leave; MTSS/CCSS rules treat maternity leave pay as salary for labour rights.","amount":"CCSS pays 50% of the registered salary and the employer pays the other 50%, according to CCSS contact page and official legal interpretation.","duration":"Generally maternity leave period under Labour Code; exact start/end depends on medical certificate and labour rules.","howToClaim":"Register/process maternity leave in CCSS employer system and employee follows medical certification process.","documents":"Medical certificate/incapacity, employer payroll record, identity/insured information and CCSS forms/system data.","deadline":"When maternity leave is issued/registered; timing depends on CCSS process.","employerResp":"Pay employer 50%, register maternity leave correctly and maintain worker rights.","employeeResp":"Provide medical certificate and comply with leave conditions.","payrollImpact":"Payroll continues only for employer portion; CCSS subsidy must be reconciled and leave is included for labour benefit calculations.","authority":"CCSS / MTSS / Procuraduría General legal system","sourceUrl":"https://www.ccss.sa.cr/contacto | https://www.mtss.go.cr/temas-laborales/ | https://pgrweb.go.cr/textocompleto/normas/1/vigente/cir/2010-2019/2015-2019/2017/146a7/83623_107573-1.html","notes":"Official CCSS contact page states 50% CCSS and 50% employer for maternity subsidy."},{"category":"Sickness / Medical Leave","schemeName":"CCSS sickness incapacity subsidy","claimableBy":"Employee","eligible":"Insured worker with certified sickness incapacity under CCSS health insurance.","amount":"CCSS cash subsidy for sickness incapacity; official PGR/CCSS regulation indicates subsidy calculation starts from the fourth day and uses salary reported by the employer to CCSS.","duration":"For certified incapacity period according to CCSS rules.","howToClaim":"Use CCSS incapacity registration/control/payment process.","documents":"Incapacity certificate/boleta, insured ID, salary reported in CCSS payroll and medical evidence.","deadline":"At the time incapacity is issued/processed; CCSS system controls payment status.","employerResp":"Report salary correctly to CCSS and record worker incapacity.","employeeResp":"Follow medical leave and check incapacity status where needed.","payrollImpact":"Payroll must avoid paying full normal salary where CCSS subsidy applies, depending on company policy/law.","authority":"CCSS / PGR legal system","sourceUrl":"https://www.ccss.sa.cr/tramites?c=pensiones | https://sfa.ccss.sa.cr/incapacidades/ | https://www.pgrweb.go.cr/DOCS/NORMAS/1/VIGENTE/R/1990-1999/1990-1994/1993/C5B3/65B01.HTML","notes":"Exact rates and employer top-up practices should be checked against current CCSS regulation and collective/company policies."},{"category":"Work Injury / Occupational Disease","schemeName":"INS occupational risk insurance claim","claimableBy":"Employee; employer/INS process","eligible":"Worker suffering occupational accident or disease under mandatory work-risk insurance.","amount":"INS provides coverage/benefits under work-risk insurance; exact medical and cash benefits depend on the case and policy/statutory assessment.","duration":"For the occupational injury treatment and compensation period.","howToClaim":"Report the accident/sinister through INS channels and follow medical/claims process.","documents":"Accident report, employment details, medical evidence, INS policy/employer information.","deadline":"Report promptly after accident; exact deadline depends on INS work-risk process.","employerResp":"Maintain occupational risk insurance and report incidents to INS.","employeeResp":"Report injury and attend medical/claim assessments.","payrollImpact":"Payroll must classify work accident absence and coordinate INS benefit/reimbursement treatment.","authority":"Instituto Nacional de Seguros / MTSS","sourceUrl":"https://portal2.ins-cr.com/apps/web/servicios/frmasistencia.aspx | https://www.mtss.go.cr/seguridad-social/","notes":"INS process is case-based; use official INS work-risk portal/channel for live claims."},{"category":"Social Security / Payroll Adjustment","schemeName":"CCSS refunds or payroll adjustments for employers/workers","claimableBy":"Employer or employee depending on overpayment type","eligible":"Employer, insured worker or independent worker with eligible overpaid contributions or incorrect payroll data.","amount":"Refund/adjustment amount depends on verified overpayment or correction.","duration":"Case-by-case.","howToClaim":"Request through CCSS official trámite such as devolución de cuotas or solicitud ajustes de planilla.","documents":"Contribution/payment records, payroll details, identification and supporting evidence for the correction/refund.","deadline":"According to CCSS administrative process.","employerResp":"Keep accurate payroll submissions and request corrections where needed.","employeeResp":"Provide evidence if worker refund is involved.","payrollImpact":"Payroll may need retroactive corrections and reconciliation of social security expense.","authority":"CCSS","sourceUrl":"https://www.ccss.sa.cr/tramites?c=pensiones | https://www.ccss.sa.cr/patronos","notes":"This is not a benefit programme, but a practical government claim/refund workflow for payroll errors."}],"Croatia":[{"category":"Maternity / Parental","schemeName":"Maternity and parental benefits","claimableBy":"Employee/self-employed parent; paid/implemented by HZZO","eligible":"Employed and self-employed parents covered by compulsory health insurance and meeting conditions under the Maternity and Parental Benefits Act.","amount":"Salary compensation/benefits under HZZO rules; HZZO FAQ states the base is the average salary paid in the last six months before the qualifying event.","duration":"Maternity, paternity, parental leave and related family rights according to the Act.","howToClaim":"Submit claim to HZZO / use gov.hr and HZZO procedure.","documents":"Application form, health insurance/identity data, employment/pay records, birth/child documentation as required.","deadline":"Claim according to HZZO procedure and relevant leave start date.","employerResp":"Provide employment/payroll data and respect protected parental rights.","employeeResp":"Apply to HZZO and provide child/insurance documents.","payrollImpact":"Payroll must coordinate state-paid compensation and employer-funded pregnancy/breastfeeding leave exceptions.","authority":"HZZO / gov.hr","sourceUrl":"https://gov.hr/en/maternity-and-parental-benefits/704 | https://hzzo.hr/rodiljne-i-roditeljske-potpore | https://hzzo.hr/pitanja-i-odgovori/12","notes":"Gov.hr notes some pregnancy/breastfeeding leave is obtained from employer and salary compensation is charged to employer funds, not HZZO."},{"category":"Sickness / Medical Leave","schemeName":"HZZO sick leave salary compensation","claimableBy":"Employee; employer may pay first depending on sick-leave period and recover/coordinate where allowed","eligible":"Insured worker temporarily unable to work due to sickness under compulsory health insurance rules.","amount":"Salary compensation is based on statutory HZZO rules and average salary basis; exact payer and reimbursement depend on cause and duration.","duration":"For certified temporary incapacity period.","howToClaim":"Doctor issues sick leave; employer and HZZO process salary compensation/reimbursement according to HZZO rules.","documents":"Medical certificate, employer payroll records, insurance data and HZZO forms.","deadline":"Follow HZZO and employer reporting deadlines after sick leave is opened/closed.","employerResp":"Record absence, submit salary data and pay/recover according to HZZO rules.","employeeResp":"Follow medical instructions and provide sick leave documentation.","payrollImpact":"Payroll must separate employer-borne sick pay from HZZO-funded compensation.","authority":"HZZO","sourceUrl":"https://hzzo.hr/pitanja-i-odgovori/12 | https://hzzo.hr/","notes":"Check HZZO operational rules for exact employer recovery and first-day thresholds."},{"category":"Hiring / Wage Subsidy","schemeName":"HZZ Employment Support - Potpore za zapošljavanje","claimableBy":"Employer","eligible":"Employer hiring eligible unemployed persons registered with the Croatian Employment Service and meeting measure requirements.","amount":"HZZ grants monthly flat-rate employment support; amount depends on measure, worker category, education level and tax relief eligibility.","duration":"According to 2026 active employment measure rules/contract.","howToClaim":"Apply online through HZZ active employment measures portal before employment/within measure process.","documents":"Employer financial documents, employee eligibility records, job vacancy details and HZZ online application data.","deadline":"Requests are submitted according to annual HZZ measure rules and open application period.","employerResp":"Maintain supported employment and comply with HZZ measure contract.","employeeResp":"Remain registered/eligible with HZZ where required.","payrollImpact":"Can reduce employment cost; HR must budget only after approval because use of measures is an option, not an automatic right.","authority":"Croatian Employment Service (HZZ)","sourceUrl":"https://mjere.hzz.hr/mjere/potpore-za-zaposljavanje-2026/ | https://mjere.hzz.hr/katalog-mjera/opci-uvjeti-koristenja-mjera-aktivne-politike-zaposljavanja-u-2026-godini/","notes":"HZZ states active measures are not an administrative right; approval depends on meeting conditions and available programme rules."}],"Cyprus":[{"category":"Maternity / Parental","schemeName":"Maternity Benefit","claimableBy":"Employee / insured mother","eligible":"Expecting or gave birth/adopted/surrogacy case and has paid Social Insurance contributions.","amount":"Social Insurance cash benefit; amount depends on insured earnings and contribution record.","duration":"For approved maternity benefit period.","howToClaim":"Apply online through gov.cy with authenticated CY Login, or by paper form where online access is not available.","documents":"CY Login, Social Insurance number, pregnancy/birth/adoption evidence and employer-related details requested by Social Insurance Services.","deadline":"Application must be submitted within 21 days from the day for which the benefit is claimed.","employerResp":"Provide employer declaration/employment information when requested and coordinate payroll during leave.","employeeResp":"Submit the application and supporting documents on time.","payrollImpact":"Benefit is paid through Social Insurance, so payroll should avoid double-paying where leave is not fully employer-funded.","authority":"Social Insurance Services, Ministry of Labour and Social Insurance","sourceUrl":"https://www.gov.cy/en/service/maternity-allowance-benefit/","notes":"Official page states Social Insurance contributions are required and gives a 21-day application timing rule."},{"category":"Sickness / Medical Leave","schemeName":"Sickness Benefit","claimableBy":"Employee / insured person","eligible":"Insured person who is unable to work due to sickness and meets Social Insurance conditions.","amount":"Social Insurance cash sickness benefit; amount depends on insured earnings/contribution record.","duration":"For approved period of sickness benefit.","howToClaim":"Apply online through gov.cy using CY Login.","documents":"CY Login, Social Insurance details, medical certificate or sickness evidence requested by Social Insurance Services.","deadline":"Submit as soon as sickness benefit is needed; official service page does not show a fixed public deadline.","employerResp":"Record sick absence and provide employment/payroll details where requested.","employeeResp":"Apply and provide medical evidence.","payrollImpact":"Payroll must coordinate employer sick pay, absence status and Social Insurance benefit to avoid duplicate treatment.","authority":"Social Insurance Services, Ministry of Labour and Social Insurance","sourceUrl":"https://www.gov.cy/en/service/sickness-benefit/"},{"category":"Paternity / Parental","schemeName":"Paternity Allowance","claimableBy":"Employee / insured father or eligible parent","eligible":"Eligible insured person applying for paternity allowance under Social Insurance rules.","amount":"Social Insurance paternity allowance; amount depends on insured earnings/contribution record.","duration":"For approved paternity allowance period.","howToClaim":"Submit the official paternity allowance application form through Social Insurance Services.","documents":"Paternity allowance application form, Social Insurance details, child/birth evidence and employment information.","deadline":"Follow Social Insurance Services filing process; no fixed public deadline shown on the gov.cy service page.","employerResp":"Confirm employment details and coordinate payroll leave status.","employeeResp":"Submit application and required documents.","payrollImpact":"Treat paternity leave/benefit separately from normal working salary where applicable.","authority":"Social Insurance Services, Ministry of Labour and Social Insurance","sourceUrl":"https://www.gov.cy/en/service/paternity-allowance/"},{"category":"Parental Leave","schemeName":"Parental Leave Benefit","claimableBy":"Employee / insured parent","eligible":"Parent with Social Insurance number/contributions; employed parents must have completed 6 months continuous employment with same employer, not receive full employer pay during leave, and inform employer at least 3 weeks before leave unless reduced by consent.","amount":"Social Insurance parental leave benefit; amount depends on insured earnings/contribution record.","duration":"Benefit entitlement for each child up to age 15 ranges from 8 to 14 weeks depending on birth order; disabled child eligibility up to age 21 with extra weeks; application can cover 1 day to maximum 5 weeks per calendar year.","howToClaim":"Apply online through gov.cy using CY Login.","documents":"CY Login, Social Insurance details, child details, employer/leave evidence.","deadline":"Application must be submitted no later than 7 days after the first day for which benefit is requested.","employerResp":"Receive employee notice, verify employment and manage leave/payroll status.","employeeResp":"Notify employer and apply within the deadline.","payrollImpact":"Important payroll rule: employee must not be receiving full employer pay for the leave period to qualify.","authority":"Social Insurance Services, Ministry of Labour and Social Insurance","sourceUrl":"https://www.gov.cy/en/service/parental-leave-benefit/"},{"category":"Paid Annual Leave / Central Fund","schemeName":"Paid Annual Leave via Central Holiday Fund","claimableBy":"Employee; employer contribution-based fund may pay employee","eligible":"All private and public sector employees including apprentices; Central Holiday Fund applies where leave pay is paid out of the Fund instead of directly by employer.","amount":"Annual leave pay either paid directly by employer or out of Central Holiday Fund to which employers contribute.","duration":"If worked 48 weeks in a year: 4 weeks annual leave; 20 working days for 5-day week, 24 working days for 6-day week.","howToClaim":"Use gov.cy annual leave service / Central Holiday Fund process where applicable.","documents":"Employment details, leave period, contribution/eligibility details.","deadline":"Claim timing depends on Central Holiday Fund process.","employerResp":"Pay employee directly or contribute to Central Holiday Fund as applicable.","employeeResp":"Use leave entitlement and follow claim/leave process.","payrollImpact":"Payroll must know whether leave pay is employer-paid or Fund-paid to avoid duplication.","authority":"Social Insurance Services / Central Holiday Fund","sourceUrl":"https://www.gov.cy/en/service/31545/"},{"category":"Hiring / Wage Subsidy","schemeName":"Funding Schemes to Support Employment","claimableBy":"Employer","eligible":"Employers participating in Department of Labour Employment Support Grant Schemes; schemes focus on integrating/reintegrating unemployed persons, especially vulnerable groups.","amount":"Grant/subsidy amount depends on the specific active scheme and approval terms.","duration":"Depends on the call/scheme.","howToClaim":"Apply through Department of Labour subsidy/funding programme channels.","documents":"Employer registration, vacancy/employee details, unemployment/vulnerable group eligibility evidence and any scheme documents.","deadline":"Before hiring or within scheme-specific application period.","employerResp":"Apply before committing costs where required, keep records and comply with scheme conditions.","employeeResp":"Jobseeker provides eligibility information where needed.","payrollImpact":"Can offset wage/hiring costs, but normal payroll and labour law obligations still apply.","authority":"Department of Labour, Ministry of Labour and Social Insurance","sourceUrl":"https://www.gov.cy/en/service/funding-programmes-to-support-employment/"}],"Czech Republic":[{"category":"Sickness / Medical Leave","schemeName":"Nemocenské - Sickness Benefit","claimableBy":"Employee / insured person","eligible":"Economically active insured person temporarily unable to work due to illness.","amount":"Sickness insurance benefit; calculated from reduced daily assessment base under Czech sickness insurance rules.","duration":"For temporary incapacity period after employer wage compensation period, subject to sickness insurance rules.","howToClaim":"Doctor issues electronic incapacity documentation; employee/employer process through CSSZ/OSSZ systems.","documents":"Electronic incapacity record, employee identification, employer payroll details.","deadline":"Handled through electronic sick-leave/CSSZ process; practical timing depends on doctor/employer submission.","employerResp":"Process e-sick leave/payroll data and submit required employer information to CSSZ.","employeeResp":"Cooperate with doctor/employer and follow sickness rules.","payrollImpact":"Employer pays statutory wage compensation first; CSSZ benefit covers eligible later sickness period.","authority":"Czech Social Security Administration (CSSZ)","sourceUrl":"https://www.cssz.cz/nemocenske?lang=en"},{"category":"Maternity / Parental","schemeName":"Peněžitá pomoc v mateřství - Maternity Benefit","claimableBy":"Employee / insured parent","eligible":"Mother, father or insured person taking a child into care who meets sickness insurance participation and qualifying-period conditions.","amount":"Cash maternity benefit from sickness insurance; calculated from assessment base.","duration":"Generally tied to maternity leave period; MPSV employment guide states maternity leave is 28 weeks, or 37 weeks for multiple births.","howToClaim":"From 2025, gynecologist submits expected birth confirmation electronically; employee uses identifier/claim through employer, who forwards to OSSZ/CSSZ.","documents":"Birth/expected birth confirmation identifier, employee and employer payroll details, additional child-care/adoption documents if needed.","deadline":"Submit when maternity leave/benefit starts; CSSZ process applies.","employerResp":"Forward employee claim/details to OSSZ/CSSZ and manage maternity leave in HR records.","employeeResp":"Provide identifier/documents and submit claim through employer or directly if self-employed/voluntarily insured.","payrollImpact":"Payroll should stop/adjust normal salary where unpaid maternity leave is covered by CSSZ benefit.","authority":"Czech Social Security Administration (CSSZ) / MPSV","sourceUrl":"https://www.cssz.cz/penezita-pomoc-v-materstvi?article=4f38f2007647e; https://ppropo.mpsv.cz/pdf/IX112Materskaarodicovskadovolena.pdf"},{"category":"Paternity / Parental","schemeName":"Otcovská - Paternity Benefit","claimableBy":"Employee / insured father or eligible caregiver","eligible":"Insured father or insured person taking child into substitute care; sickness insurance participation required.","amount":"Cash paternity benefit from sickness insurance; calculated from assessment base.","duration":"14 days connected with care for a newborn child or substitute-care child.","howToClaim":"Apply through CSSZ/OSSZ process; employee provides claim to employer, employer forwards required data.","documents":"Child/birth or substitute-care documents, employee and employer data.","deadline":"Use during the eligible statutory period around birth/care; exact timing follows CSSZ rules.","employerResp":"Forward claim/payroll data and record paternity leave.","employeeResp":"Submit claim and supporting documents.","payrollImpact":"Payroll records paternity leave separately from working salary.","authority":"Czech Social Security Administration (CSSZ)","sourceUrl":"https://www.cssz.cz/otcovska?lang=en"},{"category":"Employer Social Insurance Relief","schemeName":"Employer Social Insurance Discount for Part-Time Employees","claimableBy":"Employer","eligible":"Employer hiring qualifying part-time employees in categories such as age 55+, students, workers under 21, recently retrained workers, disabled persons, and parents caring for a child under 10, subject to detailed conditions.","amount":"5% discount from the aggregate assessment bases of eligible employees.","duration":"Monthly, where eligibility and reporting requirements are met.","howToClaim":"Employer must notify CSSZ before applying the discount and then claim it in the social insurance reporting/payment process.","documents":"Notification of intention to apply discount, employee eligibility evidence, monthly payroll/social insurance report.","deadline":"Discount must be claimed by the due date for the relevant calendar month.","employerResp":"Check eligibility before claiming, notify CSSZ, claim discount correctly in payroll filing.","employeeResp":"Provide eligibility evidence where needed.","payrollImpact":"Direct payroll cost reduction through lower employer social security payable for qualifying part-time roles.","authority":"Czech Social Security Administration (CSSZ) / MPSV JMHZ","sourceUrl":"https://www.cssz.cz/-/sleva-na-pojistnem-zamestnavatele-zkracene-uvazky-uplatnovani-v-ramci-jm-1; https://eportal.cssz.cz/web/portal/-/tiskopisy/ozuspoj"},{"category":"Unemployment / Jobseeker","schemeName":"Unemployment Benefit / Labour Office Registration","claimableBy":"Employee / jobseeker","eligible":"Person who registers with the Labour Office and meets unemployment benefit conditions.","amount":"Amount depends on previous earnings, qualifying period and Labour Office assessment.","duration":"For statutory unemployment benefit period depending on age/conditions.","howToClaim":"Register and apply through Labour Office channels, including online ordering/appointments where available.","documents":"Identity, employment termination evidence, earnings/employment history documents.","deadline":"Apply immediately after employment ends to avoid gaps.","employerResp":"Provide termination/employment documents to employee where required.","employeeResp":"Register as jobseeker and submit required documents.","payrollImpact":"Usually not an employer claim, but HR must issue accurate termination/payroll documents.","authority":"Labour Office of the Czech Republic","sourceUrl":"https://objednavky.uradprace.cz/?IDSL=1002&culture=en"}],"Denmark":[{"category":"Maternity / Parental","schemeName":"Maternity/Paternity Benefits Reimbursement for Employers","claimableBy":"Employer; employee if unpaid leave","eligible":"Employer that pays salary during employee maternity/paternity leave can apply for reimbursement; if leave is unpaid, employee can apply for maternity/paternity benefits.","amount":"Reimbursement/benefit amount depends on statutory maternity/paternity benefit rules and salary paid.","duration":"During approved maternity/paternity leave period.","howToClaim":"Employer reports leave and applies through Min Barsel / NemRefusion using MitID and NemRefusion rights.","documents":"Employee leave information, salary paid, CPR/employee data, employer NemRefusion access.","deadline":"Claim timing follows Udbetaling Danmark/NemRefusion rules; employer should report leave when employee goes on leave.","employerResp":"Report leave, apply for reimbursement, pay salary only where contract/CBA requires.","employeeResp":"Plan leave and apply directly if unpaid.","payrollImpact":"Payroll must coordinate salary paid with government reimbursement.","authority":"Udbetaling Danmark / Business in Denmark (Virk)","sourceUrl":"https://businessindenmark.virk.dk/guidance/ba-bid-barselsdagpenge/ba-bid-employer/"},{"category":"Maternity / Parental Fund","schemeName":"Barsel.dk Reimbursement / Compensation","claimableBy":"Private employer; self-employed/private entrepreneur","eligible":"Private employers paying salary during maternity/paternity leave; self-employed/private entrepreneurs on maternity/paternity leave may receive compensation.","amount":"Barsel.dk reimburses private employers paying salary during leave; exact amount depends on Barsel.dk rules and payroll case.","duration":"During approved maternity/paternity leave.","howToClaim":"Use Barsel.dk guidance/self-service through Business in Denmark.","documents":"Salary paid, leave records, employee/self-employed details.","deadline":"Apply through Barsel.dk/NemRefusion process within applicable claim timing.","employerResp":"Keep salary and leave records and claim eligible reimbursement.","employeeResp":"Provide leave details and cooperate with employer.","payrollImpact":"Reduces employer maternity/paternity leave salary cost for eligible private employers.","authority":"Barsel.dk / Udbetaling Danmark","sourceUrl":"https://businessindenmark.virk.dk/guidance/barsel-dk-bid/"},{"category":"Sickness / Medical Leave","schemeName":"Sickness Benefits Reimbursement","claimableBy":"Employer","eligible":"Employer may have to pay wages during sickness; if employee has been sick for more than 30 days and employer continues to pay wages, employer can receive reimbursement.","amount":"Sickness benefit reimbursement amount depends on statutory sickness benefit rules.","duration":"Short-term benefit; Life in Denmark states sickness benefit can generally be received up to 22 weeks within the last nine full calendar months, subject to reassessment/extensions.","howToClaim":"Report sickness and apply for reimbursement through NemRefusion.","documents":"Sick leave details, employee information, salary paid, medical/sickness documentation where required.","deadline":"Report/apply within NemRefusion/municipality deadlines.","employerResp":"Pay required sickness wages, report sickness and claim reimbursement where eligible.","employeeResp":"Report sickness and cooperate with documentation.","payrollImpact":"Payroll must track first employer-paid period and reimbursement period.","authority":"Municipality / NemRefusion / Business in Denmark","sourceUrl":"https://businessindenmark.virk.dk/guidance/sick-leave/sickness-benefits/; https://lifeindenmark.borger.dk/working/work-rights/leave-of-absence/sickness-benefits/sickness-benefits-for-a-salary-earner"},{"category":"Unemployment","schemeName":"Unemployment Benefits","claimableBy":"Employee / jobseeker","eligible":"Unemployed person who is member of an unemployment insurance fund and meets benefit conditions.","amount":"Benefit amount depends on unemployment insurance fund rules and individual basis.","duration":"Benefit period depends on statutory unemployment insurance rules.","howToClaim":"Register as a jobseeker at Jobnet.dk and apply through unemployment insurance fund.","documents":"Identity, employment history, membership and jobseeker registration documents.","deadline":"Register when unemployed; benefit timing depends on a-kasse/Jobnet rules.","employerResp":"Provide termination/employment documents if needed.","employeeResp":"Register as jobseeker and follow job-search requirements.","payrollImpact":"Not an employer claim; HR impact is issuing final documents and managing termination payroll.","authority":"Danish Agency for Labour Market and Recruitment / Jobnet / a-kasse","sourceUrl":"https://lifeindenmark.borger.dk/working/work-rights/unemployment-benefits"},{"category":"International Recruitment Support","schemeName":"EURES Targeted Mobility Scheme Support","claimableBy":"Employer and jobseeker","eligible":"Danish employer recruiting/onboarding candidates from EU, Norway or Iceland under EURES TMS Sweden project rules.","amount":"Financial support available for hiring/onboarding; exact support depends on TMS eligibility and approved costs.","duration":"Project/call-based.","howToClaim":"Apply through Workindenmark/EURES Targeted Mobility Scheme guidance.","documents":"Employer recruitment details, candidate details, onboarding/travel/settling support evidence requested by programme.","deadline":"Before or during eligible recruitment/onboarding under project rules.","employerResp":"Apply before costs where required and keep evidence.","employeeResp":"Candidate provides documents for eligible mobility support.","payrollImpact":"May reduce international recruitment/onboarding cost, but does not replace normal employment/payroll obligations.","authority":"Workindenmark / Danish Agency for Labour Market and Recruitment / EURES","sourceUrl":"https://www.workindenmark.dk/til-arbejdsgivere/du-kan-soege-om-oekonomisk-stoette"},{"category":"Recruitment Service","schemeName":"Workindenmark Employer Recruitment Assistance","claimableBy":"Employer","eligible":"Danish companies needing help finding qualified candidates from abroad.","amount":"Public recruitment assistance is free of charge; it is service support rather than a cash reimbursement.","duration":"As needed for recruitment.","howToClaim":"Contact Workindenmark for employer support.","documents":"Vacancy details, recruitment needs, employer information.","deadline":"No fixed claim deadline; use before/during recruitment.","employerResp":"Use service to source candidates and comply with Danish employment rules.","employeeResp":"Applicant applies/engages with recruitment.","payrollImpact":"No direct payroll claim, but useful government-supported hiring resource.","authority":"Workindenmark / Danish Agency for Labour Market and Recruitment","sourceUrl":"https://www.workindenmark.dk/for-employers","notes":"Included as a government-supported service, not a cash claim."}],"Egypt":[{"category":"Maternity / Parental","schemeName":"Private Sector Maternity Leave Wage Compensation","claimableBy":"Employee / insured woman; employer endorses claim","eligible":"Insured woman in private sector claiming wage compensation for maternity leave.","amount":"Wage compensation amount is assessed by the National Organization for Social Insurance based on the application and insured wage records.","duration":"For approved maternity leave period.","howToClaim":"Submit maternity wage compensation request to the competent NOSI office, endorsed by employer.","documents":"Original and two copies of application, child birth document, administratively approved leave decision from employer.","deadline":"Submit after maternity leave/birth documents are available; official service page does not show a fixed public deadline.","employerResp":"Endorse application, provide leave decision and insurance/employment data.","employeeResp":"Submit application and birth/leave documents.","payrollImpact":"Payroll should coordinate maternity leave pay/compensation and insurance records.","authority":"National Organization for Social Insurance (NOSI)","sourceUrl":"https://www.nosi.gov.eg/ar/Services/Pages/Info/CompPayInsPriSecMaternity.aspx"},{"category":"Work Injury / Occupational Disease","schemeName":"Work Injury Notification and Documents","claimableBy":"Employer; employee may report if employer does not","eligible":"Insured worker with workplace accident or occupational disease.","amount":"NOSI/insurance benefits depend on injury assessment and law; exact compensation varies by case.","duration":"For injury treatment, temporary incapacity, disability or other applicable period.","howToClaim":"Employer completes injury documents and submits to the competent insurance office; if employer refuses, injured worker or representative may submit the injury notification.","documents":"Work injury notification form, accident/injury documents according to type/place of injury, medical documents and employer records.","deadline":"Notify and submit documents promptly after accident; procedural timing depends on NOSI injury file.","employerResp":"Complete and submit injury documents to NOSI and keep accident records.","employeeResp":"Report accident and cooperate with medical/insurance process.","payrollImpact":"HR/payroll must mark occupational injury, coordinate leave/pay and insurance claim.","authority":"National Organization for Social Insurance (NOSI)","sourceUrl":"https://www.nosi.gov.eg/ar/Services/Pages/Info/%D8%A5%D8%AE%D8%B7%D8%A7%D8%B1-%D8%A7%D9%84%D8%B5%D9%86%D8%AF%D9%88%D9%82-%D8%A8%D8%A5%D8%B5%D8%A7%D8%A8%D8%A9-%D8%A7%D9%84%D8%B9%D9%85%D9%84-%D9%88%D9%85%D9%88%D8%A7%D9%81%D8%A7%D8%AA%D9%87-%D8%A8%D8%A7%D9%84%D9%85%D8%B3%D8%AA%D9%86%D8%AF%D8%A7%D8%AA-%D8%A7%D9%84%D9%84%D8%A7%D8%B2%D9%85%D8%A9.aspx"},{"category":"Unemployment","schemeName":"Unemployment Compensation","claimableBy":"Employee / insured person","eligible":"Insured person who becomes unemployed and meets statutory conditions, including not having resigned or being treated as resigned due to absence.","amount":"75% of last contribution wage for first 4 weeks; 65% for second 4 weeks; 55% for third 4 weeks; 45% for remaining weeks.","duration":"During unemployment period and during vocational training decided by the manpower office, subject to legal limits.","howToClaim":"Submit unemployment compensation request to NOSI.","documents":"Unemployment compensation application form and supporting termination/employment/insurance documents.","deadline":"Apply after unemployment occurs; timing follows NOSI procedure.","employerResp":"Provide termination and insurance documents where requested.","employeeResp":"Apply and comply with manpower office/training requirements.","payrollImpact":"Not an employer reimbursement; payroll/HR must issue accurate separation documents.","authority":"National Organization for Social Insurance (NOSI)","sourceUrl":"https://www.nosi.gov.eg/ar/Services/Pages/Info/UnEmplomentCompensation.aspx"},{"category":"Employer Contribution Relief","schemeName":"Reduction of Occupational Injury Insurance Contribution","claimableBy":"Employer","eligible":"Private sector employer that meets conditions and requests reduction in work injury insurance contribution in exchange for paying wage compensation and transportation expenses.","amount":"Reduction of occupational injury insurance contribution by 0.50%.","duration":"Applies while approval/conditions remain valid.","howToClaim":"Submit request to NOSI under the official service process.","documents":"Employer request and any NOSI-required supporting evidence.","deadline":"Apply before using the reduced contribution rate.","employerResp":"Pay wage compensation/transport expenses as required and maintain compliance.","employeeResp":"No direct employee action except cooperating with injury documents if needed.","payrollImpact":"Payroll impact: lower employer contribution rate for occupational injury insurance if approved.","authority":"National Organization for Social Insurance (NOSI)","sourceUrl":"https://www.nosi.gov.eg/ar/Services/Pages/Info/OccupInjuryInsuOneThird.aspx"},{"category":"Tax Incentive / Settlement","schemeName":"Tax Incentives and Facilitation Initiative","claimableBy":"Employer / taxpayer","eligible":"Taxpayer covered by 2025 tax facilitation/incentive laws and Egyptian Tax Authority rules; some rules target projects with annual turnover not exceeding EGP 20 million.","amount":"Tax settlement/facilitation and incentive treatment depends on law, dispute status and taxpayer category.","duration":"According to ETA initiative deadlines and relevant laws/ministerial decisions.","howToClaim":"Use Egyptian Tax Authority initiative page and official portal/forms for submission.","documents":"Tax registration, dispute/return details, requested ETA forms and supporting tax documents.","deadline":"Deadlines depend on the specific 2025 law/decision and ETA announcement.","employerResp":"Assess eligibility, file official forms and maintain tax records.","employeeResp":"Not applicable unless individual taxpayer.","payrollImpact":"Can reduce tax exposure/settle disputes; payroll relevance only where wage tax/social tax matters are involved.","authority":"Egyptian Tax Authority","sourceUrl":"https://www.eta.gov.eg/ar/content/aladlt-altryfyt-lmbadrt-alhwafz-w-altshylat-aldrybyt","notes":"Included because it is an official government tax incentive/facilitation claim, not a labour benefit."}],"Estonia":[{"category":"Maternity / Parental","schemeName":"Maternity Benefit and Maternity Leave","claimableBy":"Employee / mother","eligible":"Employed mother in an employment relationship before expected birth and entitled to temporary incapacity benefit under the Health Insurance Act; other insured work statuses may also qualify.","amount":"Mother parental benefit / maternity benefit calculated under Social Insurance Board rules.","duration":"Offer is sent 80 days before expected birth; period can be adjusted only in specific cases.","howToClaim":"Social Insurance Board sends offer; use self-service/official process to confirm.","documents":"Expected birth data from healthcare provider, employment/insurance data, personal details.","deadline":"Handle when offer is received before birth or after birth for unemployed mother.","employerResp":"Confirm employment/leave status and manage payroll leave.","employeeResp":"Review/confirm benefit offer and submit changes if needed.","payrollImpact":"Payroll must distinguish maternity leave/benefit from employer salary.","authority":"Social Insurance Board","sourceUrl":"https://sotsiaalkindlustusamet.ee/en/family-benefits-and-allowances/family-benefits-overview/maternity-benefit-and-maternity-leave"},{"category":"Paternity / Parental","schemeName":"Paternity Benefit and Paternity Leave","claimableBy":"Father / other eligible parent","eligible":"Child’s father or another eligible parent who is not the mother; where father is absent, mother’s spouse/registered partner may qualify.","amount":"Father parental benefit calculated under Estonian parental benefit rules.","duration":"30 calendar days; can be used from 30 calendar days before expected birth until child turns 3; cannot be transferred.","howToClaim":"Apply/arrange through Social Insurance Board self-service process.","documents":"Child/parent details, employment/insurance information.","deadline":"Use within the eligible period up to child age 3.","employerResp":"Record paternity leave and coordinate payroll.","employeeResp":"Apply and schedule leave days.","payrollImpact":"Payroll should account for benefit-funded leave days separately.","authority":"Social Insurance Board","sourceUrl":"https://sotsiaalkindlustusamet.ee/en/family-benefits-and-allowances/family-benefits-overview/paternity-benefit-and-paternity-leave"},{"category":"Parental Leave","schemeName":"Shared Parental Benefit and Parental Leave","claimableBy":"Parent","eligible":"Parent raising a child; parents decide who receives shared parental benefit; parental leave applies to parent in employment relationship.","amount":"Replacement income under parental benefit rules; amount depends on previous income and statutory calculation.","duration":"For statutory shared parental benefit/leave period.","howToClaim":"Apply/manage in Social Insurance Board self-service.","documents":"Child details, parent/benefit recipient details, employment/leave information.","deadline":"Apply/manage according to Social Insurance Board process.","employerResp":"Record parental leave and provide employment information if needed.","employeeResp":"Choose benefit recipient and manage self-service application.","payrollImpact":"Payroll must reflect parental leave status and any part-time/work-while-benefit rules.","authority":"Social Insurance Board","sourceUrl":"https://sotsiaalkindlustusamet.ee/en/family-benefits-and-allowances/family-benefits-overview/shared-parental-benefit"},{"category":"Sickness / Medical Leave","schemeName":"Sickness Benefit","claimableBy":"Employee / insured person","eligible":"Person with health insurance unable to work due to sickness with a certificate of sick leave.","amount":"No benefit first 3 sickness days; employer pays sickness benefit on days 4-8; Health Insurance Fund pays after that under rules.","duration":"Illness benefit generally up to 182 days for an insured event according to benefit comparison table.","howToClaim":"Doctor issues sick leave certificate; employer and Health Insurance Fund process benefit based on certificate.","documents":"Certificate of sick leave and employer certificate/payment data.","deadline":"Processed when sick-leave certificate is issued and submitted.","employerResp":"Pay days 4-8 sickness benefit and submit/confirm employer data.","employeeResp":"Obtain sick leave certificate and follow medical/work restrictions.","payrollImpact":"Payroll must handle unpaid days 1-3, employer-paid days 4-8 and Health Insurance Fund-paid period.","authority":"Estonian Health Insurance Fund","sourceUrl":"https://www.tervisekassa.ee/en/people/benefits-provided-health-insurance-fund/sickness-benefit; https://www.tervisekassa.ee/en/comparison-benefits-incapacity-work-0"},{"category":"Hiring / Wage Subsidy","schemeName":"Wage Subsidy","claimableBy":"Employer","eligible":"Employer hiring a less competitive or disadvantaged person to help them enter the labour market.","amount":"Wage subsidy amount depends on Töötukassa rules and the individual case.","duration":"For approved subsidy period.","howToClaim":"Apply through Estonian Unemployment Insurance Fund employer services.","documents":"Employer details, job offer, candidate eligibility and employment documents.","deadline":"Apply before/when hiring under scheme rules.","employerResp":"Submit application, hire eligible candidate and retain payroll records.","employeeResp":"Candidate/jobseeker provides eligibility information.","payrollImpact":"Can reduce employer wage cost but normal employment tax/payroll obligations remain.","authority":"Estonian Unemployment Insurance Fund (Töötukassa)","sourceUrl":"https://www.tootukassa.ee/en/services/employers/wage-subsidy"},{"category":"Training / Upskilling","schemeName":"Training Grant for Employers","claimableBy":"Employer","eligible":"Employer applying to train employees so they can adapt to changes in the economy; eligible training depends on Töötukassa rules.","amount":"Grant partially reimburses employer for employee training costs.","duration":"Depends on approved training and grant conditions.","howToClaim":"Apply through Töötukassa employer training grant service.","documents":"Training plan, provider/course evidence, employee details, cost documents.","deadline":"Apply before training/within scheme rules.","employerResp":"Apply, pay/arrange training and keep invoices/evidence.","employeeResp":"Attend approved training and provide necessary employee details.","payrollImpact":"Can reduce training cost; payroll may need to track training time/paid time.","authority":"Estonian Unemployment Insurance Fund (Töötukassa)","sourceUrl":"https://www.tootukassa.ee/en/services/employers/training-grant-employers"},{"category":"Tax Deduction / Individual Claim","schemeName":"Training Expenses Tax Incentive","claimableBy":"Employee / private individual","eligible":"Private individual claiming qualifying training expenses on income tax return under Estonian Tax and Customs Board rules.","amount":"Deductible training expenses reduce taxable income subject to annual tax rules and limits.","duration":"Claimed in annual income tax return.","howToClaim":"Claim through Estonian income tax return.","documents":"Training invoices/receipts and tax return evidence.","deadline":"During annual income tax filing period.","employerResp":"No employer action unless providing training/payment evidence.","employeeResp":"Keep receipts and claim in tax return.","payrollImpact":"Usually not employer payroll; useful for employee self-claim guidance.","authority":"Estonian Tax and Customs Board","sourceUrl":"https://www.emta.ee/en/private-client/taxes-and-payment/tax-incentives"}],"Finland":[{"category":"Sickness / Medical Leave","schemeName":"Sickness Allowance reimbursement to employer","claimableBy":"Employer, if employer pays wages during sickness absence","eligible":"Employer has paid wages for a period when the employee is entitled to Kela sickness allowance; wage payer has a Business ID and reports absence/payment data through the Incomes Register.","amount":"Kela sickness allowance is paid to the employer up to the wages paid for the same period; amount is allowance-based and case-specific.","duration":"For sickness allowance period under Kela rules; sickness allowance generally relates to incapacity lasting less than one year.","howToClaim":"Submit reimbursement application to Kela through the Incomes Register / employer e-service.","documents":"Absence data, wage payment data, employee identity details, medical certificate information and employer Business ID.","deadline":"Submit through the Incomes Register when reporting absence/payment data; exact timing follows Kela/Incomes Register processing rules.","employerResp":"Pay sick wages where required by law/CBA/contract, report absence correctly and apply for reimbursement if wages continue after waiting period.","employeeResp":"Provide medical certificate and cooperate with employer/Kela requirements.","payrollImpact":"Payroll must distinguish employer-paid sick pay and Kela-reimbursed allowance to avoid double payment.","authority":"Kela / Finnish Incomes Register","sourceUrl":"https://www.vero.fi/en/incomes-register/companies-and-organisations/employers/earnings-payment-data/absence-data/reimbursement-application-to-kela/ | https://www.suomi.fi/citizen/health-and-medical-care/falling-ill-and-rehabilitation/guide/sick-leave-employment-relationship-and-patients-rights/illness-and-employment-relationship","notes":"Official guidance says Kela may pay sickness allowance to the employer if the employer pays wages during sickness absence after the first ten days."},{"category":"Maternity / Parental","schemeName":"Parental allowance / pregnancy allowance payable to employer","claimableBy":"Employer, if employer pays salary during parental or pregnancy leave","eligible":"Employee is entitled to Kela parental/pregnancy allowance and employer pays wages/salary for the same leave period.","amount":"Kela pays the allowance to the employer for the paid leave period, up to the wages paid; exact amount depends on Kela benefit calculation.","duration":"Pregnancy allowance is 40 working days; parental allowance is generally 160 working days per parent, subject to transfer rules.","howToClaim":"Employer applies to Kela using employer e-service or Incomes Register reimbursement process.","documents":"Leave period details, wages paid, employee information and Kela-requested evidence.","deadline":"Kela form guidance states employer must apply at latest when the period with pay has ended.","employerResp":"Coordinate paid leave, report wages and apply for allowance if salary is paid during leave.","employeeResp":"Inform employer of leave and provide required family/medical information.","payrollImpact":"Reduces employer cost when salary is paid during family leave; payroll must reconcile allowance against salary paid.","authority":"Kela","sourceUrl":"https://www.kela.fi/on-parental-leave | https://www.kela.fi/benefit-forms/SV15e.pdf | https://www.vero.fi/en/incomes-register/companies-and-organisations/employers/earnings-payment-data/absence-data/reimbursement-application-to-kela/","notes":"Use current Kela calculator/rules before quoting the payable allowance amount."},{"category":"Maternity / Parental","schemeName":"Family leave compensation and annual leave cost compensation","claimableBy":"Employer","eligible":"Employer has incurred family-leave-related costs or annual leave costs accrued during special pregnancy, pregnancy or parental leave.","amount":"Compensation amount is calculated by Kela based on statutory benefit rules and claimed costs; not a flat universal amount.","duration":"Claim relates to family leave and annual leave costs accumulated during eligible leave.","howToClaim":"Apply to Kela using employer application/form or employer e-service.","documents":"Employer application, employee details, leave period, paid wages/annual leave costs and supporting payroll records.","deadline":"Family leave compensation: within 2 years of start of pregnancy allowance period or adoption parental allowance period; annual leave costs: within 2 years from beginning of the calendar month for which compensation is applied.","employerResp":"Track leave costs, submit application and keep payroll evidence.","employeeResp":"Provide leave details and documents requested by employer/Kela.","payrollImpact":"Important payroll accrual item because annual leave can accrue during parental leave and may be reimbursable.","authority":"Kela","sourceUrl":"https://www.kela.fi/benefit-forms/SV18e.pdf | https://www.kela.fi/news/are-you-a-self-employed-person-about-to-hire-your-first-employee","notes":"Official form sets separate two-year deadlines."},{"category":"Health / Occupational Health","schemeName":"Occupational health care cost reimbursement","claimableBy":"Employer","eligible":"Employer that arranges statutory preventive occupational healthcare for employees; may also provide GP-level medical care services.","amount":"Kela reimburses necessary and reasonable occupational healthcare costs under Health Insurance Act rules; reimbursement rate/cap depends on cost class and annual Kela rules.","duration":"Claimed for the employer occupational healthcare accounting period.","howToClaim":"Submit employer occupational healthcare reimbursement claim online through Kela service with Suomi.fi mandate.","documents":"Occupational healthcare agreement, action plan, cost records/invoices and employer claim details.","deadline":"Claim timing depends on the accounting period and Kela reimbursement service rules.","employerResp":"Arrange preventive occupational healthcare, pay provider, keep records and file reimbursement.","employeeResp":"Use occupational health service according to employer policy.","payrollImpact":"Employer cost can be partly reimbursed; track separately from payroll wages.","authority":"Kela","sourceUrl":"https://www.kela.fi/occupational-health-care | https://www.kela.fi/documents/d/guest/brochure_how_to_apply_for_compensation_of_occupational_health_care_costs_online_2025","notes":"Preventive occupational healthcare is mandatory for employers in Finland."},{"category":"Hiring / Wage Subsidy","schemeName":"Pay Subsidy (Palkkatuki)","claimableBy":"Employer","eligible":"Employer hiring an unemployed jobseeker where the employment authority grants subsidy to cover pay costs; used to promote employment and improve competence.","amount":"Benefit covers part of pay costs; exact percentage and cap depend on employment authority decision and worker category.","duration":"Approved subsidy period depends on decision and programme rules.","howToClaim":"Apply through Job Market Finland / Business E-services before or during approved hiring process.","documents":"Employer details, vacancy/job details, candidate eligibility and authority decision documents.","deadline":"Apply according to employment authority process before relying on subsidy.","employerResp":"Apply, hire eligible person and comply with terms/pay records.","employeeResp":"Jobseeker must be registered/eligible under employment authority rules.","payrollImpact":"Reduces employer wage cost but does not replace normal payroll, tax and social insurance obligations.","authority":"Employment authority / Job Market Finland","sourceUrl":"https://tyomarkkinatori.fi/en/more-information-about-services/palkkatuki | https://tyomarkkinatori.fi/en/employers-and-entrepreneurs/business-e-services","notes":"Official page states pay subsidy is discretionary and intended to promote employment of unemployed jobseekers."}],"France":[{"category":"Sickness / Medical Leave","schemeName":"Subrogation for daily sickness allowances (IJSS)","claimableBy":"Employer, where salary is maintained","eligible":"Employee is on sick leave and employer maintains salary; employee is entitled to daily allowances from Assurance Maladie.","amount":"Assurance Maladie pays daily allowances directly to employer under subrogation; amount follows IJSS rules.","duration":"For the compensated sick leave period under Assurance Maladie rules.","howToClaim":"Employer reports the work stoppage through DSN / salary certificate process and requests subrogation.","documents":"Work stoppage, salary data, DSN/salary certificate and employee social security details.","deadline":"If no subrogation: salary elements in DSN within 5 days of employer knowing the stoppage. If subrogation: transmit on receipt and no later than the monthly DSN for the month of stoppage.","employerResp":"Maintain salary if applicable, submit DSN/salary certificate and reconcile IJSS payments.","employeeResp":"Send medical certificate/work stoppage to employer and health insurance according to rules.","payrollImpact":"Payroll must gross/net manage salary maintenance and IJSS received by employer.","authority":"Assurance Maladie / ameli.fr","sourceUrl":"https://www.ameli.fr/entreprise/vos-salaries/arret-de-travail/subrogation-salaire | https://www.ameli.fr/entreprise/actualites/transmettre-l-attestation-de-salaire-dans-quels-delais-et-pourquoi","notes":"Use current DSN rules because reporting deadlines and controls are strict."},{"category":"Maternity / Parental","schemeName":"Maternity daily allowances and employer DSN/subrogation","claimableBy":"Employee; employer may receive through subrogation if salary maintained","eligible":"Private-sector employee on maternity leave who meets social security conditions; CPAM pays daily allowances, or employer receives them if subrogation applies.","amount":"CPAM daily allowance based on salary calculation rules; exact amount depends on salary and social security ceilings.","duration":"Statutory maternity leave period based on family situation; CPAM allowance paid for eligible leave.","howToClaim":"Employee follows maternity leave process; employer submits required DSN/salary certificate and may use subrogation if maintaining salary.","documents":"Pregnancy/maternity leave evidence, salary data, DSN/salary certificate.","deadline":"Employer reporting deadlines follow DSN/salary certificate timing for maternity stoppage.","employerResp":"Report maternity leave correctly and reconcile CPAM allowances if subrogated.","employeeResp":"Inform employer and health insurance of maternity leave and provide evidence.","payrollImpact":"Payroll must separate employer salary maintenance and social security daily allowances.","authority":"Service-Public / Assurance Maladie","sourceUrl":"https://www.service-public.fr/particuliers/vosdroits/F2265?lang=en | https://www.ameli.fr/entreprise/vos-salaries/declaration-sociale-nominative","notes":"Service-Public explains CPAM maternity daily allowance calculation; employer process runs through DSN."},{"category":"Hiring / Apprenticeship","schemeName":"Hiring aid for apprenticeship contract","claimableBy":"Employer","eligible":"Employer hiring an apprentice under eligible apprenticeship contract; rules differ by signing period and employer size.","amount":"Aid is paid automatically monthly before salary, within a maximum 12-month limit; amount and eligibility depend on date/size/diploma level.","duration":"First 12 months of apprenticeship contract, subject to current conditions.","howToClaim":"No separate aid request; declare apprentice and send contract to OPCO within 6 months.","documents":"Apprenticeship contract, OPCO filing, DSN/payroll data and employer details.","deadline":"Contract must be sent to OPCO no later than 6 months after conclusion.","employerResp":"Declare hiring, file contract with OPCO and maintain payroll records.","employeeResp":"Sign apprenticeship contract and meet training requirements.","payrollImpact":"Reduces apprenticeship labour cost; monthly aid must be reconciled against payroll funding.","authority":"Entreprendre.Service-Public / ASP / OPCO","sourceUrl":"https://entreprendre.service-public.fr/vosdroits/F23556?lang=en","notes":"Rules changed across 2025-2026; verify current date band before quoting amount."},{"category":"Business Support / Public Aid Search","schemeName":"State and local authority business aids database","claimableBy":"Employer / business","eligible":"Companies looking for official public financial aid, grants or support from the State or local authorities.","amount":"Amount depends on selected public aid scheme; database is a gateway, not one fixed claim.","duration":"Depends on each aid scheme.","howToClaim":"Use the official public aid database / Entreprendre.Service-Public pages to find and apply to relevant scheme.","documents":"Company registration, project details and scheme-specific evidence.","deadline":"Scheme-specific deadlines apply.","employerResp":"Identify applicable aid and comply with scheme conditions.","employeeResp":"Usually no employee action unless aid is employee/training related.","payrollImpact":"Useful for HR/payroll only when aid covers hiring, training or employment cost.","authority":"Entreprendre.Service-Public","sourceUrl":"https://entreprendre.service-public.fr/vosdroits/N16153?language=en-gb","notes":"Matrix flags this as official gateway because France has many scheme-specific aids."}],"Germany":[{"category":"Sickness / Employer Reimbursement","schemeName":"U1 continued remuneration reimbursement","claimableBy":"Employer, generally small employers","eligible":"Employer participating in U1 levy scheme, generally employers with not more than 30 employees, that continue wage payment during employee sickness.","amount":"Health insurance fund reimburses a percentage of continued salary payments; reimbursement rate depends on the selected fund/tariff.","duration":"For eligible continued-pay sickness periods under AAG rules.","howToClaim":"Submit reimbursement request to relevant statutory health insurance fund through approved payroll/electronic process.","documents":"Employee incapacity certificate/eAU, payroll data, employer participation/fund details.","deadline":"Submit through health insurance fund process after wage payment/absence data is available.","employerResp":"Continue sick pay when legally required, pay U1 levy and apply for reimbursement.","employeeResp":"Provide sickness notification/medical certificate according to rules.","payrollImpact":"Can offset sick-pay cost for eligible employers; payroll must post reimbursement separately.","authority":"Statutory health insurance funds / AAG framework","sourceUrl":"https://arbeitgeber.zfbkk.de/en/insurance-and-contributions/pay-as-you-go-insurance","notes":"Official sickness funds administer U1; rates differ by fund, so use the specific employer health fund for amount."},{"category":"Maternity / Employer Reimbursement","schemeName":"U2 maternity reimbursement","claimableBy":"Employer","eligible":"Employer paying maternity protection pay or employer supplement to maternity benefit under German maternity protection rules.","amount":"Employer is reimbursed for maternity protection pay and maternity benefit supplement through U2 levy; official employer insurance sources describe maternity relief under U2.","duration":"For maternity protection/pay period and employment ban periods covered by rules.","howToClaim":"Apply to the responsible health insurance fund through electronic reimbursement procedure.","documents":"Maternity certificate, payroll data, maternity protection period/employment ban evidence.","deadline":"Submit according to health insurance fund electronic process.","employerResp":"Pay required maternity supplement/protection pay, pay U2 levy and request reimbursement.","employeeResp":"Provide pregnancy/maternity evidence and coordinate leave.","payrollImpact":"Important cost recovery item; payroll must calculate employer supplement and reimbursement.","authority":"Statutory health insurance funds / Federal health information portal","sourceUrl":"https://arbeitgeber.zfbkk.de/en/insurance-and-contributions/pay-as-you-go-insurance | https://gesund.bund.de/finanzielle-leistungen-schwangerschaft-und-geburt","notes":"Use the employee’s health insurance fund rules for exact reimbursement process."},{"category":"Hiring / Wage Subsidy","schemeName":"Eingliederungszuschuss integration subsidy","claimableBy":"Employer","eligible":"Employer hiring a person whose placement is difficult and whose performance is expected to be lower at the beginning of employment.","amount":"Wage subsidy to compensate reduced performance; amount and duration are determined by the Federal Employment Agency case-by-case.","duration":"Approved funding duration set in agency decision.","howToClaim":"Apply online / contact Employer Service before concluding subsidised employment where required.","documents":"Employer questionnaire, employment contract/job data, candidate eligibility and agency approval.","deadline":"Apply before relying on funding; no legal entitlement.","employerResp":"Apply, hire candidate under approved terms and keep payroll evidence.","employeeResp":"Candidate cooperates with employment agency eligibility assessment.","payrollImpact":"Reduces wage cost but does not remove employment/payroll obligations.","authority":"Federal Employment Agency (Bundesagentur für Arbeit)","sourceUrl":"https://www.arbeitsagentur.de/unternehmen/finanziell/eingliederungszuschuss-zur-foerderung-arbeitsaufnahme | https://www.arbeitsagentur.de/datei/dok_ba014612.pdf","notes":"Federal Employment Agency states there is no legal entitlement; decision is discretionary."},{"category":"Short-time Work / Wage Replacement","schemeName":"Kurzarbeitergeld short-time work allowance","claimableBy":"Employer applies; benefit supports employees","eligible":"Employer has temporary significant loss of work and meets Kurzarbeit conditions; employees have reduced working hours/loss of earnings.","amount":"Short-time allowance amount follows Federal Employment Agency rules; application may include reimbursement of social insurance contributions where applicable.","duration":"For approved short-time work period; official guidance notes extended maximum up to 24 months for 01 Jan 2025 to 31 Dec 2026, then generally 12 months from 2027.","howToClaim":"Notify work loss and apply to Federal Employment Agency using official online/PDF process.","documents":"Notification of work loss, payroll short-time calculation list, employee data and application forms.","deadline":"Application must be filed within exclusion period of 3 months; benefit earliest from calendar month in which notification is received.","employerResp":"Submit notification/application, calculate reduced pay and keep records.","employeeResp":"Accept short-time arrangement where legally/contractually required and provide work-hour data.","payrollImpact":"Major payroll impact: reduced wages, short-time allowance calculation and reporting.","authority":"Federal Employment Agency","sourceUrl":"https://www.arbeitsagentur.de/m/corona-kurzarbeit%20/ | https://www.arbeitsagentur.de/datei/dok_ba039765.pdf | https://web.arbeitsagentur.de/kugoao/kugoao-ui/pc/antrag","notes":"Used during temporary downturns; rules and maximum duration can change by ordinance."}],"Ghana":[{"category":"Pension / Social Security","schemeName":"SSNIT old-age pension / lump sum benefit","claimableBy":"Employee / insured member","eligible":"Worker registered and contributing under Ghana Basic National Social Security Scheme; benefit eligibility depends on age and contribution history under National Pensions Act rules.","amount":"Monthly pension or lump sum based on contribution record and SSNIT formula; not a fixed employer claim amount.","duration":"Retirement benefit once qualifying conditions are met.","howToClaim":"Member applies through SSNIT branch/self-service process using benefit forms.","documents":"SSNIT number/GhanaCard, employment/contribution records, retirement evidence and bank details.","deadline":"Apply when qualifying for retirement; exact processing follows SSNIT benefit procedure.","employerResp":"Register employees, submit contribution reports and pay contributions on time.","employeeResp":"Maintain SSNIT records and apply for benefit when eligible.","payrollImpact":"No direct payroll reimbursement; employer compliance ensures employee can claim future benefits.","authority":"SSNIT","sourceUrl":"https://www.ssnit.org.gh/what-we-do/ | https://www.ssnit.org.gh/forms/ | https://www.ssnit.org.gh/laws/","notes":"SSNIT is the administrator of Ghana First Tier Pension Scheme."},{"category":"Disability / Invalidity","schemeName":"SSNIT invalidity pension","claimableBy":"Employee / insured member","eligible":"SSNIT member who becomes invalid and satisfies scheme conditions for invalidity benefit.","amount":"Monthly invalidity pension calculated by SSNIT based on scheme rules and contribution record.","duration":"Paid while qualifying invalidity conditions apply under scheme rules.","howToClaim":"Apply to SSNIT using official benefit process/forms.","documents":"Medical evidence, SSNIT/member details, contribution record and required identity/bank documents.","deadline":"Apply once invalidity condition and supporting documents are available.","employerResp":"Keep contributions current and provide employment records if requested.","employeeResp":"Submit medical and identity documents to SSNIT.","payrollImpact":"No employer reimbursement; important employee statutory benefit linked to social security contributions.","authority":"SSNIT","sourceUrl":"https://www.ssnit.org.gh/our-benefits/ | https://www.ssnit.org.gh/forms/ | https://www.ssnit.org.gh/laws/","notes":"Official SSNIT site lists invalidity as a scheme benefit."},{"category":"Death / Survivors","schemeName":"SSNIT survivors lump sum benefit","claimableBy":"Surviving beneficiaries / nominees","eligible":"Survivors/nominees of a deceased SSNIT member or pensioner, subject to scheme rules and records.","amount":"Lump sum calculated by SSNIT based on contribution/benefit rules and survivor eligibility.","duration":"One-off survivor claim.","howToClaim":"Submit claim to SSNIT through branch/self-service process and forms.","documents":"Death certificate, nominee/survivor documents, SSNIT number, identity documents and bank details.","deadline":"Apply after death with required evidence; processing follows SSNIT rules.","employerResp":"Keep employee SSNIT contributions and nominee records up to date where applicable.","employeeResp":"Beneficiaries submit claim and evidence.","payrollImpact":"HR should guide survivors on SSNIT process but benefit is paid by SSNIT, not payroll.","authority":"SSNIT","sourceUrl":"https://www.ssnit.org.gh/our-benefits/ | https://www.ssnit.org.gh/forms/","notes":"Keep nominee records updated to reduce claim delays."},{"category":"Work Injury / Occupational Accident","schemeName":"Workmen’s Compensation claim","claimableBy":"Employee / dependent; paid by employer under law","eligible":"Employee sustains personal injury by accident arising out of and in the course of employment; employer liability applies subject to the Act.","amount":"Employer must pay compensation commensurate with assessed incapacity; fatal/permanent cases may be awarded by court according to Act.","duration":"For injury treatment/incapacity period and compensation award.","howToClaim":"Report and process under Workmen’s Compensation Act; medical officer assesses incapacity; court may award in serious/fatal cases.","documents":"Accident report, medical assessment, employment evidence and court/authority documents if needed.","deadline":"Act requires payment within specified period; exact case timing follows Act and court/medical process.","employerResp":"Pay compensation, ensure injured employee does not suffer reduced earnings during treatment as stated in official Act excerpt.","employeeResp":"Report injury and provide medical evidence/cooperate with assessment.","payrollImpact":"Employer cost, not government reimbursement; must be handled as statutory employment injury liability.","authority":"Ministry of Labour, Jobs and Employment / Parliament of Ghana","sourceUrl":"https://melr.gov.gh/files/publications/Workmen%27s_Compensation_Act.pdf | https://repository.parliament.gh/items/6e393609-8e60-474b-a001-07928b63aa41","notes":"This is a government-regulated statutory claim, not a government-paid reimbursement."}],"Greece":[{"category":"Maternity / Social Security","schemeName":"e-EFKA maternity allowance","claimableBy":"Employee / insured person; employer confirms electronically","eligible":"Insured employee absent from work due to maternity/pregnancy and puerperium; employer confirms electronically that employee did not work during the period.","amount":"e-EFKA grants pregnancy and puerperium maternity allowance; amount depends on insurance/wage rules.","duration":"For pregnancy and puerperium absence period under e-EFKA rules.","howToClaim":"Employee applies through gov.gr; employer confirms absence electronically.","documents":"Insurance details, maternity absence period, employer confirmation and e-EFKA-requested documents.","deadline":"Submit through gov.gr/e-EFKA when maternity period is known.","employerResp":"Confirm electronically that the employee did not work during maternity period.","employeeResp":"Apply online and provide maternity/insurance details.","payrollImpact":"Payroll must coordinate employer confirmation and any salary/social security treatment during maternity leave.","authority":"e-EFKA / Gov.gr","sourceUrl":"https://www.gov.gr/en/org/efka/gennese/epidoma-metrotetas","notes":"Gov.gr states the process is completed when the employer confirms non-work electronically."},{"category":"Maternity / Supplementary Benefit","schemeName":"DYPA supplementary maternity benefits","claimableBy":"Employee / working mother","eligible":"Working mother insured with e-EFKA, actually working in private sector at start of pregnancy leave and after childbirth, and has received e-EFKA maternity benefit.","amount":"Calculated as the difference between earnings and the allowance paid by e-EFKA for the same period.","duration":"For eligible maternity benefit period under DYPA rules.","howToClaim":"Apply through gov.gr / DYPA service for supplementary maternity benefits.","documents":"e-EFKA maternity benefit decision, wage/earnings data, employment relationship and supporting documents.","deadline":"Apply according to DYPA process and deadlines.","employerResp":"Provide employment/wage confirmation if requested.","employeeResp":"Apply and provide benefit/wage evidence.","payrollImpact":"Not employer reimbursement, but HR should guide employees because it relates to maternity pay gap.","authority":"DYPA / Gov.gr","sourceUrl":"https://www.gov.gr/en/ipiresies/ergasia-kai-asphalise/apozemioseis-kai-parokhes/sumpleromatikes-parokhes-metrotetas | https://www.dypa.gov.gr/paroches-metrotetas","notes":"DYPA calculates benefit as difference between earnings and e-EFKA maternity allowance."},{"category":"Sickness / Medical Leave","schemeName":"e-EFKA sickness allowance","claimableBy":"Employee / insured person","eligible":"Insured salaried person unable to work due to illness and meeting e-EFKA conditions.","amount":"Sickness allowance amount depends on e-EFKA insurance/pay rules and duration.","duration":"For approved sickness period under e-EFKA rules.","howToClaim":"Apply through e-EFKA / gov.gr sickness allowance service.","documents":"Medical certificate/illness evidence, insurance details, employment details and any employer confirmation.","deadline":"e-EFKA FAQ states there is a deadline for application; use current e-EFKA service instructions before payroll action.","employerResp":"Provide employment/payroll confirmation if requested.","employeeResp":"Submit medical and insurance evidence.","payrollImpact":"Payroll must coordinate sick leave, employer pay if applicable and social security benefit.","authority":"e-EFKA / Gov.gr","sourceUrl":"https://www.gov.gr/en/ipiresies/ergasia-kai-asphalise/apozemioseis-kai-parokhes | https://www.efka.gov.gr/el/menoy/sychnes-eroteseis-kai-apanteseis/paroches-kepa","notes":"Official English gov.gr portal lists “Get a sickness allowance” under compensation and benefits."},{"category":"Hiring / Wage Subsidy","schemeName":"DYPA business subsidy for hiring unemployed persons","claimableBy":"Employer","eligible":"Businesses hiring eligible registered unemployed persons under current DYPA programme and regional/programme criteria.","amount":"Example active official programme: subsidy 50%-70% of wage and non-wage cost, maximum EUR 875/month for 12 months for 2,000 jobs in Eastern Macedonia and Thrace.","duration":"Example programme period: 12 months; other DYPA programmes have different periods.","howToClaim":"Apply to DYPA programme through official electronic process when call is open.","documents":"Employer details, job position, candidate eligibility, payroll/social insurance data and programme documents.","deadline":"Application window is programme-specific; apply while programme is open and before claiming subsidy.","employerResp":"Apply, hire eligible person, pay wages/contributions and submit claim evidence.","employeeResp":"Register/qualify as unemployed candidate under DYPA rules.","payrollImpact":"Can reduce employment cost but normal wage and social insurance obligations remain.","authority":"DYPA Public Employment Service","sourceUrl":"https://www.dypa.gov.gr/en/ksekinisan-oi-aitiseis-ghia-to-neo-proghramma-epikhorighisis-epikheiriseon-ghia-tin-proslipsi-2000-anerghon-ilikias-18-etwn-kai-ano-stin-perifereia-anatolikis-makedonias-kai-thrakis-1 | https://www.dypa.gov.gr/en/unemployed","notes":"Greece has many DYPA programmes; do not generalise one regional programme to all employers."},{"category":"Training / Employment Programmes","schemeName":"DYPA training and employment programmes","claimableBy":"Employer / unemployed person depending on programme","eligible":"Eligibility depends on the specific DYPA training, work experience or subsidised employment programme.","amount":"Subsidy/allowance amount depends on programme call; some programmes combine training and subsidised employment.","duration":"Programme-specific.","howToClaim":"Use DYPA official programme pages or gov.gr services to apply/register.","documents":"Programme application, unemployment registration, employer/job/training evidence.","deadline":"Programme-specific application windows and deadlines.","employerResp":"Apply only when the programme is open; keep payroll/training records.","employeeResp":"Register with DYPA and participate in training/employment process.","payrollImpact":"Can affect HR hiring/training plan and payroll subsidy tracking.","authority":"DYPA Public Employment Service / Gov.gr","sourceUrl":"https://www.dypa.gov.gr/en/unemployed | https://www.gov.gr/en/upourgeia/upourgeio-ergasias-kai-koinonikes-asphalises/demosia-uperesia-apaskholeses-d-up","notes":"Use as official gateway row because programmes open/close frequently."}],"Hong Kong":[{"category":"Maternity / Employer Reimbursement","schemeName":"Reimbursement of Maternity Leave Pay (RMLP) Scheme","claimableBy":"Employer","eligible":"Employer has paid statutory maternity leave pay for the 11th to 14th weeks under the Employment Ordinance for an eligible employee.","amount":"Reimbursement of 11th to 14th weeks maternity leave pay, subject to a cap of HKD 80,000 per employee.","duration":"Covers the additional four weeks of statutory maternity leave pay.","howToClaim":"Apply through the Reimbursement Easy Portal / RMLP Scheme after paying the employee.","documents":"Employee maternity leave/pay records, proof of payment, employment records and documents requested by the portal.","deadline":"Apply according to RMLP portal time limits after payment; confirm current portal instructions before submission.","employerResp":"Pay statutory maternity leave pay first, keep payroll evidence and submit reimbursement application.","employeeResp":"Provide maternity leave documents and support employer verification.","payrollImpact":"Employer can claim back part of maternity leave pay; payroll must track weeks 11 to 14 separately.","authority":"Labour Department / RMLP Scheme","sourceUrl":"https://www.labour.gov.hk/eng/labour/ebs.htm | https://www.rmlps.gov.hk/eng/about","notes":"Official Labour Department page confirms cap and scope."},{"category":"Severance / Long Service Payment Subsidy","schemeName":"Subsidy Scheme for Abolition of MPF Offsetting Arrangement (SSA)","claimableBy":"Employer","eligible":"Employer has paid severance payment or long service payment for post-transition employment period on or after 1 May 2025 under the abolition of MPF offsetting arrangement.","amount":"Subsidy ratio changes over a 25-year scheme; threshold of HKD 500,000 is used with specified employer subsidy ratios for each subsidy year.","duration":"25-year subsidy scheme.","howToClaim":"Apply through the TransitionEase / offsetting subsidy portal.","documents":"SP/LSP calculation, employment records, MPF/off-setting related records and payment evidence.","deadline":"Programme-specific; apply via official portal after relevant SP/LSP liability arises.","employerResp":"Calculate SP/LSP correctly, pay employee and submit subsidy claim for eligible post-transition portion.","employeeResp":"No direct claim; employee receives SP/LSP from employer.","payrollImpact":"Important payroll termination cost recovery item; must separate pre-transition and post-transition service periods.","authority":"Labour Department / Offsetting Subsidy Portal","sourceUrl":"https://www.offsettingsubsidy.gov.hk/en/ | https://www.offsettingsubsidy.gov.hk/en/scheme-characteristics.html","notes":"Do not treat as direct employee benefit; it shares employer SP/LSP cost."},{"category":"Training / Employment Support","schemeName":"Youth Employment and Training Programme (YETP) on-the-job training allowance","claimableBy":"Employer / trainee","eligible":"Young people and employers participating in approved YETP on-the-job training; trainees are engaged as paid employees during OJT.","amount":"Employer OJT allowance is 50% of monthly salary, capped at HKD 5,000 per month per trainee. Trainee workplace attachment allowanc
