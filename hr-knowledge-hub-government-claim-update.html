<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Government Claim Guide</title>
<style>
@import url('https://fonts.cdnfonts.com/css/euclid-circular-b');

:root {
  --navy: #0a1628;
  --navy-mid: #102040;
  --navy-light: #1a3055;
  --blue-bright: #2e7dd1;
  --blue-glow: #4a9eff;
  --white: #ffffff;
  --off-white: #f0f4f8;
  --text-muted: #8aa0b8;
  --border: #1e3a5f;
  --sb-pad-x: 16px;
  --sb-code-w: 34px;
  --sb-full-w: 280px;
  --sb-collapsed-w: 56px;
  --banner-h: 90px;
  --filter-h: 53px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Euclid Circular B', sans-serif;
  background: var(--off-white);
  color: #1a2a3a;
  display: flex; flex-direction: column;
}

/* ══ BANNER ══ */
.banner {
  background: var(--navy);
  position: relative; overflow: hidden;
  padding: 0 24px; height: var(--banner-h);
  flex-shrink: 0;
  display: flex; align-items: center;
}
.banner::before {
  content: ''; position: absolute; right: -60px; top: -60px;
  width: 280px; height: 280px; border-radius: 50%;
  border: 1.5px solid rgba(74,158,255,0.12);
  box-shadow: 0 0 0 28px rgba(74,158,255,0.04), 0 0 0 56px rgba(74,158,255,0.03);
  pointer-events: none;
}
.banner-left { display: flex; align-items: center; gap: 16px; z-index: 1; min-width: 0; }
.banner-logo { height: 44px; width: auto; display: block; flex-shrink: 0; }
.banner-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
.banner-text { min-width: 0; }
.banner-title { font-size: 17px; font-weight: 700; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.banner-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ══ FILTER BAR ══ */
.filter-bar {
  background: var(--navy-mid);
  border-bottom: 1px solid var(--border);
  padding: 0 16px; height: var(--filter-h);
  flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
}
.btn-hamburger {
  display: none;
  align-items: center; justify-content: center;
  width: 36px; height: 36px; flex-shrink: 0;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--white); font-size: 16px; cursor: pointer;
  transition: background 0.2s;
}
.btn-hamburger:hover { background: rgba(255,255,255,0.14); }
.filter-label {
  font-size: 11px; font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px; white-space: nowrap;
}
.search-wrap { position: relative; flex: 1; min-width: 0; max-width: 300px; }
.search-icon {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px; pointer-events: none;
  color: var(--text-muted);
}
.search-input {
  width: 100%; padding: 8px 10px 8px 32px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--white); font-size: 13px;
  font-family: 'Euclid Circular B', sans-serif;
  outline: none; transition: border-color 0.2s, background 0.2s;
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { border-color: var(--blue-bright); background: rgba(255,255,255,0.1); }
.select-wrap { position: relative; flex-shrink: 0; min-width: 150px; }
.select-wrap select {
  width: 100%; padding: 8px 28px 8px 11px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--white); font-size: 13px;
  font-family: 'Euclid Circular B', sans-serif;
  appearance: none; cursor: pointer; outline: none;
}
.select-wrap select option { background: #1a2a3a; color: #fff; }
.select-wrap select:focus { border-color: var(--blue-bright); }
.select-wrap::after {
  content: '▾'; position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted); pointer-events: none; font-size: 12px;
}
.btn-clear {
  padding: 8px 14px; flex-shrink: 0;
  background: rgba(255,60,60,0.12);
  border: 1px solid rgba(255,60,60,0.25); border-radius: 8px;
  color: #ff8888; font-size: 12px; font-weight: 600;
  font-family: 'Euclid Circular B', sans-serif;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.btn-clear:hover { background: rgba(255,60,60,0.22); color: #ffbbbb; }
.btn-clear .clear-icon { display: none; }

/* ══ LAYOUT ══ */
.layout { display: flex; flex: 1; overflow: hidden; position: relative; }

/* ══ SIDEBAR ══ */
.sidebar {
  width: var(--sb-full-w); min-width: var(--sb-full-w);
  background: var(--navy);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  transition: width 0.25s ease, min-width 0.25s ease;
  flex-shrink: 0; z-index: 10;
}
.sidebar-header {
  padding: 11px var(--sb-pad-x);
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: var(--navy-mid); flex-shrink: 0;
  overflow: hidden;
}
.sidebar-header-text {
  font-size: 10px; font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1.2px;
  white-space: nowrap; overflow: hidden;
  transition: opacity 0.2s;
}
.btn-sb-toggle {
  display: none;
  align-items: center; justify-content: center;
  flex-shrink: 0;
  background: transparent; border: none;
  color: var(--text-muted); cursor: pointer;
  padding: 6px; transition: color 0.2s;
}
.btn-sb-toggle:hover { color: var(--white); }
.sidebar-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
.sidebar-scroll::-webkit-scrollbar { width: 4px; }
.sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(74,158,255,0.2); border-radius: 2px; }
.sb-row {
  display: flex; align-items: center;
  padding: 9px var(--sb-pad-x);
  border-left: 3px solid transparent;
  cursor: pointer;
  transition: background 0.13s, border-color 0.13s;
  user-select: none; gap: 8px;
}
.sb-row:hover { background: rgba(74,158,255,0.09); }
.sb-row.active { background: rgba(46,125,209,0.16); border-left-color: var(--blue-bright); }
.sb-code {
  width: var(--sb-code-w); flex-shrink: 0;
  font-size: 10.5px; font-weight: 700;
  color: #8aa0b8; letter-spacing: 0.8px;
  font-family: 'Euclid Circular B', sans-serif;
  text-align: left; line-height: 1;
}
.sb-label {
  flex: 1; font-size: 13px; font-weight: 500;
  color: #b8cce0; line-height: 1.25;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0; transition: opacity 0.2s, max-width 0.2s;
}
.sb-row:hover .sb-label { color: var(--white); }
.sb-row.active .sb-label { color: var(--white); font-weight: 600; }
.sb-badge {
  font-size: 10.5px;
  background: rgba(74,158,255,0.12);
  color: var(--text-muted);
  padding: 2px 7px; border-radius: 8px;
  font-family: 'Euclid Circular B', sans-serif;
  flex-shrink: 0; transition: opacity 0.2s;
}
.sb-row.active .sb-badge { background: rgba(46,125,209,0.3); color: var(--blue-glow); }
.accordion-item { border-bottom: 1px solid rgba(255,255,255,0.03); }
.sidebar-empty { padding: 30px var(--sb-pad-x); text-align: center; color: var(--text-muted); font-size: 13px; }

/* ══ MOBILE OVERLAY ══ */
.sidebar-overlay {
  display: none; position: fixed; inset: 0; z-index: 30;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(2px);
}
.sidebar-overlay.active { display: block; }

/* ══ MAIN CONTENT ══ */
.main {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 24px 28px; background: var(--off-white);
}
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: rgba(0,30,80,0.18); border-radius: 3px; }
.welcome-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 60vh; text-align: center; color: var(--text-muted);
  padding: 20px;
}
.welcome-state .big-icon { font-size: 48px; margin-bottom: 14px; opacity: 0.6; }
.welcome-state h2 { font-size: 20px; font-weight: 600; color: #3a5070; margin-bottom: 8px; }
.welcome-state p { font-size: 14px; max-width: 360px; line-height: 1.6; }

/* ══ DETAIL HEADER ══ */
.detail-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 20px; padding-bottom: 16px;
  border-bottom: 2px solid #dde5ef;
  flex-wrap: wrap; gap: 12px;
}
.detail-header h1 { font-size: 22px; font-weight: 700; color: #0e2040; line-height: 1.3; }
.detail-header .meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.claim-count {
  background: var(--navy); color: var(--blue-glow);
  padding: 8px 16px; border-radius: 20px;
  font-size: 20px; font-weight: 700;
  font-family: 'Euclid Circular B', sans-serif;
  text-align: center; flex-shrink: 0;
}
.claim-count span { display: block; font-size: 10px; font-weight: 500; color: var(--text-muted); margin-top: 1px; }

/* ══ CATEGORY FILTER PILLS ══ */
.cat-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
.cat-pill {
  padding: 5px 13px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1px solid #c8d8e8;
  background: #e0e8f0; color: #3a5070;
  transition: all 0.15s; user-select: none;
}
.cat-pill:hover { background: #ccd8e8; color: #1a2a3a; }
.cat-pill.active { background: var(--navy); color: var(--white); border-color: var(--navy); }

/* ══ CATEGORY GROUP ══ */
.cat-group { margin-bottom: 28px; }
.cat-group-label {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 2px;
  color: #6080a0; margin-bottom: 10px;
  padding-bottom: 6px; border-bottom: 1px solid #dde5ef;
}

/* ══ CLAIM CARD ══ */
.benefit-card {
  background: var(--white);
  border: 1px solid #e8eef4;
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 8px;
  transition: box-shadow 0.15s, border-color 0.15s;
}
.benefit-card:hover { box-shadow: 0 2px 10px rgba(0,30,80,0.09); border-color: #c0d4e8; }
.benefit-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 12px; margin-bottom: 10px;
}
.benefit-name {
  font-size: 14px; font-weight: 600; color: #1a2a3a; flex: 1; line-height: 1.4;
}
.mandatory-tag {
  font-size: 10.5px; font-weight: 700;
  padding: 3px 9px; border-radius: 10px;
  white-space: nowrap; flex-shrink: 0; letter-spacing: 0.2px;
}

/* Claimable By tag colors — distinct from Benefits Plan Mandatory colors */
.tag-cb-employee    { background: #e0f5f3; color: #0e5c56; }
.tag-cb-employer    { background: #fce7f3; color: #9d174d; }
.tag-cb-both        { background: #fef3c7; color: #92400e; }
.tag-cb-beneficiary { background: #f3e8ff; color: #6b21a8; }
.tag-cb-other       { background: #e8ecf4; color: #3a5070; }

.benefit-details {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px;
}
.detail-block {}
.detail-full { grid-column: 1 / -1; }
.detail-label {
  font-size: 9.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: #9ab0c8; margin-bottom: 3px;
}
.detail-value {
  font-size: 13px; color: #2a3a4a; line-height: 1.55;
}
.source-link {
  display: inline-block;
  font-size: 12px; color: var(--blue-bright);
  text-decoration: none; margin-right: 8px;
  transition: color 0.15s;
}
.source-link:hover { color: var(--blue-glow); text-decoration: underline; }
.no-results { text-align: center; padding: 48px 20px; color: var(--text-muted); font-size: 14px; }

/* ══ TABLET ══ */
@media (max-width: 1024px) and (min-width: 600px) {
  .btn-sb-toggle { display: flex; }
  .filter-label { display: none; }
  .sidebar { width: var(--sb-collapsed-w); min-width: var(--sb-collapsed-w); }
  .sidebar-header-text { opacity: 0; width: 0; overflow: hidden; }
  .sidebar .sidebar-header { justify-content: center; }
  .sidebar .sb-label, .sidebar .sb-badge { display: none !important; }
  .sidebar .sb-code { width: var(--sb-collapsed-w) !important; text-align: center !important; font-size: 11px; }
  .sidebar .sb-row { padding: 11px 0 !important; border-left: none !important; gap: 0; }
  .sidebar.expanded { width: var(--sb-full-w); min-width: var(--sb-full-w); }
  .sidebar.expanded .sidebar-header { justify-content: space-between; }
  .sidebar.expanded .sidebar-header-text { opacity: 1; width: auto; }
  .sidebar.expanded .sb-label { display: block !important; }
  .sidebar.expanded .sb-badge { display: flex !important; opacity: 1; width: auto; }
  .sidebar.expanded .sb-code { width: var(--sb-code-w) !important; text-align: left !important; font-size: 10.5px; }
  .sidebar.expanded .sb-row { padding: 9px var(--sb-pad-x) !important; border-left: 3px solid transparent !important; gap: 8px; }
  .sidebar.expanded .sb-row.active { border-left-color: var(--blue-bright) !important; }
  .benefit-details { grid-template-columns: 1fr; }
}

/* ══ MOBILE ══ */
@media (max-width: 599px) {
  :root { --filter-h: 52px; }
  .banner { padding: 12px 16px; height: auto; align-items: flex-start; }
  .banner-logo { height: 32px; margin-top: 2px; }
  .banner-divider { height: 26px; margin-top: 4px; }
  .banner-title { font-size: 13px; white-space: normal; line-height: 1.35; }
  .banner-subtitle { font-size: 10.5px; white-space: normal; line-height: 1.45; margin-top: 3px; }
  .btn-hamburger { display: flex; }
  .filter-label { display: none; }
  .btn-clear .clear-text { display: none; }
  .btn-clear .clear-icon { display: inline; }
  .btn-clear { padding: 0; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
  .filter-bar { gap: 8px; padding: 0 12px; }
  .search-wrap { flex: 1; min-width: 0; max-width: none; }
  .search-input { font-size: 12px; padding: 7px 8px 7px 28px; }
  .select-wrap { width: 110px; min-width: 0; }
  .select-wrap select { font-size: 12px; padding: 7px 22px 7px 8px; }
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: min(85vw, 300px); min-width: 0; z-index: 40;
    transform: translateX(-110%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 4px 0 32px rgba(0,0,0,0.4);
  }
  .sidebar.mobile-open { transform: translateX(0); }
  .btn-sb-toggle { display: flex; }
  .main { padding: 16px; }
  .detail-header h1 { font-size: 18px; }
  .benefit-details { grid-template-columns: 1fr; }
  .benefit-card { padding: 12px 14px; }
}
</style>
</head>
<body>

<!-- BANNER -->
<div class="banner">
  <div class="banner-left">
    <a href="index.html"><img class="banner-logo" src="https://marcowallpaper.s3.ap-southeast-1.amazonaws.com/Marco+logo+white+(tall).png" alt="Marco"></a>
    <div class="banner-divider"></div>
    <div class="banner-text">
      <div class="banner-title">Government Claim Guide</div>
      <div class="banner-subtitle">Government claim schemes, eligibility &amp; employer responsibilities by country</div>
    </div>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <button class="btn-hamburger" id="btnMobileOpen" onclick="mobileOpenDrawer()" aria-label="Open menu">&#9776;</button>
  <span class="filter-label">FILTER</span>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M21 21L16.65 16.65M19 11C19 15.4183 15.4183 19 11 19C6.58172 19 3 15.4183 3 11C3 6.58172 6.58172 3 11 3C15.4183 3 19 6.58172 19 11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <input type="text" class="search-input" id="sidebarSearch" placeholder="Search country..." oninput="filterSidebar()">
  </div>
  <div class="select-wrap">
    <select id="regionFilter" onchange="filterSidebar()">
      <option value="">All Regions</option>
      <option value="Americas">Americas</option>
      <option value="APAC">APAC</option>
      <option value="EMEA">EMEA</option>
      <option value="Middle East">Middle East</option>
      <option value="Africa">Africa</option>
    </select>
  </div>
  <button class="btn-clear" onclick="clearFilters()"><span class="clear-text">&#10005; Clear</span><span class="clear-icon">&#10005;</span></button>
</div>

<!-- LAYOUT -->
<div class="layout">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="mobileCloseDrawer()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-header-text">SELECT A COUNTRY</span>
      <button class="btn-sb-toggle" id="btnSbToggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 8H14M2 4H14M2 12H14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="sidebar-scroll" id="countryList"></div>
  </div>
  <div class="main" id="mainContent">
    <div class="welcome-state">
      <div class="big-icon">&#128196;</div>
      <h2>Select a country to view its government claims</h2>
      <p>Choose any country from the left panel. You can search by name, filter by region, or browse by claim category once selected.</p>
    </div>
  </div>
</div>

sted.","deadline":"Report immediately after accident/illness; exact procedural timelines depend on ART/SRT process.","employerResp":"Maintain ART coverage and report workplace accident/illness accurately.","employeeResp":"Report accident/illness and attend medical/assessment process.","payrollImpact":"Track absence as work injury; coordinate wage replacement/medical coverage with ART.","authority":"SRT / ART","sourceUrl":"https://www.argentina.gob.ar/srt/art | https://www.argentina.gob.ar/Trabajo/casasparticulares/empleador/aportesycontribuciones/art/accidentes","notes":"The accidents page says the employer, worker or anyone aware of the accident/occupational disease may report it to the ART."},{"category":"Hiring / Wage Subsidy / Training","schemeName":"Fomentar Empleo / Programa de Inserción Laboral / Acciones de Entrenamiento para el Trabajo","claimableBy":"Employer and jobseeker","eligible":"Employers participating in the programme; eligible workers/jobseekers registered through Portal Empleo.","amount":"Government contribution varies by company headcount, working schedule and worker category; employer pays the difference to applicable pay/CBA.","duration":"Depends on programme track and agreement.","howToClaim":"Register or participate through Portal Empleo / Secretaría de Trabajo channels and follow programme approval process.","documents":"Employer registration, job/training offer details, worker registration and programme-specific evidence.","deadline":"Before or during programme onboarding as required by Secretaría de Trabajo.","employerResp":"Host training/hiring, comply with programme terms and pay any salary difference.","employeeResp":"Register employment history and apply/postulate through Portal Empleo where applicable.","payrollImpact":"Can reduce hiring/training cost, but payroll must still match labour agreement/minimum wage obligations.","authority":"Secretaría de Trabajo, Empleo y Seguridad Social","sourceUrl":"https://www.argentina.gob.ar/trabajo/fomentarempleo | https://www.argentina.gob.ar/trabajo/fomentarempleo/montos-de-las-prestaciones-del-programa-fomentar-empleo | https://www.argentina.gob.ar/trabajo/ept","notes":"Use official amount page for current programme contribution levels before implementation."}],"Australia":[{"category":"Maternity / Parental","schemeName":"Paid Parental Leave - Parental Leave Pay","claimableBy":"Employee claims; employer may deliver payment after receiving funds","eligible":"Eligible working parents; employer determination may require employer to provide the payment to employee.","amount":"As of current Services Australia page: AUD 189.62 per day before tax, or AUD 948.10 per 5-day week, based on national minimum wage.","duration":"120 days before 1 Jul 2026; 130 days for a child born/adopted from 1 Jul 2026.","howToClaim":"Employee claims through Services Australia; employer registers for the scheme and responds to employer determination.","documents":"Employee claim details, proof of birth/adoption, employer registration/payment details and any Services Australia requests.","deadline":"Claiming timeframes vary by child birth/adoption date; employee should claim within Services Australia timeframes.","employerResp":"Register, respond to employer determination, provide Parental Leave Pay only after receiving funds from Services Australia.","employeeResp":"Claim payment, arrange leave with employer and provide proof/evidence.","payrollImpact":"Taxable payment delivered through employer in many cases; from 1 Jul 2025 ATO super contribution is paid directly to employee super, not by employer.","authority":"Services Australia / ATO","sourceUrl":"https://www.servicesaustralia.gov.au/how-paid-parental-leave-scheme-works-for-employers?context=23121 | https://www.servicesaustralia.gov.au/how-much-parental-leave-pay-you-can-get?context=64479 | https://www.servicesaustralia.gov.au/parental-leave-pay-days-to-increase-from-1-july-2026","notes":"Rate usually changes on 1 July each year; verify before using in payroll proposal."},{"category":"Hiring / Wage Subsidy","schemeName":"Workforce Australia Wage Subsidies","claimableBy":"Employer","eligible":"Legal entity with ABN; ongoing vacancy at least 15 hours/week; active Workforce Australia Online for Business account; eligible employee must meet provider assessment.","amount":"Up to AUD 10,000.","duration":"Agreement term up to 26 weeks.","howToClaim":"Talk to an Employment Services Provider; approve wage subsidy agreement through Workforce Australia Online for Business.","documents":"ABN/business details, vacancy details, Workforce Australia account, provider assessment and wage subsidy agreement.","deadline":"Employer must approve the wage subsidy agreement within 28 days of eligible employee starting work.","employerResp":"Meet agreement terms and keep records of employment/hours/wages.","employeeResp":"No direct employee claim; employee eligibility is assessed by provider.","payrollImpact":"Reduces hiring cost, but does not remove normal wage, tax, superannuation and employment obligations.","authority":"Department of Employment and Workplace Relations / Workforce Australia","sourceUrl":"https://www.dewr.gov.au/download/16203/wage-subsidies-employer-factsheet/38146/wage-subsidies-employer-factsheet/pdf | https://www.dewr.gov.au/wage-subsidies","notes":"Not available for immediate family, previously employed workers within last two years, or where other government funding is received."},{"category":"Work Injury / Occupational Disease","schemeName":"Workers compensation claim - state/territory based example: WorkCover Queensland","claimableBy":"Employee; employer can lodge/manage claim","eligible":"Worker has work-related injury or illness accepted by workers compensation insurer.","amount":"Weekly compensation for lost wages plus medical/rehabilitation costs; Queensland basic weekly payment may start at 55% of QOTE until wage information is finalised.","duration":"For accepted claim period under state/territory workers compensation law.","howToClaim":"Worker or employer lodges claim with relevant state/territory insurer; Queensland employers use WorkCover Connect.","documents":"Work capacity/medical certificate, wage history, accident details, employer and worker details.","deadline":"Notify/report as soon as practicable; exact deadline is state/territory specific.","employerResp":"Maintain workers compensation insurance, provide wage history and report serious incidents if required.","employeeResp":"Lodge claim and provide medical/work capacity evidence.","payrollImpact":"Record as workers compensation absence; coordinate insurer payments and employer excess where applicable.","authority":"State/Territory workers compensation authorities; WorkCover Queensland example","sourceUrl":"https://www.worksafe.qld.gov.au/claims-and-insurance/compensation-claims | https://www.worksafe.qld.gov.au/claims-and-insurance/compensation-claims/make-a-claim | https://www.worksafe.qld.gov.au/claims-and-insurance/compensation-claims/payments-and-support/weekly-compensation/basic-weekly-payment","notes":"Australia is not one single national workers compensation scheme; use the relevant state/territory source for final implementation."}],"Austria":[{"category":"Maternity / Parental","schemeName":"Wochengeld - Maternity Allowance","claimableBy":"Employee/self-employed woman, paid by health insurance","eligible":"Employees in work; voluntarily self-insured low-income employees; fully insured freelancers; some insured self-employed/farmers.","amount":"For employees, normally based on last three net salary payments before maternity leave; supplements apply for one-off payments.","duration":"Generally 8 weeks before due date and 8 weeks after birth; may extend depending on birth circumstances and employment bans.","howToClaim":"Apply to the relevant health insurance carrier; required documents can be submitted personally or by post.","documents":"Medical certificate, employment/pay confirmation for maternity allowance, and insurance/employment details.","deadline":"Apply once medical certificate and pre-birth details are available; exact timing depends on insurer process.","employerResp":"Provide employment and pay confirmation where required; respect maternity employment ban.","employeeResp":"Submit documents to health insurance carrier.","payrollImpact":"Employer does not pay normal salary for covered maternity allowance period; coordinate leave and social insurance reporting.","authority":"Austrian health insurance carrier / oesterreich.gv.at","sourceUrl":"https://www.oesterreich.gv.at/en/themen/familie_und_partnerschaft/geburt-eines-kindes/5/1/wochengeld","notes":"Self-employed women may receive operating assistance or a daily maternity allowance depending on status."},{"category":"Sick Leave / Social Insurance","schemeName":"Krankengeld - Sickness Benefit","claimableBy":"Employee, paid by health insurance after continued pay rules","eligible":"Insured employee whose full employer sick-pay entitlement has ended or reduced under Austrian rules.","amount":"Health insurance cash benefit; exact amount depends on insurance rules and earnings evidence.","duration":"For medically certified incapacity period subject to statutory limits.","howToClaim":"Employer submits Arbeits- und Entgeltbestätigung for sickness benefit via ELDA to the competent health insurance carrier.","documents":"Work incapacity evidence and employer earnings confirmation.","deadline":"ÖGK employer guide says the confirmation should be sent as soon as possible in the interest of the entitled person.","employerResp":"Submit/correct earnings confirmation for sickness benefit through ELDA.","employeeResp":"Provide medical certification and cooperate with insurer process.","payrollImpact":"Important payroll handoff after employer continued-pay period; incorrect earnings confirmation may delay benefit.","authority":"Österreichische Gesundheitskasse / ELDA","sourceUrl":"https://www.gesundheitskasse.at/cdscontent/load?contentid=10008.794802&version=1743409079 | https://www.gesundheitskasse.at/cdscontent/load?contentid=10008.683311&version=1735812013","notes":"Use the current ÖGK employer guide for payroll implementation details."},{"category":"Hiring Subsidy","schemeName":"AMS Eingliederungsbeihilfe","claimableBy":"Employer","eligible":"Companies hiring eligible unemployed workers, such as long-term unemployed or older jobseekers; exclusions include AMS, federal government, political parties and radical associations.","amount":"Amount is agreed case-by-case with AMS based on labour-market policy requirements.","duration":"Duration is agreed case-by-case with AMS.","howToClaim":"Apply through the employer eAMS account before employment starts.","documents":"Company details, candidate eligibility details, planned employment details, AMS-required documentation.","deadline":"Must apply before the employment relationship begins.","employerResp":"Do not hire first if subsidy is needed; consult AMS and apply before start date.","employeeResp":"Register/maintain jobseeker status as required by AMS.","payrollImpact":"Reduces hiring cost only after AMS approval; normal payroll obligations continue.","authority":"Arbeitsmarktservice Austria (AMS)","sourceUrl":"https://www.ams.at/unternehmen/service-zur-personalsuche/foerderungen/eingliederungsbeihilfe","notes":"Conditions differ regionally; do not use a national fixed amount."}],"Bahrain":[{"category":"Wage Support","schemeName":"Tamkeen Wage Increment Program","claimableBy":"Employer","eligible":"SME/micro enterprise with active CR/licence and no active violations; Bahraini employee aged 18-45 with at least 3 months employment; basic wage generally BHD 200-1,500 and qualification-linked salary thresholds.","amount":"Supports basic wage increments for Bahraini employees; support details follow Tamkeen programme approval.","duration":"12 months.","howToClaim":"Apply through Tamkeen support programme channels.","documents":"CR/licence, employee nationality/age/tenure/salary evidence, payroll records and Tamkeen documents.","deadline":"As per Tamkeen programme application window and approval process.","employerResp":"Ensure employee and company eligibility, submit documents and maintain compliant payroll.","employeeResp":"Provide required personal/qualification/payroll information to employer if needed.","payrollImpact":"Supports salary increase cost but payroll must reflect actual basic wage and statutory social insurance reporting.","authority":"Tamkeen - Labour Fund","sourceUrl":"https://www.tamkeen.bh/en/programs/wage-inc/","notes":"Official Arabic page provides detailed thresholds: secondary BHD 300+, diploma BHD 380+, bachelor's or higher BHD 450+."},{"category":"Hiring / Wage Subsidy","schemeName":"Tamkeen National Employment Program","claimableBy":"Employer","eligible":"Private sector enterprises employing Bahraini talent through eligible tracks, including Jobs+ / programme channels.","amount":"Wage support for Bahraini employment; public Tamkeen update states support tracks include 50% for 3 years and 30% for 5 years.","duration":"Up to 5 years depending on selected support track.","howToClaim":"Apply through Tamkeen / National Employment Program channels.","documents":"Company documents, Bahraini candidate/job details, wage records and programme approvals.","deadline":"Before or during recruitment as required by programme.","employerResp":"Comply with programme terms and pay wages correctly.","employeeResp":"Participate as eligible Bahraini jobseeker/employee if required.","payrollImpact":"Useful for local hiring planning; does not replace minimum wage or social insurance duties.","authority":"Tamkeen - Labour Fund / Ministry of Labour channels","sourceUrl":"https://www.tamkeen.bh/en/programs/national-employment-program-3-0/ | https://www.tamkeen.bh/en/nep-new-support-tracks/","notes":"Tamkeen pages may restrict access; retain source URL and verify current terms at time of application."},{"category":"Unemployment / Social Insurance","schemeName":"Insurance Against Unemployment","claimableBy":"Employee/insured person; administered by SIO","eligible":"Persons covered by Bahrain unemployment insurance law who meet statutory conditions.","amount":"Benefit/compensation amount depends on Law No. 78 of 2006 and SIO rules; public SIO pages should be checked before advising figures.","duration":"As determined by unemployment insurance law and SIO approval.","howToClaim":"Use SIO individual e-services / official unemployment insurance process.","documents":"SIO account details, ID/insurance information, proof of unemployment and any Ministry/SIO-required evidence.","deadline":"As specified by SIO / unemployment insurance law.","employerResp":"Maintain correct SIO contributions and end-of-service employment reporting.","employeeResp":"File unemployment claim and provide required documents.","payrollImpact":"Payroll termination reporting and SIO contribution accuracy are important for employee claim eligibility.","authority":"Social Insurance Organization (SIO)","sourceUrl":"https://www.sio.gov.bh/en/insurance-against-unemployment | https://www.sio.gov.bh/en/law-no-13-of-1975-818549","notes":"Official SIO law and e-services should be checked for exact compensation rate and filing conditions."}],"Bangladesh":[{"category":"Medical / Welfare Assistance","schemeName":"Bangladesh Labour Welfare Foundation - Medical Grant","claimableBy":"Worker","eligible":"Workers in formal or informal sectors who meet Labour Welfare Foundation requirements.","amount":"Financial assistance amount is not clearly stated on the public forms page; depends on Foundation approval/rules.","duration":"One-off or case-based assistance.","howToClaim":"Submit the official medical grant form to Bangladesh Labour Welfare Foundation.","documents":"Medical grant form, worker identity/employment evidence, medical documents and any requested supporting evidence.","deadline":"No fixed deadline found on public forms page; submit as soon as possible with complete documents.","employerResp":"Provide employment evidence if requested; support worker with documents.","employeeResp":"Prepare and submit form with medical evidence.","payrollImpact":"Not a payroll reimbursement; HR may help workers collect employment records.","authority":"Bangladesh Labour Welfare Foundation","sourceUrl":"https://blwf.gov.bd/pages/forms | https://blwf.gov.bd/","notes":"Foundation page lists medical grant and education grant forms."},{"category":"Worker Welfare / Death / Disability / Medical","schemeName":"Central Fund Financial Assistance","claimableBy":"Worker or worker family","eligible":"Eligible workers/families under Central Fund rules, especially garment-sector/covered worker assistance areas.","amount":"Amount depends on Central Fund rules and approval; public application page lists assistance forms but not a universal rate.","duration":"One-off or case-based assistance.","howToClaim":"Submit relevant Central Fund application form: medical assistance, death assistance, permanent/partial disability, or education scholarship.","documents":"Application form, worker/family identity, employment proof, medical/death/disability evidence and supporting records.","deadline":"No fixed deadline found on public application page; submit promptly.","employerResp":"Assist worker/family with employment and accident/death evidence where requested.","employeeResp":"Submit claim form and evidence to Central Fund.","payrollImpact":"HR impact is mainly documentation support; not a standard payroll credit.","authority":"Central Fund, Ministry of Labour and Employment","sourceUrl":"https://centralfund.gov.bd/site/page/c931b51e-3b2d-4f50-8409-e4cfe8c2de6b/ | https://centralfund.gov.bd/pages/downloads/6922dadadbfbab28ce0571ff","notes":"Central Fund site also references Employment Injury Scheme development; verify sector coverage before advising workers."},{"category":"Maternity Benefit","schemeName":"Bangladesh Labour Act maternity benefit","claimableBy":"Employee, paid by employer under law","eligible":"Female worker meeting Labour Act maternity benefit conditions.","amount":"Statutory maternity benefit is employer-funded under labour law rather than a government reimbursement claim.","duration":"Labour Act maternity period; verify the latest amended law text before use.","howToClaim":"Employee applies/notifies employer under Labour Act process; no separate government reimbursement found from official sources for general private sector.","documents":"Pregnancy/maternity notice, medical or expected delivery evidence and employment records.","deadline":"Follow Labour Act notice requirements.","employerResp":"Pay statutory maternity benefit and keep payroll/leave records.","employeeResp":"Provide required notice and evidence.","payrollImpact":"Direct employer payroll cost; include in guide as 'not government claimable' unless sector-specific fund exists.","authority":"Ministry of Labour and Employment","sourceUrl":"https://mole.gov.bd/site/page/1acc251b-d520-4619-8de2-c6e8afa2c07f/%E0%A6%AC%E0%A6%BE%E0%A6%82%E0%A6%B2%E0%A6%BE%E0%A6%A6%E0%A7%87%E0%A6%B6-%E0%A6%B6%E0%A7%8D%E0%A6%B0%E0%A6%AE-%28%E0%A6%B8%E0%A6%82%E0%A6%B6%E0%A7%8B%E0%A6%A7%E0%A6%A8%29-%E0%A6%86%E0%A6%87%E0%A6%A8-%E0%A7%A8%E0%A7%A6%E0%A7%A7%E0%A7%A9","notes":"Included to prevent confusion: it is a statutory employer obligation, not a government claim/reimbursement based on located official sources."}],"Belgium":[{"category":"Maternity / Parental","schemeName":"Repos de maternité / indemnité de maternité","claimableBy":"Employee, paid by mutuality under INAMI rules","eligible":"Salaried worker or eligible unemployed/self-employed parent meeting Belgian maternity insurance conditions.","amount":"For active employees: 82% of gross daily salary for first 30 days; from day 31, 75% of capped gross daily salary.","duration":"Usually 15 weeks for single birth; longer for multiple birth or specific situations.","howToClaim":"Employee contacts her mutuality; employer must send required social data to the mutuality.","documents":"Medical certificate/expected delivery date, mutuality forms, employer social data and bank details.","deadline":"Apply before/at start of maternity rest; exact timing depends on mutuality and employee situation.","employerResp":"Communicate required social data and respect maternity protection/work prohibition rules.","employeeResp":"Notify employer and mutuality, submit medical and personal documents.","payrollImpact":"Employer normally does not fund the INAMI maternity allowance, but payroll/leave records must be coordinated.","authority":"INAMI / SPF Emploi","sourceUrl":"https://www.inami.fgov.be/fr/themes/grossesse-et-naissance/maternite/repos-de-maternite-pour-les-salariees-ou-les-chomeuses | https://emploi.belgique.be/fr/themes/jours-feries-et-conges/conge-de-maternite","notes":"Belgium uses sickness funds/mutualities for benefit payment; employer data is still required."},{"category":"Sickness / Incapacity","schemeName":"Indemnités d’incapacité de travail","claimableBy":"Employee, paid by mutuality under INAMI rules","eligible":"Insured worker unable to work due to sickness/accident and meeting incapacity benefit conditions after any guaranteed-pay period.","amount":"Benefit percentage and cap depend on status and incapacity period; public INAMI pages provide the applicable ceilings.","duration":"For medically certified incapacity period subject to Belgian benefit rules.","howToClaim":"Employee submits incapacity certificate to mutuality; employer sends social data to mutuality.","documents":"Medical certificate, employer social data, bank details and mutuality-requested evidence.","deadline":"Certificate/reporting deadlines depend on mutuality instructions and employment status.","employerResp":"Provide timely wage/social data and manage guaranteed salary period correctly.","employeeResp":"Send medical certificate and cooperate with mutuality.","payrollImpact":"Important payroll handoff when employer guaranteed-pay period ends and mutuality benefit begins.","authority":"INAMI","sourceUrl":"https://www.inami.fgov.be/fr/themes/incapacite-de-travail","notes":"Use current INAMI amount/cap pages before advising exact net pay."},{"category":"Temporary Unemployment","schemeName":"Chômage temporaire / tijdelijke werkloosheid","claimableBy":"Employer communicates; employee receives unemployment benefit via ONEM/RVA process","eligible":"Employer has qualifying temporary unemployment reason such as economic reasons, weather, technical accident or force majeure; worker is temporarily suspended/reduced.","amount":"Benefit amount depends on ONEM/RVA unemployment rules; not a direct employer reimbursement.","duration":"For approved temporary unemployment period.","howToClaim":"Employer uses Social Security/ONEM online temporary unemployment communication service.","documents":"Employer communication, reason evidence, worker details, control card/required documents depending on case.","deadline":"Communicate before/during temporary unemployment according to ONEM/RVA rules for the specific reason.","employerResp":"Submit the temporary unemployment communication and keep supporting evidence.","employeeResp":"Follow unemployment benefit/card requirements if requested.","payrollImpact":"Payroll must distinguish worked time, suspended days and unemployment-benefit days.","authority":"ONEM/RVA / Socialsecurity.be","sourceUrl":"https://www.socialsecurity.be/site_fr/employer/applics/ctw/index.htm | https://www.onem.be/employeurs","notes":"Useful during temporary work suspension; not a general wage subsidy."},{"category":"Employer Social Security Reduction","schemeName":"Target group reduction - first hires / premiers engagements","claimableBy":"Employer","eligible":"New employer hiring first employees; from 2024 rules apply to a maximum of 3 workers under the first-engagements reduction.","amount":"Reduction of employer social security contributions; exact reduction depends on worker number and quarter, as stated in ONSS administrative instructions.","duration":"For qualifying quarters; first worker may have longer/unlimited support subject to current rules.","howToClaim":"Claim through normal Belgian payroll/DMFA social security declaration using correct reduction codes.","documents":"Employer registration, employment contract/payroll data and social security declaration evidence.","deadline":"During periodic ONSS/DMFA payroll reporting.","employerResp":"Apply correct reduction only when eligible and retain payroll evidence.","employeeResp":"No direct employee claim.","payrollImpact":"Can reduce employer social security cost; payroll setup must be accurate.","authority":"ONSS / Socialsecurity.be","sourceUrl":"https://www.socialsecurity.be/employer/instructions/dmfa/fr/latest/instructions/deductions/structuralreduction_targetgroupreductions/firstengagments.html","notes":"Check latest ONSS quarter instructions because amounts and scope have changed recently."}],"Brazil":[{"category":"Maternity / Parental","schemeName":"Salário-maternidade","claimableBy":"Employee/insured person, through INSS; employer may handle payment/offset for employees depending on case","eligible":"Insured person who meets INSS maternity benefit conditions for birth, adoption, legal custody for adoption, or legally covered event.","amount":"INSS maternity salary rules apply; value depends on insured category and contribution/pay base.","duration":"Generally 120 days for covered maternity events, subject to INSS rules.","howToClaim":"Request through Meu INSS / INSS salary-maternity service; employee category affects process.","documents":"Identification, contribution/employment evidence, birth/adoption/custody documents and INSS-requested records.","deadline":"File according to INSS service rules and event timing.","employerResp":"For employees, provide/maintain correct payroll and social security records; handle any statutory payment/offset process if applicable.","employeeResp":"Submit the INSS request and supporting documents.","payrollImpact":"May affect payroll because maternity pay can move through employer payroll/INSS compensation depending on worker category.","authority":"INSS","sourceUrl":"https://www.gov.br/inss/pt-br/servicos/salarios-maternidade","notes":"Verify the worker category before stating who pays first."},{"category":"Sickness / Work Incapacity","schemeName":"Benefício por Incapacidade Temporária","claimableBy":"Employee/insured person, paid by INSS after statutory employer-paid period where applicable","eligible":"Insured person temporarily unable to work due to illness or accident and meeting INSS medical/contribution rules.","amount":"Benefit amount depends on INSS calculation; work-accident nature may require CAT and medical evidence.","duration":"For period granted by INSS medical/document review; extension can be requested near the end if still unable to work.","howToClaim":"Apply through Meu INSS/Central 135; Atestmed/document review may be used in applicable cases.","documents":"Medical certificate/report, identification, employment/contribution data and CAT if work-related.","deadline":"Extension request can be made in the last 15 days of the benefit period according to INSS guidance.","employerResp":"Pay/manage statutory initial absence period where required; issue/support CAT for work accidents.","employeeResp":"Submit medical evidence and benefit request, and request extension if needed.","payrollImpact":"Payroll must separate employer-paid sick days from INSS-paid benefit period.","authority":"INSS","sourceUrl":"https://www.gov.br/inss/pt-br/direitos-e-deveres/beneficios-por-incapacidade/auxilio-por-incapacidade-temporaria | https://www.gov.br/inss/pt-br/saiba-mais/auxilios/comunicacao-de-acidente-de-trabalho-cat","notes":"For work accidents, CAT documentation is critical."},{"category":"Tax Incentive / Employee Food","schemeName":"Programa de Alimentação do Trabalhador - PAT","claimableBy":"Employer","eligible":"Legal entity participating in PAT and providing food/meal benefit under programme rules, prioritising low-income workers.","amount":"Tax incentive/deduction rules apply under PAT legislation; exact tax treatment depends on income tax regime and current rules.","duration":"Ongoing while registered and compliant with PAT requirements.","howToClaim":"Register/operate through the Ministry of Labour and Employment PAT process and comply with programme rules.","documents":"Company registration, food benefit records, employee eligibility/payment records and tax documentation.","deadline":"During PAT registration/compliance and corporate tax filing cycle.","employerResp":"Operate benefits only for food purpose and keep records for tax/audit.","employeeResp":"Use benefit according to programme purpose.","payrollImpact":"Can reduce corporate tax cost for eligible employers; not a cash reimbursement.","authority":"Ministry of Labour and Employment","sourceUrl":"https://www.gov.br/trabalho-e-emprego/pt-br/servicos/empregador/programa-de-alimentacao-do-trabalhador-pat","notes":"Benefit is voluntary but tax-incentivised."}],"Bulgaria":[{"category":"Maternity / Parental","schemeName":"Cash benefit for pregnancy and childbirth","claimableBy":"Employee, paid by NSSI","eligible":"Insured person covered for general sickness and maternity with required insurance period.","amount":"NSSI short-term benefit; commonly calculated from insured income under social insurance rules.","duration":"For statutory pregnancy and childbirth leave period under Bulgarian law.","howToClaim":"Employer/insurer submits required certificate/data to NSSI; employee provides bank and benefit declaration data.","documents":"Hospital sheet/medical documents, employee declaration and employer Annex 9/certificate data.","deadline":"Submit benefit data promptly after medical/leave documents are issued.","employerResp":"Submit correct electronic/paper benefit data to NSSI.","employeeResp":"Provide declaration, bank account and medical documents.","payrollImpact":"Employer does not fund the full benefit but must prepare accurate NSSI documents.","authority":"National Social Security Institute","sourceUrl":"https://nssi.bg/en/faqs/short-term-benefits/","notes":"Use current Social Security Budget Act for exact current ceilings."},{"category":"Sickness / Work Injury","schemeName":"Temporary incapacity cash benefit","claimableBy":"Employee, paid by NSSI after first employer-paid days","eligible":"Insured person covered for general sickness/maternity; no 6-month period needed for work accident/occupational disease cases.","amount":"General illness benefit is 80% of average daily gross salary/insured income; work accident/occupational disease is 90%. Employer pays first 3 working days at 70% for general temporary incapacity.","duration":"Until working capacity is restored or invalidity established; statutory limits apply in some cases.","howToClaim":"Hospital sheet and employer/insurer data are submitted to NSSI.","documents":"Hospital sheet, employee declaration, employer Annex 9/certificate and social security records.","deadline":"Submit after hospital sheet is issued; employer data should be provided for each hospital sheet.","employerResp":"Pay first 3 working days where applicable and submit NSSI data correctly.","employeeResp":"Provide medical documents and bank/payment details.","payrollImpact":"Payroll must calculate first employer-paid days and then coordinate NSSI benefit period.","authority":"National Social Security Institute","sourceUrl":"https://nssi.bg/en/faqs/short-term-benefits/","notes":"Official NSSI page gives rates and document requirements."},{"category":"Unemployment Benefit","schemeName":"Cash unemployment benefit","claimableBy":"Employee, paid by NSSI","eligible":"Person with unemployment insurance contributions for at least 12 months in last 18 months, registered unemployed at Employment Agency, and meeting pension/work restrictions.","amount":"Daily benefit is 60% of average daily wage/insured income over last 24 months, subject to statutory minimum and maximum.","duration":"4 to 12 months depending on length of insured service after 31 Dec 2001.","howToClaim":"Register with Employment Agency and submit application-declaration to NSSI.","documents":"Identity document, termination act, insurable service documents where required and application-declaration.","deadline":"Register with Employment Agency within 7 working days and file NSSI application within 3 months to avoid delay reduction.","employerResp":"Provide correct termination/payroll records when requested.","employeeResp":"Register and apply within deadlines.","payrollImpact":"Termination reporting and payroll contribution accuracy affect eligibility.","authority":"National Social Security Institute / Employment Agency","sourceUrl":"https://nssi.bg/en/faqs/unemployment-benefits/ | https://www.az.government.bg/en/pages/za-nas/","notes":"Employee claim, not employer reimbursement."}],"Cambodia":[{"category":"Maternity / Social Security","schemeName":"NSSF maternity daily allowance and additional childbirth allowance","claimableBy":"Employee, paid/administered through NSSF/Royal Government rules","eligible":"Female worker registered with NSSF and meeting maternity/health-care benefit conditions.","amount":"NSSF health care scheme provides 70% of daily average wage for maternity leave; official NSSF post also refers to 90-day maternity leave and KHR 400,000 additional allowance for one child.","duration":"90-day maternity leave benefit referenced by NSSF; additional allowance depends on birth count/official rules.","howToClaim":"Apply/report through NSSF process/branch or NSSF agent; employer registration and contribution compliance are needed.","documents":"NSSF membership, identity, medical/delivery evidence, phone/bank/payment details and employer records.","deadline":"Pregnant worker from 26 weeks up should complete request form as soon as possible for additional allowance per NSSF notice.","employerResp":"Register enterprise/workers and pay NSSF contributions accurately.","employeeResp":"Submit/request maternity allowance documents to NSSF.","payrollImpact":"Payroll should distinguish employer maternity pay obligations from NSSF/Royal Government allowances.","authority":"National Social Security Fund","sourceUrl":"https://www.nssf.gov.kh/health-care-scheme-2/ | https://www.nssf.gov.kh/2018/09/04/postnatal-female-worker-receives-90-day-maternity-leave-and-120-of-wage-besides-400000-riels-of-additional-allowance-of-the-royal-government/ | https://www.nssf.gov.kh/2018/09/04/pregnant-worker-from-26-weeks-up-shall-complete-form-of-request-letter-as-soon-as-possible-to-receive-additional-allowance/","notes":"Official sources include older NSSF notices; re-check current Prakas if using for live payroll advice."},{"category":"Work Injury / Occupational Risk","schemeName":"NSSF employment injury benefits","claimableBy":"Employee, through NSSF","eligible":"Worker suffering work injury covered by NSSF occupational risk scheme; employer must be registered/contributing.","amount":"Medical care/treatment at NSSF-recognised facilities; other employment injury benefits depend on injury assessment and NSSF rules.","duration":"For covered treatment/recovery/compensation period under NSSF rules.","howToClaim":"Report work injury and use NSSF-recognised health facilities/claim process.","documents":"Accident report, medical records, NSSF membership/employer details and supporting evidence.","deadline":"Report promptly according to NSSF occupational risk procedures.","employerResp":"Register/pay contributions and report workplace accidents.","employeeResp":"Seek treatment and provide injury evidence.","payrollImpact":"HR must coordinate work accident reporting and absence records; not a normal payroll reimbursement.","authority":"National Social Security Fund","sourceUrl":"https://www.nssf.gov.kh/employment-injury-scheme-2/benefit/ | https://www.nssf.gov.kh/employment-injury-scheme-2/contribution-payment/","notes":"NSSF page states employers with 8+ employees must register/pay contributions."},{"category":"Training Grant / Co-funding","schemeName":"Skills Development Fund - Joint Training Program / Skills Matching Program","claimableBy":"Employer, training provider or eligible programme participant","eligible":"Enterprises/training providers/associations participating in SDF priority-sector and approved training programmes.","amount":"SDF provides co-funding support; exact co-funding amount depends on approved programme/guideline.","duration":"Per approved training proposal/programme cycle.","howToClaim":"Apply through SDF programme process and submit training proposal/documentation.","documents":"Training proposal, enterprise/training provider details, participant list, budget and SDF-required evidence.","deadline":"Follow open call/application window in current SDF guidelines.","employerResp":"Design training with provider and keep attendance/outcome/cost records.","employeeResp":"Participate in approved training and provide required records.","payrollImpact":"Can reduce upskilling/reskilling cost; not a payroll wage subsidy.","authority":"Skills Development Fund under Ministry of Economy and Finance","sourceUrl":"https://sdfcambodia.org/about-sdf/ | https://sdfcambodia.org/joint-training-program/ | https://sdfcambodia.org/skill-matching-program/","notes":"SDF is an official national trust fund launched as a trust fund in 2023."}],"Canada":[{"category":"Maternity / Parental","schemeName":"Employment Insurance maternity and parental benefits","claimableBy":"Employee/parent, paid by Service Canada","eligible":"Eligible worker away from work because pregnant/recently gave birth or caring for newborn/newly adopted child; must meet EI eligibility rules.","amount":"Standard benefit can pay 55% of earnings up to CAD 729/week; extended parental has a lower rate/cap.","duration":"Maternity up to 15 weeks; parental standard/extended periods depend on option and sharing rules.","howToClaim":"Apply online through Service Canada / EI application.","documents":"SIN, employment details/ROE, banking information, birth/adoption details and other EI-requested documents.","deadline":"Apply as soon as work stops; EI rules apply to benefit start and waiting period.","employerResp":"Issue ROE and manage leave/top-up plan if offered.","employeeResp":"Apply online and choose parental option carefully.","payrollImpact":"Employer payroll must issue ROE and track statutory leave; EI is not employer reimbursement.","authority":"Employment and Social Development Canada / Service Canada","sourceUrl":"https://www.canada.ca/en/services/benefits/ei/ei-maternity-parental.html | https://www.canada.ca/en/services/benefits/ei/ei-maternity-parental/benefit-amount.html","notes":"Quebec residents use QPIP instead of federal EI maternity/parental benefits."},{"category":"Sickness / Medical Leave","schemeName":"Employment Insurance sickness benefits","claimableBy":"Employee, paid by Service Canada","eligible":"Eligible worker unable to work for medical reasons such as illness, injury, quarantine or any medical condition and meeting EI rules.","amount":"EI sickness benefit rate is generally 55% of earnings up to the weekly maximum set by EI.","duration":"Up to 26 weeks according to current EI sickness benefit rules.","howToClaim":"Apply online through Service Canada.","documents":"SIN, ROE/employment details, medical certificate if requested, banking information.","deadline":"Apply as soon as work stops; EI application timing affects payment.","employerResp":"Issue ROE and coordinate any employer sick-pay or disability plan.","employeeResp":"Apply online and keep medical evidence.","payrollImpact":"Payroll must separate employer-paid sick leave from EI sickness period.","authority":"Employment and Social Development Canada / Service Canada","sourceUrl":"https://www.canada.ca/en/services/benefits/ei/ei-sickness.html","notes":"Official page was updated in June 2026; verify weekly maximum before quoting amount."},{"category":"Hiring / Wage Subsidy","schemeName":"Canada Summer Jobs wage subsidy","claimableBy":"Employer","eligible":"Not-for-profit/public-sector employers and private-sector employers with 50 or fewer full-time employees creating quality summer jobs for youth aged 15-30.","amount":"Not-for-profit employers can receive up to 100% of provincial/territorial minimum wage; public/private sector employers up to 50%.","duration":"Approved summer job period under contribution agreement; application windows are annual.","howToClaim":"Apply during CSJ application period and manage approved funding agreement through Canada.ca/Service Canada process.","documents":"Business number/CRA registration, project/job details, youth hiring records, payroll records and final reporting.","deadline":"2026 application period was Nov 4, 2025 to Dec 11, 2025 according to Canada.ca applicant guide; future years will have new windows.","employerResp":"Apply before deadline, hire eligible youth and keep payroll/funding records.","employeeResp":"Youth must meet programme eligibility if hired.","payrollImpact":"Reduces wage cost for approved roles; employer must still pay wages and comply with labour rules.","authority":"Employment and Social Development Canada","sourceUrl":"https://www.canada.ca/en/employment-social-development/services/funding/canada-summer-jobs/applicant-guide.html","notes":"Annual intake; include current application period each year."},{"category":"Student Wage Subsidy","schemeName":"Student Work Placement Program","claimableBy":"Employer via funded delivery partners","eligible":"Employers hiring eligible post-secondary students for work-integrated learning placements through approved delivery partners.","amount":"Up to CAD 5,000 for every opportunity offered to a student through the programme, according to Canada.ca.","duration":"Per approved student placement.","howToClaim":"Apply through one of the Government of Canada funded delivery partner organisations.","documents":"Employer details, placement description, student eligibility evidence, payroll/placement records and partner-required documents.","deadline":"Year-round according to Canada.ca page, subject to delivery partner budgets and rules.","employerResp":"Apply through the right delivery partner and keep placement/payroll records.","employeeResp":"Student must meet Canadian PSE and work eligibility rules.","payrollImpact":"Can offset student placement wage cost; not a general employee subsidy.","authority":"Employment and Social Development Canada","sourceUrl":"https://www.canada.ca/en/employment-social-development/services/student-work-placements-wage-subsidies.html | https://www.canada.ca/en/employment-social-development/programs/student-work-placement-program.html","notes":"Delivery partners administer applications; details can differ by sector."}],"Chile":[{"category":"Maternity / Parental","schemeName":"Pre- and postnatal maternity leave subsidy (Subsidio por Incapacidad Laboral maternal)","claimableBy":"Employee; paid through health/social security system","eligible":"Insured worker with approved maternity medical leave; ChileAtiende states the worker receives a wage-replacement subsidy during prenatal and postnatal leave.","amount":"Wage-replacement maternity subsidy; amount is calculated under statutory subsidy rules and must not exceed the average remuneration basis described by DT.","duration":"Prenatal 6 weeks / 42 days before expected birth; postnatal 12 weeks / 84 days after birth; postnatal parental leave may follow under maternity-protection rules.","howToClaim":"Worker obtains medical leave and follows health insurer/COMPIN/ChileAtiende process for maternity leave benefit.","documents":"Medical leave/certificate, identity/RUN, employment/social security contribution information and any health insurer requirements.","deadline":"Apply when maternity medical leave is issued; specific processing timing depends on insurer/COMPIN rules.","employerResp":"Respect protected leave and submit/confirm employment and contribution data if requested.","employeeResp":"Provide medical certificate and personal/employment data; coordinate with insurer/COMPIN.","payrollImpact":"Treat as statutory protected leave; coordinate payroll so company salary is not double counted against state/social security subsidy.","authority":"ChileAtiende / Dirección del Trabajo / SUSESO","sourceUrl":"https://www.chileatiende.gob.cl/fichas/8647-pre-y-postnatal | https://www.dt.gob.cl/portal/1628/w3-article-60117.html | https://www.suseso.cl/612/w3-propertyvalue-34022.html","notes":"Rates/caps should be checked before payroll use because SIL calculation rules depend on contribution history and current statutory ceilings."},{"category":"Sickness / Medical Leave","schemeName":"Subsidio por Incapacidad Laboral - common sickness medical leave","claimableBy":"Employee","eligible":"Worker with an authorized medical leave due to temporary incapacity for work.","amount":"Wage-replacement subsidy during authorized medical leave; exact amount depends on statutory calculation and approved leave.","duration":"For the period of approved medical leave.","howToClaim":"Medical leave is submitted/processed through the official medical leave system and payer entity under SUSESO rules.","documents":"Authorized medical leave, medical evidence, identity and employment/contribution records.","deadline":"Follow medical leave submission/appeal timelines set by the medical leave/COMPIN process.","employerResp":"Process absence, report employment/contribution details and avoid paying unsupported duplicate salary.","employeeResp":"Submit or validate medical leave and attend medical review if required.","payrollImpact":"Payroll must mark paid medical leave as SIL-related absence and reconcile employer salary advances where applicable.","authority":"SUSESO / COMPIN / health insurer","sourceUrl":"https://www.suseso.cl/622/articles-769164_archivo_03.pdf | https://www.suseso.cl/612/w3-propertyvalue-34022.html","notes":"Use SUSESO compendium/law for detailed eligibility and calculation, especially for disputes."},{"category":"Unemployment / Income Support","schemeName":"Seguro de Cesantía","claimableBy":"Employee","eligible":"Workers with contracts governed by the Labour Code, public education assistant statute, or private household workers, as described by ChileAtiende.","amount":"Paid from the employee unemployment individual account and, when requirements are met, the Solidarity Unemployment Fund; exact amount depends on account balance, cause of termination and statutory schedule.","duration":"Temporary unemployment income support while the worker is unemployed and meets conditions.","howToClaim":"Worker requests the benefit via AFC/ChileAtiende channels after job loss.","documents":"Termination/finiquito or equivalent termination evidence, identity details and contribution record.","deadline":"Apply after employment termination; employer must register employment start with AFC within official timeframe noted by ChileAtiende.","employerResp":"Register workers with AFC and provide accurate employment termination/contract information.","employeeResp":"Apply for unemployment insurance and provide termination documents.","payrollImpact":"No normal payroll after termination; HR must ensure AFC registration and termination documentation are accurate.","authority":"ChileAtiende / AFC","sourceUrl":"https://www.chileatiende.gob.cl/fichas/62932-seguro-de-cesantia","notes":"ChileAtiende states the employer completes the start-of-services notice in AFC virtual employer branch or PreviRed within the official timeframe."},{"category":"Training / Tax Credit","schemeName":"SENCE Training Tax Credit (Franquicia Tributaria)","claimableBy":"Employer","eligible":"First-category taxpayers that meet SENCE requirements and use eligible training/evaluation/certification activities.","amount":"Tax incentive that finances eligible training, evaluation and competency certification activities; amount/cap depends on SENCE rules, payroll base and activity type.","duration":"Annual/period-based use according to SENCE rules and approved activity.","howToClaim":"Employer uses SENCE channels/OTIC or authorized training process and applies the training tax credit.","documents":"Company tax/employer details, training activity records, participant information, invoices/OTEC/OTIC documents and SENCE forms.","deadline":"Before and after training according to SENCE communication/liquidation deadlines.","employerResp":"Select eligible courses, keep training records and use SENCE/OTIC process correctly.","employeeResp":"Attend approved training and provide participant information where required.","payrollImpact":"Reduces training cost through tax credit; HR/payroll should track eligible wages and training attendance.","authority":"SENCE","sourceUrl":"https://sence.gob.cl/empresas/franquicia-tributaria | https://sence.gob.cl/empresas/franquicia/franquicia-para-empresas","notes":"Official SENCE pages should be checked for current annual caps and operational instructions."}],"China":[{"category":"Maternity / Medical Insurance","schemeName":"Maternity insurance benefits - childbirth medical expenses and maternity allowance","claimableBy":"Employee; sometimes paid to employer then employee depending on local rules","eligible":"Employees covered by employer-paid maternity insurance; NHSA states maternity insurance covers employers and employees, with employer contributions and no employee contribution.","amount":"Two benefits: reimbursement/payment of childbirth-related medical expenses and maternity allowance. Allowance is based on the employer unit average monthly wage; medical expense coverage varies locally.","duration":"During maternity leave / childbirth and family-planning medical events as locally implemented.","howToClaim":"Claim through the local medical insurance agency; many areas allow direct settlement or simplified online processing.","documents":"ID or social security card/medical insurance e-voucher, diagnosis certificate/outpatient record or discharge record; some areas may ask for unit/personal bank details.","deadline":"NHSA states maternity allowance applications should be completed within 10 working days after acceptance; local rules may differ.","employerResp":"Enroll all eligible employees in maternity insurance and provide unit/bank details if local office pays the employer.","employeeResp":"Submit required medical/identity materials or use automatic direct-settlement flow where available.","payrollImpact":"Maternity allowance may replace payroll during leave; HR must check whether local agency pays employer or employee directly.","authority":"National Healthcare Security Administration / local medical insurance agencies","sourceUrl":"https://www.nhsa.gov.cn/art/2024/12/12/art_14_15085.html | https://www.nhsa.gov.cn/art/2025/5/3/art_14_16441.html","notes":"China is locally administered; benefit caps, direct payment and documentation differ by city/province."},{"category":"Work Injury / Occupational Disease","schemeName":"Work-related injury insurance benefits","claimableBy":"Employee; claim handled through work injury insurance system","eligible":"Employee suffering a work accident or occupational disease recognized under the Work Injury Insurance Regulation.","amount":"Benefits include medical treatment, rehabilitation, disability allowances/one-off benefits and death benefits according to injury grade and regulation.","duration":"For recognized work injury treatment, disability or death benefit periods.","howToClaim":"Employer or employee applies for work injury recognition and benefit processing through local human resources/social security channels.","documents":"Accident report, medical records, employment relationship evidence, work injury recognition decision and disability assessment if needed.","deadline":"Work injury recognition and benefit timelines depend on regulation/local HRSS process; report promptly after incident.","employerResp":"Maintain work injury insurance, report accidents and cooperate with recognition/assessment.","employeeResp":"Report injury, provide medical evidence and attend assessment.","payrollImpact":"Payroll must treat absence as work injury and coordinate statutory wage/benefit obligations.","authority":"State Council / MOHRSS / local HRSS","sourceUrl":"https://www.gov.cn/zwgk/2005-05/20/content_144.htm | https://www.mohrss.gov.cn/SYrlzyhshbzb/shehuibaozhang/zcwj/gongshang/","notes":"Use local HRSS guidance for the exact process and current benefit payment standard."},{"category":"Unemployment / Income Support","schemeName":"Unemployment insurance benefit","claimableBy":"Employee","eligible":"Insured unemployed person meeting unemployment insurance conditions and registration/job-search requirements under local rules.","amount":"Benefit standard is set by provincial/municipal government; MOHRSS notes it is below the local minimum wage and above the urban resident minimum living security standard.","duration":"Temporary benefit period depends on contribution history and local rules.","howToClaim":"Apply through local unemployment insurance/public employment service channels.","documents":"ID/social security card, unemployment registration, termination/unemployment evidence and contribution record as required locally.","deadline":"After unemployment registration; exact application timeframes are local.","employerResp":"Contribute to unemployment insurance and issue/record termination documents accurately.","employeeResp":"Register unemployment and apply through official channel.","payrollImpact":"No active payroll after termination; HR should provide official termination/contribution information.","authority":"MOHRSS / local HRSS","sourceUrl":"https://www.mohrss.gov.cn/xxgk2020/fdzdgknr/zhgl/jytabl/jydf/202501/t20250123_535309.html | https://www.npc.gov.cn/npc/c1773/c1849/c13784/c26054/c26057/201905/t20190521_206215.html","notes":"Amounts are local, not national; check the city/province standard before quoting a number."},{"category":"Hiring / Social Insurance Subsidy","schemeName":"Social insurance subsidy for employers hiring key groups","claimableBy":"Employer","eligible":"Employers that absorb eligible employment-difficulty persons, graduating-year college graduates or recent unemployed graduates, subject to local employment subsidy rules.","amount":"Subsidy against employer social insurance contributions; amount, term and eligible groups are local. MOHRSS promotes online/direct fast processing and payment to enterprise accounts.","duration":"Local policy term; can be monthly or fixed-period depending on local rules.","howToClaim":"Apply through local employment subsidy systems, online portals/apps or direct fast-processing data matching.","documents":"Employer registration, employment contract, social insurance contribution record, employee eligibility records; some areas reduce materials through data matching.","deadline":"Local application window; MOHRSS notice asks local authorities to speed up review and payment.","employerResp":"Hire eligible workers, pay social insurance and keep employment records.","employeeResp":"Provide eligibility information if required.","payrollImpact":"Can reduce employer statutory contribution cost; HR must ensure worker eligibility before budgeting subsidy.","authority":"MOHRSS / Education Ministry / Finance Ministry / local HRSS","sourceUrl":"https://www.mohrss.gov.cn/xxgk2020/fdzdgknr/zcfg/gfxwj/jy/202206/t20220629_455727.html","notes":"National notice sets processing direction; exact subsidy percentage and term are local."}],"Colombia":[{"category":"Maternity / Paternity","schemeName":"Economic recognition of maternity and paternity leave","claimableBy":"Employee; employer often advances/records payroll and recovers/coordinates with EPS","eligible":"Contributory health-system affiliate meeting contribution requirements; Decreto 780 requires contributions during months corresponding to pregnancy for maternity leave recognition.","amount":"Economic recognition for maternity/paternity leave through EPS/ADRES framework; maternity leave is labour-protected and paid according to statutory health-system rules.","duration":"Maternity leave under labour law; current practical duration must be verified with current Labour Code/ministry guidance for live use.","howToClaim":"Submit leave/certificate information through employer/EPS process; public-sector guide describes recognition before EPS/ARL.","documents":"Medical certificate, birth/adoption evidence where applicable, ID, EPS affiliation and contribution records.","deadline":"Submit to EPS/administrative process promptly after medical certificate/birth; internal/public employer processes may set defined windows.","employerResp":"Record leave, report payroll novelty through PILA and manage recovery/recognition with EPS.","employeeResp":"Provide medical/birth documents and confirm EPS/contribution details.","payrollImpact":"Payroll must classify the leave as maternity/paternity and reconcile EPS recognition against salary payments.","authority":"Ministry of Health / Función Pública / EPS / ADRES","sourceUrl":"https://ciudadanos.sectorsalud.gov.co/ciudadanos/enfoque-diferencial/Paginas/dec-780-licencia-maternidad.aspx | https://www1.funcionpublica.gov.co/documents/34645357/34703294/Guia-gestion-incapacidades-licencias-maternidad-paternidad-v6.pdf/2ac26f86-0d76-1fd2-d354-239637a0e963 | https://www.minsalud.gov.co/sites/rid/Lists/BibliotecaDigital/RIDE/DE/DIJ/circular-externa-024-de-2017.pdf","notes":"Exact duration and operational recovery may change; verify Labour Code and EPS guidance before payroll implementation."},{"category":"Sickness / Medical Leave","schemeName":"Economic recognition of general sickness incapacity","claimableBy":"Employee; employer/EPS process","eligible":"Worker with certified general sickness incapacity under the contributory health system.","amount":"Economic recognition through the health system/EPS according to incapacity rules; payment rate varies by type/day and current regulation.","duration":"For medically certified incapacity period.","howToClaim":"Employer/worker submits incapacity to EPS and manages recognition/liquidation process.","documents":"Medical incapacity certificate, ID, EPS affiliation, contribution/payment records, employer payroll records.","deadline":"Follow EPS/legal claim windows; public-sector guide sets internal workflow expectations.","employerResp":"Report incapacity and PILA novelties, manage payroll advance/recovery where applicable.","employeeResp":"Submit certificate and comply with medical leave.","payrollImpact":"Payroll must separate employer-paid days and EPS-recognized days, depending on current rules.","authority":"Ministry of Health / Función Pública / EPS","sourceUrl":"https://www1.funcionpublica.gov.co/documents/34645357/34703294/Guia-gestion-incapacidades-licencias-maternidad-paternidad-v6.pdf/2ac26f86-0d76-1fd2-d354-239637a0e963 | https://ciudadanos.sectorsalud.gov.co/ciudadanos/enfoque-diferencial/Paginas/dec-780-ingreso-base-durante-licencia-maternidad.aspx","notes":"Use current EPS and health ministry procedures for employer recovery and claim windows."},{"category":"Work Injury / Occupational Disease","schemeName":"Economic benefits for occupational accident or disease through ARL","claimableBy":"Employee; employer/ARL process","eligible":"Worker with occupational accident/disease covered by an Occupational Risk Administrator (ARL).","amount":"Recognition of incapacity/benefits through ARL; exact amount depends on occupational risk and incapacity/disability assessment.","duration":"For the certified occupational incapacity or permanent benefit period.","howToClaim":"Report accident/disease and process claim with ARL under the occupational risk system.","documents":"Accident report, medical documents, employment/ARL affiliation evidence, incapacity certificate and assessment records.","deadline":"Report immediately according to ARL/occupational-risk process; specific timelines depend on regulation and ARL process.","employerResp":"Maintain ARL affiliation, report work accident and support investigation.","employeeResp":"Report accident and provide medical evidence.","payrollImpact":"Payroll must mark absence as occupational risk and coordinate ARL recognition.","authority":"ARL / Ministry of Health / Función Pública","sourceUrl":"https://www1.funcionpublica.gov.co/documents/34645357/34703294/Guia-gestion-incapacidades-licencias-maternidad-paternidad-v6.pdf/2ac26f86-0d76-1fd2-d354-239637a0e963","notes":"Public guide covers ARL recognition workflow; use ARL-specific official instructions for exact claim steps."},{"category":"Unemployment / Income Support","schemeName":"Mecanismo de Protección al Cesante","claimableBy":"Employee","eligible":"Unemployed worker who meets protection mechanism requirements; Superfinanciera notes support can be linked to severance savings and unemployment protection mechanism.","amount":"Support for up to six months including health and pension contributions, labour guidance and a subsidy from saved severance funds where applicable.","duration":"Up to six months after job loss, according to Superfinanciera explanation.","howToClaim":"Apply through the relevant severance fund/family compensation fund unemployment protection mechanism.","documents":"Termination evidence, ID, severance fund/compensation fund records and contribution/savings information.","deadline":"Apply after unemployment; exact process depends on the administrator.","employerResp":"Deposit severance correctly and provide employment/termination evidence when needed.","employeeResp":"Apply and maintain requir
