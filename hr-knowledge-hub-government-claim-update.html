oyerResp":"Allow statutory care leave and provide salary/employment confirmation.","employeeResp":"Provide medical and personal claim documents.","payrollImpact":"Payroll must classify care leave and coordinate EO allowance if salary is advanced.","authority":"FSIO / OASI-AVS compensation offices","sourceUrl":"https://www.bsv.admin.ch/en/eo-benefits | https://www.ahv-iv.ch/en/Social-insurances/Income-compensation-allowance-in-the-event-of-service-maternity-other-parent-caring-for-a-sick-child-and-adoption","notes":"This is a social insurance income-replacement claim, not a general employer grant."},{"category":"Short-Time Work / Wage Support","schemeName":"Short-time working compensation / Kurzarbeitsentschädigung","claimableBy":"Employer","eligible":"Employer with temporary unavoidable loss of work meeting unemployment insurance conditions; employees must consent and must generally be eligible for unemployment insurance.","amount":"Compensation covers a proportion of salary loss; SECO states short-time work compensation is the unemployment-insurance route for reduced working hours.","duration":"Temporary, subject to approval and statutory maximum periods depending on situation.","howToClaim":"Employer gives advance notification to the cantonal employment office, then submits settlement/claim to selected unemployment insurance fund after approval.","documents":"Advance notification, employee consent, working-time records, payroll/wage loss calculation and unemployment fund forms.","deadline":"SECO page states advance notification must generally be submitted at least 3 calendar days before intended compensation claim.","employerResp":"Apply before starting short-time work, maintain records and pay/settle wages correctly.","employeeResp":"Consent to short-time work and record reduced hours as required.","payrollImpact":"Directly affects payroll because employer must calculate lost working hours and compensation settlement.","authority":"SECO / Cantonal employment office / Unemployment insurance fund","sourceUrl":"https://www.secoalv.admin.ch/secoalv/en/home/menue/unternehmen/versicherungsleistungen/kurzarbeitsentschaedigung.html | https://www.arbeit.swiss/en/employers/short-time-working-compensation","notes":"Official SECO/arbeit.swiss source; exact claim rules can vary by canton and current federal measures."},{"category":"Work Injury / Accident Insurance","schemeName":"Accident insurance daily allowance and monetary benefits","claimableBy":"Employee through accident insurer; employer reports accident","eligible":"Employee covered by compulsory accident insurance who is wholly or partly unable to work due to occupational or covered non-occupational accident.","amount":"Federal Office of Public Health states daily allowance is paid from the third day after accident; monetary benefits are calculated on insured income.","duration":"During medically certified incapacity until recovery, pension transition or statutory end point.","howToClaim":"Employer reports accident to accident insurer/Suva or private insurer; insurer processes medical and income-replacement benefits.","documents":"Accident report, medical certificate, employment/salary details, insurer forms.","deadline":"Report accident promptly according to insurer/employer process; employer notification duties apply.","employerResp":"Maintain compulsory accident insurance and report workplace accidents accurately.","employeeResp":"Report accident and attend medical/insurer process.","payrollImpact":"Payroll must coordinate salary continuation with insurer daily allowance.","authority":"Federal Office of Public Health / Suva or approved accident insurer","sourceUrl":"https://www.bag.admin.ch/en/monetary-benefits-of-accident-insurance | https://www.bag.admin.ch/en/accident-insurance-benefits","notes":"Use insurer-specific portal/forms for actual submission; benefits are statutory but administered by accident insurers."}],"Taiwan":[{"category":"Maternity / Labor Insurance","schemeName":"Labor Insurance Maternity Benefits","claimableBy":"Employee / insured person","eligible":"Insured female worker with childbirth more than 280 days after joining labor insurance or premature labor more than 181 days after joining.","amount":"One lump sum equal to 2 months of average monthly insurance salary; additional payment applies for multiple births based on BLI rules.","duration":"One-time benefit per qualifying birth.","howToClaim":"Apply to Bureau of Labor Insurance online, by form/mail, through household registration office route, or through insured unit where applicable.","documents":"Maternity benefit application/payment receipt, birth certificate or household registration details, bank account and insurance information.","deadline":"Claim rights generally follow statutory benefit limitation periods; BLI forms/process should be followed.","employerResp":"Endorse or assist application when employee applies through insured unit; keep insurance salary accurate.","employeeResp":"Submit application and birth/bank details.","payrollImpact":"Public insurance benefit; payroll must not double-count it as employer-funded wages unless company policy tops up.","authority":"Bureau of Labor Insurance, Ministry of Labor","sourceUrl":"https://www.bli.gov.tw/en/0007458.html | https://www.bli.gov.tw/en/0011486.html | https://www.bli.gov.tw/EN/0016186.html","notes":"Official BLI page states the two-month average monthly insurance salary standard."},{"category":"Sick Leave / Labor Insurance","schemeName":"Labor Insurance Injury or Sickness Benefits","claimableBy":"Employee / insured person","eligible":"Insured person unable to work due to injury or sickness and meeting BLI qualification; supporting evidence required.","amount":"Benefit is calculated under Labor Insurance rules using insurance salary and qualifying conditions; occupational cases have separate occupational accident standards.","duration":"For the approved temporary incapacity period within statutory limits.","howToClaim":"Insured unit generally completes/seals the application form and sends it to BLI; individual routes apply in some cases.","documents":"Application form, medical certificate/diagnosis, attendance and leave records, salary records and other BLI-requested evidence.","deadline":"BLI application page states the insured unit should submit within the 5-year official claim period.","employerResp":"Prepare/endorse application and provide salary/attendance records.","employeeResp":"Provide medical evidence and cooperate with insured unit/BLI.","payrollImpact":"Payroll must classify unpaid sick/injury absence and coordinate BLI benefit.","authority":"Bureau of Labor Insurance, Ministry of Labor","sourceUrl":"https://www.bli.gov.tw/en/0011971.html | https://www.bli.gov.tw/en/0011494.html | https://www.bli.gov.tw/en/0007457.html","notes":"Do not mix ordinary sickness benefit with occupational accident insurance; rates and routes differ."},{"category":"Work Injury / Occupational Accident","schemeName":"Labor Occupational Accident Insurance injury/sickness benefit","claimableBy":"Employee / insured person; employer supports reporting","eligible":"Worker suffers occupational accident or occupational disease during coverage, including cases handled under Labor Occupational Accident Insurance and Protection Act.","amount":"BLI states occupational injury/sickness medical care benefits are payable at 70% of average monthly insurance salary; after one full year, reduced to 50% for maximum one further year.","duration":"Up to statutory occupational accident benefit period depending on recovery and assessment.","howToClaim":"Apply through BLI occupational accident insurance process; worker may apply directly in certain cases if employer failed to insure.","documents":"Occupational accident/injury evidence, medical documentation, attendance/leave and salary records, BLI forms.","deadline":"Follow BLI claim periods and occupational accident reporting rules.","employerResp":"Maintain required insurance and support claim records; failure to insure can still allow worker application and employer exposure.","employeeResp":"Submit medical and accident evidence.","payrollImpact":"Work injury benefits affect absence coding and may trigger employer compliance review.","authority":"Bureau of Labor Insurance, Ministry of Labor","sourceUrl":"https://www.bli.gov.tw/en/0007459.html | https://www.bli.gov.tw/en/0016059.html | https://www.bli.gov.tw/en/0010221.html","notes":"Official BLI page provides the 70% then 50% payment rule for occupational injury/sickness benefits."},{"category":"Unemployment / Employment Insurance","schemeName":"Employment Insurance Unemployment Benefits","claimableBy":"Employee / insured person","eligible":"Insured person who involuntarily leaves job, has at least 1 year of employment insurance coverage within 3 years before separation, is able/willing to work and registers with public employment service.","amount":"BLI materials state 60% of average monthly insurance salary for the 6 months before separation; dependent top-up may apply.","duration":"Up to 6 months; up to 9 months for eligible older workers or persons with disability under BLI rules.","howToClaim":"Register for job seeking with public employment service and apply for unemployment benefit through employment insurance process.","documents":"Separation/withdrawal evidence, employment insurance record, job-seeking registration and dependent evidence if claiming top-up.","deadline":"BLI states benefit is calculated from the 15th day after job-seeking registration and application process follows public employment service timing.","employerResp":"Correctly withdraw insurance and provide separation documents if required.","employeeResp":"Register, seek work and report status as required.","payrollImpact":"Payroll/HR must issue accurate termination and insurance withdrawal records.","authority":"Bureau of Labor Insurance / Public Employment Service","sourceUrl":"https://www.bli.gov.tw/en/0016409.html | https://www.bli.gov.tw/EN/0015902.html | https://www.bli.gov.tw/en/0014933.html","notes":"Employee benefit; employer role is mainly termination/insurance accuracy."},{"category":"Parental Leave / Employment Insurance","schemeName":"Employment Insurance Parental Leave Allowance","claimableBy":"Employee / insured parent","eligible":"Insured parent with at least 1 year of employment insurance enrollment, child under 3, and on parental leave without pay under Gender Equality in Employment Act.","amount":"BLI states parental leave allowance is 60% of average monthly insurance salary; additional parental leave wage subsidy may apply under official policy.","duration":"For each child, maximum period follows BLI employment insurance rules; common BLI guidance refers to up to 6 months per parent/child context.","howToClaim":"Submit parental leave allowance application and proof of parental leave without pay to BLI; combined continued insurance application may be possible.","documents":"Application form/payment receipt, proof of parental leave without pay showing dates, child details and bank details.","deadline":"Apply according to BLI parental leave allowance process and leave dates.","employerResp":"Approve/record parental leave without pay and provide proof of leave dates.","employeeResp":"Apply to BLI and maintain eligibility.","payrollImpact":"Payroll must suspend/adjust salary and social insurance handling during parental leave without pay.","authority":"Bureau of Labor Insurance, Ministry of Labor","sourceUrl":"https://www.bli.gov.tw/en/0016412.html | https://www.bli.gov.tw/en/0011969.html | https://www.bli.gov.tw/EN/0016383.html","notes":"Official BLI pages provide the 60% rule and application documents."}],"Thailand":[{"category":"Sickness / Social Security","schemeName":"Social Security sickness benefit","claimableBy":"Employee / insured person","eligible":"Insured person under Social Security who meets contribution and medical certification conditions for sickness.","amount":"Official SSO benefit rules apply; SSO English brochure describes cash benefit claims through SSO offices and benefit categories.","duration":"For approved sickness period within statutory limits.","howToClaim":"Submit benefit claim at Bangkok/provincial/branch Social Security Office or official channel where available.","documents":"SSO benefit claim form, medical certificate, ID/social security details, bank/payment information.","deadline":"SSO compensation benefit form guidance states claims can be submitted within 2 years from date of eligibility for Section 33/39 benefits.","employerResp":"Register employee and pay social security contributions correctly.","employeeResp":"Submit benefit claim and medical documents.","payrollImpact":"Payroll must coordinate employer sick pay/absence with SSO benefit, where applicable.","authority":"Social Security Office, Ministry of Labour","sourceUrl":"https://www.sso.go.th/wpr/assets/upload/files_storage/sso_th/e7ac89a170da1bcfe9d254ce91d4556e.pdf | https://www.sso.go.th/wpr/assets/upload/files_storage/sso_th/984dba64eaa1b4ceaaa45128b099bf36.pdf","notes":"Official SSO English brochure/PDF used due limited English benefit pages."},{"category":"Maternity / Social Security","schemeName":"Social Security maternity benefit","claimableBy":"Employee / insured person","eligible":"Insured person meeting Social Security maternity contribution conditions.","amount":"SSO provides maternity-related cash/medical benefits under social security; exact amount depends on current SSO rules and contribution conditions.","duration":"Per qualifying childbirth within SSO limits.","howToClaim":"Employee submits claim to Social Security Office with required birth/medical evidence.","documents":"Claim form, birth certificate/medical evidence, ID/social security details and bank/payment information.","deadline":"SSO compensation benefit guidance indicates claim submission within 2 years from eligibility for Section 33/39 benefits.","employerResp":"Maintain SSO registration and contribution records.","employeeResp":"Submit maternity claim and birth/medical documents.","payrollImpact":"Payroll must coordinate statutory maternity leave, company pay and SSO benefit.","authority":"Social Security Office, Ministry of Labour","sourceUrl":"https://www.sso.go.th/wpr/assets/upload/files_storage/sso_th/e7ac89a170da1bcfe9d254ce91d4556e.pdf | https://www.sso.go.th/wpr/assets/upload/files_storage/sso_th/984dba64eaa1b4ceaaa45128b099bf36.pdf","notes":"Thailand has a social security benefit model rather than employer reimbursement for statutory maternity leave."},{"category":"Work Injury / Compensation Fund","schemeName":"Workmen’s Compensation Fund benefits","claimableBy":"Employee; employer funds and reports through WCF/SSO","eligible":"Employee suffers accident, injury, sickness, disability, death, disappearance, organ loss or loss of working capacity due to work for employer.","amount":"WCF pays compensation including medical expenses, monthly compensation, funeral expenses and rehabilitation; rates depend on injury type and WCF assessment.","duration":"For approved medical treatment, compensation, rehabilitation or survivor period.","howToClaim":"Employer/employee reports work injury and applies through Workmen’s Compensation Fund platform/SSO channels.","documents":"Accident report, medical certificate, employer registration, wage information and WCF required forms.","deadline":"Report promptly under WCF process; exact deadline depends on compensation case and SSO instructions.","employerResp":"Pay WCF contributions, report work injury and support documents.","employeeResp":"Report injury and provide medical evidence.","payrollImpact":"Payroll must coordinate work injury absence and compensation fund benefit.","authority":"Social Security Office / Workmen’s Compensation Fund","sourceUrl":"https://wcfp.sso.go.th/ | https://wcfp.sso.go.th/web-portal/Privilege | https://www.sso.go.th/wpr/assets/upload/files_storage/sso_th/8fc8266ab89b2e81dd3e800862607bae.pdf","notes":"Official WCF portal states the fund pays compensation to employees for work-caused injury/sickness."},{"category":"Unemployment / Social Security","schemeName":"Unemployment registration and compensation","claimableBy":"Employee / insured person","eligible":"Insured person who becomes unemployed and meets SSO/Department of Employment registration and reporting conditions.","amount":"Unemployment benefit amount depends on reason for unemployment and Social Security rules.","duration":"For approved unemployment period within statutory limits.","howToClaim":"Register and report through Department of Employment unemployment system, then SSO handles benefit according to insurance status.","documents":"Unemployment registration, ID/social security details, bank account, termination/separation details.","deadline":"Register/report according to DOE unemployment system timeline; SSO benefit claim rules apply.","employerResp":"Submit accurate termination and contribution records.","employeeResp":"Register unemployment and report job-seeking status.","payrollImpact":"HR termination records affect the employee’s unemployment claim.","authority":"Department of Employment / Social Security Office","sourceUrl":"https://unemploy.doe.go.th/welcome | https://www.sso.go.th/wpr/assets/upload/files_storage/sso_th/e7ac89a170da1bcfe9d254ce91d4556e.pdf","notes":"Official DOE unemployment system is the worker registration/reporting route."}],"Turkey":[{"category":"Maternity / Social Security","schemeName":"Analık halinde geçici iş göremezlik ödeneği / Maternity temporary incapacity allowance","claimableBy":"Employee / insured person","eligible":"4/a or 4/b insured woman, or qualifying insured male’s uninsured spouse in defined maternity cases, meeting SGK conditions.","amount":"SGK temporary incapacity allowance is paid for maternity; amount is calculated under SGK temporary incapacity rules, generally based on earnings subject to premium.","duration":"Covers statutory maternity incapacity period; SGK page defines first 8 weeks after birth and 10 weeks for multiple pregnancy context in maternity case definition.","howToClaim":"Medical report and insurance data flow to SGK; insured person follows SGK/e-Devlet or SGK unit procedures for payment.","documents":"Medical report, insurance premium/service record, bank/payment details and SGK-requested evidence.","deadline":"Follow SGK maternity/incapacity process and report timing.","employerResp":"Ensure insurance premiums/service reporting are correct and process absence records.","employeeResp":"Provide medical report/payment details and follow SGK process.","payrollImpact":"Payroll must coordinate unpaid/paid maternity absence with SGK temporary incapacity payment.","authority":"SGK / Social Security Institution","sourceUrl":"https://www.sgk.gov.tr/Content/Post/1b0b3c3c-7035-4340-a450-508800fe8dd1/Analik-Halinde-Gecici-Is-Goremezlik-Odenegi-Odenmesi-2022-05-27-09-35-20 | https://www.sgk.gov.tr/Content/Post/709f7f1b-d7e7-4509-8eac-745fec3a25bf/Analik-Hali-2025-02-27-11-34-31","notes":"Use current SGK calculation service/circular for exact daily amount."},{"category":"Sick Leave / Social Security","schemeName":"Hastalık halinde geçici iş göremezlik ödeneği / Sickness temporary incapacity allowance","claimableBy":"Employee / insured person","eligible":"Insured employee medically certified as temporarily unable to work due to illness and meeting SGK premium/report conditions.","amount":"SGK states temporary incapacity allowance is a cash benefit paid to insured persons on rest report due to work accident, occupational disease, sickness or maternity; exact amount follows SGK formula.","duration":"For medically certified rest period after statutory waiting/eligibility rules.","howToClaim":"Medical rest report is processed through SGK systems; employee checks/receives payment through SGK/e-Devlet or SGK channels.","documents":"Medical rest report, insurance record, employer confirmation where required, bank/payment details.","deadline":"Follow SGK report/payment procedure; employer must process non-working declaration where required.","employerResp":"Record sick leave and complete SGK non-working/absence confirmations correctly.","employeeResp":"Comply with medical report and provide payment details.","payrollImpact":"Affects payroll because employer must avoid overpaying periods covered by SGK unless company policy tops up.","authority":"SGK / Social Security Institution","sourceUrl":"https://www.sgk.gov.tr/Content/Post/e33fffdb-16b9-4722-a9c1-2bd0a2a220d1/Hastalik-Hali-2025-02-27-11-27-26 | https://e.sgk.gov.tr/","notes":"Official SGK page defines the temporary incapacity allowance."},{"category":"Work Injury / Occupational Disease","schemeName":"Work accident and occupational disease benefits / SGK notification","claimableBy":"Employee benefit; employer reports to SGK","eligible":"Employee suffers work accident or occupational disease covered by SGK.","amount":"SGK short-term insurance benefits can include temporary incapacity allowance and permanent incapacity/death income; exact amount depends on case.","duration":"During medical incapacity and any assessed permanent/survivor benefit period.","howToClaim":"Employer reports work accident/occupational disease through SGK e-insurance notification system or official form; SGK processes benefits.","documents":"Work accident/occupational disease notification form, medical reports, workplace/employee details, wage/insurance records.","deadline":"SGK work accident page states notification generally within 3 working days; occupational disease page also refers to 3 working days from learning of the condition.","employerResp":"Report accident/occupational disease within required time and maintain insurance records.","employeeResp":"Report injury/illness and cooperate with medical assessment.","payrollImpact":"Payroll/HR must track statutory work injury absence and SGK benefit exposure; late reporting can create penalties.","authority":"SGK / Social Security Institution","sourceUrl":"https://sgd.sgk.gov.tr/Content/Post/7b0b48c6-ceba-472b-8011-c4a9b3125133/Is-Kazasi-2025-02-27-10-08-15 | https://sgd.sgk.gov.tr/Content/Post/a4b7b555-198f-41e4-a020-fa52276bda37/Meslek-Hastaligi-2025-02-27-10-32-29 | https://e.sgk.gov.tr/Download/DownloadFile?d=bf271de4-fea9-4557-a460-957858589cf9&f=31fecdc0-3584-48b7-a1bd-3c04f8b9f1ce.pdf","notes":"Official SGK sources cover report route and timing."},{"category":"Unemployment / Employment Insurance","schemeName":"İşsizlik Ödeneği / Unemployment allowance","claimableBy":"Employee / unemployed insured person","eligible":"Person who loses job involuntarily and meets unemployment insurance contribution, availability and application conditions.","amount":"İŞKUR pays monthly unemployment allowance; amount depends on insured earnings and statutory caps.","duration":"Duration depends on insured contribution history under unemployment insurance rules.","howToClaim":"Apply to İŞKUR within official timeframe after job separation, usually via İŞKUR/e-Devlet or service channels.","documents":"Termination/separation details, identity, insurance records and İŞKUR application.","deadline":"İŞKUR rules apply; late application may reduce entitlement.","employerResp":"Submit accurate separation/insurance data.","employeeResp":"Apply, remain available for work and follow İŞKUR requirements.","payrollImpact":"HR termination records directly affect employee eligibility and processing.","authority":"İŞKUR / Turkish Employment Agency","sourceUrl":"https://iskur.gov.tr/is-arayan/issizlik-sigortasi/issizlik-odenegi/","notes":"Official İŞKUR page states unemployment allowance processing/payment through İŞKUR."},{"category":"Training / Active Labour Programme","schemeName":"İŞKUR On-the-Job Training Programmes / Active Labour Programmes","claimableBy":"Employer and jobseeker/trainee","eligible":"Employers and unemployed/jobseekers participating in İŞKUR approved active labour/on-the-job training programmes.","amount":"İŞKUR programme support varies by programme; may include trainee daily payments, insurance support or employer participation under official programme rules.","duration":"Programme-specific; İŞKUR English page states on-the-job programmes are maximum 40 hours per week.","howToClaim":"Employer/jobseeker participates through İŞKUR programme application and approval process.","documents":"Employer registration, programme/training plan, participant eligibility details and İŞKUR-requested documents.","deadline":"Before programme start and according to İŞKUR approval/call dates.","employerResp":"Apply/host training and follow programme rules.","employeeResp":"Attend training/job programme and meet participation conditions.","payrollImpact":"Can reduce recruitment/training cost but is not a normal payroll reimbursement; keep İŞKUR records.","authority":"İŞKUR / Turkish Employment Agency","sourceUrl":"https://iskur.gov.tr/en/is-arayan/aktif-isgucu-programlari/isbasi-egitim-programlari/ | https://www.iskur.gov.tr/is-arayan/aktif-isgucu-programlari/","notes":"Exact support amount must be checked against the current İŞKUR programme announcement/contract."}],"Ukraine":[{"category":"Sick Leave / Social Insurance","schemeName":"Temporary incapacity / sick leave insurance payments","claimableBy":"Employee; Pension Fund handles insurance payment","eligible":"Insured employee with properly issued e-sick leave/certificate and social insurance coverage.","amount":"PFU states sick leave and maternity are paid by the Pension Fund of Ukraine; from 4 Apr 2025 rules changed for payment process.","duration":"For medically certified incapacity period according to law and e-sick leave status.","howToClaim":"Electronic sick leave is formed; employer/authorized person processes documents and PFU pays insurance funds under current procedure.","documents":"E-sick leave, employment/insurance data, wage calculation data, PFU electronic cabinet documents.","deadline":"PFU guidance states e-sick leave becomes ready for payment 7 days after closure; exact submission/payment deadlines follow PFU procedure.","employerResp":"Check e-sick leave, calculate/submit required data and pay employer-funded first days if applicable under law.","employeeResp":"Monitor e-sick leave and provide required information.","payrollImpact":"Payroll must calculate employer-paid days and PFU-funded benefit separately.","authority":"Pension Fund of Ukraine","sourceUrl":"https://www.pfu.gov.ua/2171024-z-4-kvitnya-2025-roku-budut-diyaty-novi-pravyla-oplaty-likarnyanyh/ | https://www.pfu.gov.ua/lg/360148-oplata-likarnyanogo/ | https://www.pfu.gov.ua/vn/407981-vse-pro-stroky-pryznachennya-strahovyh-vyplat-ta-podannya-povidomlennya-pro-vyplatu-koshtiv/","notes":"Use current PFU procedure because Ukraine changed sickness payment rules from April 2025."},{"category":"Maternity / Social Insurance","schemeName":"Pregnancy and childbirth benefit / maternity sick leave payment","claimableBy":"Employee / insured person","eligible":"Insured woman with pregnancy/childbirth sick leave certificate and social insurance coverage.","amount":"PFU states maternity benefit compensates loss of salary/income for the full maternity leave period.","duration":"For the maternity leave/sick-leave period stated in the medical certificate and law.","howToClaim":"Processed through PFU social insurance/e-sick leave process; employer submits/calculates required data where needed.","documents":"Pregnancy/childbirth e-sick leave, insurance/employment data, wage calculation data, PFU forms.","deadline":"PFU guidance states pregnancy and childbirth e-sick leave can reach ready-to-pay status 7 days from opening; follow PFU deadlines for insurance payment notification.","employerResp":"Process maternity sick leave and submit required PFU data; protect employment rights.","employeeResp":"Check e-sick leave/application status and provide data if requested.","payrollImpact":"Payroll must separate maternity benefit from salary and employer-funded payments.","authority":"Pension Fund of Ukraine","sourceUrl":"https://www.pfu.gov.ua/lg/359806-vyplata-za-likarnyanymy-u-zv-yazku-z-vagitnistyu-ta-pologamy/ | https://www.pfu.gov.ua/2167308-osoblyvosti-nadannya-dopomogy-po-vagitnosti-ta-pologah-dlya-fop/ | https://www.pfu.gov.ua/vn/407981-vse-pro-stroky-pryznachennya-strahovyh-vyplat-ta-podannya-povidomlennya-pro-vyplatu-koshtiv/","notes":"Employee-facing insurance benefit; employer role is payroll/e-sick leave processing."},{"category":"Unemployment / Social Insurance","schemeName":"Unemployment benefit","claimableBy":"Employee / registered unemployed person","eligible":"Person registered as unemployed with State Employment Service and meeting legal conditions.","amount":"Amount and duration depend on insurance record, wage history, reason for unemployment and wartime rules; some regional official guidance states general wartime duration is 90 calendar days for most citizens.","duration":"Duration depends on current law and martial-law rules.","howToClaim":"Register with State Employment Service online/cabinet or employment centre; comply with job-search requirements.","documents":"Identity, employment record, insurance/wage data and registration documents.","deadline":"Register promptly after unemployment; follow DCS reporting requirements.","employerResp":"Provide accurate dismissal/employment documents.","employeeResp":"Register and comply with employment service requirements.","payrollImpact":"HR termination documentation affects unemployment registration and benefit calculation.","authority":"State Employment Service of Ukraine","sourceUrl":"https://www.dcz.gov.ua/ | https://old.dcz.gov.ua/storinka/reyestraciya-bezrobitnyh | https://zap.dcz.gov.ua/novyna/yaka-zaraz-tryvalist-vyplaty-dopomogy-po-bezrobittyu-v-umovah-voyennogo-stanu-chy-ne","notes":"Use national DCS portal for current rules; wartime regional pages may provide current Q&A."},{"category":"Employer Hiring Subsidy","schemeName":"Employer compensation programmes for hiring / compensation for employment of IDPs and other groups","claimableBy":"Employer","eligible":"Employer hiring eligible groups under State Employment Service programmes, such as internally displaced persons or persons with disability workplace arrangement support.","amount":"Compensation amount depends on programme type and current government rules/calls.","duration":"Programme-specific and often linked to martial-law or targeted employment policy.","howToClaim":"Apply through State Employment Service employer services/cabinet or relevant programme page before/after hiring as required.","documents":"Employer application, employment order/contract, employee eligibility evidence, payroll/payment confirmation and bank/tax data.","deadline":"According to current programme/call rules.","employerResp":"Apply, keep employment/payroll records and meet retention conditions.","employeeResp":"Provide eligibility evidence if needed.","payrollImpact":"Can reduce hiring cost; payroll records are core evidence for reimbursement.","authority":"State Employment Service of Ukraine","sourceUrl":"https://www.dcz.gov.ua/ | https://old.dcz.gov.ua/Fond","notes":"Official DCS homepage lists employer compensation programmes; exact amount must be checked against the live programme page when claiming."},{"category":"Training / Skills Support","schemeName":"Training voucher / education support","claimableBy":"Employee / individual; sometimes employer-adjacent workforce support","eligible":"Eligible persons under State Employment Service voucher programme seeking additional education or retraining.","amount":"State Employment Service describes voucher as state funds for additional education; exact value/programme depends on current law and training path.","duration":"One approved education/training route under voucher rules.","howToClaim":"Apply through State Employment Service voucher service and approved education/training providers.","documents":"Application, identity/employment status documents, education documents, selected training programme and DCS-requested proof.","deadline":"According to State Employment Service voucher rules and programme availability.","employerResp":"May support employees/jobseekers with documents where company encourages upskilling, but not a direct employer reimbursement by default.","employeeResp":"Apply and attend approved training.","payrollImpact":"Useful for workforce planning; not usually a payroll claim unless employer has separate programme.","authority":"State Employment Service of Ukraine","sourceUrl":"https://www.dcz.gov.ua/","notes":"Official DCS homepage lists training voucher service as a popular service."}],"United Arab Emirates":[{"category":"Unemployment / Job Loss Insurance","schemeName":"Unemployment Insurance Scheme (ILOE)","claimableBy":"Employee / insured person","eligible":"UAE nationals and residents working in the federal government or private sector who are subscribed and meet the required conditions; excluded categories include investors/owners, domestic workers, temporary-contract employees, juveniles under 18 and retirees who joined a new job.","amount":"Monthly cash compensation for up to 3 months per claim; official material states compensation may reach up to AED 10,000 for category 1 and up to AED 20,000 for category 2, subject to scheme rules.","duration":"Up to 3 months per claim, with an overall coverage cap under the unemployment insurance law.","howToClaim":"Submit an ILOE claim through the official ILOE/MOHRE channels after eligible involuntary job loss.","documents":"Emirates ID, insurance subscription details, employment/termination details, bank or exchange payout details, and any ILOE-requested proof.","deadline":"File according to ILOE claim rules after job loss; eligibility requires at least 12 consecutive months of subscription.","employerResp":"No employer funding requirement for the insurance premium; ensure workers know the mandatory subscription requirement and provide employment records if needed.","employeeResp":"Subscribe personally, keep premiums paid, and submit the claim with correct payout details.","payrollImpact":"No direct payroll reimbursement; HR should communicate ILOE coverage and keep termination records clean.","authority":"MOHRE / ILOE","sourceUrl":"https://www.mohre.gov.ae/en/guidance-and-awareness-portal-new/unemployment-insurance-scheme | https://www.mohre.gov.ae/assets/download/478deddf/Federal%20Decree-Law%20No.%2013%20of%202022%20Concerning%20Unemployment%20Insurance%20Scheme.pdf.aspx","notes":"This is an insurance/social-security style claim, not an employer reimbursement."},{"category":"Work Injury / Occupational Disease","schemeName":"Work Injury Compensation","claimableBy":"Employee; employer pays statutory compensation","eligible":"Private-sector worker suffers a work-related injury or occupational disease covered under UAE labour law and related work injury resolutions.","amount":"Employer must provide medical care, paid leave and compensation. Death compensation is 24 months basic wage, minimum AED 18,000 and maximum AED 200,000; disability compensation follows official schedules.","duration":"During treatment/recovery and any disability/death compensation assessment.","howToClaim":"Employer reports the injury/illness to the medical authority and police/competent channels; compensation follows medical report and legal schedule.","documents":"Incident report, medical report, police/authority report, employment contract/basic wage evidence and compensation assessment documents.","deadline":"Report promptly according to the work-injury procedure; exact timing depends on official reporting channel and case facts.","employerResp":"Report and document the incident, arrange medical care, pay statutory compensation and keep workplace injury records.","employeeResp":"Report injury, attend medical examination and cooperate with evidence collection.","payrollImpact":"Payroll must track work-injury paid leave and compensation separately from ordinary salary.","authority":"UAE Government / MOHRE","sourceUrl":"https://u.ae/en/information-and-services/jobs/employment-in-the-private-sector/Work-Injury-Compensation-in-the-UAE | https://www.mohre.gov.ae/assets/download/337da13/Cabinet%20resolution%20No.%2033%20of%202022%20concerning%20work%20injuries%20and%20occupational%20diseases_638945724923244440.pdf.aspx","notes":"This is a statutory worker entitlement and employer obligation, not a government grant."},{"category":"Maternity / Leave Entitlement","schemeName":"Private-sector Maternity Leave","claimableBy":"Employee","eligible":"Female private-sector employee who is pregnant/has given birth and requests maternity leave under UAE Labour Law.","amount":"60 days maternity leave: first 45 days full pay and next 15 days half pay; additional unpaid or paid extensions may apply for pregnancy/child health situations supported by medical evidence.","duration":"60 days core maternity leave; official portal also describes additional leave in specified medical/child disability cases.","howToClaim":"Employee requests maternity leave from the employer; employer processes leave/pay through payroll.","documents":"Medical certificate or pregnancy/birth evidence, leave request and any medical-authority certificate for extension.","deadline":"According to employer leave process and UAE Labour Law requirements.","employerResp":"Grant statutory leave and pay correctly through payroll; keep records.","employeeResp":"Request leave and provide medical/birth evidence.","payrollImpact":"This is employer-paid leave, so there is no public reimbursement row unless a separate sector/emirate programme applies.","authority":"UAE Government / MOHRE","sourceUrl":"https://u.ae/en/information-and-services/jobs/employment-in-the-private-sector/types-of-leaves-and-entitlements-in-the-private-sector/maternity-leave","notes":"Included because it is a government-regulated employment entitlement; not a claim-back scheme."},{"category":"National Workforce Support","schemeName":"NAFIS Emirati Salary Support / Employment Support","claimableBy":"Employer and eligible UAE national employee, depending on programme route","eligible":"Eligible UAE nationals working in the private sector and participating employers, subject to NAFIS programme conditions.","amount":"Government support amount varies by programme, salary, qualification and eligibility. Use current NAFIS portal rules before quoting a number.","duration":"Programme-based; duration and renewal depend on NAFIS rules.","howToClaim":"Apply or manage through the official NAFIS platform/services.","documents":"Emirati employee identity, employment contract, salary/payroll information, company registration and any NAFIS-requested documents.","deadline":"According to NAFIS programme windows and portal requirements.","employerResp":"Register/verify employment data and comply with Emiratisation/NAFIS programme rules.","employeeResp":"Register and maintain eligibility under NAFIS rules.","payrollImpact":"Can offset labour cost for eligible Emirati hiring, but must be tracked separately from normal payroll.","authority":"NAFIS / UAE Government","sourceUrl":"https://nafis.gov.ae/","notes":"Programme details change; use live NAFIS service terms for exact support amount and eligibility."}],"United Kingdom":[{"category":"Statutory Pay Reimbursement","schemeName":"Recovery of Statutory Maternity, Paternity, Adoption, Shared Parental and Parental Bereavement Pay","claimableBy":"Employer","eligible":"Employer that has paid qualifying statutory family-related pay to eligible employees through payroll.","amount":"Most employers can reclaim 92% of statutory payments; small employers may reclaim 100% plus compensation/relief where eligible under HMRC rules.","duration":"For each statutory pay period paid to the employee.","howToClaim":"Reclaim through payroll/HMRC PAYE process; request advance funding from HMRC if unable to afford payments.","documents":"Payroll records, statutory pay calculations, employee eligibility evidence, MATB1/notice/forms where relevant, PAYE records.","deadline":"Through normal PAYE reporting/payment cycle or HMRC advance funding process.","employerResp":"Pay employee correctly, keep records and reclaim through HMRC.","employeeResp":"Provide notice/evidence for leave and statutory pay entitlement.","payrollImpact":"Direct payroll reclaim; affects employer PAYE/NIC cashflow and payroll reporting.","authority":"HMRC / GOV.UK","sourceUrl":"https://www.gov.uk/recover-statutory-payments | https://www.gov.uk/employers-maternity-pay-leave/help-with-statutory-pay","notes":"Core UK employer reimbursement route for statutory family pay."},{"category":"Payroll Tax Relief","schemeName":"Employment Allowance","claimableBy":"Employer","eligible":"Eligible UK employer with employer Class 1 National Insurance liability, subject to HMRC eligibility restrictions.","amount":"Reduce employer Class 1 National Insurance liability by up to GBP 10,500 per tax year.","duration":"Annual tax-year allowance until the cap is used or the tax year ends.","howToClaim":"Claim through payroll software by submitting the Employment Allowance indicator in the Employer Payment Summary.","documents":"PAYE reference, payroll/NIC liability records and eligibility confirmation.","deadline":"Can be claimed during the tax year through payroll; previous-year claims may be possible under HMRC rules.","employerResp":"Check eligibility, claim once per employer/group as required and keep records.","employeeResp":"No employee action.","payrollImpact":"Reduces employer NIC cost and payroll cashflow.","authority":"HMRC / GOV.UK","sourceUrl":"https://www.gov.uk/claim-employment-allowance","notes":"Amount is current official GOV.UK figure at research date."},{"category":"Workplace Disability Support","schemeName":"Access to Work Grant","claimableBy":"Employee primarily; employer may receive advice/support route","eligible":"Employee or self-employed person with a disability or health condition needing support to start, stay in or return to work.","amount":"Grant support is needs-based; may cover specialist equipment, support workers, travel-to-work support or other approved support above normal reasonable adjustments.","duration":"Case-by-case award period depending on needs and DWP decision.","howToClaim":"Apply through GOV.UK Access to Work service; DWP assesses needs and award.","documents":"Identity/contact information, job/employer details, health condition/disability information and support-cost evidence.","deadline":"Apply when support is needed; timing affects whether costs can be considered.","employerResp":"Provide reasonable adjustments and cooperate with DWP recommendations/claims where employer action is needed.","employeeResp":"Apply and provide evidence.","payrollImpact":"Can reduce workplace support costs but is not normal payroll reimbursement.","authority":"Department for Work and Pensions / GOV.UK","sourceUrl":"https://www.gov.uk/access-to-work","notes":"Grant does not replace employer duty to make reasonable adjustments."},{"category":"Training / Apprenticeship Funding","schemeName":"Apprenticeship Funding Rules - England","claimableBy":"Employer / training provider","eligible":"Employer accessing government apprenticeship funding through the apprenticeship service and using eligible providers/standards under current funding rules.","amount":"Government funding supports eligible apprenticeship training and assessment costs according to funding-band and employer contribution rules.","duration":"For eligible apprenticeship duration and assessment period.","howToClaim":"Use the apprenticeship service and follow current DfE funding rules and employer agreement.","documents":"Apprenticeship agreement, training plan, provider records, apprentice eligibility, evidence pack and employer agreement records.","deadline":"According to apprenticeship start date and funding-rule year.","employerResp":"Follow funding rules, maintain evidence, pay required contributions and use approved provider.","employeeResp":"Participate in training and meet apprenticeship eligibility/learning requirements.","payrollImpact":"Training funding reduces/structures employer training cost; payroll must handle apprentice pay separately.","authority":"Department for Education / GOV.UK","sourceUrl":"https://www.gov.uk/government/publications/apprenticeship-funding-rules-and-assessment-plan-guidance-2026-to-2027","notes":"England-specific; devolved nations have separate rules."},{"category":"Work Injury / Industrial Disease","schemeName":"Industrial Injuries Disablement Benefit","claimableBy":"Employee","eligible":"Worker disabled because of an accident at work or certain prescribed occupational diseases; self-employed accident claims generally excluded under GOV.UK guidance.","amount":"Weekly benefit depends on assessed level of disablement and published benefit rates.","duration":"Ongoing or fixed according to assessment/award decision.","howToClaim":"Claim using the official IIDB claim route/form through DWP/GOV.UK.","documents":"Claim form, employment/work accident details, medical evidence and supporting documents.","deadline":"Claim after the accident/disease; timing can affect payment start date.","employerResp":"Provide work accident/employment details where needed.","employeeResp":"Submit claim and medical/work evidence.","payrollImpact":"Employee benefit, not an employer payroll reimbursement.","authority":"DWP / GOV.UK","sourceUrl":"https://www.gov.uk/industrial-injuries-disablement-benefit","notes":"Not the same as employer liability insurance or civil compensation."}],"United States":[{"category":"Hiring Tax Credit","schemeName":"Work Opportunity Tax Credit (WOTC)","claimableBy":"Employer","eligible":"Employer hiring individuals from IRS/DOL targeted groups who have faced significant barriers to employment and obtaining required certification.","amount":"Federal tax credit generally based on qualified wages; IRS publication states in general WOTC is 40% of up to USD 6,000 of wages for a qualifying individual, with variations by target group.","duration":"Generally first-year wages, with special rules for some groups.","howToClaim":"Obtain certification from the State Workforce Agency, then claim on IRS Form 5884 and general business credit forms.","documents":"Pre-screening/certification information, State Workforce Agency certification, payroll wage records and IRS forms.","deadline":"Certification must be requested within required WOTC timelines; tax claim follows federal income tax return rules.","employerResp":"Pre-screen applicants lawfully, request certification, keep wage records and file tax forms.","employeeResp":"Provide required eligibility/certification information if applicable.","payrollImpact":"Reduces federal tax liability, not payroll cash reimbursement.","authority":"IRS / U.S. Department of Labor","sourceUrl":"https://www.irs.gov/businesses/small-businesses-self-employed/work-opportunity-tax-credit | https://www.irs.gov/forms-pubs/about-form-5884","notes":"Availability and target groups should be checked before use because credits can expire or be extended by Congress."},{"category":"Paid Leave Tax Credit","schemeName":"Employer Credit for Paid Family and Medical Leave - IRC Section 45S","claimableBy":"Employer","eligible":"Eligible employer that provides paid family and medical leave to qualifying employees under a written policy meeting IRS requirements.","amount":"Credit equals a percentage of wages paid while qualifying employees are on family and medical leave; IRS states the credit applies to taxable years beginning after 31 Dec 2017 and before 1 Jan 2026 unless extended.","duration":"For qualifying paid family/medical leave wages in eligible tax years.","howToClaim":"Calculate and claim using IRS Form 8994 and income tax return/general business credit process.","documents":"Written paid leave policy, wage records, leave records, employee eligibility evidence and Form 8994 support.","deadline":"Annual tax return filing; currently time-limited unless extended.","employerResp":"Maintain compliant paid leave policy and records; file tax forms.","employeeResp":"Provide leave documentation under employer policy.","payrollImpact":"Tax-credit planning item; not a statutory payroll reimbursement programme.","authority":"IRS","sourceUrl":"https://www.irs.gov/newsroom/section-45s-employer-credit-for-paid-family-and-medical-leave-faqs | https://www.irs.gov/forms-pubs/about-form-8994","notes":"Flagged because current IRS page states the credit period ends before 1 Jan 2026 unless law changes."},{"category":"Health Coverage Tax Credit","schemeName":"Small Business Health Care Tax Credit","claimableBy":"Employer","eligible":"Eligible small employer providing employee health care coverage through qualifying arrangements and meeting IRS size/wage/contribution rules.","amount":"Credit may offset part of employer health insurance premium cost; generally claimed for no more than two consecutive taxable years.","duration":"Up to two consecutive taxable years when eligible.","howToClaim":"Claim on annual income tax return with IRS Form 8941; tax-exempt eligible employers use applicable IRS process.","documents":"Health insurance premium records, employee counts/wages, contribution records and Form 8941 calculation.","deadline":"Annual tax return filing deadline.","employerResp":"Maintain health coverage and records; calculate/claim accurately.","employeeResp":"No employee claim action.","payrollImpact":"Reduces tax liability/benefit cost for eligible small employers.","authority":"IRS","sourceUrl":"https://www.irs.gov/affordable-care-act/employers/small-business-health-care-tax-credit-and-the-shop-marketplace | https://www.irs.gov/forms-pubs/about-form-8941","notes":"Not all small employers qualify; average wage and employee-count limits apply."},{"category":"Unemployment Insurance","schemeName":"State Unemployment Insurance Benefits","claimableBy":"Employee; state UI agency administers","eligible":"Worker unemployed through no fault of their own and meeting the state unemployment insurance rules in the state where they worked.","amount":"Amount and duration are state-specific; federal DOL directs claimants to the state UI programme.","duration":"State-specific benefit weeks and amount.","howToClaim":"File with the unemployment insurance programme in the state where the employee worked, usually online/phone/in person.","documents":"SSN/identity, employer and wage history, separation reason and state-required documents.","deadline":"DOL says to contact the state UI programme as soon as possible after becoming unemployed.","employerResp":"Provide separation/wage information to state agency when requested and pay applicable UI taxes.","employeeResp":"File claim with correct state UI agency and certify eligibility.","payrollImpact":"Employer payroll impact is mainly state UI tax and wage/separation reporting, not a direct federal claim.","authority":"U.S. Department of Labor / State UI Agencies","sourceUrl":"https://www.dol.gov/general/topic/unemployment-insurance | https://www.dol.gov/agencies/eta/feature-unemployment","notes":"Highly state-specific; matrix should not quote one national benefit amount."},{"category":"Work Injury / Workers Compensation","schemeName":"Workers Compensation / FECA and State Systems","claimableBy":"Employee; employer/state/federal system depending on worker type","eligible":"Private/state/local workers generally use state workers compensation boards; federal employees may file under FECA through ECOMP.","amount":"Medical and wage-loss benefits depend on state law or federal FECA rules.","duration":"Case-based during injury, recovery, disability or survivor benefit period.","howToClaim":"Private/state/local workers contact state workers compensation board; federal employees may file through ECOMP.","documents":"Accident report, medical evidence, employer details, wage records and state/federal claim forms.","deadline":"State/federal deadlines apply; report promptly after injury.","employerResp":"Maintain required workers compensation coverage and report/respond to claims.","employeeResp":"Report injury and file with correct state/federal system.","payrollImpact":"Payroll impact depends on paid leave, wage continuation and insurance premium/experience rating.","authority":"U.S. Department of Labor / State Workers Compensation Boards","sourceUrl":"https://www.dol.gov/general/topic/workcomp | https://www.ecomp.dol.gov/","notes":"No single national private-sector workers compensation rate; administered mainly at state level."}],"Uruguay":[{"category":"Maternity / Parental","schemeName":"Subsidio por maternidad","claimableBy":"Employee, paid by BPS","eligible":"Covered worker with valid activity/coverage during maternity leave under BPS rules.","amount":"BPS states the subsidy replaces salary and covers the 98-day maternity leave period.","duration":"98 days of maternity leave for common maternity subsidy; special cases may differ.","howToClaim":"Use BPS maternity subsidy process; employer sends required employment/wage data where applicable.","documents":"Identity, employment/contribution data, medical/pregnancy/birth evidence and employer data requested by BPS.","deadline":"According to BPS process and leave timing.","employerResp":"Provide wage/activity data to BPS and manage leave records.","employeeResp":"Ensure medical/identity information is submitted and coordinate with employer/BPS.","payrollImpact":"Salary replacement is paid by BPS, so payroll should avoid double-paying normal salary unless required by policy.","authority":"BPS","sourceUrl":"https://www.bps.gub.uy/11371/subsidio-por-maternidad.html | https://www.bps.gub.uy/10385/subsidios-por-maternidad-y-paternidad.html","notes":"BPS also publishes paternity and half-time care subsidy information."},{"category":"Sickness Benefit","schemeName":"Subsidio por enfermedad","claimableBy":"Employee, paid by BPS","eligible":"Active worker medically unable to work due to sickness or work accident, subject to BPS coverage rules.","amount":"BPS pays a sickness subsidy; public page states BPS can cover up to one year, with possible one-year extension or two years alternated within the last four years for the same condition.","duration":"Up to one year, extendable under BPS rules.","howToClaim":"Medical certification/claim is handled through BPS process; employee must inform employer.","documents":"Medical certification, identity and employment/contribution data.","deadline":"According to medical certification and BPS process; employee must inform employer after certification.","employerResp":"Track medical absence and consult BPS worker-subsidy status where available.","employeeResp":"Inform employer and comply with BPS certification process.","payrollImpact":"Payroll should coordinate salary suspension/replacement with BPS subsidy period.","authority":"BPS","sourceUrl":"https://www.bps.gub.uy/4774/subsidio-por-enfermedad.html | https://www.bps.gub.uy/23650/como-se-inicia-el-tramite-de-subsidio-por-enfermedad.html","notes":"BPS services allow employers to consult worker subsidy/certification status."},{"category":"Unemployment Benefit","schemeName":"Subsidio por desempleo","claimableBy":"Employee, paid by BPS","eligible":"Private-sector worker covered by BPS rules who loses employment involuntarily through dismissal or contract end.","amount":"BPS grants unemployment subsidy; exact amount/duration depends on contribution/wage history and current rules.","duration":"Depends on BPS unemployment-subsidy rules and worker circumstances.","howToClaim":"Apply through BPS unemployment subsidy service.","documents":"Identity, employment termination details, work/contribution data and any requested documents.","deadline":"Apply according to BPS deadlines after job loss; BPS service page should be checked live.","employerResp":"Provide termination and payroll information where requested.","employeeResp":"Submit unemployment claim and required evidence.","payrollImpact":"Employer should correctly report termination to avoid delays.","authority":"BPS","sourceUrl":"https://www.bps.gub.uy/4802/subsidio-por-desempleo-por-despido.html | https://www.bps.gub.uy/16873/subsidio-por-desempleo.html","notes":"Amount not forced because it is worker-specific and BPS-rule based."},{"category":"Work Injury / Occupational Disease","schemeName":"Banco de Seguros del Estado Work Accident Coverage","claimableBy":"Employee; BSE insurance route","eligible":"Worker suffers work accident or occupational disease covered by the mandatory BSE system.","amount":"Benefits/indemnity depend on BSE/official law and case assessment. For registered domestic workers, BPS notes BSE work accident insurance is automatically contracted and charged through BPS.","duration":"Case-based.","howToClaim":"Accidents are reported to BSE in the form determined by BSE; BPS handles related registration/contribution channels for certain sectors.","documents":"Accident report, medical evidence, employment details and insurance/registration records.","deadline":"Report according to BSE rules; update work address/details where required.","employerResp":"Maintain coverage/registration and report accident to BSE.","employeeResp":"Report accident and comply with medical/claim process.","payrollImpact":"Work injury payments/insurance should be separated from ordinary payroll.","authority":"BPS / Banco de Seguros del Estado","sourceUrl":"https://www.bps.gub.uy/7319/cobertura-del-banco-de-seguros-del-estado.html | https://www.bps.gub.uy/bps/file/3574/2/ley16074_seguros_de_accidente_de_trabajo_y_enfermedades_profesionales._reglamentacion.pdf","notes":"Public BPS p forms and contribution data.","deadline":"According to VSS administrative procedure after sickness leave.","employerResp":"Collect medical documents, prepare benefit list and submit/coordinate with VSS.","employeeResp":"Provide medical certificate and notify employer.","payrollImpact":"Payroll must not duplicate VSS sickness benefit unless company policy tops up.","authority":"Vietnam Social Security / Government Portal","sourceUrl":"https://vanban.chinhphu.vn/?docid=211199&pageid=27160 | https://baohiemxahoi.gov.vn/tintuc/Pages/linh-vuc-bao-hiem-xa-hoi.aspx?CateID=168&ItemID=25667","notes":"Exact days and rates should be checked against current VSS rules and employee contribution history."},{"category":"Work Injury / Occupational Disease","schemeName":"Compulsory Occupational Accident and Disease Insurance","claimableBy":"Employee; employer submits/coordinates","eligible":"Employee suffers occupational accident or disease covered by compulsory insurance and occupational safety law.","amount":"Benefits can include one-time/monthly allowance, medical/rehabilitation support and other statutory support depending on impairment and legal rules.","duration":"Case-based based on medical assessment and statutory entitlement.","howToClaim":"Employee/employer prepares claim dossier to VSS according to administrative procedure for occupational accident/disease benefits.","documents":"Accident investigation/record, medical assessment, treatment documents, employer documents and VSS forms.","deadline":"According to VSS/occupational safety procedures; report and document accident promptly.","employerResp":"Report/investigate workplace accident, prepare documents and maintain compulsory insurance compliance.","employeeResp":"Attend medical assessment and provide required documents.","payrollImpact":"Payroll/HR must track work injury absence and insurance benefit separately from normal wage.","authority":"Vietnam Social Security / Government Portal","sourceUrl":"https://vanban.chin g on route","eligible":"Eligible employers, workers or participants under government job-creation support programmes and implementing decrees.","amount":"Support amount varies by policy route, locality and programme; Government Portal lists Decree 338/2025 guiding job creation support policies.","duration":"Programme-based.","howToClaim":"Apply through relevant labour/employment authority or public-service route under active programme rules.","documents":"Programme application, business/worker eligibility documents, training/employment plan and authority-requested evidence.","deadline":"According to active programme/call.","employerResp":"Check programme eligibility, apply and retain records.","employeeResp":"Participate in approved employment/training activities where applicable.","payrollImpact":"May affect hiring/training budgets; not a standard automatic payroll claim.","authority":"Government Portal / labour-employment authorities","sourceUrl":"https://vanban.chinhphu.vn/?docid=214560&pageid=27160 | https://vanban.chinhphu.vn/?docid=216288&pageid=27160","notes":"Included as a policy route because exact active support is programme/locality based."}]};

const ALL_KEYS = Object.keys(CLAIMS_DATA);

function getRegion(k) { return REGION_MAP[k] || 'Other'; }
function getISO(k) { return ISO_MAP[k] || ''; }

function escHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function getBroadGroup(cat) {
  const c = (cat || '').toLowerCase();
  if (/maternity|parental|childcare|paternity|adoption|birth|infant|child\/|family.*care|care leave|parental.*leave/.test(c)) return 'Maternity & Parental';
  if (/sick.*leave|sickness|disability|invalidity|health coverage|medical leave|incapacity|work incapacity|sick pay/.test(c)) return 'Sick Leave & Disability';
  if (/work injury|accident|occupational/.test(c)) return 'Work Injury';
  if (/unemployment|short.time work|insolvency|wage protection|worker entitlement|temporary unemployment/.test(c)) return 'Unemployment & Wage Support';
  if (/pension|retirement|old age|provident fund/.test(c)) return 'Pension & Retirement';
  if (/death|funeral|survivor|dependent.*\//i.test(c)) return 'Death & Survivors';
  if (/hiring|training|apprenticeship|career conversion|employment support|job creation|wage subsidy|tax credit|tax incentive|payroll tax|education|scholarship|internship|upskilling|skills grant|skills sub/.test(c)) return 'Employment & Training';
  return 'Other';
}

const BROAD_ORDER = [
  'Maternity & Parental',
  'Sick Leave & Disability',
  'Work Injury',
  'Unemployment & Wage Support',
  'Pension & Retirement',
  'Death & Survivors',
  'Employment & Training',
  'Other'
];

function getClaimableByClass(text) {
  const t = (text || '').toLowerCase();
  const hasEmployee = t.includes('employee');
  const hasEmployer = t.includes('employer');
  if (hasEmployee && hasEmployer) return 'tag-cb-both';
  if (hasEmployer) return 'tag-cb-employer';
  if (hasEmployee) return 'tag-cb-employee';
  if (t.includes('beneficiar') || t.includes('family') || t.includes('dependent')) return 'tag-cb-beneficiary';
  return 'tag-cb-other';
}

function getClaimableByLabel(text) {
  const t = (text || '').toLowerCase();
  const hasEmployee = t.includes('employee');
  const hasEmployer = t.includes('employer');
  if (hasEmployee && hasEmployer) return 'Employee &amp; Employer';
  if (hasEmployer) return 'Employer';
  if (hasEmployee) return 'Employee';
  if (t.includes('beneficiar') || t.includes('family')) return 'Beneficiary';
  return text ? escHtml(text.split(';')[0].trim().substring(0, 30)) : 'Other';
}

function renderClaim(c) {
  const cbClass = getClaimableByClass(c.claimableBy);
  const cbLabel = getClaimableByLabel(c.claimableBy);

  let detailsHtml = '';
  if (c.eligible)      detailsHtml += `<div class="detail-block"><div class="detail-label">Who Is Eligible</div><div class="detail-value">${escHtml(c.eligible)}</div></div>`;
  if (c.amount)        detailsHtml += `<div class="detail-block"><div class="detail-label">Amount / Rate</div><div class="detail-value">${escHtml(c.amount)}</div></div>`;
  if (c.duration)      detailsHtml += `<div class="detail-block detail-full"><div class="detail-label">Duration / Limit</div><div class="detail-value">${escHtml(c.duration)}</div></div>`;
  if (c.claimableBy)   detailsHtml += `<div class="detail-block detail-full"><div class="detail-label">Claimable By</div><div class="detail-value">${escHtml(c.claimableBy)}</div></div>`;
  if (c.howToClaim)    detailsHtml += `<div class="detail-block detail-full"><div class="detail-label">How to Claim</div><div class="detail-value">${escHtml(c.howToClaim)}</div></div>`;
  if (c.documents)     detailsHtml += `<div class="detail-block detail-full"><div class="detail-label">Required Documents</div><div class="detail-value">${escHtml(c.documents)}</div></div>`;
  if (c.deadline)      detailsHtml += `<div class="detail-block"><div class="detail-label">Submission Deadline</div><div class="detail-value">${escHtml(c.deadline)}</div></div>`;
  if (c.authority)     detailsHtml += `<div class="detail-block"><div class="detail-label">Government Authority</div><div class="detail-value">${escHtml(c.authority)}</div></div>`;
  if (c.employerResp)  detailsHtml += `<div class="detail-block detail-full"><div class="detail-label">Employer Responsibility</div><div class="detail-value">${escHtml(c.employerResp)}</div></div>`;
  if (c.employeeResp)  detailsHtml += `<div class="detail-block detail-full"><div class="detail-label">Employee Responsibility</div><div class="detail-value">${escHtml(c.employeeResp)}</div></div>`;
  if (c.payrollImpact) detailsHtml += `<div class="detail-block detail-full"><div class="detail-label">Payroll / HR Impact</div><div class="detail-value">${escHtml(c.payrollImpact)}</div></div>`;
  if (c.notes)         detailsHtml += `<div class="detail-block detail-full"><div class="detail-label">Notes</div><div class="detail-value">${escHtml(c.notes)}</div></div>`;

  let sourceHtml = '';
  if (c.sourceUrl) {
    const urls = c.sourceUrl.split('\n').map(u => u.trim()).filter(Boolean);
    if (urls.length) {
      sourceHtml = `<div class="detail-block detail-full"><div class="detail-label">Official Source</div><div class="detail-value">${
        urls.map((u, i) => `<a href="${escHtml(u)}" target="_blank" rel="noopener" class="source-link">Source ${i + 1} &#8599;</a>`).join('')
      }</div></div>`;
    }
  }

  return `<div class="benefit-card">
    <div class="benefit-header">
      <span class="benefit-name">${escHtml(c.schemeName || '—')}</span>
      <span class="mandatory-tag ${cbClass}">${cbLabel}</span>
    </div>
    <div class="benefit-details">${detailsHtml}${sourceHtml}</div>
  </div>`;
}

function getFilteredKeys() {
  const search = (document.getElementById('sidebarSearch').value || '').toLowerCase();
  const region = document.getElementById('regionFilter').value;
  return ALL_KEYS.filter(k => {
    if (search && !k.toLowerCase().includes(search)) return false;
    if (region && !getRegion(k).includes(region)) return false;
    return true;
  });
}

function buildSidebar(filtered) {
  const list = document.getElementById('countryList');
  if (!filtered.length) { list.innerHTML = '<div class="sidebar-empty">No results found</div>'; return; }

  let html = '';
  const sorted = filtered.slice().sort((a, b) => a.localeCompare(b));
  sorted.forEach(k => {
    const claims = CLAIMS_DATA[k] || [];
    html += `<div class="accordion-item">
      <div class="sb-row${currentKey === k ? ' active' : ''}" data-key="${escHtml(k)}">
        <span class="sb-code">${escHtml(getISO(k))}</span>
        <span class="sb-label">${escHtml(k)}</span>
        <span class="sb-badge">${claims.length}</span>
      </div>
    </div>`;
  });

  list.innerHTML = html;
}

function filterSidebar() { buildSidebar(getFilteredKeys()); }

function clearFilters() {
  document.getElementById('sidebarSearch').value = '';
  document.getElementById('regionFilter').value = '';
  buildSidebar(ALL_KEYS);
}

document.getElementById('countryList').addEventListener('click', function(e) {
  const row = e.target.closest('.sb-row');
  if (!row || !row.dataset.key) return;
  currentKey = row.dataset.key;
  currentBroadCat = 'all';
  mobileCloseDrawer();
  buildSidebar(getFilteredKeys());
  renderDetail(currentKey);
});

document.getElementById('mainContent').addEventListener('click', function(e) {
  const pill = e.target.closest('.cat-pill');
  if (!pill || !currentKey) return;
  currentBroadCat = pill.dataset.cat;
  renderDetail(currentKey);
});

function renderDetail(key) {
  const claims = CLAIMS_DATA[key];
  if (!claims) return;

  const region = getRegion(key);
  const metaParts = [region, `${claims.length} claim${claims.length !== 1 ? 's' : ''}`];

  const broadCount = {};
  claims.forEach(c => { const bg = getBroadGroup(c.category); broadCount[bg] = (broadCount[bg] || 0) + 1; });
  const presentCats = BROAD_ORDER.filter(g => broadCount[g]);

  let pillsHtml = `<div class="cat-pills">
    <span class="cat-pill${currentBroadCat === 'all' ? ' active' : ''}" data-cat="all">All (${claims.length})</span>`;
  presentCats.forEach(g => {
    pillsHtml += `<span class="cat-pill${currentBroadCat === g ? ' active' : ''}" data-cat="${escHtml(g)}">${escHtml(g)} (${broadCount[g]})</span>`;
  });
  pillsHtml += '</div>';

  const grouped = {};
  claims.forEach(c => {
    const bg = getBroadGroup(c.category);
    if (!grouped[bg]) grouped[bg] = {};
    if (!grouped[bg][c.category]) grouped[bg][c.category] = [];
    grouped[bg][c.category].push(c);
  });

  let contentHtml = '';
  BROAD_ORDER.forEach(bg => {
    if (!grouped[bg]) return;
    if (currentBroadCat !== 'all' && currentBroadCat !== bg) return;
    Object.keys(grouped[bg]).sort().forEach(rawCat => {
      contentHtml += `<div class="cat-group">
        <div class="cat-group-label">${escHtml(rawCat)}</div>
        ${grouped[bg][rawCat].map(c => renderClaim(c)).join('')}
      </div>`;
    });
  });

  if (!contentHtml) contentHtml = '<div class="no-results">No claims in this category.</div>';

  document.getElementById('mainContent').innerHTML = `
    <div class="detail-header">
      <div>
        <h1>${escHtml(key)}</h1>
        <div class="meta">${metaParts.join(' &middot; ')}</div>
      </div>
      <div class="claim-count">${claims.length}<span>claims</span></div>
    </div>
    ${pillsHtml}
    <div id="claimContent">${contentHtml}</div>`;
}

function mobileOpenDrawer() {
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('sidebarOverlay').classList.add('active');
}
function mobileCloseDrawer() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('expanded'); }

buildSidebar(ALL_KEYS);
</script>
<script src="assets/lang/lang-loader.js"></script>
</body>
