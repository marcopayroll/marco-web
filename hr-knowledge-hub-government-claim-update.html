e is HKD 8,000 on completion.","duration":"OJT allowance generally payable for 6 to 12 months.","howToClaim":"Employer participates through YETP / Labour Department process and submits OJT allowance application, including online system where available.","documents":"Employer/trainee details, OJT agreement, payroll records, training completion/termination records.","deadline":"Programme-specific; submit according to YETP manual and Labour Department instructions.","employerResp":"Provide OJT vacancies, mentoring and payroll/training records; submit allowance claims.","employeeResp":"Participate in training/employment and complete required programme steps.","payrollImpact":"Reduces cost of youth hiring/training but employer must still pay wages and comply with employment law.","authority":"Labour Department","sourceUrl":"https://www.labour.gov.hk/eng/service/content6.htm | https://www.yes.labour.gov.hk/Download/Employer/emp_ojt_download_manual_en.pdf","notes":"Official YETP page confirms allowance amount and period."},{"category":"Training / Education Fee Reimbursement","schemeName":"Continuing Education Fund (CEF)","claimableBy":"Employee / individual learner","eligible":"Hong Kong resident aged 18 or above at course commencement and meeting residence requirements; course must be CEF reimbursable.","amount":"Unlimited claims up to lifetime maximum of HKD 25,000 reimbursement.","duration":"Claim within one year after successful completion of each CEF reimbursable course.","howToClaim":"Submit online application and required documents via eWFSFAA / CEF channels.","documents":"Course proof, attendance/assessment evidence, payment receipts and identity/residence evidence.","deadline":"Within one year upon successful completion of CEF reimbursable course.","employerResp":"Generally none, unless employer helps with training administration separately.","employeeResp":"Select eligible course, meet attendance/assessment rules and submit reimbursement claim.","payrollImpact":"Not payroll-funded, but HR can guide employees on training reimbursement options.","authority":"Working Family and Student Financial Assistance Agency","sourceUrl":"https://www.wfsfaa.gov.hk/en/ce/cef/overview.php | https://www.wfsfaa.gov.hk/en/ce/cef/procedures_range2.php","notes":"Official page states age, maximum amount and claim timing."},{"category":"Work Injury / Occupational Disease","schemeName":"Employees' Compensation claim under Employees' Compensation Ordinance","claimableBy":"Employee; employer reports and pays statutory compensation / insurer handles covered claim","eligible":"Employee injured by accident arising out of and in course of employment, or suffering prescribed occupational disease.","amount":"Statutory compensation and medical/work injury payments depend on injury, incapacity and ordinance calculation; employer is liable and insurance is mandatory.","duration":"For certified work injury/occupational disease claim period.","howToClaim":"Employer reports accident using statutory forms; claim handled through Labour Department and employer/insurer process.","documents":"Accident notice, medical certificates, incapacity assessment, wage records and insurance information.","deadline":"Report promptly; use prescribed forms and Labour Department guidance.","employerResp":"Maintain employees compensation insurance, report accident, keep wage/medical records and coordinate insurer.","employeeResp":"Report injury and provide medical evidence.","payrollImpact":"Track as work injury absence; payroll must support wage/compensation calculations.","authority":"Labour Department","sourceUrl":"https://www.labour.gov.hk/eng/public/content2_7.htm | https://www.labour.gov.hk/eng/legislat/content1.htm | https://www.gov.hk/en/residents/employment/employee/workinjury.htm","notes":"No-fault statutory compensation system; not a grant."}],"Hungary":[{"category":"Maternity / Infant Care","schemeName":"Csecsemőgondozási díj (CSED) - infant care fee","claimableBy":"Employee / insured parent","eligible":"Eligible insured person around childbirth with qualifying insurance/income history under health insurance rules.","amount":"100% of calendar-day base / income base, except reduced to 70% in specific cases if earning activity starts after 90 days from birth.","duration":"Up to the 168th day from the child's birth, with special rules for premature children.","howToClaim":"Submit the official CSED application form to the health insurance body / payer unit.","documents":"CSED application form, employment/income details, social security/TAJ details, birth/pregnancy evidence as required.","deadline":"Apply when maternity/childbirth entitlement starts; follow Hungarian State Treasury / employer payer-unit process.","employerResp":"If operating as social insurance payer, process/forward the claim and income data correctly.","employeeResp":"Submit application and required evidence.","payrollImpact":"Payroll must provide insurance/wage data and coordinate maternity absence.","authority":"Magyar Államkincstár / health insurance cash benefits","sourceUrl":"https://www.allamkincstar.gov.hu/csaladok-tamogatasa/gyermekvallalas-tamogatasa/csecsemogondozasi-dij-csed-","notes":"Official page provides duration, calculation base and 100% rate."},{"category":"Childcare / Parental Benefit","schemeName":"Gyermekgondozási díj (GYED) - child-care fee","claimableBy":"Employee / insured parent","eligible":"Insurance-linked parent raising a child after CSED period, subject to Hungarian family/health insurance rules.","amount":"Amount depends on insured income and statutory rules; official source should be checked for current cap and calculation.","duration":"Generally follows infant-care period and can run while child-care eligibility continues under GYED rules.","howToClaim":"Apply through Hungarian State Treasury / health insurance cash-benefit process or employer payer unit where applicable.","documents":"Application form, birth/child details, insurance history and income/employment evidence.","deadline":"Apply under official GYED process once eligibility starts.","employerResp":"Provide/verify income and insurance data, especially where employer is a payer unit.","employeeResp":"Submit application and child/insurance evidence.","payrollImpact":"HR/payroll needs to manage parental leave status and data for state benefit calculation.","authority":"Magyar Államkincstár","sourceUrl":"https://www.allamkincstar.gov.hu/ | https://navigatehungary.hu/en/familybenefits/csedgyedgyesgyeten/familybenefitsgeneral","notes":"Used official Treasury portal plus official public information gateway; verify cap before operational use."},{"category":"Sickness / Sick Pay","schemeName":"Betegszabadság and Táppénz","claimableBy":"Employee / insured person","eligible":"Employee covered by Labour Code/public employment rules may receive employer-paid sick leave; insured person may receive táppénz if insured, paying social security contribution and medically certified unable to work.","amount":"Employer-paid sick leave is 70% of absence pay; táppénz amount depends on social insurance rules.","duration":"Sick leave/táppénz period depends on medical incapacity and statutory limits.","howToClaim":"Medical certificate; táppénz handled through health insurance / employer payer-unit process.","documents":"Medical certificate, employment/insurance details and income data.","deadline":"Submit medical evidence promptly; exact benefit claim process depends on payer unit.","employerResp":"Pay sick leave when applicable and provide data/process benefit claim if payer unit.","employeeResp":"Obtain medical certification and cooperate with claim process.","payrollImpact":"Payroll must distinguish employer sick leave from health-insurance táppénz.","authority":"Magyar Államkincstár","sourceUrl":"https://www.allamkincstar.gov.hu/egeszsegbiztositas/Betegseg/tappenz-betegszabadsag","notes":"Official page states 70% sick leave and táppénz eligibility conditions."},{"category":"Hiring / Wage Subsidy","schemeName":"Bértámogatás under labour-market programme","claimableBy":"Employer","eligible":"Employer hiring eligible programme participant/jobseeker and meeting net headcount increase and de minimis / programme conditions.","amount":"Example official 2024 notice: 50% of employer-borne gross wage, capped at HUF 250,000 per month; part-time cap prorated.","duration":"Programme-specific; total support capped by monthly cap x support months.","howToClaim":"Submit employer application to government office / labour-market programme before or as required by programme notice.","documents":"Employer application, employee eligibility, wage data, headcount evidence and programme forms.","deadline":"Application window and timing are programme-specific.","employerResp":"Apply before claiming, maintain records, meet employment/headcount commitments.","employeeResp":"Register/participate as eligible jobseeker if required.","payrollImpact":"Can reduce hiring cost but normal wage and contribution obligations remain.","authority":"Hungarian Government Offices / labour market programme","sourceUrl":"https://kormanyhivatalok.hu/sites/default/files/2024-05/hirdetmeny_bertamogatas_20240523.pdf","notes":"Programme rules change; use current county/government office notice."}],"Iceland":[{"category":"Maternity / Paternity / Parental Leave","schemeName":"Maternity/Paternity Leave Fund payments","claimableBy":"Employee / self-employed parent","eligible":"Parent active in Iceland labour market and qualifying under maternity/paternity leave rules; application notifies employer through Ísland.is process.","amount":"80% of average income over the calculation period; maximum payment ISK 700,000 during leave.","duration":"Iceland maternity/paternity leave is 12 months combined; individual transfer rules apply.","howToClaim":"Apply through Ísland.is / Directorate of Labour maternity and paternity leave service.","documents":"Employment/income evidence, parental leave plan, child/adoption evidence and employer notification.","deadline":"Employer should be informed 8 weeks before expected due date; application follows official portal timing.","employerResp":"Review planned leave and provide employment/pay information if requested.","employeeResp":"Apply and notify employer through official process.","payrollImpact":"State fund pays benefit; payroll tracks unpaid/partly paid leave and rights continuity.","authority":"Directorate of Labour / Ísland.is","sourceUrl":"https://island.is/en/apply-for-maternity-and-paternity-leave | https://island.is/en/apply-for-maternity-and-paternity-leave/amounts-and-calculations","notes":"Search/open access may be limited but official snippets confirm rate and cap."},{"category":"Work Injury / Accident","schemeName":"Sick leave daily payments for work-related accident","claimableBy":"Employee; paid to employer while worker is on paid sick leave","eligible":"Employee unable to work due to work-related accident for 10 days or more.","amount":"Daily payments from Social Insurance Administration until recovery or up to 52 weeks; while worker is on paid sick leave, payments are paid to employer.","duration":"Until recovery or up to 52 weeks.","howToClaim":"Report/claim through official work-accident and social insurance process.","documents":"Medical evidence, accident report, employment/pay records and insurance details.","deadline":"Report work accident promptly under official procedures.","employerResp":"Report accident and coordinate daily payment/insurance while employee is on paid sick leave.","employeeResp":"Provide medical evidence and report injury.","payrollImpact":"Employer may receive daily payments while continuing sick pay; payroll must coordinate recovery.","authority":"Social Insurance Administration / Ísland.is","sourceUrl":"https://island.is/en/sick-leave-rights | https://island.is/en/o/social-insurance-administration","notes":"Official source states 10-day trigger, 52-week limit and payment to employer while paid sick leave continues."},{"category":"Hiring / Wage Subsidy","schemeName":"Directorate of Labour recruitment grant","claimableBy":"Employer","eligible":"Employer hiring a registered jobseeker through the Directorate of Labour; position must be registered and grant applied for before work starts.","amount":"ISK 428,015 per month; corresponds to 100% of basic unemployment benefit plus 11.5% pension fund contribution.","duration":"Up to 6 months.","howToClaim":"Register the position and apply through the Directorate of Labour / Ísland.is employer process before employee starts work.","documents":"Employer details, registered position, candidate/jobseeker referral and employment agreement.","deadline":"Must apply and register position before employee begins work.","employerResp":"Do not start employment before approval/application; maintain employment and payroll records.","employeeResp":"Be registered with Directorate of Labour as jobseeker.","payrollImpact":"Reduces hiring cost for eligible new hires; normal payroll obligations continue.","authority":"Directorate of Labour / Ísland.is","sourceUrl":"https://island.is/en/recruitment-grant | https://island.is/en/o/directorate-of-labour/employers","notes":"Official snippet confirms amount, pension component and 6-month maximum."},{"category":"Insolvency / Wage Protection","schemeName":"Guarantee Fund for Wages","claimableBy":"Employee / wage creditor","eligible":"Employee has recognised priority wage-related claim against bankrupt employer estate in Iceland.","amount":"Guarantees qualifying outstanding wages, termination compensation, vacation pay, accident compensation and pension premiums, subject to fund/legal limits.","duration":"Claim must reach fund within 6 months of insolvency notice; 12 months may be considered if earlier filing was impossible.","howToClaim":"Liquidator submits approved priority claims to the fund; employee/wage creditor follows bankruptcy estate process.","documents":"Employment contract, payslips, unpaid wage/vacation/termination evidence and liquidator confirmation.","deadline":"6 months from publication of insolvency notice in Official Journal, with possible 12-month exception.","employerResp":"Cooperate with liquidator; no normal employer claim once bankrupt estate process applies.","employeeResp":"Submit/verify wage claim with liquidator/fund process.","payrollImpact":"Protects unpaid wages when employer is insolvent; HR/payroll records are critical evidence.","authority":"Directorate of Labour / Wage Guarantee Fund","sourceUrl":"https://island.is/en/o/directorate-of-labour/guarantee-fund-for-wages | https://www.government.is/library/04-Legislation/Wage%20Guarantee%20Fund%20Act%20No%2088%202003%20with%20subsequent%20amendments%202018.pdf","notes":"Official Directorate page gives deadline; Act confirms covered claim types."}],"India":[{"category":"Maternity / Social Security","schemeName":"ESIC Maternity Benefit","claimableBy":"Employee / insured woman","eligible":"Insured woman under ESI scheme meeting maternity benefit conditions.","amount":"ESIC maternity cash benefit; maternity duration depends on child count and circumstances. Official ESIC page states 12 weeks for two or more surviving children and commissioning/adopting mothers, 6 weeks for miscarriage/MTP.","duration":"Varies by case: e.g. 12 weeks for specified cases, 6 weeks after miscarriage/MTP; other statutory periods apply under ESIC rules.","howToClaim":"Claim through ESIC branch office / IP portal where online facility is available.","documents":"ESIC maternity forms/certificate, insurance number, medical certificate and childbirth/adoption evidence.","deadline":"Use ESIC claim process as soon as maternity certificate/eligibility applies.","employerResp":"Register/pay ESI contributions and support employee records.","employeeResp":"Submit claim and medical/birth evidence.","payrollImpact":"Benefit is from ESIC for covered insured women; payroll must coordinate maternity absence and ESI status.","authority":"Employees State Insurance Corporation (ESIC)","sourceUrl":"https://www.esic.gov.in/maternity-benefits | https://www.india.gov.in/esic-form-19-claim-maternity-benefit-and-notice-work","notes":"Official ESIC page provides maternity benefit categories and durations."},{"category":"Sickness / Social Security","schemeName":"ESIC Sickness Benefit","claimableBy":"Employee / insured person","eligible":"Insured person under ESIC with certified sickness occurring in a benefit period and requiring medical attendance/abstention from work.","amount":"Periodical cash payments during certified sickness; rate and duration depend on ESIC rules.","duration":"During certified sickness in relevant benefit period.","howToClaim":"Claim through ESIC process with medical certification.","documents":"ESIC sickness certificate, insurance number and medical evidence.","deadline":"Submit according to ESIC branch/IP portal process.","employerResp":"Maintain ESI registration/contributions and payroll records.","employeeResp":"Obtain ESIC medical certification and file claim.","payrollImpact":"Payroll must coordinate ESI-covered sickness benefits and absence treatment.","authority":"Employees State Insurance Corporation (ESIC)","sourceUrl":"https://www.esic.gov.in/sickness-benefits | https://www.esic.gov.in/information-benefits","notes":"ESIC states sickness benefit is periodical cash payment during certified sickness."},{"category":"Work Injury / Disability / Dependants","schemeName":"ESIC Disablement and Dependants benefits","claimableBy":"Employee / dependant","eligible":"Insured person suffering employment injury / occupational disease, or dependant of insured person in case of employment injury death.","amount":"ESIC provides cash and medical benefits for employment injury, disablement and dependants; amount depends on statutory assessment.","duration":"For temporary/permanent disablement or dependant entitlement under ESIC rules.","howToClaim":"Claim through ESIC branch / benefits process.","documents":"Accident report, medical records, ESIC insurance details, employer records and dependant evidence where applicable.","deadline":"Report/claim as per ESIC rules promptly after injury/death.","employerResp":"Report employment injury and keep ESI/wage records.","employeeResp":"Submit medical/dependant evidence and cooperate with assessment.","payrollImpact":"Important for payroll absence, injury reporting and statutory insurance coordination.","authority":"Employees State Insurance Corporation (ESIC)","sourceUrl":"https://www.esic.gov.in/benefits | https://www.esic.gov.in/information-benefits","notes":"ESIC official benefits page lists social security benefits."},{"category":"Training / Apprenticeship Subsidy","schemeName":"National Apprenticeship Promotion Scheme (NAPS)","claimableBy":"Employer / establishment","eligible":"Establishments engaging eligible apprentices under Apprentices Act / NAPS and using official apprenticeship portal.","amount":"Government shares 25% of prescribed stipend, capped at INR 1,500 per month per apprentice; basic training cost up to INR 7,500 for maximum 500 hours/3 months.","duration":"During approved apprenticeship/training period.","howToClaim":"Register on Apprenticeship Training Portal; submit contracts/claims online.","documents":"Apprentice contract, stipend records, attendance/training records and portal claim evidence.","deadline":"Submit claims through official portal according to NAPS process.","employerResp":"Register seats, contract apprentices, pay stipend and claim government share.","employeeResp":"Register/apply as apprentice and complete training.","payrollImpact":"Direct employer cost offset for apprentices; payroll/stipend records required.","authority":"Ministry of Skill Development and Entrepreneurship / Apprenticeship Portal","sourceUrl":"https://www.msde.gov.in/static/uploads/2024/04/Guidelines-for-NAPS.pdf | https://www.apprenticeshipindia.gov.in/","notes":"Official NAPS guidelines provide amounts and online claim process."},{"category":"Death / Provident Fund Insurance","schemeName":"Employees Deposit Linked Insurance (EDLI)","claimableBy":"Nominee / legal heir of EPF member","eligible":"EPF-covered employee dies during service; nominee/legal heir claims benefit.","amount":"Minimum INR 2.5 lakh and maximum INR 7 lakh; employer contributes 0.5% of wages, no employee contribution.","duration":"One-time death insurance claim.","howToClaim":"Claim through EPFO process / Form 5IF or current EPFO channel.","documents":"Death certificate, nominee/legal heir evidence, EPF details, bank details and employer attestation where required.","deadline":"EPFO page states claims are processed within 20 days; file promptly after death.","employerResp":"Maintain EPF/EDLI contributions and attest/support claim where required.","employeeResp":"Nominee/legal heir submits claim evidence.","payrollImpact":"Not payroll reimbursement but payroll/HR must support family claim and EPF records.","authority":"Employees Provident Fund Organisation (EPFO)","sourceUrl":"https://www.epfo.gov.in/insurance-scheme-edli/","notes":"Official EPFO page states benefit range, employer contribution and 20-day processing target."}],"Indonesia":[{"category":"Unemployment / Job Loss","schemeName":"Jaminan Kehilangan Pekerjaan (JKP)","claimableBy":"Employee / worker","eligible":"BPJS Ketenagakerjaan participant under age 54 with at least 12 months contributions in 24 months before PHK and qualifying termination reason.","amount":"Cash benefit of 60% of wage every month for up to 6 months, plus counselling, labour market information and job training.","duration":"Up to 6 months cash benefit.","howToClaim":"Submit JKP claim through official JKP/SIAPKerja/BPJS process with PHK report and bank account.","documents":"PHK evidence/report, SIAPKerja account, statement willing to work again, active bank account and BPJS status.","deadline":"Official JKP page states claim submission no later than 6 months after PHK.","employerResp":"Report employee inactive to BPJS Ketenagakerjaan and provide PHK evidence/reporting support.","employeeResp":"File claim, maintain willingness to work and complete JKP process.","payrollImpact":"Payroll termination process must produce accurate PHK and BPJS records.","authority":"Kemnaker / BPJS Ketenagakerjaan","sourceUrl":"https://jkp.go.id/ | https://jkp.go.id/tentang","notes":"Official JKP page confirms 60% wage cash benefit and contribution eligibility."},{"category":"Work Injury / Occupational Disease","schemeName":"BPJS Ketenagakerjaan Jaminan Kecelakaan Kerja (JKK)","claimableBy":"Employee / worker; employer reports/coordinates","eligible":"Registered BPJS Ketenagakerjaan participant suffers work accident or occupational disease.","amount":"Medical treatment and cash compensation under JKK; BPJS pages state healthcare and cash compensation are provided.","duration":"For work accident/occupational disease treatment and compensation period.","howToClaim":"Claim through BPJS Ketenagakerjaan / PLKK / official JKK claim channels.","documents":"Accident report, medical documents, BPJS participant details, employment/wage details and supporting evidence.","deadline":"Report accident promptly according to BPJS/employer process.","employerResp":"Register workers, pay contributions, report accidents and coordinate PLKK/claim process.","employeeResp":"Report injury and provide medical evidence.","payrollImpact":"Payroll must track work injury absence, wage basis and BPJS claim coordination.","authority":"BPJS Ketenagakerjaan","sourceUrl":"https://faq-int.bpjsketenagakerjaan.go.id/ | https://eplkk2.bpjsketenagakerjaan.go.id/login | https://eklaim-pmi.bpjsketenagakerjaan.go.id/jkk","notes":"Public FAQ/int and official BPJS service pages confirm JKK purpose and claim channels."},{"category":"Death Benefit","schemeName":"BPJS Ketenagakerjaan Jaminan Kematian (JKM)","claimableBy":"Heir / family of participant","eligible":"Registered BPJS Ketenagakerjaan participant dies, not necessarily due to work accident depending on JKM rules.","amount":"Death compensation paid to heir under BPJS Ketenagakerjaan JKM; amount depends on current BPJS regulation and membership category.","duration":"One-time death claim plus any statutory components.","howToClaim":"Claim through BPJS Ketenagakerjaan JKM channels.","documents":"Death certificate, heir/family documents, participant details, bank account and BPJS-requested evidence.","deadline":"Submit after death according to BPJS process.","employerResp":"Register/pay contributions and support family with employment/BPJS records.","employeeResp":"Heir submits claim documents.","payrollImpact":"HR must support deceased employee family claim and final payroll records.","authority":"BPJS Ketenagakerjaan","sourceUrl":"https://faq-int.bpjsketenagakerjaan.go.id/ | https://eklaim-pmi.bpjsketenagakerjaan.go.id/jkm","notes":"Official BPJS FAQ states JKM provides death compensation to heirs."},{"category":"Old Age Savings / Employment Exit","schemeName":"BPJS Ketenagakerjaan Jaminan Hari Tua (JHT) claim","claimableBy":"Employee / participant","eligible":"BPJS Ketenagakerjaan participant meeting claim category such as reaching age 56, resignation or termination.","amount":"JHT balance claim; amount depends on accumulated participant savings and investment results.","duration":"One-time or permitted withdrawal depending on claim category.","howToClaim":"Submit via Lapak Asik / JMO / BPJS claim channel.","documents":"KTP, family card, BPJS card, PHK/resignation/retirement evidence, bank account and other BPJS documents.","deadline":"Based on claim category; official Lapak Asik lists eligible claim reasons.","employerResp":"Report employment status correctly and ensure contributions are updated.","employeeResp":"Submit documents through official claim service.","payrollImpact":"Payroll offboarding must ensure BPJS status and contribution records are accurate.","authority":"BPJS Ketenagakerjaan","sourceUrl":"https://jmoantrian.bpjsketenagakerjaan.go.id/ | https://lapakasik.bpjsketenagakerjaan.go.id/","notes":"Official Lapak Asik page lists claim reasons such as age 56, resignation and PHK."},{"category":"Training / Upskilling","schemeName":"Kartu Prakerja","claimableBy":"Employee / jobseeker / individual worker","eligible":"Jobseekers, workers/labourers affected by termination and other eligible workforce groups under programme rules.","amount":"Training assistance and incentives under programme rules; amounts change by wave/budget and should be checked on official Prakerja platform.","duration":"Programme/wave-specific.","howToClaim":"Register through official Prakerja dashboard and complete training/process requirements.","documents":"Identity/NIK, account data, training completion and payment/e-wallet/bank details as required.","deadline":"Registration windows are wave/programme-specific.","employerResp":"Generally none unless employer separately supports employee learning.","employeeResp":"Register, select training and complete programme requirements.","payrollImpact":"Not employer payroll claim; HR can list as employee upskilling support option.","authority":"Kartu Prakerja / Coordinating Ministry for Economic Affairs","sourceUrl":"https://www.prakerja.go.id/ | https://bantuan.kemnaker.go.id/support/solutions/folders/43000567853 | https://alibaba-cloud-academy.prakerja.go.id/pelatihan/","notes":"Official sources state Prakerja is for competency development, productivity and competitiveness."}],"Ireland":[{"category":"Maternity / Parental","schemeName":"Maternity Benefit","claimableBy":"Employee; payment can be assigned to employer in salary-paid cases","eligible":"Employed or self-employed person on maternity leave with sufficient PRSI contributions.","amount":"EUR 262 per week on full-rate Maternity Benefit.","duration":"26 weeks; unpaid maternity leave can follow but is not covered by Maternity Benefit.","howToClaim":"Apply through MyWelfare or paper form to the Department of Social Protection.","documents":"PPS number, employer details, medical certificate / expected due date and PRSI evidence if requested.","deadline":"Employee should apply at least 6 weeks before maternity leave; self-employed at least 12 weeks before.","employerResp":"Confirm employment details; if topping up salary, coordinate whether DSP payment is paid to employer.","employeeResp":"Submit claim and notify employer of maternity leave.","payrollImpact":"Payroll must separate employer salary top-up from DSP benefit; benefit is not an employer grant unless assigned to employer.","authority":"Department of Social Protection","sourceUrl":"https://www.gov.ie/en/department-of-social-protection/services/maternity-benefit/","notes":"Official rate should be rechecked each year because social welfare rates may change."},{"category":"Maternity / Parental","schemeName":"Paternity Benefit","claimableBy":"Employee; payment may be assigned to employer in salary-paid cases","eligible":"Relevant parent on paternity leave with sufficient PRSI contributions.","amount":"EUR 262 per week.","duration":"2 weeks.","howToClaim":"Apply online through MyWelfare or by official Paternity Benefit form.","documents":"PPS number, employer details, leave dates, child birth/adoption details and PRSI evidence if requested.","deadline":"Apply at least 4 weeks before starting paternity leave where possible.","employerResp":"Confirm leave and payroll top-up/assignment arrangement where applicable.","employeeResp":"Apply and give employer required leave notice.","payrollImpact":"Payroll should not double-count statutory benefit and employer salary top-up.","authority":"Department of Social Protection","sourceUrl":"https://www.gov.ie/en/department-of-social-protection/services/paternity-benefit/ | https://www.gov.ie/en/department-of-social-protection/publications/operational-guidelines-paternity-benefit/","notes":"Available to same-sex couples according to the official service page."},{"category":"Maternity / Parental","schemeName":"Parent's Benefit","claimableBy":"Employee / self-employed parent","eligible":"Parent on parent's leave with sufficient PRSI contributions; child must meet scheme timing rules.","amount":"Official page states Parent's Benefit provides payment for the eligible weeks; current rate should be checked on DSP rate tables.","duration":"9 weeks for each parent, within first 2 years of child birth/adoption placement.","howToClaim":"Apply through MyWelfare.","documents":"PPS number, child PPSN where required, employer/leave details, PRSI and supporting documents.","deadline":"Apply in line with parent's leave timing; before taking leave is safest.","employerResp":"Confirm parent's leave dates and payroll treatment.","employeeResp":"Submit claim and take approved leave period.","payrollImpact":"Payroll should track parent's leave separately from maternity/paternity leave.","authority":"Department of Social Protection","sourceUrl":"https://www.gov.ie/en/department-of-social-protection/services/parents-benefit/","notes":"From August 2024, entitlement increased from 7 weeks to 9 weeks."},{"category":"Sickness / Medical Leave","schemeName":"Illness Benefit","claimableBy":"Employee / self-employed claimant","eligible":"Person certified medically unfit for work and satisfying PRSI conditions.","amount":"Weekly payment; exact personal rate depends on contribution record and official rate table.","duration":"Short-term illness support; duration depends on PRSI record and case.","howToClaim":"Apply through MyWelfare after doctor certifies illness.","documents":"Medical certificate, PPS number, employment/PRSI details and bank details.","deadline":"Claim within 6 weeks of becoming ill.","employerResp":"Pay statutory sick pay first where applicable; coordinate any company sick pay offset.","employeeResp":"Get medical certification and submit claim.","payrollImpact":"Illness Benefit is separate from employer statutory sick pay; in 2026 it may start after statutory sick leave/waiting days depending on case.","authority":"Department of Social Protection","sourceUrl":"https://www.gov.ie/en/department-of-social-protection/services/illness-benefit/ | https://www.gov.ie/en/department-of-social-protection/publications/illness-benefit-injury-benefit-and-statutory-sick-leave-in-2025/","notes":"Gov.ie explains how statutory sick leave affects start of Illness Benefit."},{"category":"Work Injury / Occupational Disease","schemeName":"Occupational Injuries Benefit / Injury Benefit","claimableBy":"Employee claimant","eligible":"Insured person unfit for work due to accident at work, accident travelling directly to/from work, or prescribed occupational disease.","amount":"Weekly Injury Benefit / Occupational Injuries Scheme payment; rate depends on official DSP rates and case.","duration":"Where incapacity lasts more than 3 days; long-term related benefits may apply depending on assessment.","howToClaim":"Apply to Department of Social Protection using Injury Benefit process.","documents":"Medical certificate, accident/work injury evidence, employer details and PRSI information.","deadline":"Apply promptly after work injury/occupational disease; use official form/process.","employerResp":"Keep accident records and provide employer confirmation where needed.","employeeResp":"Report accident/illness and submit claim documents.","payrollImpact":"Classify absence as work-related injury and coordinate employer sick pay/insurance where applicable.","authority":"Department of Social Protection","sourceUrl":"https://www.citizensinformation.ie/en/social-welfare/disability-and-illness/injury-benefit/ | https://www.citizensinformation.ie/en/social-welfare/disability-and-illness/occupational-injuries-benefit-overview/","notes":"Citizens Information is Ireland's statutory public information service; use DSP forms for filing."},{"category":"Hiring / Wage Subsidy","schemeName":"JobsPlus","claimableBy":"Employer","eligible":"Employer hiring eligible unemployed jobseeker into full-time employment under JobsPlus rules.","amount":"EUR 7,500 or EUR 10,000 over two years, depending on candidate eligibility band.","duration":"Paid monthly over 24 months if conditions continue to be met.","howToClaim":"Employer and employee complete JobsPlus online application process.","documents":"Employer registration, job offer/full-time employment details, employee eligibility confirmation and tax/PRSI data.","deadline":"Apply and obtain approval through JobsPlus process before/around employment commencement as required.","employerResp":"Submit employer application, maintain eligible employment and comply with scheme conditions.","employeeResp":"Employee confirms eligibility through JobsPlus process.","payrollImpact":"Direct wage-cost offset; track monthly grant income separately from gross salary.","authority":"Department of Social Protection","sourceUrl":"https://www.gov.ie/en/department-of-social-protection/services/jobsplus/ | https://www.gov.ie/en/department-of-social-protection/publications/operational-guidelines-jobsplus/","notes":"The official guideline states JobsPlus is a monthly employer payment to offset wage costs."},{"category":"Disability Hiring / Wage Subsidy","schemeName":"Wage Subsidy Scheme","claimableBy":"Employer","eligible":"Employer hires/retains a person with a disability whose productivity is reduced and who works at least the required hours.","amount":"Department-funded wage subsidy; exact level depends on scheme rules and approved case.","duration":"Ongoing while eligible employment and scheme conditions are met.","howToClaim":"Apply through Intreo/DSP Wage Subsidy Scheme process.","documents":"Employer details, employee eligibility/disability evidence, employment contract, hours and wage details.","deadline":"Apply before claiming subsidy; ongoing compliance evidence may be required.","employerResp":"Provide adapted role/supports, pay wages and submit claims/records.","employeeResp":"Provide eligibility information and participate in assessment where needed.","payrollImpact":"Offset to wage cost, not a replacement for normal payroll obligations.","authority":"Department of Social Protection","sourceUrl":"https://www.gov.ie/en/department-of-social-protection/publications/operational-guidelines-wage-subsidy-scheme/","notes":"Useful for supported employment; do not treat as general hiring grant."}],"Israel":[{"category":"Maternity / Parental","schemeName":"Maternity Allowance","claimableBy":"Employee; employer may issue Form 100 for automatic payment","eligible":"Working woman who stops working for birth/parenthood leave and meets National Insurance contribution conditions.","amount":"Calculated by income subject to contributions, up to NIS 1,752.33 per day.","duration":"Up to 15 weeks / 105 days if full contribution condition is met; 8 weeks / 56 days for partial entitlement.","howToClaim":"Claim submitted by employee or automatically through employer Form 100 process.","documents":"Form 100/employer wage data, identity and bank details, birth/medical information and NII-requested evidence.","deadline":"Employer Form 100 can be issued during pregnancy if stopped working, not earlier than 9 weeks before estimated birth date.","employerResp":"Issue Form 100 accurately where employee requests / payroll data is needed.","employeeResp":"Stop work during entitlement period and provide claim details/evidence.","payrollImpact":"Payroll must report income correctly; maternity allowance is paid by NII, not salary.","authority":"National Insurance Institute","sourceUrl":"https://www.btl.gov.il/ENGLISH%20HOMEPAGE/BENEFITS/MATERNITY%20INSURANCE/MATERNITY%20ALLOWANCE/Pages/default.aspx | https://www.btl.gov.il/English%20Homepage/Benefits/Maternity%20Insurance/Maternity%20Allowance/Pages/Benefitrates.aspx | https://www.btl.gov.il/English%20Homepage/Benefits/Maternity%20Insurance/Maternity%20Allowance/Pages/Maximum.aspx | https://www.btl.gov.il/English%20Homepage/Benefits/Maternity%20Insurance/Maternity%20Allowance/Pages/submittheclaim.aspx","notes":"Amounts and contribution periods should be verified on NII before payroll implementation."},{"category":"Work Injury / Occupational Disease","schemeName":"Injury Allowance","claimableBy":"Employee claimant","eligible":"Insured person injured in work accident, on the way to/from work, or with occupational disease, and medically unable to work.","amount":"Paid by NII based on work injury rules and insured income; exact amount depends on case.","duration":"For medically certified incapacity period under work injury rules.","howToClaim":"Submit work injury claim to National Insurance Institute.","documents":"Medical certificate, accident details, employer confirmation/wage data and NII forms.","deadline":"Submit promptly after injury; NII may request employer/wage documents.","employerResp":"Report accident and provide wage/employment confirmation.","employeeResp":"Attend medical assessment and submit documents.","payrollImpact":"Track as work injury absence; NII benefit may affect wage replacement/top-up.","authority":"National Insurance Institute","sourceUrl":"https://www.btl.gov.il/ENGLISH%20HOMEPAGE/BENEFITS/WORK%20INJURY%20INSURANCE/INJURY%20ALLOWANCE/Pages/default.aspx","notes":"Work injury includes accident during and as a result of work and certain commuting accidents."},{"category":"Unemployment / Job Loss","schemeName":"Unemployment Benefits","claimableBy":"Employee claimant","eligible":"Worker who lost employment and meets NII unemployment insurance rules; must report to Employment Service.","amount":"Daily benefit calculated by age and income subject to contributions over last full 6 months before first Employment Service appearance.","duration":"Quota depends on eligibility profile and reporting days.","howToClaim":"Register/report with Employment Service and submit claim to NII online or by form.","documents":"Termination documents, wage data, Employment Service reporting, tax/exemption authorizations if relevant.","deadline":"Report to Employment Service immediately upon termination; submit NII claim with required documents.","employerResp":"Provide termination/wage forms if requested.","employeeResp":"Register and report as instructed; submit claim and return-to-work updates.","payrollImpact":"No employer reimbursement, but HR must provide accurate leaver documentation.","authority":"National Insurance Institute / Israeli Employment Service","sourceUrl":"https://www.btl.gov.il/English%20Homepage/Benefits/Unemployment%20Insurance/Pages/default.aspx | https://www.btl.gov.il/English%20Homepage/Benefits/Unemployment%20Insurance/Pages/BenefitAmount.aspx | https://www.btl.gov.il/English%20Homepage/Benefits/Unemployment%20Insurance/Pages/submit-the-claim.aspx","notes":"Employment Service reporting drives monthly benefit days sent to NII."},{"category":"Employer Reimbursement","schemeName":"Reserve Service Benefit - Employer Refund","claimableBy":"Employer","eligible":"Employer that paid usual wages/advance to salaried employee serving in reserve duty.","amount":"NII reimburses employer for reserve service benefit calculated under law; minimum daily benefit noted by NII for eligible persons.","duration":"For approved reserve service days.","howToClaim":"Submit employer claim for reimbursement of reserve duty benefits to NII branch / online system where available.","documents":"Employer claim form, wage data, reserve service evidence or data required by NII.","deadline":"After employee reserve service/payment; special rules may apply during emergency periods.","employerResp":"Pay usual wage/advance, submit claim and keep payroll/reserve duty records.","employeeResp":"Provide reserve service details if required.","payrollImpact":"Payroll pays salary first then records NII reimbursement; treat reimbursement separately from wages.","authority":"National Insurance Institute","sourceUrl":"https://www.btl.gov.il/English%20Homepage/Benefits/Reserve%20Service%20Benefit/Pages/Informationforemployers.aspx | https://www.btl.gov.il/English%20Homepage/About/Frequent_questions/Reserve-Service/Pages/default.aspx | https://www.btl.gov.il/English%20Homepage/Benefits/Reserve%20Service%20Benefit/Pages/Benefit-by-type.aspx","notes":"Very payroll-relevant because employer often pays employee first and claims refund from NII."},{"category":"Tax Credit / Work Income Support","schemeName":"Work Grant","claimableBy":"Employee / self-employed person","eligible":"Employee or self-employed person aged 21+ with children, or aged 55+ without children, whose income meets legal criteria.","amount":"Additional income grant; amount depends on income/family profile and Tax Authority calculation.","duration":"Annual claim by tax year; official page states online application for 2025 can be submitted until 31 Dec 2027.","howToClaim":"Apply through Israel Tax Authority work grant online service.","documents":"Identity verification, income/tax data, bank details and family-status information.","deadline":"For 2025 grant, official page states online application deadline is 31 Dec 2027.","employerResp":"No employer claim; provide accurate wage/tax reporting.","employeeResp":"Submit claim personally and ensure bank/tax details are correct.","payrollImpact":"Individual tax support; payroll should not treat it as employer-funded benefit.","authority":"Israel Tax Authority","sourceUrl":"https://www.gov.il/en/departments/topics/work_grant/govil-landing-page","notes":"Relevant for employee-facing guidance, not employer cost recovery."}],"Italy":[{"category":"Maternity / Parental","schemeName":"Maternity and Paternity Leave Allowance","claimableBy":"Employee / self-employed / separate scheme worker depending on category","eligible":"Eligible workers taking maternity, paternity or parental leave under INPS rules.","amount":"Benefit depends on employment category and leave type; INPS processes claims/direct payment where required.","duration":"Maternity/paternity/parental leave duration depends on statutory leave type and worker category.","howToClaim":"Submit claim through INPS online procedure for maternity/paternity leave benefits.","documents":"INPS credentials, employment/contribution data, birth/adoption information and leave dates.","deadline":"Submit according to INPS procedure before/around leave period depending on claim type.","employerResp":"File payroll/unified reporting correctly; pay/top up where required by Italian rules/CBA.","employeeResp":"Submit INPS claim when direct payment or personal claim is required.","payrollImpact":"Payroll must coordinate INPS allowance, employer advance where applicable, and leave reporting.","authority":"INPS","sourceUrl":"https://www.inps.it/it/en/inps-comunica/diritti-e-obblighi-in-materia-di-sicurezza-sociale-nell-unione-e/per-i-cittadini/prestazioni-per-congedi-a-tutela-della-maternit--e-paternit.html | https://www.inps.it/it/en/inps-comunica/diritti-e-obblighi-in-materia-di-sicurezza-sociale-nell-unione-e/procedure/congedi-di-maternit-e-paternit.html","notes":"Italy has different routes for employees, self-employed and separate pension scheme workers."},{"category":"Sickness / Medical Leave","schemeName":"Illness Allowance","claimableBy":"Private-sector employee claimant; employer may advance depending on sector","eligible":"Private-sector worker temporarily unfit for work due to illness and belonging to covered categories.","amount":"Social security benefit to compensate loss of employment income; exact amount depends on INPS rules and worker category.","duration":"For certified illness period within scheme limits.","howToClaim":"Medical certificate is transmitted electronically; INPS handles entitlement/payment process.","documents":"Medical certificate, contribution/employment records and any INPS-requested documents.","deadline":"Follow medical certification and INPS/employer reporting deadlines immediately when illness starts.","employerResp":"Receive/verify illness certificate, report absence and advance/payment treatment where applicable.","employeeResp":"Obtain medical certification and comply with availability/check rules.","payrollImpact":"Payroll must reflect illness allowance/advance and any CBA top-up.","authority":"INPS","sourceUrl":"https://www.inps.it/it/en/inps-comunica/diritti-e-obblighi-in-materia-di-sicurezza-sociale-nell-unione-e/per-i-cittadini/indennit--di-malattia.html","notes":"Do not confuse ordinary illness with INAIL work injury."},{"category":"Work Injury / Occupational Disease","schemeName":"INAIL Work Injury / Occupational Disease Benefits","claimableBy":"Employee claimant; employer reports injury","eligible":"Worker covered by INAIL suffers work accident or occupational disease.","amount":"Medical, economic and compensation benefits under INAIL; amount depends on injury, disability and law.","duration":"For treatment/incapacity/disability assessment period.","howToClaim":"Employer submits injury report/communication to INAIL; employee follows medical/INAIL process.","documents":"Electronic medical certificate reference, accident details, employer report and medical evidence.","deadline":"Employer must report injuries not healable within 3 days within 2 days after receiving medical certificate references.","employerResp":"Maintain INAIL insurance, report injuries and pay INAIL premium.","employeeResp":"Report accident and cooperate with medical/INAIL procedures.","payrollImpact":"Classify absence as work injury; INAIL process affects wage replacement and employer reporting.","authority":"INAIL","sourceUrl":"https://www.inail.it/portale/it/multilingua/english/insurance-in-the-u-e-/Accidents-and-injuries-at-work.html | https://www.inail.it/portale/assicurazione/it/Datore-di-Lavoro/Impresa-con-dipendenti-industria-artigianato-terziario-altre-attivita/denunce-infortuni-e-malattie-professionali-impresa-con-dipendenti/denuncia-comunicazione-di-infortunio-sul-lavoro-impresa-con-dipendenti.html","notes":"The report deadline is a key compliance point for employers."},{"category":"Unemployment / Job Loss","schemeName":"NASpI / DIS-COLL Unemployment Benefits","claimableBy":"Employee / eligible worker claimant","eligible":"Worker in involuntary unemployment or eligible collaboration category meeting contribution/work requirements.","amount":"Amount and duration calculated under INPS unemployment benefit rules.","duration":"Depends on contribution history and benefit type.","howToClaim":"Submit unemployment benefit claim to INPS.","documents":"Termination/unemployment details, contribution records, identity/bank data and INPS requested documents.","deadline":"Submit after unemployment starts within INPS deadlines.","employerResp":"Provide termination/payroll data correctly.","employeeResp":"Submit claim and meet job-search/activation obligations.","payrollImpact":"Leaver paperwork and payroll reporting affect benefit calculation.","authority":"INPS","sourceUrl":"https://www.inps.it/it/en/inps-comunica/diritti-e-obblighi-in-materia-di-sicurezza-sociale-nell-unione-e/per-i-cittadini/prestazioni-per-la-disoccupazione--naspi-e-dis-coll-e-rimpatriati.html","notes":"Employee-facing claim, but HR data quality matters."},{"category":"Hiring / Contribution Relief","schemeName":"Bonus Giovani / Youth Hiring Incentive","claimableBy":"Employer","eligible":"Employer making qualifying permanent hire or fixed-term-to-permanent conversion of young worker under official programme rules.","amount":"Contribution exemption/relief; exact cap and territorial rules depend on the active Bonus Giovani scheme.","duration":"For eligible hiring period set by programme.","howToClaim":"Employer applies through INPS Portal of Benefits / official procedure when opened.","documents":"Employment contract, worker eligibility, employer contribution/tax compliance and INPS application data.","deadline":"Application must be filed according to INPS/Ministry procedure and active programme window.","employerResp":"Verify eligibility before hire/contract conversion; file INPS application and keep evidence.","employeeResp":"Provide eligibility declarations/history if required.","payrollImpact":"Reduces employer social contribution cost, not gross salary.","authority":"Ministry of Labour and Social Policies / INPS","sourceUrl":"https://lavoro.gov.it/pn-giovani-donne-lavoro/progetti/interventi/bonus-giovani | https://lavoro.gov.it/pn-giovani-donne-lavoro/comunicazione/notizie/bonus-giovani-bonus-donne-circolari-inps","notes":"Use current official circular before claiming; programmes are time-limited and criteria change."}],"Japan":[{"category":"Maternity / Health Insurance","schemeName":"Maternity Allowance / Childbirth-related Health Insurance Benefit","claimableBy":"Employee claimant through Employees' Health Insurance","eligible":"Insured employee under Employees' Health Insurance who is absent from work for childbirth-related leave and meets health insurance conditions.","amount":"Allowance is claim-based through Employees' Health Insurance; exact amount depends on insured salary/standard remuneration and health insurance rules.","duration":"For statutory maternity absence period around childbirth under health insurance rules.","howToClaim":"Claim through employer/health insurance association or Japan Pension Service route depending on insurer.","documents":"Health insurance claim form, employer wage/absence confirmation, childbirth medical information and bank details.","deadline":"Submit according to insurer/Japan Pension Service procedures after/before leave as required.","employerResp":"Confirm wages paid/not paid and submit employer section to insurer.","employeeResp":"Provide childbirth/leave evidence and claim form.","payrollImpact":"Payroll must record unpaid/paid maternity leave and avoid double payment where allowance replaces salary.","authority":"Japan Pension Service / Health Insurance insurer","sourceUrl":"https://www.nenkin.go.jp/service/pamphlet/kaigai/konen-kenpo.files/English.pdf | https://www.nenkin.go.jp/international/english/japanese-system/employeespension/epi_procedure.html","notes":"Japan has multiple insurers; exact filing route may depend on health insurance association."},{"category":"Maternity / Parental","schemeName":"Childcare Leave Benefits / Birth-related Childcare Leave Support","claimableBy":"Employee claimant through Employment Insurance; employer files/assists","eligible":"Employment Insurance insured worker taking childcare leave and meeting benefit requirements.","amount":"Employment Insurance benefit; 2025 reforms added birth-after-leave support and shortened working hours benefit. Exact amount depends on wages and rules.","duration":"Generally for childcare leave periods under Employment Insurance / Childcare Leave Act rules.","howToClaim":"Employer files benefit application with Hello Work / employment insurance route or assists employee.","documents":"Employment insurance data, wage ledger, childcare leave dates, birth/child evidence and employer confirmation.","deadline":"Submit within Hello Work/employment insurance application periods for each benefit period.","employerResp":"Set up childcare leave, keep wage/attendance records and file/assist claim.","employeeResp":"Request leave and provide child/leave evidence.","payrollImpact":"Payroll/HR must manage leave status, wage reporting and social insurance exemption if applicable.","authority":"Ministry of Health, Labour and Welfare / Hello Work","sourceUrl":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000135090_00001.html | https://jsite.mhlw.go.jp/tokyo-roudoukyoku/newpage_01477.html | https://www.japaneselawtranslation.go.jp/en/laws/view/3877/en","notes":"April 2025 reforms created new related benefits; verify current details before filing."},{"category":"Sickness / Medical Leave","schemeName":"Sickness and Injury Allowance","claimableBy":"Employee claimant through Employees' Health Insurance","eligible":"Insured person absent from work due to non-work-related sickness or injury and unable to receive wages.","amount":"Employees' Health Insurance claim-based allowance; exact amount depends on standard remuneration and health insurance rules.","duration":"For certified absence period within health insurance benefit limits.","howToClaim":"Claim through health insurance association / Japan Pension Service procedures.","documents":"Medical certification, employer wage/absence confirmation, health insurance claim form and bank details.","deadline":"Submit after medically certified unpaid/partly paid absence according to insurer process.","employerResp":"Certify absence/wages and process payroll offsets.","employeeResp":"Obtain medical certification and submit claim form.","payrollImpact":"Separate from workers' compensation; payroll must coordinate wage paid vs allowance.","authority":"Japan Pension Service / Health Insurance insurer","sourceUrl":"https://www.nenkin.go.jp/service/pamphlet/kaigai/konen-kenpo.files/English.pdf","notes":"Non-work injury/sickness is health insurance, while work injury is workers' compensation."},{"category":"Employment Retention / Wage Subsidy","schemeName":"Employment Adjustment Subsidy","claimableBy":"Employer","eligible":"Employer covered by employment insurance forced to reduce business activities for economic reasons and temporarily adjusts employment through leave, training or secondment while maintaining jobs.","amount":"SME subsidy rate generally 2/3; large enterprise 1/2; training add-on applies; official page notes daily cap such as JPY 8,870 and maximum paid days.","duration":"Up to 100 days in first year / 150 days in three years for leave/training; secondment up to 1 year, subject to rules.","howToClaim":"Apply to Labour Bureau/Hello Work using MHLW forms or employment-related subsidy portal.","documents":"Labour-management agreement, sales/production decline evidence, leave/training/secondment records, wage payment records and employment insurance data.","deadline":"Submit according to MHLW application period after implementation/payment cycle.","employerResp":"Maintain employment, pay leave allowance/wages, prepare records and apply for subsidy.","employeeResp":"Participate in leave/training/secondment as arranged.","payrollImpact":"Direct employer subsidy to offset leave allowance/training wage cost.","authority":"Ministry of Health, Labour and Welfare","sourceUrl":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/koyou_roudou/koyou/kyufukin/pageL07_20200515.html","notes":"Official MHLW page warns about fake subsidy sites; use only mhlw.go.jp."},{"category":"Training / Skills Subsidy","schemeName":"Human Resource Development Support Subsidy","claimableBy":"Employer","eligible":"Employer conducting eligible employee training or granting eligible training leave under MHLW course rules.","amount":"Subsidy amount varies by course; may support training expenses and wages depending on track.","duration":"Depends on approved training course and subsidy track.","howToClaim":"Submit plan/application documents to Labour Bureau/Hello Work using MHLW forms.","documents":"Training plan, curriculum, attendance, cost invoices, wage records and employee/employer eligibility evidence.","deadline":"Submit before training where plan approval is required; claim after training according to course rules.","employerResp":"Plan qualifying training, keep attendance/cost records and file claim.","employeeResp":"Attend training and provide necessary confirmations.","payrollImpact":"Can offset training expense/wage cost; not automatic payroll reimbursement.","authority":"Ministry of Health, Labour and Welfare","sourceUrl":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/38819_00008.html","notes":"Course rules change; use current MHLW forms for the relevant fiscal year."}],"Jordan":[{"category":"Maternity / Social Security","schemeName":"Maternity Insurance Benefit","claimableBy":"Employee claimant through Social Security Corporation","eligible":"Insured woman covered by Jordan social security/maternity insurance and meeting contribution/legal conditions.","amount":"Social Security Law provides maternity insurance; exact cash benefit is determined by SSC law/bylaws and contribution wage.","duration":"For statutory maternity period under Social Security Law and implementing rules.","howToClaim":"Claim through Social Security Corporation electronic services / branch process.","documents":"SSC subscription details, wage records, birth/medical documents, employer information and bank details.","deadline":"Submit according to SSC maternity insurance process after/before childbirth as required.","employerResp":"Enroll/pay social security contributions and provide wage/employment data.","employeeResp":"Submit claim and required documents through SSC.","payrollImpact":"Employer generally finances through contributions rather than direct maternity pay reimbursement.","authority":"Social Security Corporation","sourceUrl":"https://www.ssc.gov.jo/en/home/ | https://www.ssc.gov.jo/en/about-the-corporation/ | https://www.ssc.gov.jo/wp-content/uploads/2025/02/law-26.1.2025-compressed.pdf","notes":"Official English site confirms benefits are funded by employee/employer contributions; law PDF provides insurance framework."},{"category":"Work Injury / Occupational Disease","schemeName":"Work Injury Insurance","claimableBy":"Employee claimant; employer reports/participates","eligible":"Insured worker with work accident, commuting-related work injury or occupational disease as defined in Social Security Law.","amount":"Medical care and work injury insurance benefits under SSC; amount depends on injury/disability assessment.","duration":"For treatment/incapacity/disability period under SSC assessment.","howToClaim":"Report/claim through Social Security Corporation procedures.","documents":"Accident report, medical evidence, employer/wage data and SSC forms.","deadline":"Report promptly under SSC procedure; exact statutory timelines should be checked in Arabic SSC service instructions.","employerResp":"Maintain SSC coverage and report work injury information.","employeeResp":"Attend medical assessment and submit evidence.","payrollImpact":"Payroll/HR must record work injury absence and coordinate SSC benefit with employer obligations.","authority":"Social Security Corporation","sourceUrl":"https://www.ssc.gov.jo/en/about-the-corporation/ | https://www.ssc.gov.jo/wp-content/uploads/2025/02/law-26.1.2025-compressed.pdf | https://www.ssc.gov.jo/wp-content/uploads/2022/05/Insurance-Benefits-Bylaw.pdf","notes":"Law PDF defines work injury and occupational disease; benefit amount is case-specific."},{"category":"Unemployment / Job Loss","schemeName":"Unemployment Insurance","claimableBy":"Employee claimant","eligible":"Insured person covered by Social Security Law unemployment insurance and meeting legal conditions.","amount":"Temporary unemployment benefit under SSC law; exact amount/duration depends on contribution account and law/bylaws.","duration":"Limited period under unemployment insurance rules.","howToClaim":"Apply through Social Security Corporation electronic services / branch process.","documents":"SSC subscription record, termination/unemployment evidence, wage data and bank details.","deadline":"Submit after unemployment begins according to SSC process.","employerResp":"Provide employment termination/wage data where needed.","employeeResp":"Submit claim and keep SSC details updated.","payrollImpact":"HR leaver records affect employee claim; no broad employer reimbursement.","authority":"Social Security Corporation","sourceUrl":"https://www.ssc.gov.jo/en/home/ | https://www.ssc.gov.jo/en/about-the-corporation/ | https://www.ssc.gov.jo/wp-content/uploads/2025/02/law-26.1.2025-compressed.pdf","notes":"Official SSC site confirms unemployment is part of social security benefits framework."},{"category":"Hiring / Wage Subsidy / Training","schemeName":"National Employment Program / Private Sector Employment and Skills Support","claimableBy":"Employer / training provider / jobseeker depending on window","eligible":"Private-sector firms and jobseekers selected under Jordan employment programme rules.","amount":"Programme can provide temporary wage subsidies and support to skills training; exact amount depends on awarded support window.","duration":"Project/programme-based; duration set by programme agreement.","howToClaim":"Apply through Ministry of Labour / National Employment Platform or programme calls.","documents":"Company registration, job opportunities, training/onboarding plan, worker selection and programme agreement documents.","deadline":"During active programme windows/calls only.","employerResp":"Apply, train/hire supported workers, keep payroll/training records and comply with programme monitoring.","employeeResp":"Register as jobseeker and participate in selected training/job placement.","payrollImpact":"Can reduce onboarding/wage cost but is not a permanent statutory entitlement.","authority":"Ministry of Labour","sourceUrl":"https://www.mol.gov.jo/AR/Pages/%D8%A7%D9%84%D9%86%D8%B8%D8%A7%D9%85_%D8%A7%D9%84%D9%88%D8%B7%D9%86%D9%8A_%D9%84%D9%84%D8%AA%D8%B4%D8%BA%D9%8A%D9%84 | https://mol.gov.jo/EBV4.0/Root_Storage/AR/EB_HomePage/Revised__The_SEP_Implementation_Updates_Jordan_Support_to_Private_Sector_Employment_and_Skills_%28P177959%29.pdf","notes":"Programme-based, not universal. Verify active call and eligibility before quoting."},{"category":"Training / Employment Support","schemeName":"Vocational and Technical Education, Training and Skills Development Support Fund","claimableBy":"Employer / investor / training project depending on funding window","eligible":"Projects/programmes supporting vocational and technical training, skills development, employment, productive branches and low-income/unemployed groups.","amount":"Official Ministry news notes support of 50% of minimum wage, JOD 25 social security subscription allowance and JOD 25 transport allowance for productive branch support; other funding varies by programme.","duration":"Programme/funding-window specific.","howToClaim":"Apply through Ministry of Labour fund/programme procedures when calls are open.","documents":"Project proposal, training/employment plan, beneficiary data, cost/payroll records and ministry-required evidence.","deadline":"Only during open calls or approved funding cycles.","employerResp":"Submit project/funding request and maintain evidence of employment/training delivery.","employeeResp":"Participate in funded training/employment if selected.","payrollImpact":"Potential support for employment/training costs; should not be assumed in standard payroll unless approved.","authority":"Ministry of Labour","sourceUrl":"https://www.mol.gov.jo/AR/Pages/%D9%86%D8%A8%D8%B0%D8%A9_%D8%B9%D9%86_%D8%A7%D9%84%D8%B5%D9%86%D8%AF%D9%88%D9%82 | https://mol.gov.jo/AR//NewsDetails/%D8%B5%D9%86%D8%AF%D9%88%D9%82_%D8%AF%D8%B9%D9%85_%D8%A7%D9%84%D8%AA%D8%B9%D9%84%D9%8A%D9%85_%D9%88%D8%A7%D9%84%D8%AA%D8%AF%D8%B1%D9%8A%D8%A8_%D8%A7%D9%84%D9%85%D9%87%D9%86%D9%8A_%D9%88%D8%A7%D9%84%D8%AA%D9%82%D9%86%D9%8A_%D9%8A%D8%B9%D9%82%D8%AF_%D8%A7%D8%AC%D8%AA%D9%85%D8%A7%D8%B9%D9%87_%D8%A7%D9%84%D8%A3%D9%88%D9%84","notes":"Arabic official pages used; details may require Arabic form/service review before filing."}],"Kenya":[{"category":"Social Security / Pension","schemeName":"NSSF Benefits and Grants","claimableBy":"Employee / member or dependant","eligible":"Registered NSSF member or eligible dependant/survivor meeting NSSF benefit conditions.","amount":"Benefits depend on the NSSF benefit type and member contribution record; NSSF pays eligible benefits/grants from the Fund.","duration":"Claim timing depends on benefit type such as age, invalidity, survivor/dependant or other NSSF qualifying event.","howToClaim":"Apply through NSSF / eCitizen or NSSF branch process for the relevant benefit/grant.","documents":"NSSF member number, national ID, proof of qualifying event, dependant/survivor documents and bank/payment details.","deadline":"Submit when the qualifying event occurs; no one standard deadline across all benefit types.","employerResp":"Register/remit NSSF contributions and give accurate employee details when required.","employeeResp":"Submit the relevant claim and supporting documents.","payrollImpact":"Payroll contribution history affects claim eligibility; HR should keep NSSF registration and contribution records accurate.","authority":"National Social Security Fund","sourceUrl":"https://www.nssf.or.ke/benefits | https://nssf.ecitizen.go.ke/","notes":"Official NSSF page covers benefits and grants; amounts are benefit-specific rather than one fixed employer claim."},{"category":"Work Injury / Occupational Disease","schemeName":"Work Injury Benefits Act compensation","claimableBy":"Employee claimant; employer reports/participates","eligible":"Employee who suffers a workplace accident or occupational disease covered by the Work Injury Benefits Act.","amount":"Compensation, medical aid and related benefits are assessed under WIBA; amount depends on injury, earnings and Director/assessment outcome.","duration":"For covered injury, disease, incapacity, disability or death case according to WIBA.","howToClaim":"Report the accident/occupational disease and follow Labour Ministry / Director of Occupational Safety and Health process.","documents":"Accident report, medical certificate, wage details, employment information, witness/supporting evidence and claim forms.","deadline":"Report promptly after accident/disease; statutory timelines should be checked in the WIBA process for the specific case.","employerResp":"Report workplace accidents, keep insurance/OSH records and provide wage/employment evidence.","employeeResp":"Notify employer/authority, attend medical assessment and submit evidence.","payrollImpact":"Record absence as work injury and coordinate compensation/medical treatment with statutory process.","authority":"Ministry of Labour and Social Protection / Directorate of Occupational Safety and Health","sourceUrl":"https://www.labour.go.ke/sites/default/files/2022-10/Work-Injury-Benefits-ACT-2007.pdf","notes":"Official Act used because benefit amount is case-assessed rather than a simple fixed grant."},{"category":"Training / Skills","schemeName":"NITA training cost reimbursement","claimableBy":"Employer","eligible":"Levy-contributing employer that incurs approved employee training costs and meets NITA reimbursement rules.","amount":"NITA guidance states reimbursement may be in part or full for training costs incurred on employees.","duration":"For approved training/reimbursement applications; period depends on NITA rules and training cycle.","howToClaim":"Register as levy payer and submit training/reimbursement application to NITA with supporting records.","documents":"Training invoices/receipts, attendance records, programme details, levy compliance evidence and NITA application forms.","deadline":"Submit within NITA reimbursement process/timeframes for the training activity.","employerResp":"Pay levy, keep training records and submit reimbursement application.","employeeResp":"Attend/complete training where relevant.","payrollImpact":"Can offset approved training spend; should be tracked separately from normal payroll cost.","authority":"National Industrial Training Authority","sourceUrl":"https://nita.go.ke/our-services/levy-inspectorate.html | https://nita.go.ke/component/edocman/guidelines-for-training-and-reimbursement.html?Itemid=0","notes":"Official NITA source states reimbursement in part or full; exact approval depends on NITA review."},{"category":"Training / Internship","schemeName":"NITA industrial attachment opportunities and grants","claimableBy":"Employer / training host","eligible":"Employer or institution participating in NITA-supported industrial attachment arrangements.","amount":"NITA levy inspectorate page states industrial attachment opportunities and grants are available to attaching employers.","duration":"Programme-based; duration/limit depends on NITA attachment grant window and approval.","howToClaim":"Apply/participate through NITA official channels when attachment opportunities or grant windows are active.","documents":"Employer registration, attachment placement information, trainee records, levy/payment evidence and NITA-required documents.","deadline":"During open NITA opportunity/grant processes.","employerResp":"Host trainees, maintain placement records and comply with NITA requirements.","employeeResp":"Participate in attachment/training and provide documents as required.","payrollImpact":"May reduce attachment/training cost but is not automatic payroll reimbursement.","authority":"National Industrial Training Authority","sourceUrl":"https://nita.go.ke/our-services/levy-inspectorate.html","notes":"Marked programme-based because NITA availability and grant approval can change."}],"Kuwait":[{"category":"Unemployment / Job Loss","schemeName":"Unemployment Insurance","claimableBy":"Employee / insured worker","eligible":"Insured workers in the private and oil sectors covered by Kuwait unemployment insurance whose service has ended and who meet legal conditions.","amount":"Unemployment compensation is paid under PIFSS unemployment insurance; exact amount and duration follow the law and PIFSS assessment.","duration":"Temporary benefit after service ends, subject to PIFSS law and eligibility.","howToClaim":"Register/apply through Kuwait Government Online / PIFSS unemployment insurance service.","documents":"Civil ID, insurance record, termination/service-end evidence, employment details and PIFSS-requested documents.","deadline":"After service ends; submit according to PIFSS online service requirements.","employerResp":"Register/pay social insurance for eligible Kuwaiti/GCC employees and provide termination data when required.","employeeResp":"Submit application and required documents.","payrollImpact":"HR leaver records and social insurance registration affect the employee claim.","authority":"Public Institution for Social Security / Kuwait Government Online","sourceUrl":"https://pifss.gov.kw/sites/En/pages/eservices/unemploymentinsurance.aspx | https://e.gov.kw/sites/kgoenglish/Pages/Services/PIFFS/UnemploymentInsuranceRegistrationForm.aspx","notes":"Official KGO page states this registers unemployment compensation for persons whose service ended in private or oil sector."},{"category":"Employment Support / Allowance","schemeName":"National Labour Support / Labour Support Benefits","claimableBy":"Employee / Kuwaiti national worker; employer data may be required","eligible":"Kuwaiti national workers in the private sector or eligible categories under Public Authority for Manpower support rules.","amount":"Support/allowance amount depends on PAM benefit category and national labour support rules.","duration":"As long as eligibility continues and PAM conditions are met.","howToClaim":"Use Public Authority for Manpower labour support e-services / benefits department.","documents":"Civil ID, employment registration, salary/social insurance data, employer details and PAM forms.","deadline":"Submit according to PAM e-service/benefits procedures.","employerResp":"Register national labour properly and keep wage/social insurance data updated.","employeeResp":"Apply/maintain eligibility through PAM/Sahel/e-service channels.","payrollImpact":"Important for Kuwait payroll because national labour support is separate from employer salary and may require employer data consistency.","authority":"Public Authority for Manpower","sourceUrl":"https://www.manpower.gov.kw/ | https://www.manpower.gov.kw/EServices.aspx","notes":"Official PAM site lists labour support benefit services; rates require checking current PAM category rules."},{"category":"Social Security / Pension","schemeName":"PIFSS insured benefits","claimableBy":"Employee / insured Kuwaiti worker, business owner or beneficiary","eligible":"Kuwaiti insured persons, business owners, retirees or beneficiaries covered by PIFSS.","amount":"PIFSS pays social security benefits according to insurance chapter/status; exact amount depends on contribution record and law.","duration":"Depends on benefit type, such as retirement, disability, survivor or other PIFSS-covered event.","howToClaim":"Apply through PIFSS e-services or submit official insured/beneficiary forms.","documents":"Civil ID, nationality certificate, employment contract/appointment/termination evidence and PIFSS forms as relevant.","deadline":"When qualifying event occurs; timing depends on benefit type.","employerResp":"Enroll/terminate insured workers correctly and maintain contribution data.","employeeResp":"Submit the applicable form and evidence.","payrollImpact":"Payroll contribution and enrollment accuracy are central to future benefit eligibility.","authority":"Public Institution for Social Security","sourceUrl":"https://pifss.gov.kw/sites/En/Pages/Persona/Insured.aspx | https://www.pifss.gov.kw/sites/En/Pages/PersonsDefination.aspx","notes":"PIFSS defines insured persons and required documents; not a general employer reimbursement."}],"Laos":[{"category":"Social Security / Maternity","schemeName":"National Social Security Fund maternity or miscarriage benefit","claimableBy":"Employee / insured person","eligible":"Insured employee or voluntary insured person covered by Lao social security and meeting maternity/miscarriage benefit conditions.","amount":"Social Security Law lists maternity or miscarriage as a protected benefit; amount depends on NSSF rules and insurable earnings.","duration":"For qualifying maternity/miscarriage period under NSSF law/rules.","howToClaim":"Claim through Lao Social Security Organisation / National Social Security Fund process.","documents":"Social security registration, contribution evidence, medical/pregnancy/birth documents, employer details and bank/payment details.","deadline":"Submit according to LSSO/NSSF claim process when qualifying event occurs.","employerResp":"Register employees and pay NSSF contributions.","employeeResp":"Submit claim documents to LSSO/NSSF.","payrollImpact":"Payroll contributions fund eligibility; HR should coordinate leave with NSSF benefit claim.","authority":"Lao Social Security Organisation / National Social Security Fund","sourceUrl":"https://lsso.gov.la/Legislation/nssf%20law34%20en.pdf | https://lsso.gov.la/Legislation/nssf%20law%2054%20en.pdf","notes":"Official LSSO law PDFs list maternity/miscarriage as a social security benefit; operational details may require local LSSO service guidance."},{"category":"Social Security / Sickness","schemeName":"National Social Security Fund sickness benefit","claimableBy":"Employee / insured person","eligible":"Insured person temporarily unable to work due to sickness and meeting NSSF conditions.","amount":"Social Security Law lists sickness as a covered social security benefit; payment depends on NSSF rules and insurable earnings.","duration":"For covered sickness/incapacity period as approved by NSSF.","howToClaim":"Apply through LSSO/NSSF using medical evidence and contribution record.","documents":"Medical certificate, NSSF registration/contribution record, employer confirmation and payment details.","deadline":"Submit as required by LSSO/NSSF when sickness/incapacity occurs.","employerResp":"Register employees, pay contributions and verify absence/employment where required.","employeeResp":"Provide medical certificate and apply for benefit.","payrollImpact":"Sickness absence may shift part of income protection to NSSF depending on approval.","authority":"Lao Social Security Organisation / National Social Security Fund","sourceUrl":"https://lsso.gov.la/Legislation/nssf%20law34%20en.pdf | https://lsso.gov.la/Legislation/nssf%20law%2054%20en.pdf","notes":"Use official law source; amounts should be verified with current LSSO schedule before payroll modelling."},{"category":"Work Injury / Occupational Disease","schemeName":"National Social Security Fund employment injury / occupational disease benefit","claimableBy":"Employee / insured person; employer reports","eligible":"Insured worker with employment injury or occupational disease covered by NSSF.","amount":"Law includes employment injury and occupational disease benefits; amount depends on assessment and NSSF rules.","duration":"For treatment, incapacity or longer-term benefit period as assessed.","howToClaim":"Report/claim through employer and LSSO/NSSF process.","documents":"Accident report, medical evidence, employer data, contribution record and NSSF claim documents.","deadline":"Report promptly according to NSSF/OSH requirements; exact timeline should be checked locally.","employerResp":"Report accident/disease and maintain contribution/OSH records.","employeeResp":"Attend assessment and provide evidence.","payrollImpact":"HR must record work injury absence and coordinate NSSF benefit process.","authority":"Lao Social Security Organisation / National Social Security Fund","sourceUrl":"https://lsso.gov.la/Legislation/nssf%20law34%20en.pdf | https://lsso.gov.la/Legislation/nssf%20law%2054%20en.pdf","notes":"Official law source confirms employment injury/occupational disease is in the NSSF benefit package."},{"category":"Unemployment / Job Loss","schemeName":"National Social Security Fund unemployment benefit","claimableBy":"Employee / insured person","eligible":"Insured person who becomes unemployed and meets contribution/eligibility conditions under NSSF law.","amount":"Law lists unemployment as a social security benefit; benefit amount and duration depend on NSSF rules and contribution record.","duration":"Temporary unemployment support according to NSSF law/rules.","howToClaim":"Apply through LSSO/NSSF after unemployment with required evidence.","documents":"Termination/unemployment evidence, NSSF contr
