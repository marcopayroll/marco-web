l pay for first week, ACC generally starts from day 8 if approved.","duration":"For approved incapacity period after first week; duration depends on recovery/ACC assessment.","howToClaim":"Health provider lodges injury claim; claimant separately applies for weekly compensation via ACC/MyACC or contacts ACC.","documents":"Medical certificate/ACC claim, employment/earnings information and bank/tax details.","deadline":"Apply when injury claim is accepted and medical certificate shows incapacity; no fixed universal deadline in summary page.","employerResp":"Pay first week for work injury and provide earnings/return-to-work support.","employeeResp":"Apply for weekly compensation and provide medical/earnings evidence.","payrollImpact":"Payroll must handle first-week employer payment and possible top-ups separately from ACC.","authority":"ACC","sourceUrl":"https://www.acc.co.nz/im-injured/financial-support/weekly-compensation/weekly-compensation-for-employees | https://www.acc.co.nz/for-business/supporting-your-injured-employee-to-recover-at-work/income-for-your-employee-while-they-recover","notes":"ACC is a New Zealand Crown entity; official ACC pages used."},{"category":"Hiring / Wage Subsidy / Training","schemeName":"Flexi-wage subsidy","claimableBy":"Employer and jobseeker","eligible":"Employers hiring staff who need extra support to get started, keep working, upskill or fill a role, subject to Work and Income assessment.","amount":"Wage contribution to help employers pay wages; training and ongoing support can also be included if needed. Amount is case-assessed.","duration":"Programme/agreement-specific.","howToClaim":"Employer completes Work and Income Flexi-wage employer contact/application form.","documents":"Employer and role details, candidate/jobseeker information, training/support plan if required.","deadline":"Apply before or during hiring/support arrangement; Work and Income aims to contact employer within 5 working days after form submission.","employerResp":"Apply and agree wage/training support terms before relying on subsidy.","employeeResp":"Participate in Work and Income plan/support.","payrollImpact":"Can offset wage/training cost but is not automatic; payroll should only apply after approval.","authority":"Work and Income / Ministry of Social Development","sourceUrl":"https://www.workandincome.govt.nz/employers/subsidies-training-and-other-help/flexi-wage.html | https://services.workandincome.govt.nz/online_forms/flexi_wage_employer_form/new","notes":"Official Work and Income pages used."},{"category":"Training / Apprenticeship","schemeName":"Apprenticeship Boost","claimableBy":"Employer","eligible":"Employers taking on or retaining eligible apprentices in training toward qualification, subject to current Apprenticeship Boost rules.","amount":"Payment made directly to employers; current amount/eligibility depends on latest MSD/TEC settings.","duration":"Programme-based; Apprenticeship Boost was made permanent in Budget 2024, with rules amended from 2025.","howToClaim":"Apply through the official Apprenticeship Boost process/agency route; confirm current portal at time of claim.","documents":"Employer details, apprentice employment/training evidence and programme details.","deadline":"Programme-specific; apply while apprentice is eligible and employed.","employerResp":"Apply and maintain apprentice employment/training records.","employeeResp":"Apprentice must be in eligible training/employment.","payrollImpact":"Employer receives support directly; payroll should retain proof of eligibility and approval.","authority":"MSD / Business.govt.nz / TEC","sourceUrl":"https://www.business.govt.nz/people-and-leave/advertising-and-hiring/recruitment-options-for-your-business | https://www.msd.govt.nz/about-msd-and-our-work/publications-resources/monitoring/major-spending-decisions/index.html | https://www.msd.govt.nz/about-msd-and-our-work/about-msd/legislation/notice-of-change/2024/apprenticeship-boost-initiative-amendment-2024.html","notes":"Official NZ government sources confirm direct employer payment and permanent status/amendment."},{"category":"Business / Self-employment Support","schemeName":"Flexi-wage self-employment / Business Training and Advice support","claimableBy":"Self-employed person / person starting business","eligible":"Person planning to start or already getting Flexi-wage self-employment and meeting Work and Income criteria; business advice grant may support training/advice costs.","amount":"Support can help with start-up costs and business training/advice; exact amount is Work and Income-assessed.","duration":"Programme/agreement-specific.","howToClaim":"Apply through Work and Income online form or case manager route.","documents":"Business plan/support needs, personal eligibility, training/advice cost evidence.","deadline":"Apply before committing costs where approval is required.","employerResp":"Not usually an employer payroll claim; relevant if engaging self-employed/start-up pathway.","employeeResp":"Apply and provide business/training evidence.","payrollImpact":"Useful for workforce transition or self-employment support, not normal employee payroll.","authority":"Work and Income / Business.govt.nz","sourceUrl":"https://www.workandincome.govt.nz/products/a-z-benefits/flexi-wage-self-employment.html | https://www.business.govt.nz/business-stage-or-type/sole-traders/funding-and-other-government-help","notes":"Official Work and Income and Business.govt.nz pages used."}],"Nigeria":[{"category":"Work Injury / Occupational Disease","schemeName":"Employees' Compensation Scheme (ECS)","claimableBy":"Employee / dependants, through NSITF claim process","eligible":"Employee who suffers work-related injury, occupational disease, disability or death in the course of employment; scheme is employer-funded.","amount":"Compensation/medical support depends on injury, disability, death, medical expenses and NSITF assessment under the Employees' Compensation Act/ECS.","duration":"For covered treatment, disability, death or recovery period as determined by NSITF.","howToClaim":"Employer/worker reports accident or disease and submits NSITF claim forms through NSITF branch/claims channels.","documents":"Accident notification form, claim for compensation form, medical report/evidence, employer details, employee details and other NSITF checklist documents.","deadline":"Report promptly after accident/disease; exact claim processing depends on NSITF forms/checklist.","employerResp":"Register with NSITF/ECS, pay employer contribution, report workplace accidents/diseases and support claim documentation.","employeeResp":"Report incident, attend medical assessment and provide evidence requested by NSITF.","payrollImpact":"Payroll/HR must track work-injury absence and coordinate statutory compensation instead of treating it as ordinary sick leave only.","authority":"Nigeria Social Insurance Trust Fund (NSITF)","sourceUrl":"https://nsitf.gov.ng/compensation/ | https://nsitf.gov.ng/resources/","notes":"Official NSITF resources list accident notification, compensation claim and claim re-opening forms."},{"category":"Training Grant / Levy Reimbursement","schemeName":"Industrial Training Fund (ITF) Training Reimbursement Scheme","claimableBy":"Employer","eligible":"Contributing employer that paid full annual training contribution and implemented approved training according to ITF reimbursement rules.","amount":"Up to maximum 50% of the annual training contribution paid, subject to ITF reimbursement criteria and training categories.","duration":"Annual training year; claims relate to training implemented in the relevant year.","howToClaim":"Submit annual training plan/approval and claim file to the relevant ITF Area Office using prescribed ITF TR forms.","documents":"Evidence of training contribution payment, approved training plan/forms, attendance list, certificates, receipts, course evidence and ITF monitoring forms where required.","deadline":"Training claims must reach the relevant ITF Area Office on or before 30 June after the training year.","employerResp":"Pay 1% training contribution where covered, obtain training approval, maintain records and submit claim file.","employeeResp":"Attend approved training and sign attendance/receive certificates where needed.","payrollImpact":"Can partially offset training cost/levy; HR must keep training records and evidence for reimbursement audit.","authority":"Industrial Training Fund (ITF)","sourceUrl":"https://itf.gov.ng/pdf/Reimbursement.pdf | https://itf.gov.ng/employer_reg/","notes":"Official ITF scheme states covered employers contribute 1% payroll and qualifying employers may be reimbursed up to 50% of training contribution."},{"category":"Work Injury / Medical Expenses","schemeName":"ECS medical expenses / disability / death benefit claim","claimableBy":"Employee / dependants","eligible":"Covered worker or dependants where workplace injury, occupational disease, disability or death qualifies under ECS.","amount":"Benefit amount depends on medical expenses, disability/death assessment and Employees' Compensation Act rules; NSITF lists medical expense refund, death benefits and disability benefits.","duration":"Case-specific; tied to treatment, disability assessment or survivor entitlement.","howToClaim":"File the relevant ECS compensation claim with NSITF and follow claim investigation/assessment.","documents":"Medical bills/reports, accident report, employer schedule/payment evidence, death certificate or disability assessment where applicable.","deadline":"No single universal public deadline found on NSITF page; report and claim as soon as incident occurs.","employerResp":"Keep ECS registration/payment up to date and provide reports/evidence to NSITF.","employeeResp":"Provide treatment/claim evidence and cooperate with assessment.","payrollImpact":"Work injury costs may be transferred to statutory ECS where approved, but employer must still report and document correctly.","authority":"Nigeria Social Insurance Trust Fund (NSITF)","sourceUrl":"https://nsitf.gov.ng/compensation/ | https://nsitf.gov.ng/publications/","notes":"Included separately because NSITF tracks medical expense refund, death benefits and disability benefits as ECS outcomes."}],"Norway":[{"category":"Sick Leave / Public Insurance Reimbursement","schemeName":"NAV sickness benefit refund to employer","claimableBy":"Employer or employee","eligible":"Employee qualifies for sickness benefit; employer normally pays employer period and can receive NAV refunds where employer continues salary beyond NAV-covered period or specific refund situations apply.","amount":"Benefit/refund is based on NAV sickness benefit rules; public sources state employee must meet qualifying period and income requirement.","duration":"After employer period and for NAV-covered sickness benefit period, subject to statutory limits and eligibility.","howToClaim":"Employer submits income information and refund claim/application through NAV/Altinn employer services.","documents":"Income information form, sick leave documentation/medical certificate and payroll/payment evidence as required.","deadline":"Refund claims generally must be made within 3 months, otherwise entitlement can be lost.","employerResp":"Pay and follow up sick leave, submit income information and refund application on time.","employeeResp":"Submit sick note/self-certification and cooperate with follow-up plan.","payrollImpact":"Payroll must separate employer-paid period from NAV-refunded benefit/top-up.","authority":"NAV / Altinn","sourceUrl":"https://info.altinn.no/en/start-and-run-business/working-conditions/print-leave-of-absence-and-holidays/paid-and-unpaid-leave/ | https://www.nav.no/arbeidsgiver/soknader/en","notes":"Altinn notes refund claims within three months for relevant NAV leave benefits."},{"category":"Maternity / Parental","schemeName":"Parental benefit refund to employer","claimableBy":"Employer or employee","eligible":"Employee entitled to parental benefit; employer can receive refund if it pays salary during leave instead of employee being paid directly by NAV.","amount":"NAV benefit/refund based on parental benefit entitlement; employer refund depends on salary paid and NAV rules.","duration":"For approved parental benefit period.","howToClaim":"Employer submits income information/refund claim to NAV; employee applies for parental benefit.","documents":"Income information, leave dates, employee application/benefit documentation and payroll evidence.","deadline":"Employer refund claims generally within 3 months; employee must apply punctually.","employerResp":"Coordinate leave, pay salary if company policy/CBA applies and claim refund where applicable.","employeeResp":"Apply for parental benefit and agree leave timing with employer.","payrollImpact":"Payroll needs correct leave coding and treatment of NAV reimbursements versus employer top-ups.","authority":"NAV / Altinn","sourceUrl":"https://www.nav.no/arbeidsgiver/ansatt-venter-barn/en | https://info.altinn.no/en/start-and-run-business/working-conditions/print-leave-of-absence-and-holidays/paid-and-unpaid-leave/","notes":"NAV states it reimburses parental benefit to employer using registered employer bank account."},{"category":"Care Leave / Child Illness","schemeName":"Care benefit / child sickness refund","claimableBy":"Employer","eligible":"Employee has statutory paid days for child illness; employer covers first ten days and can claim NAV refund for eligible days beyond that.","amount":"NAV refund for carer's allowance / child illness days after employer-covered entitlement, depending on family/child situation.","duration":"Annual child sickness leave limits vary by family/child count and situation.","howToClaim":"Employer submits income information and refund claim to NAV/Altinn.","documents":"Income information, absence documentation, child illness/care documentation if requested.","deadline":"Refund claim generally within 3 months.","employerResp":"Pay statutory employer-covered days, submit income/refund information for NAV-covered days.","employeeResp":"Notify employer and provide required care/illness documentation.","payrollImpact":"Payroll must track child sick leave days separately from ordinary sick leave.","authority":"NAV / Altinn","sourceUrl":"https://info.altinn.no/en/start-and-run-business/working-conditions/print-leave-of-absence-and-holidays/paid-and-unpaid-leave/","notes":"Altinn explains employer first covers days for child illness and can claim NAV refunds afterward."},{"category":"Hiring / Wage Subsidy","schemeName":"Varig lønnstilskudd (Permanent wage subsidy)","claimableBy":"Employer","eligible":"Employer hires or retains a person with permanently reduced work capacity; NAV assesses eligibility.","amount":"NAV pays part of wage over time to compensate for reduced work capacity; amount is case-by-case in NAV agreement.","duration":"Longer-term/ongoing support according to NAV agreement and assessment.","howToClaim":"Employer contacts NAV and enters agreement with NAV and employee.","documents":"NAV assessment, employment agreement, wage details and follow-up agreement.","deadline":"Before start/continuation of subsidised employment as agreed with NAV.","employerResp":"Hire/pay employee on ordinary terms and follow NAV agreement.","employeeResp":"Participate in NAV assessment and follow-up measures.","payrollImpact":"Can reduce employment cost but employee remains ordinary employee on normal wage/conditions.","authority":"NAV","sourceUrl":"https://www.nav.no/arbeidsgiver/varig-lonnstilskudd | https://info.altinn.no/skjemaoversikt/arbeids-og-velferdsetaten-nav/avtale-om-oppstart-av-lonnstilskudd/","notes":"NAV describes employer wage subsidy for employees with permanently reduced work capacity."},{"category":"Work Injury / Occupational Disease","schemeName":"Occupational injury benefit / insurance claim","claimableBy":"Employee","eligible":"Person suffers occupational injury or occupational disease as defined by Norwegian rules; employer must report occupational injuries/illnesses to NAV.","amount":"Benefits may include special National Insurance treatment/benefits and occupational injury insurance compensation; amount depends on case.","duration":"Case-specific depending on injury, treatment, disability or survivor claim.","howToClaim":"Employer reports occupational injury/illness to NAV and notifies Labour Inspection Authority/police for serious injuries/death; employee claims benefits through NAV/insurer.","documents":"Injury report, medical documentation, employer report, insurance evidence and NAV-requested documents.","deadline":"Serious injury/death must be notified immediately; NAV reporting should be made as required after accident/illness.","employerResp":"Report to authorities/NAV and maintain mandatory occupational injury insurance.","employeeResp":"Seek medical care and apply/provide evidence for NAV/insurance claim.","payrollImpact":"HR must record accident, report externally and coordinate insurance/NAV documentation.","authority":"NAV / Norwegian Labour Inspection Authority / Altinn","sourceUrl":"https://www.nav.no/yrkesskade/en | https://info.altinn.no/en/start-and-run-business/working-conditions/health-safety-and-environment-hse/obligation-to-report-occupational-accidents-injuries-and-illness/ | https://www.arbeidstilsynet.no/en/contact/give-notice-about-occupational-accident/occupational-injury-insurance/","notes":"Occupational injury insurance is separate from ordinary sick pay and may cover income loss and costs."}],"Oman":[{"category":"Maternity / Paternity","schemeName":"Maternity Leaves Insurance","claimableBy":"Employer / employee","eligible":"Working mothers covered by Oman Social Protection Fund maternity leave insurance; SPF page states the programme provides maternity leave throughout pregnancy and after childbirth and includes paternity leave.","amount":"Benefit/allowance under SPF maternity leave insurance; precise payable amount and reimbursement process depend on SPF law/regulations and employee coverage.","duration":"Maternity/paternity leave period under SPF rules; coverage commenced under Social Protection Law timeline.","howToClaim":"Apply/verify through SPF services, including maternity leave benefit service on gov.om/SPF channels.","documents":"Employee/employer registration, wage data, leave details, birth/medical evidence and SPF-required forms.","deadline":"Follow SPF portal/service timing; no universal deadline stated on public summary page.","employerResp":"Register insured workers, pay maternity leave insurance contributions and submit/verify wage/leave data.","employeeResp":"Provide pregnancy/birth and identity/insurance details.","payrollImpact":"Payroll must align leave pay, SPF contributions and any reimbursement/benefit handling.","authority":"Social Protection Fund (SPF)","sourceUrl":"https://www.spf.gov.om/en/insurance_programs/insurance-for-maternity-leaves/ | https://gov.om/en/social-protection-fund","notes":"Official SPF page confirms maternity leave insurance and paternity leave coverage."},{"category":"Sick Leave / Other Leave","schemeName":"Insurance for Sick and Other Leaves","claimableBy":"Employee / employer","eligible":"Covered worker under SPF sick/other leave branch; SPF describes sick leave and unusual leaves such as marriage, death and patient accompanying leave.","amount":"Insurance rights for covered leaves; exact amount depends on Social Protection Law/executive regulations.","duration":"Branch takes effect two years after Social Protection Law implementation according to SPF page.","howToClaim":"Use SPF service/claim procedure when branch is active and employee qualifies.","documents":"Medical/leave proof, employment/insurance registration and SPF-required evidence.","deadline":"Follow SPF implementing rules once active.","employerResp":"Pay required contributions and maintain accurate leave/wage records.","employeeResp":"Provide medical or leave evidence.","payrollImpact":"Future payroll impact: leave benefits may shift from pure employer cost to SPF insurance handling when active.","authority":"Social Protection Fund (SPF)","sourceUrl":"https://www.spf.gov.om/en/insurance_programs/insurance-for-sick-and-other-leaves/ | https://www.spf.gov.om/en/faq/what-are-the-contribution-rates-to-be-paid-by-the-worker-and-employer/","notes":"Included with effective-date caution because SPF page says branch takes effect two years after law implementation."},{"category":"Work Injury / Occupational Disease","schemeName":"Work Injuries and Occupational Diseases Insurance","claimableBy":"Employer / employee","eligible":"Covered workers with work injury or occupational disease; SPF FAQ notes non-Omani workers are covered under work injury and occupational disease insurance as applicable.","amount":"Medical/compensation benefits depend on Social Protection Law/regulations and injury assessment.","duration":"For covered injury/disease and recovery/assessment period.","howToClaim":"Employer reports work injury or occupational disease through gov.om/SPF service.","documents":"Incident report, worker details, employment/insurance information, medical reports and other SPF-requested documents.","deadline":"Report promptly through official service; exact timing follows SPF/MOL service rules.","employerResp":"Report injuries/diseases, pay contributions and cooperate with SPF assessment.","employeeResp":"Report incident and provide medical evidence.","payrollImpact":"HR must log work injury and submit official report; not just internal accident record.","authority":"Social Protection Fund / Gov.om","sourceUrl":"https://gov.om/en/w/report-a-work-injury-or-occupational-disease | https://www.spf.gov.om/en/faq/do-the-social-insurance-programs-cover-non-omani-workers/","notes":"gov.om service states employers and stakeholders can report work injuries and occupational diseases."},{"category":"Unemployment / Employment Security","schemeName":"Employment Security Insurance","claimableBy":"Employee","eligible":"Omani workers covered by employment security insurance who lose work for qualifying reasons beyond their control.","amount":"Employment security insurance benefit under SPF; contribution table shows employee 0.5% and employer 0.5% from 1 Jan 2024.","duration":"Duration and rate depend on SPF rules/individual eligibility.","howToClaim":"Apply through SPF employment security/job security process.","documents":"Employment termination evidence, wage/contribution history, identity and SPF-requested documents.","deadline":"Apply according to SPF rules after qualifying job loss.","employerResp":"Pay employer contribution and report employment/contribution data accurately.","employeeResp":"Apply after job loss and provide termination/contribution evidence.","payrollImpact":"Payroll must ensure contributions and termination reporting are accurate because they affect benefit entitlement.","authority":"Social Protection Fund (SPF)","sourceUrl":"https://www.spf.gov.om/en/faq/what-are-the-contribution-rates-to-be-paid-by-the-worker-and-employer/ | https://www.spf.gov.om/en/about-us/","notes":"SPF contribution table confirms employment security insurance contributions."},{"category":"Old Age / Disability / Death","schemeName":"Insurance for Old Age, Disability and Death","claimableBy":"Employee / dependants","eligible":"Omani workers and specified categories covered by SPF old age, disability and death scheme.","amount":"Pension/benefit depends on contribution periods, age/disability/death conditions and SPF calculation.","duration":"Ongoing pension/benefit if eligibility is met.","howToClaim":"Apply through SPF registration/benefit channels.","documents":"Contribution record, identity, employment data, medical disability/death evidence where relevant.","deadline":"At qualifying event/age or after disability/death conditions arise.","employerResp":"Register worker and pay employer contributions accurately.","employeeResp":"Maintain registration and apply/provide evidence at claim event.","payrollImpact":"Contribution accuracy affects pension/benefit entitlement; HR must manage SPF reporting.","authority":"Social Protection Fund (SPF)","sourceUrl":"https://www.spf.gov.om/en/insurance_programs/insurance-for-the-old-age-disability-and-death/ | https://www.spf.gov.om/en/faq/what-are-the-contribution-rates-to-be-paid-by-the-worker-and-employer/","notes":"Included because it is a statutory social insurance claim rather than an employer reimbursement."}],"Pakistan":[{"category":"Sickness / Maternity / Injury","schemeName":"Provincial Employees Social Security cash benefits (PESSI example)","claimableBy":"Employee","eligible":"Secured worker registered with provincial social security institution; eligibility varies by province and covered establishment.","amount":"PESSI states sickness benefit 75% of wages up to 121 days; injury benefit 100% wages up to 180 days; maternity 100% wages for 6 weeks prenatal and 6 weeks postnatal.","duration":"Depends on benefit type and provincial rules.","howToClaim":"Claim through relevant provincial social security institution/dispensary/office.","documents":"Social security card/registration, medical certificate, employer details, wage record and benefit-specific documents.","deadline":"Apply when sickness/maternity/injury occurs; exact timing depends on provincial procedure.","employerResp":"Register/pay provincial social security contribution and verify worker record.","employeeResp":"Provide social security card and medical/maternity/injury evidence.","payrollImpact":"Payroll should track social security-covered absence separately from ordinary employer-paid leave.","authority":"Punjab Employees Social Security Institution (PESSI) / provincial ESSI","sourceUrl":"https://pessi.punjab.gov.pk/cash_benefits | https://pessi.punjab.gov.pk/","notes":"Pakistan social security is provincial; PESSI is used as an official provincial example."},{"category":"Old Age / Pension","schemeName":"Employees' Old-Age Benefits Institution (EOBI) benefits","claimableBy":"Employee / dependants","eligible":"Private-sector employee registered/insured with EOBI and meeting old-age, invalidity, survivors or grant eligibility.","amount":"Old-age, invalidity, survivors and old-age grant benefits; amount depends on EOBI law, contribution record and qualifying conditions.","duration":"Ongoing pension or one-time grant depending on benefit type.","howToClaim":"Apply/verify through EOBI online services/office.","documents":"CNIC, EOBI registration, employment/contribution record, age/disability/death evidence where relevant.","deadline":"At retirement age, invalidity or death/survivor event.","employerResp":"Register/pay EOBI contributions and keep records updated.","employeeResp":"Check EOBI registration/records and submit claim at qualifying event.","payrollImpact":"Payroll contribution records directly affect pension/benefit entitlement.","authority":"Employees' Old-Age Benefits Institution (EOBI)","sourceUrl":"https://fs2e.eobi.gov.pk/Login.iface","notes":"Official EOBI portal is used; detailed benefit rates should be verified from EOBI circular/law before advising employees."},{"category":"Worker Welfare Grant","schemeName":"Workers Welfare Fund / Punjab Workers Welfare Fund marriage grant","claimableBy":"Employee / worker family","eligible":"Registered industrial worker meeting Workers Welfare Fund / provincial board conditions; Punjab page states bride age must be at least 18.","amount":"Grant amount depends on current federal/provincial WWF/PWWF notification; official page confirms marriage grant service and timing.","duration":"One-time grant per eligible marriage event, subject to scheme rules.","howToClaim":"Submit application to relevant field office / MIS where applicable.","documents":"Marriage certificate/nikkah documents, worker ID, EOBI/social security card and documents required by relevant board.","deadline":"Punjab page states application within one year from date of marriage, with possible delay condonation up to two years maximum.","employerResp":"Provide employment/social security/EOBI verification where required.","employeeResp":"Submit grant application and evidence.","payrollImpact":"Usually not payroll cost, but HR may need to support employment verification.","authority":"Workers Welfare Fund / Punjab Workers Welfare Fund","sourceUrl":"https://pwwf.punjab.gov.pk/marriage_grant | https://mis.wwf.gov.pk/welcome","notes":"Provincial differences apply; use relevant province board for final filing."},{"category":"Worker Welfare Grant","schemeName":"Workers Welfare Fund death grant / bereavement grant","claimableBy":"Employee dependants","eligible":"Dependants of eligible registered worker under WWF/provincial workers welfare board rules.","amount":"Grant amount depends on current WWF/provincial notification.","duration":"One-time death/bereavement grant.","howToClaim":"Submit death grant form through relevant WWF/provincial workers welfare board/field office.","documents":"Death certificate, EOBI or Social Security card, bank details, affidavit and board-required documents.","deadline":"Deadline depends on relevant board; verify provincial board requirements.","employerResp":"Provide employment verification and worker registration evidence where requested.","employeeResp":"Family/dependants submit claim and evidence.","payrollImpact":"Not a payroll reimbursement; HR support is mainly certification/documentation.","authority":"Workers Welfare Fund / KP Workers Welfare Board","sourceUrl":"https://wwf.gov.pk/Download | https://wwbkp.gov.pk/death_grant","notes":"Official federal and provincial pages list death grant forms/checklists."},{"category":"Education / Scholarship","schemeName":"Workers Welfare Fund education scholarship / talent scholarship","claimableBy":"Employee family","eligible":"Eligible worker's children/family under WWF/provincial board criteria.","amount":"Scholarship/education support amount depends on education level and current board rules.","duration":"Per academic year / course period, subject to continuing eligibility.","howToClaim":"Submit scholarship claim form through WWF/MIS/provincial workers welfare board.","documents":"Scholarship form, worker social security/EOBI evidence, school/college documents, fee/education records and required undertakings.","deadline":"Filing deadline depends on current form/board notification.","employerResp":"Support worker with employment verification and registration documents.","employeeResp":"Submit forms and education evidence.","payrollImpact":"Not payroll claim, but HR may assist workers with required employer certification.","authority":"Workers Welfare Fund","sourceUrl":"https://wwf.gov.pk/Download | https://mis.wwf.gov.pk/welcome","notes":"WWF download page lists scholarship claim forms and checklists."}],"Peru":[{"category":"Maternity / Parental","schemeName":"EsSalud maternity subsidy (Subsidio por maternidad)","claimableBy":"Employee / employer representative may process","eligible":"Pregnant insured worker meeting EsSalud contribution and employment conditions.","amount":"Subsidy compensates maternity leave; official page states 98 days.","duration":"98 days maternity subsidy period; special extensions may apply under separate rules.","howToClaim":"Apply through EsSalud/VIVA or authorized channels using Form 1040 where required.","documents":"Form 1040, medical/maternity certificate/CITT where applicable, identity, employment/contribution evidence and employer authorization if representative files.","deadline":"File according to EsSalud rules; verify current VIVA/OSPE deadline before submission.","employerResp":"Keep EsSalud contributions/payroll records and assist with forms if employer representative files.","employeeResp":"Apply/provide medical and identity documents.","payrollImpact":"Payroll must code maternity subsidy separately from ordinary salary and coordinate EsSalud reimbursement/direct payment treatment.","authority":"EsSalud / gob.pe","sourceUrl":"https://www.gob.pe/291-subsidio-por-maternidad-essalud | https://www.gob.pe/53164-subsidio-por-maternidad-en-essalud-requisitos-para-obtener-el-subsidio-por-maternidad-en-essalud","notes":"Official gob.pe states maternity subsidy is granted for 98 days."},{"category":"Sick Leave / Temporary Disability","schemeName":"EsSalud temporary incapacity subsidy","claimableBy":"Employee / employer representative may process","eligible":"Regular insured worker with employment relationship and required contributions; for accident, affiliation is enough according to official conditions page.","amount":"EsSalud subsidy from day 21 of incapacity; employer pays remuneration for first 20 days.","duration":"From day 21 up to maximum 11 months and 10 consecutive days, subject to conditions.","howToClaim":"Submit claim through EsSalud/VIVA/OSPE with required form/documents.","documents":"Form 1040, CITT/medical evidence, identity, employment/contribution evidence and employer authorization if applicable.","deadline":"Apply after qualifying incapacity and according to EsSalud procedure.","employerResp":"Pay first 20 days, maintain contributions and support claim if employer files.","employeeResp":"Provide medical certificate/CITT and claim documents.","payrollImpact":"Payroll must split first 20 employer-paid days from EsSalud subsidy period.","authority":"EsSalud / gob.pe","sourceUrl":"https://www.gob.pe/415-subsidio-para-el-trabajador-por-incapacidad-temporal | https://www.gob.pe/419-subsidio-para-el-trabajador-con-incapacidad-temporal-otorgado-por-essalud-condiciones | https://www.gob.pe/423-subsidio-para-el-trabajador-con-incapacidad-temporal-otorgado-por-essalud-requisitos-para-solicitar-y-cobrar-el-subsidio-por-incapacidad-temporal","notes":"Official page states EsSalud right begins from day 21 and employer remains obliged for first 20 days."},{"category":"Child / Birth Support","schemeName":"EsSalud lactation subsidy (Subsidio por lactancia)","claimableBy":"Mother of newborn / insured family","eligible":"Mother of live newborn child of regular or agrarian insured person meeting EsSalud coverage/contribution conditions; newborn must be registered in RENIEC.","amount":"One-time payment of S/ 820.00; in multiple birth, payment is made for each child.","duration":"One-time per live birth/newborn.","howToClaim":"Apply through EsSalud; some cases are handled through Lactancia Cero Trámites from participating birth-certificate systems.","documents":"Form 1040 if manual, DNI/identity, newborn registration, insured person details and contribution evidence as needed.","deadline":"Apply according to EsSalud lactation benefit procedure; automated route may not require manual filing.","employerResp":"Maintain EsSalud contribution records and assist employee if necessary.","employeeResp":"Ensure newborn registration and submit/verify benefit request.","payrollImpact":"Usually not employer payroll cost but HR may need to confirm coverage or support documents.","authority":"EsSalud / gob.pe","sourceUrl":"https://www.gob.pe/266-subsidio-por-lactancia-essalud | https://www.gob.pe/53032-solicitar-subsidio-por-lactancia-essalud-condiciones | https://www.gob.pe/52506-solicitar-subsidio-por-lactancia-essalud-lactancia-cero-tramites","notes":"Official gob.pe page states one-time S/820 lactation subsidy."},{"category":"Funeral / Death Support","schemeName":"EsSalud funeral benefit (Prestación por sepelio)","claimableBy":"Beneficiary / family","eligible":"Eligible beneficiary of insured person who incurred funeral expenses and meets EsSalud conditions.","amount":"Funeral benefit amount/limit depends on current EsSalud rules; included by EsSalud as an economic benefit.","duration":"One-time funeral expense benefit.","howToClaim":"Submit economic benefit claim to EsSalud using applicable Form 1040 / benefit channel.","documents":"Form 1040, death certificate, receipts/evidence of funeral expenses, identity and insured person contribution/coverage proof.","deadline":"Follow EsSalud procedure/deadline for sepelio benefit.","employerResp":"May provide employment/contribution support documents if requested.","employeeResp":"Submit receipts and death/identity documents.","payrollImpact":"Not regular payroll cost; HR may support family with employment/contribution proof.","authority":"EsSalud / gob.pe","sourceUrl":"https://www.gob.pe/institucion/essalud/tema/prestaciones-economicas | https://www.gob.pe/institucion/essalud/informes-publicaciones/6024768-f-1040-solicitud-de-prestaciones-economicas-subsidio-por-lactancia-subsidio-por-maternidad-y-prestacion-por-sepelio","notes":"EsSalud economic benefits category includes sepelio/funeral benefit."},{"category":"Employment / Training Support","schemeName":"Programa Nacional de Empleo Jóvenes Productivos","claimableBy":"Jobseeker / employer participation","eligible":"Vulnerable people aged 15+ according to official MTPE page; programme provides free employability and labour-market insertion support.","amount":"Free training/employability service; not a standard employer reimbursement amount.","duration":"Programme/placement dependent.","howToClaim":"Register/participate through MTPE Jóvenes Productivos channels.","documents":"Jobseeker registration data, socioeconomic eligibility evidence and programme-required documents.","deadline":"According to current programme calls/registration periods.","employerResp":"Employers may participate in formal employment opportunities/placement activities but should not treat it as a payroll subsidy unless a specific call states so.","employeeResp":"Register and complete programme requirements.","payrollImpact":"Useful for recruitment pipeline; not a direct payroll claim.","authority":"Ministry of Labour and Employment Promotion (MTPE)","sourceUrl":"https://www.gob.pe/institucion/mtpe/campa%C3%B1as/126732-jovenes-productivos | https://www.gob.pe/mtpe","notes":"Included as employment support, not an employer cash grant."}],"Philippines":[{"category":"Maternity / Parental","schemeName":"SSS Maternity Benefit","claimableBy":"Employee; employer advances for employed member then reimburses/settles with SSS","eligible":"Female SSS member who is unable to work due to childbirth, miscarriage or emergency termination of pregnancy and meets contribution/notification rules.","amount":"Daily cash allowance based on SSS maternity benefit rules; Expanded Maternity Leave law covers 105 days for childbirth, plus option for unpaid extension and additional days for solo mothers where applicable.","duration":"Generally 105 days for childbirth; shorter/other periods apply for miscarriage or emergency termination under SSS rules.","howToClaim":"File maternity notification/application through My.SSS or SSS channels; employed member coordinates with employer, who advances benefit when required.","documents":"Maternity notification/application, proof of pregnancy/childbirth or miscarriage/ETP, member and employer details, bank/disbursement details and SSS-required documents.","deadline":"Use SSS notification/application timing; law requires employer advance within 30 days from maternity leave application for employed members.","employerResp":"Submit/confirm maternity notification, advance benefit where required, and keep SSS contribution/payment records.","employeeResp":"Notify employer/SSS and submit medical/birth documents and claim application.","payrollImpact":"Payroll must treat the benefit as statutory SSS maternity benefit, not normal employer-funded salary only; employer cash flow may be affected by advance/reimbursement timing.","authority":"Social Security System (SSS)","sourceUrl":"https://www.sss.gov.ph/maternity-benefit/ | https://www.sss.gov.ph/wp-content/uploads/2022/04/20190220-RA-11210-RRD.pdf","notes":"Official SSS page defines maternity benefit as a daily cash allowance; official RA 11210 document states 105 days and employer advance rule."},{"category":"Sick Leave / Public Insurance","schemeName":"SSS Sickness Benefit","claimableBy":"Employee; employer may advance for employed member","eligible":"SSS member unable to work due to sickness or injury and meeting SSS qualifying conditions, including required confinement/incapacity and contributions.","amount":"Daily cash allowance for covered sickness/injury; SSS public guidance states members may receive up to 120 days in a calendar year.","duration":"Up to 120 days per calendar year according to SSS public guidance, subject to medical and contribution conditions.","howToClaim":"Submit sickness notification and benefit application via My.SSS/SSS; employer confirms/advances where applicable.","documents":"Sickness notification, medical certificate/records, employer certification where applicable, SSS member details and disbursement information.","deadline":"Follow SSS sickness notification and prescriptive periods; late filing can reduce/affect benefit.","employerResp":"Record sickness absence, certify employment/payroll details and advance/process benefit where required.","employeeResp":"Notify employer/SSS promptly and submit medical documents.","payrollImpact":"Payroll needs to separate employer leave pay from SSS sickness benefit and track statutory claim status.","authority":"Social Security System (SSS)","sourceUrl":"https://www.sss.gov.ph/sickness-benefit/ | https://www.sss.gov.ph/news-and-updates/sss-sickness-benefit-program-covers-covid-infected-workers-in-home-confinement/","notes":"Official SSS page defines sickness benefit as daily cash allowance for days a member cannot work due to sickness or injury."},{"category":"Work Injury / Occupational Disease","schemeName":"Employees' Compensation Program (ECP)","claimableBy":"Employee / dependants","eligible":"Public or private sector employee or covered SSS self-employed member with work-related sickness, injury, disability or death.","amount":"Compensation package depends on work-related contingency and ECP rules; benefits can include income/medical/disability/death-related support.","duration":"For approved work-related sickness, injury, disability or death claim period as assessed under ECP.","howToClaim":"File ECP claim through SSS/GSIS as applicable and submit required work-contingency evidence.","documents":"Accident/illness report, medical evidence, employer report/certification, employment and contribution records, death/disability documents where applicable.","deadline":"Report/file according to SSS/ECP procedures as soon as work-related contingency occurs.","employerResp":"Maintain coverage, report work accident/occupational disease and assist claim filing.","employeeResp":"Report the incident and submit medical/evidence documents.","payrollImpact":"HR must classify as work-related injury/occupational disease and coordinate statutory compensation instead of only ordinary sick leave.","authority":"Social Security System (SSS) / Employees' Compensation Program","sourceUrl":"https://www.sss.gov.ph/employees-compensation-program/","notes":"Official SSS page states ECP provides a compensation package for work-related sickness, injury or death."},{"category":"Emergency Employment / Wage Support","schemeName":"TUPAD - DOLE Emergency Employment Program","claimableBy":"Worker / community beneficiary; implemented through DOLE channels","eligible":"Disadvantaged, displaced, underemployed or seasonal workers covered by DOLE TUPAD rules and local validation.","amount":"Temporary wage public employment package; pay depends on applicable minimum wage/project rules and DOLE guidelines.","duration":"10 to 90 days, continuous or otherwise depending on the work/project.","howToClaim":"Apply/participate through DOLE regional/field offices or approved local project channels.","documents":"Beneficiary profile/application, valid ID, proof of displacement/eligibility, project documents and DOLE-required forms.","deadline":"According to current DOLE project call and local validation timeline.","employerResp":"Employers should not treat this as a normal company payroll subsidy unless formally participating in a DOLE-approved project.","employeeResp":"Register/participate and complete assigned public/community work.","payrollImpact":"Not a standard employer reimbursement; useful for displaced-worker support and CSR/community employment tracking.","authority":"Department of Labor and Employment (DOLE) - BWSC","sourceUrl":"https://bwsc.dole.gov.ph/dileep/tupad/ | https://dole.gov.ph/news/dole-expands-livelihood-and-emergency-employment-access-under-updated-kabuhayan-tupad-guidelines/","notes":"Official DOLE/BWSC page describes TUPAD as temporary wage public employment for 10 to 90 days."},{"category":"Training / Tax Incentive","schemeName":"TESDA Enterprise-Based Education and Training (EBET) / training expense deduction","claimableBy":"Employer / participating enterprise","eligible":"Participating enterprise delivering enterprise-based training under TESDA/EBET framework and meeting programme/tax requirements.","amount":"Official TESDA release states income tax deduction equivalent to 75% of actual training expenses starting 1 January 2028, from 50% under old law.","duration":"Claim/tax treatment depends on training period and tax year; 75% rate starts 1 January 2028 under EBET implementation.","howToClaim":"Participate/register under TESDA enterprise-based training mechanisms and claim tax deduction through tax filing once applicable rules/portal operate.","documents":"TESDA-approved training programme/contract, trainee records, actual training expense evidence, accreditation/approval documents and tax documents.","deadline":"According to TESDA/BIR implementation and tax filing deadlines.","employerResp":"Maintain TESDA-approved enterprise-based training records and actual expense evidence.","employeeResp":"Attend/complete approved training and meet trainee requirements.","payrollImpact":"Creates HR training record and potential tax deduction; not an immediate payroll reimbursement.","authority":"TESDA","sourceUrl":"https://www.tesda.gov.ph/Media/NewsDetail/20380 | https://www.tesda.gov.ph/About/TESDA/38","notes":"Official TESDA release explains EBET income tax deduction change; TESDA page describes enterprise-based programmes."}],"Poland":[{"category":"Sick Leave / Public Insurance","schemeName":"ZUS sick pay and sickness allowance","claimableBy":"Employee; employer or ZUS pays depending on employer size/period","eligible":"Employee covered by sickness insurance and temporarily unable to work due to sickness or isolation.","amount":"Employer-financed sick pay for first 33 days in a calendar year; ZUS sickness allowance after that or for eligible cases.","duration":"First 33 days employer-paid in calendar year; different rule for older employees and ZUS allowance after employer-paid period.","howToClaim":"Employee submits medical certificate/e-ZLA; employer/ZUS processes sickness allowance depending on payer rules.","documents":"Medical certificate/e-ZLA, insurance/employment records and ZUS/employer documents where requested.","deadline":"Submit according to ZUS/employer procedures promptly after incapacity.","employerResp":"Pay employer-financed sick pay period, transmit ZUS documents and pay/settle allowance if employer is payer.","employeeResp":"Provide medical certificate and cooperate with ZUS controls.","payrollImpact":"Payroll must split employer-funded sick pay from ZUS sickness allowance and track calendar-year limits.","authority":"ZUS - Social Insurance Institution","sourceUrl":"https://lang.zus.pl/benefits/sick-pay-and-sickness-allowance | https://www.gov.pl/web/family/sickness-and-maternity-benefits","notes":"ZUS official page states employer pays first 33 days in a calendar year."},{"category":"Maternity / Parental","schemeName":"ZUS maternity allowance","claimableBy":"Employee; ZUS or employer as allowance payer","eligible":"Insured employee/parent entitled to maternity/parental leave allowance under Polish Labour Code and social insurance rules.","amount":"Maternity allowance is 100% of allowance basis for maternity leave; 81.5% option for combined maternity/parental leave if requested within 21 days after birth; parental leave period normally 70% unless blended option applies.","duration":"For statutory maternity/parental leave periods depending on birth/adoption situation.","howToClaim":"Employee submits leave/allowance request and documents to employer or ZUS depending on payer; employer transmits ZUS documents where needed.","documents":"Birth/adoption documents, leave request, employment/insurance records and ZUS forms depending on payer.","deadline":"21-day deadline after birth for blended 81.5% allowance option; other deadlines per Labour Code/ZUS rules.","employerResp":"Accept leave requests, process documents and pay allowance if employer is payer for larger establishments.","employeeResp":"Submit leave request and birth/adoption documentation.","payrollImpact":"Payroll must identify who pays the allowance: ZUS pays for employers with no more than 20 insured; employers with more than 20 pay during insurance period.","authority":"ZUS / Ministry of Family, Labour and Social Policy","sourceUrl":"https://lang.zus.pl/benefits/maternity-allowances | https://www.gov.pl/web/family/maternity-leave | https://www.gov.pl/web/family/maternity-allowance","notes":"Official gov.pl and ZUS pages confirm maternity allowance rates and payer split."},{"category":"Care Leave / Family Care","schemeName":"ZUS care allowance","claimableBy":"Employee; ZUS or employer as allowance payer","eligible":"Insured employee caring for a sick child/family member or child in cases covered by care allowance rules.","amount":"Care allowance is calculated like sickness allowance; payment responsibility depends on employer size/payer rules.","duration":"Within statutory care allowance day limits depending on care situation.","howToClaim":"Submit care leave/allowance documents to employer or ZUS depending on payer.","documents":"Care leave application, medical certificate/statement where required, child/family relationship documents and ZUS/employer forms.","deadline":"According to ZUS/employer documentation deadlines.","employerResp":"Process care leave and pay/transmit ZUS allowance documents if employer is allowance payer.","employeeResp":"Submit care request and required medical/family documents.","payrollImpact":"Payroll must record care allowance separately from ordinary sick leave and identify payer responsibility.","authority":"ZUS - Social Insurance Institution","sourceUrl":"https://lang.zus.pl/benefits/care-allowances | https://lang.zus.pl/documents/493369/574088/Zasi%C5%82ek%2Bmacierzy%C5%84ski%2Bw_ang.pdf","notes":"ZUS states employers with more than 20 insured pay care allowance during insurance period; ZUS pays for no more than 20 insured."},{"category":"Hiring / Disability Wage Subsidy","schemeName":"PFRON remuneration funding for disabled employees","claimableBy":"Employer","eligible":"Employer employing a disabled person under employment relationship and meeting PFRON funding eligibility conditions.","amount":"Monthly funding depends on employee disability severity and working hours; cannot exceed eligible wage cost limits.","duration":"Monthly, while eligibility and employment conditions continue.","howToClaim":"Apply to PFRON using employer remuneration funding system/forms.","documents":"Disability certificate, employment agreement, payroll/wage cost evidence, working-time records and PFRON forms.","deadline":"Monthly PFRON filing deadlines apply; employer must follow current PFRON system rules.","employerResp":"Employ disabled employee lawfully, maintain records, submit monthly claim and comply with aid rules.","employeeResp":"Provide disability-status documents where required.","payrollImpact":"Direct monthly wage-cost offset; payroll must track eligible wage costs and employee status.","authority":"PFRON - State Fund for Rehabilitation of Disabled Persons","sourceUrl":"https://www.pfron.org.pl/en/employers/remuneration-funding/ | https://www.pfron.org.pl/en/employers/remuneration-funding/eligibility-for-funding/ | https://www.pfron.org.pl/en/employers/remuneration-funding/funding-amount/","notes":"Official PFRON pages state funding depends on disability severity and working hours."},{"category":"Accident / Work Injury Insurance","schemeName":"ZUS accident insurance benefits","claimableBy":"Employee","eligible":"Insured person with incapacity, disability or other covered consequence of accident at work or occupational disease.","amount":"Accident insurance benefits may include sickness allowance, rehabilitation benefit, compensation/benefits depending on case and ZUS assessment.","duration":"According to accident/occupational disease benefit type and medical assessment.","howToClaim":"Employer prepares accident documentation; employee/ZUS claim handled through ZUS with required accident records.","documents":"Accident protocol/card, medical certificate, employment/insurance records and ZUS forms.","deadline":"Report and file according to accident-at-work and ZUS deadlines.","employerResp":"Investigate/report accident, prepare protocol/card and submit ZUS documents.","employeeResp":"Report accident and provide medical information.","payrollImpact":"Payroll/HR must classify work accident separately because ZUS accident insurance benefits and rates differ from ordinary sickness.","authority":"ZUS - Social Insurance Institution","sourceUrl":"https://www.zus.pl/documents/10182/167561/%C5%9Awiadczenia%2Bw%2Brazie%2Bchoroby_ang.pdf/e3c7a18b-704d-c370-6136-36b5595773f8 | https://lang.zus.pl/about-zus/the-types-of-benefits-provided-by-zus","notes":"ZUS publication covers sickness and accident insurance benefits; final entitlement is assessed by ZUS."}],"Portugal":[{"category":"Maternity / Parental","schemeName":"Segurança Social parental allowance","claimableBy":"Employee / parent","eligible":"Parent taking initial parental leave and meeting social security contribution/eligibility rules.","amount":"Paid by Social Security to compensate income loss; amount depends on chosen leave modality and reference remuneration.","duration":"Initial parental leave options generally 120 or 150 days, with variations for sharing and special situations.","howToClaim":"Apply online through Segurança Social Direta or at Social Security services.","documents":"Childbirth/birth details, social security identification, employment/contribution records, leave dates and any requested forms.","deadline":"Apply within Social Security timelines; confirm latest Segurança Social guide for exact case.","employerResp":"Confirm leave dates/employment data and coordinate payroll absence.","employeeResp":"Submit application and supporting child/leave documents.","payrollImpact":"Payroll must code parental leave separately because benefit is Social Security-paid rather than ordinary salary.","authority":"Segurança Social / gov.pt","sourceUrl":"https://www2.gov.pt/en/guias/ter-uma-crianca/licenca-parental | https://www.seg-social.pt/subsidio-parental/ | https://www.seg-social.pt/ptss/pssd/documento/cmnditjl1000dgv2y5c5lscb2","notes":"Official gov.pt states parental allowance is paid by Social Security to compensate loss of income."},{"category":"Sick Leave / Public Insurance","schemeName":"Segurança Social sickness cash benefit","claimableBy":"Employee","eligible":"Worker temporarily unable to work due to sickness and meeting contribution/medical certification rules.","amount":"Cash benefit percentage depends on duration and reference remuneration under Social Security rules.","duration":"For certified sickness period, subject to waiting periods and statutory duration limits.","howToClaim":"Medical incapacity certificate is communicated/used for Social Security benefit processing; employee applies where required.","documents":"Certificate of temporary incapacity, social security number, employment/contribution records and bank details.","deadline":"According to Segurança Social sickness benefit rules and certificate timing.","employerResp":"Record absence and provide employment/payroll data if requested.","employeeResp":"Obtain/submit medical certificate and apply or monitor benefit status.","payrollImpact":"Payroll should not duplicate Social Security sickness benefit with company-paid sick pay unless policy/CBA requires top-up.","authority":"Segurança Social","sourceUrl":"https://en.seg-social.pt/sickness-cash-benefit","notes":"Official Segurança Social page identifies sickness cash benefit service."},{"category":"Occupational Disease / Work Injury","schemeName":"Temporary incapacity for occupational disease benefit","claimableBy":"Employee","eligible":"Worker with temporary incapacity for work due to occupational disease and meeting Social Security/occupational disease requirements.","amount":"Benefit paid according to occupational disease incapacity rules and reference remuneration; amount is case-specific.","duration":"For certified temporary incapacity due to occupational disease.","howToClaim":"Apply/submit documents through Social Security/DPRP occupational disease process.","documents":"Temporary incapacity certificate for occupational disease, medical evidence, contribution records and occupational disease documents.","deadline":"According to Social Security occupational disease procedure.","employerResp":"Support reporting and provide employment/exposure information where requested.","employeeResp":"Submit medical and occupational disease documents.","payrollImpact":"HR must separate occupational disease from ordinary sickness due to statutory reporting and benefit treatment.","authority":"Segurança Social / DPRP","sourceUrl":"https://www.seg-social.pt/ptss/pssd/documento/cmp2izfi8003hii2ydxwxfy4q | https://www.seg-social.pt/ptss/pssd/documento/N07_incapacidade_temporaria_doenca_profissional/efeb841b-ab5e-41bc-9eb8-9391d11df291","notes":"Official Social Security guide covers temporary incapacity for occupational disease."},{"category":"Hiring / Wage Subsidy","schemeName":"IEFP Incentivo ATIVAR.PT / hiring support","claimableBy":"Employer","eligible":"Employer hiring unemployed person registered with IEFP under contract and meeting programme conditions.","amount":"Financial support to employers; official IEFP synthesis shows simple support examples of 12 IAS for open-ended contract and 4 IAS for fixed-term contract, with possible increases for target groups.","duration":"Support period depends on contract type/programme rules.","howToClaim":"Submit application through IEFP/iefponline during open application periods.","documents":"Employment contract, proof of IEFP-registered unemployed candidate, training plan/obligation documents and IEFP forms.","deadline":"During IEFP application windows and according to programme regulation.","employerResp":"Register job/application, hire eligible person, provide required training and maintain employment obligations.","employeeResp":"Be registered with IEFP and meet candidate eligibility.","payrollImpact":"Direct hiring cost support; payroll must maintain supported employment and training records.","authority":"IEFP","sourceUrl":"https://www.iefp.pt/documents/10181/10168394/Ficha%20Sintese%20Incentivo%20ATIVAR_29-01-2024.pdf/5c2e47e1-5f72-4460-968f-cdbea9662ccd | https://www.iefp.pt/documents/10181/10168394/Regulamento%2BIncentivo%2BATIVAR.PT","notes":"Official IEFP documents state the measure grants financial support to employers hiring unemployed registered candidates."},{"category":"Training / Internship Subsidy","schemeName":"IEFP Estágios ATIVAR.PT","claimableBy":"Employer / promoting entity","eligible":"Promoting entity hosting eligible trainee under IEFP internship rules.","amount":"IEFP co-finances internship grants and may provide employment prize if trainee is hired permanently after the internship; specific percentage/rate depends on entity and programme rules.","duration":"Internship duration and support according to current IEFP rules/call.","howToClaim":"Apply as promoting entity via iefponline/IEFP internship portal during application periods.","documents":"Promoter application, trainee eligibility, internship plan, insurance/allowance documents and IEFP forms.","deadline":"During IEFP application windows.","employerResp":"Host trainee, pay/coordinate allowances, keep attendance/training records and comply with IEFP obligations.","employeeResp":"Meet trainee eligibility and attend internship.","payrollImpact":"Useful for HR planning and junior talent pipeline; support is not normal payroll reimbursement unless approved by IEFP.","authority":"IEFP","sourceUrl":"https://iefponline.iefp.pt/IEFP/medida/estagioemprego/descEstagiosAtivarPT.jsp | https://www.iefp.pt/estagios?tab=estagios-ativar-pt_candidatura | https://www.iefp.pt/documents/10181/10178040/Ficha%20Sintese%20Estagios%20ATIVAR.PT%20%28vf%2005-01-2023%29.pdf/8c8011a5-40c1-4605-9821-ce80b0731c85","notes":"Official IEFP pages describe Estágios ATIVAR.PT and employer/promoter application route."}],"Qatar":[{"category":"Worker Entitlement / Wage Protection","schemeName":"Workers' Support and Insurance Fund","claimableBy":"Employee / worker after labour dispute decision","eligible":"Worker with entitlements decided by Labour Disputes Settlement Committees or covered under Fund objectives.","amount":"Fund pays workers' entitlements decided by Labour Disputes Settlement Committees, then recovers paid amounts from employer.","duration":"Case-specific according to labour dispute decision and Fund rules.","howToClaim":"Worker pursues labour complaint/dispute route; Fund support follows committee decision/approved process.","documents":"Labour dispute decision, employment contract, wage evidence, identity/residency documents and supporting claim documents.","deadline":"According to labour complaint and committee procedures.","employerResp":"Comply with wage/labour obligations; if Fund pays worker, employer may be required to repay Fund.","employeeResp":"File complaint/dispute and submit supporting documents.","payrollImpact":"Payroll risk control: unpaid wages/entitlements can become formal claims; maintain WPS and wage records.","authority":"Workers' Support and Insurance Fund / Ministry of Labour / Al Meezan","sourceUrl":"https://www.almeezan.qa/EnglishLaws/Law%20No.%20%2817%29%20of%202018%20on%20Establishing%20Workers%E2%80%99%20Support%20and%20Insurance%20Fund.pdf | https://www.mol.gov.qa/En/pages/default.aspx","notes":"Official law states Fund pays workers' entitlements decided by Labour Disputes Settlement Committees and recovers from employer."},{"category":"Work Injury / Occupational Disease","schemeName":"Labour Law employment accident compensation route","claimableBy":"Employee","eligible":"Worker dies during work or by reason of work, or suffers occupational injury covered by Labour Law.","amount":"Compensation/medical entitlement is determined under Labour Law and case assessment; not a general wage subsidy.","duration":"Case-specific based on accident, medical treatment, injury/death and legal decision.","howToClaim":"Employer must report accident immediately to police and Labour Department; worker/dependants pursue compensation under Labour Law route.","documents":"Accident report, police/Labour Department report, medical report, employment contract, wage records and death/disability evidence where relevant.","deadline":"Employer must report immediately when accident/death occurs.","employerResp":"Report immediately to police and Labour Department and provide records/evidence.","employeeResp":"Report accident and provide medical/claim documents.","payrollImpact":"HR must treat as statutory work injury case and preserve evidence/wage records.","authority":"Al Meezan / Ministry of Labour","sourceUrl":"https://almeezan.qa/LawArticles.aspx?LawTreeSectionID=12656&language=en&lawId=3961 | https://www.mol.gov.qa/En/ministry/Pages/default.aspx","notes":"Official Al Meezan Labour Law Article 108 states employer must report occupational injury/death immediately to police and Department."},{"category":"Sick Leave / Employer-Paid Statutory Leave","schemeName":"Labour Law sick leave entitlement","claimableBy":"Employee","eligible":"Worker after 3 months from commencement of first work and with medical report from competent physician approved by employer.","amount":"Employer-paid statutory leave: first two weeks full pay; following four weeks half pay; thereafter unpaid until return/resignation/termination under law.","duration":"Annual sick leave entitlement after qualifying period; payment tiers under Labour Law.","howToClaim":"Employee submits medical report; handled by employer under Labour Law, not a government reimbursement scheme.","documents":"Approved medical report and employment records.","deadline":"When sickness occurs; medical report required.","employerResp":"Pay statutory sick leave according to Labour Law and keep records.","employeeResp":"Provide approved medical report.","payrollImpact":"Not government-funded; included as a “no government claim” caution because it is often mistaken for public insurance reimbursement.","authority":"Al Meezan / Ministry of Labour","sourceUrl":"https://www.almeezan.qa/PrintArticle.aspx?LawArticleID=51876&language=en | https://www.almeezan.qa/LawArticles.aspx?LawArticleID=51866&LawId=3961&language=en","notes":"Official Labour Law Article 82 provides sick leave entitlement; Article 72 states sick leave remuneration is based on basic wage."},{"category":"Maternity / Employer-Paid Statutory Leave","schemeName":"Labour Law maternity leave entitlement","claimableBy":"Employee","eligible":"Female worker who has completed one full year of service with the employer and submits required medical report.","amount":"50 days of maternity leave with full remuneration, including prenatal and postnatal periods; postnatal period must be at least 35 days.","duration":"50 days; nursing hour for one year after maternity leave under Article 97.","howToClaim":"Employee submits medical report to employer; handled by employer under Labour Law, not a government reimbursement scheme.","documents":"Medical report showing expected delivery date and employment/service records.","deadline":"Before maternity leave starts according to employer procedure.","employerResp":"Grant and pay statutory maternity leave and nursing hour entitlement.","employeeResp":"Submit medical report and coordinate leave.","payrollImpact":"Not government-funded; included as a caution row because Qatar maternity is employer-paid rather than reimbursed by government.","authority":"Al Meezan / Ministry of Labour","sourceUrl":"https://www.almeezan.qa/LawArticles.aspx?LawArticleID=51891&LawId=3961&language=en | https://www.almeezan.qa/LawArticles.aspx?LawArticleID=51892&LawId=3961&language=en","notes":"Official Labour Law Article 96 states 50 days full-remuneration maternity leave after one year service."},{"category":"Pension / Social Insurance","schemeName":"Qatar retirement and pension scheme","claimableBy":"Qatari / eligible covered employee","eligible":"Covered Qatari public servants and other covered employees under retirement/pension law; coverage depends on law and authority rules.","amount":"Pension calculated according to statutory formula; older law page states 5% of final salary/average salary multiplied by years of service, subject to caps, for covered categories.","duration":"Upon retirement/end of service where contribution and legal conditions are met.","howToClaim":"Submit pension/retirement claim through General Retirement and Social Insurance Authority/DAMAN channels.","documents":"Service records, salary/contribution records, identity, employment termination/retirement documents and authority forms.","deadline":"According to GRSIA/DAMAN procedure after end of service or qualifying event.","employerResp":"Register/pay contributions for covered Qatari/GCC employees and provide service/salary data.","employeeResp":"Submit pension claim and required documents.","payrollImpact":"Only relevant for covered nationals/eligible groups; not a general expat employee claim.","authority":"General Retirement and Social Insurance Authority / DAMAN / Al Meezan","sourceUrl":"https://www.daman.gov.qa/English/Pensions/RetirementSystems/Pages/default.aspx | https://www.almeezan.qa/LawPage.aspx?id=3972&language=en","notes":"Official DAMAN page describes Qatar pension systems; Al Meezan publishes retirement and pension law."}],"Romania":[{"category":"Sick Leave / Public Health Insurance","schemeName":"CNAS medical leave allowance reimbursement from FNUASS","claimableBy":"Employer","eligible":"Employer that paid eligible medical leave allowances to insured employees where amounts are recoverable from National Single Health Insurance Fund under OUG 158/2005 rules.","amount":"Recoverable amount equals eligible allowances paid to employees from FNUASS according to medical leave rules; percentage varies by leave type.","duration":"For eligible medical leave periods beyond employer-funded/non-recoverable portions under law.","howToClaim":"Submit reimbursement request and supporting documents to relevant health insurance house/CNAS forms.","documents":"CNAS reimbursement request, medical leave certificates, payroll proof, employee list, tax/social contribution evidence and bank details.","deadline":"According to CNAS/county health insurance house filing rules; employers should file promptly after payment.","employerResp":"Pay eligible medical leave allowances and submit recovery file accurately.","employeeResp":"Provide medical certificate and required information.","payrollImpact":"Direct payroll reimbursement route; HR/payroll must track recoverable medical leave allowances separately.","authority":"CNAS - National Health Insurance House","sourceUrl":"https://cnas.ro/wp-content/uploads/2024/11/ANEXA-10-Cerere-recuperare-concedii-si-indemnizatii-angajatori.pdf | https://cnas.ro/formulare-specifice/ | https://cnas.ro/fnuass/","notes":"Official CNAS reimbursement form requests repayment of sums paid to insured employees recoverable from FNUASS."},{"category":"Maternity / Medical Leave","schemeName":"Maternity leave allowance under social health insurance","claimableBy":"Employee / employer pays then may recover eligible amounts","eligible":"Insured pregnant/postnatal employee meeting health insurance contribution and medical certificate conditions.","amount":"Maternity allowance is generally a social health insurance allowance; common statutory rate is handled under OUG 158/2005 and CNAS rules, recoverable where eligible from FNUASS.","duration":"Prenatal/postnatal maternity leave period according to medical certificate and law.","howToClaim":"Medical certificate issued and employer processes allowance/recovery through CNAS where applicable.","documents":"Medical leave certificate, pregnancy/maternity documents, payroll records, CNAS reimbursement file if employer claims.","deadline":"According to medical certificate and CNAS filing rules.","employerResp":"Process medical leave allowance and submit recoverable amounts to CNAS where applicable.","employeeResp":"Submit medical certificate and pregnancy/maternity documents.","payrollImpact":"Payroll must classify maternity medical leave separately from child-raising allowance and ordinary sickness.","authority":"CNAS / Ministry of Health legal framework","sourceUrl":"https://cnas.ro/formulare-specifice/ | https://cnas.ro/wp-content/uploads/2024/11/ANEXA-10-Cerere-recuperare-concedii-si-indemnizatii-angajatori.pdf","notes":"Included because Romania maternity medical leave allowance is part of health-insurance leave/allowance system; verify exact employee case with current CNAS rules."},{"category":"Parental / Childcare","schemeName":"Child-raising allowance and insertion incentive","claimableBy":"Parent / employee","eligible":"Parent who, in the two years before the child birth date, earned taxable income for at least 12 months and meets child/residence conditions.","amount":"Child-raising allowance/insertion incentive amount depends on law and case; ANPIS administers payments and FAQ confirms 12 months of income in previous 2 years condition.","duration":"Until statutory child age/condition depending on benefit type; insertion incentive for return to work.","howToClaim":"Apply through local social assistance/AJPIS/ANPIS process using standard forms.","documents":"Application, identity documents, child birth certificate, employer income certificate, taxable income proof, family/residence documents and bank details.","deadline":"According to ANPIS/local authority filing rules after birth/return to work.","employerResp":"Provide income/employment certificate and manage parental leave job protection.","employeeResp":"Apply and submit family/income documents.","payrollImpact":"Not employer reimbursement; HR must issue income certificate and code parental leave/return-to-work status.","authority":"ANPIS / Ministry of Labour","sourceUrl":"https://www.mmanpis.ro/faq/care-sunt-conditiile-de-acordare-a-indemnizatiei-pentru-cresterea-copilului/ | https://www.mmanpis.ro/informatii-de-interes-public/plati-efectuate-de-anpis/stimulent-de-insertie-pentru-cresterea-copilului/ | https://neamt.mmanpis.ro/informatii-de-interes-public/formulare-tip/","notes":"Official ANPIS FAQ states income requirement: at least 12 months in the 2 years before child birth."},{"category":"Hiring / Wage Subsidy","schemeName":"ANOFM subsidy for hiring graduates","claimableBy":"Employer","eligible":"Employer hiring graduates of educational institutions on indefinite contracts under Law 76/2002 stimulation measure.","amount":"Monthly subsidy of 2,250 lei per graduate hired, for 12 months.","duration":"12 months per eligible graduate hire.","howToClaim":"Conclude agreement/application with county employment agency/ANOFM and submit required employment documents.","documents":"Employment contract, graduate proof, unemployed/registration documents where applicable, payroll evidence and ANOFM forms.","deadline":"According to ANOFM/county agency application timeline.","employerResp":"Hire eligible graduate on indefinite contract, maintain employment conditions and submit monthly/support documents.","employeeResp":"Provide graduate/unemployment registration documents where required.","payrollImpact":"Direct monthly wage subsidy; payroll must maintain supported headcount and documentation.","authority":"ANOFM","sourceUrl":"https://www.anofm.ro/subventionarea-locurilor-de-munca-pentru-absolventii-de-invatamant/","notes":"Official ANOFM page states employers receive 2,250 lei monthly for 12 months per graduate hired."},{"category":"Hiring / Vulnerable Workers","schemeName":"ANOFM subsidies for hiring specific unemployed categories","claimableBy":"Employer","eligible":"Employer hiring eligible categories such as unemployed over 45, single-parent supporters, long-term unemployed, NEET youth or persons with disabilities, according to ANOFM/county rules.","amount":"Monthly subsidy commonly 2,250 lei for eligible hires; exact category and duration depend on Law 76/2002 measure.","duration":"Generally 12 months or as specified by category/measure.","howToClaim":"Apply/sign agreement with county employment agency and submit eligible hire documents.","documents":"Employment contract, proof of eligible unemployed category, ANOFM registration, payroll records and monthly declarations.","deadline":"According to ANOFM/county agency filing rules.","employerResp":"Hire/retain eligible worker and submit documents to maintain subsidy.","employeeResp":"Register with employment agency and provide category evidence.","payrollImpact":"Payroll must track subsidy-supported employees and retention obligations.","authority":"ANOFM / county AJOFM","sourceUrl":"https://www.anofm.ro/gorj/subventii-pentru-angajatori/ | https://www.anofm.ro/ialomita/subventii-lunare-de-2250-lei-pentru-angajatorii-care-incadreaza-in-munca-someri/","notes":"Official ANOFM county pages list 2,250 lei monthly subsidies for eligible unemployed categories."},{"category":"Apprenticeship / Training Grant","schemeName":"ANOFM apprenticeship financial support","claimableBy":"Employer","eligible":"Employer entering apprenticeship/training arrangement with eligible apprentice under ANOFM programme rules.","amount":"ANOFM announced financial support of 2,250 lei per month for each apprentice.","duration":"During eligible apprenticeship period according to contract/programme rules.","howToClaim":"Apply/contract through ANOFM/county employment agency and submit apprenticeship documents.","documents":"Apprenticeship contract, training plan, apprentice eligibility documents, attendance/payroll records and ANOFM forms.","deadline":"According to ANOFM programme call and county agency procedures.","employerResp":"Set up apprenticeship contract/training, keep records and claim support.","employeeResp":"Participate in apprenticeship and training requirements.","payrollImpact":"Training/hiring support; payroll must track apprentices and monthly support evidence.","authority":"ANOFM","sourceUrl":"https://www.anofm.ro/modalitati-de-finantare-pentru-firme-si-oportunitati-de-formare-pentru-ucenici-oferite-de-anofm/ | https://www.anofm.ro/","notes":"Official ANOFM release states employers can receive 2,250 lei per month for each apprentice."}],"Saudi Arabia":[{"category":"Unemployment / Social Insurance","schemeName":"SANED unemployment compensation","claimableBy":"Employee","eligible":"Saudi contributor under the annuities branch, generally below age 59/60, who lost work for a reason outside his control and satisfies contribution/eligibility conditions.","amount":"60% of average monthly contributory wages for the first 3 months, then 50% for later months, subject to SANED statutory limits.","duration":"Up to the statutory SANED compensation period; application should be made within 90 days from leaving work.","howToClaim":"Apply through GOSI/SANED electronic services or eligibility check.","documents":"Identity/Iqama or national ID, IBAN, employment termination details, GOSI contribution record and any GOSI-requested evidence.","deadline":"Apply within 90 days of leaving work according to the SANED official page.","employerResp":"Register Saudi employees correctly with GOSI and report employment/termination details accurately.","employeeResp":"Apply, remain able/willing to work, search seriously for work and follow HRSD/GOSI requirements.","payrollImpact":"Not an employer reimbursement; payroll must correctly close employment and maintain GOSI records.","authority":"General Organization for Social Insurance (GOSI)","sourceUrl":"https://www.gosi.gov.sa/GOSIOnline/SANED | https://www.gosi.gov.sa/GOSIOnline/Unemployment_Insurance_%28SANED%29%26locale%3Den_US","notes":"SANED is for Saudi contributors; non-Saudi expatriate employees are not covered by this unemployment insurance branch."},{"category":"Work Injury / Occupational Hazard","schemeName":"GOSI Occupational Hazards Branch benefits","claimableBy":"Employee; employer reports injury","eligible":"Employee covered by GOSI occupational hazards branch who suffers occupational injury, occupational disease or complication.","amount":"Medical care, daily allowance, monthly benefit or lump-sum compensation depending on injury assessment and GOSI regulations.","duration":"For treatment, temporary incapacity or permanent disability/death benefits according to case assessment.","howToClaim":"Employer/supervisor reports the occupational injury/disease through GOSI establishment services; GOSI processes benefits.","documents":"Occupational injury report, medical reports, employee/contributor details, workplace incident evidence and GOSI forms.","deadline":"Report promptly; GOSI service allows employer/
