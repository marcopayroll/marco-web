ibution record, identity documents and bank/payment details.","deadline":"After employment ends; follow LSSO/NSSF claim timing.","employerResp":"Update employment termination and contribution records accurately.","employeeResp":"Apply and maintain unemployed status/evidence as required.","payrollImpact":"Leaver data must match contribution records; no standard employer cash reimbursement.","authority":"Lao Social Security Organisation / National Social Security Fund","sourceUrl":"https://lsso.gov.la/Legislation/nssf%20law34%20en.pdf | https://lsso.gov.la/Legislation/nssf%20law%2054%20en.pdf","notes":"Operational implementation may require checking current LSSO local process in Lao language."}],"Latvia":[{"category":"Maternity / Parental","schemeName":"Maternity benefit","claimableBy":"Employee / self-employed claimant","eligible":"Socially insured employee or self-employed mother with required contribution period; maternity leave granted.","amount":"VSAA states maternity benefit amount is 80% of claimant average contribution salary.","duration":"First part for 56 or 70 days before childbirth and second part for 56 or 70 days after childbirth, depending on medical registration/conditions.","howToClaim":"Submit application to VSAA electronically, on site or by other accepted channel.","documents":"Application, pregnancy/maternity leave information, medical records and contribution/social insurance data.","deadline":"Claim within 6 months from the first day of maternity leave.","employerResp":"Grant/record maternity leave and ensure social insurance data is reported correctly.","employeeResp":"Submit VSAA application and supporting information.","payrollImpact":"Employer usually does not reimburse from state; VSAA pays benefit based on insured income.","authority":"State Social Insurance Agency (VSAA)","sourceUrl":"https://www.vsaa.gov.lv/en/services/granting-and-disbursement-maternity-benefit | https://www.vsaa.gov.lv/en/article/changes-parental-benefit-2023","notes":"Official VSAA source provides the six-month claim deadline and 80% rate."},{"category":"Paternity / Parental","schemeName":"Paternity benefit","claimableBy":"Employee / self-employed claimant","eligible":"Father of newborn child or other eligible person meeting VSAA rules and social insurance conditions.","amount":"VSAA pays paternity benefit for 10 working days of paternity leave; amount is based on insured income under VSAA rules.","duration":"10 working days leave due to birth of a child.","howToClaim":"Submit application to VSAA through e-service, on site or other accepted channel.","documents":"Application, child/birth evidence, leave/employment information and social insurance data.","deadline":"Submit according to VSAA service process; check current e-service deadlines.","employerResp":"Grant paternity leave and report employment/social insurance data correctly.","employeeResp":"Apply to VSAA and provide child/leave evidence.","payrollImpact":"Benefit paid by VSAA; employer records leave and payroll absence correctly.","authority":"State Social Insurance Agency (VSAA)","sourceUrl":"https://www.vsaa.gov.lv/en/services/granting-and-disbursement-paternity-benefit","notes":"Official VSAA source confirms eligible recipient categories and 10 working days."},{"category":"Sickness / Medical Leave","schemeName":"Sickness benefit","claimableBy":"Employee / self-employed claimant","eligible":"Employee or self-employed person unable to work and losing income due to illness; sick leave certificate B must be closed for VSAA payment.","amount":"VSAA pays sickness benefit from the 10th day of illness; for general sickness, employer-paid early days are separate.","duration":"Generally no longer than 26 weeks for continuous incapacity, extendable up to 52 weeks with medical commission opinion; intermittent limit 52 weeks in three years.","howToClaim":"Submit application to VSAA after sick leave certificate B is closed.","documents":"Closed sick leave certificate B, application, social insurance records and payment details.","deadline":"After certificate B is closed; long sickness may require closing certificate to claim.","employerResp":"Pay/record employer sick pay days and report absence/payroll data.","employeeResp":"Ensure certificate B is closed and submit VSAA claim.","payrollImpact":"Payroll must split employer sickness pay and VSAA sickness benefit periods.","authority":"State Social Insurance Agency (VSAA)","sourceUrl":"https://www.vsaa.gov.lv/en/services/granting-and-disbursement-sickness-benefit","notes":"Official VSAA source states benefit starts from 10th day and gives maximum periods."},{"category":"Work Injury / Occupational Disease","schemeName":"Insurance compensation / work accident or occupational disease remuneration","claimableBy":"Employee claimant","eligible":"Socially insured person with loss of working ability from workplace accident or diagnosed occupational disease, assessed from 25% loss of working ability.","amount":"Amount depends on lost working ability and formula/assessment; VSAA service handles insurance compensation.","duration":"For the period/degree of lost working ability established by competent medical commission.","howToClaim":"Apply to VSAA for insurance compensation / damages with required medical and accident evidence.","documents":"Accident/occupational disease documentation, medical commission decision, employment and social insurance information.","deadline":"Submit according to VSAA service rules after assessment/recognition.","employerResp":"Report work accident/occupational disease and provide employment/wage information.","employeeResp":"Submit application and medical/assessment evidence.","payrollImpact":"HR must record work injury and support evidence; benefit paid through social insurance system.","authority":"State Social Insurance Agency (VSAA)","sourceUrl":"https://www.vsaa.gov.lv/en/services/granting-and-payment-insurance-compensation | https://www.vsaa.gov.lv/en/services-0","notes":"Official VSAA page states loss of working ability must start from 25% for indemnity."},{"category":"Unemployment / Job Loss","schemeName":"Unemployment benefit","claimableBy":"Employee claimant","eligible":"Person who lost job, has unemployed status from State Employment Agency and meets social insurance conditions.","amount":"Amount depends on insurance period and wage subject to contributions.","duration":"Benefit may be received for no longer than 8 months.","howToClaim":"First apply for unemployed status with the State Employment Agency, then apply to VSAA for unemployment benefit.","documents":"Unemployed status, employment/contribution data, identity and bank/payment details.","deadline":"After unemployed status is obtained; submit according to VSAA process.","employerResp":"Provide accurate termination and social insurance/payroll data.","employeeResp":"Register as unemployed and submit VSAA benefit claim.","payrollImpact":"Leaver records affect claim; no standard employer reimbursement.","authority":"State Social Insurance Agency (VSAA) / State Employment Agency","sourceUrl":"https://www.vsaa.gov.lv/en/services/granting-and-disbursement-unemployment-benefit | https://www.nva.gov.lv/en","notes":"Official VSAA source states unemployment status must be obtained first and benefit limit is 8 months."},{"category":"Hiring / Wage Subsidy","schemeName":"State support for employment - subsidised workplaces and employer support","claimableBy":"Employer","eligible":"Employers participating in State Employment Agency active labour market measures, such as subsidised workplaces, disabled client employment, workplace adaptation or regional mobility support.","amount":"Support amount depends on the NVA measure and contract; official page lists the available support categories.","duration":"Programme-specific, depending on SEA/NVA measure agreement.","howToClaim":"Apply through State Employment Agency programme/service when the relevant support measure is open.","documents":"Employer registration, vacancy/worker data, employment agreement, payroll/cost evidence and programme documents.","deadline":"During active support measure application windows.","employerResp":"Apply, hire/retain eligible workers and keep payroll/evidence records.","employeeResp":"Participate if referred/eligible under NVA measure.","payrollImpact":"May offset hiring/adaptation costs; must not be assumed unless programme approval is received.","authority":"State Employment Agency (NVA)","sourceUrl":"https://www.nva.gov.lv/en/state-support-employment","notes":"Official NVA page lists subsidised workplaces, workplace adaptation and other support categories."}],"Lithuania":[{"category":"Maternity / Parental","schemeName":"Maternity benefit","claimableBy":"Employee claimant","eligible":"Woman covered by maternity social insurance, granted pregnancy/childbirth leave, with at least 12 months maternity insurance record in last 24 months.","amount":"77.58% of compensatory wage; monthly maternity benefits cannot be less than 8 Basic Social Benefits.","duration":"Usually 126 calendar days after 30+ weeks pregnancy; extra 14 days for complicated childbirth or multiple births; special rules apply.","howToClaim":"Apply through Sodra / Ministry social insurance process.","documents":"Pregnancy/childbirth leave, social insurance record, employment/insured income data and application details.","deadline":"Apply according to Sodra/social insurance process when leave begins.","employerResp":"Grant leave and report wage/social insurance data correctly.","employeeResp":"Submit benefit claim and required evidence.","payrollImpact":"Benefit is paid through social insurance; employer must ensure payroll/social insurance data are correct.","authority":"Ministry of Social Security and Labour / Sodra","sourceUrl":"https://socmin.lrv.lt/en/activities/social-insurance-1/social-insurance-benefits/maternity-benefit/","notes":"Official ministry page states eligibility, 77.58% rate and duration rules."},{"category":"Paternity / Parental","schemeName":"Paternity benefit","claimableBy":"Employee claimant","eligible":"Father or adoptive father covered by maternity social insurance, granted paternity leave, with at least 6 months record in last 24 months.","amount":"77.58% of compensatory wage; monthly paternity benefits cannot be less than 8 Basic Social Benefits.","duration":"For the period of paternity leave.","howToClaim":"Apply through Sodra / social insurance process.","documents":"Paternity leave approval, child/adoption evidence, social insurance record and income data.","deadline":"Apply according to Sodra/social insurance process when paternity leave is granted.","employerResp":"Grant paternity leave and report social insurance data.","employeeResp":"Submit claim and child/leave evidence.","payrollImpact":"Employer records leave; state social insurance pays benefit.","authority":"Ministry of Social Security and Labour / Sodra","sourceUrl":"https://socmin.lrv.lt/en/activities/social-insurance-1/social-insurance-benefits/paternity-benefit/","notes":"Official ministry page provides 6-month contribution record and 77.58% rate."},{"category":"Childcare / Parental","schemeName":"Childcare benefit","claimableBy":"Employee / eligible family claimant","eligible":"Eligible parent/adoptive parent/foster parent or qualifying family member covered by maternity social insurance, granted childcare leave, with at least 12 months record in last 24 months.","amount":"If chosen until child is 18 months: 60% of compensatory wage. If chosen until 24 months: 45% until age 1 and 30% until age 2. Non-transferable months: 78%.","duration":"Until child turns 18 or 24 months depending on chosen option; non-transferable months apply.","howToClaim":"Apply through Sodra / social insurance process after childcare leave is granted.","documents":"Childcare leave approval, child/adoption/guardian evidence, insured income and social insurance record.","deadline":"Apply according to Sodra/social insurance service process.","employerResp":"Grant childcare leave and report data.","employeeResp":"Submit claim and family/leave evidence.","payrollImpact":"Important payroll/HR leave planning item because benefit amount depends on chosen duration and insured income.","authority":"Ministry of Social Security and Labour / Sodra","sourceUrl":"https://socmin.lrv.lt/en/activities/social-insurance-1/social-insurance-benefits/childcare-benefit/","notes":"Official ministry page sets 60%, 45%, 30% and 78% non-transferable-month rates."},{"category":"Sickness / Medical Leave","schemeName":"Sickness benefit","claimableBy":"Employee claimant","eligible":"Insured person temporarily unable to work and losing employment income, with at least 3 months sickness insurance record in last 12 months or 6 months in last 24 months.","amount":"First 2 calendar days paid by employer at 62.06%-100% of average salary; from day 3 state fund pays 62.06% of compensatory wage.","duration":"Duration depends on incapacity; general sickness until work capacity restored/assessed, with special limits for certain cases.","howToClaim":"Apply through social insurance/Sodra process with incapacity certificate and application.","documents":"Medical incapacity certificate, social insurance record, employer wage data and application/payment details.","deadline":"Submit according to Sodra process after incapacity is certified.","employerResp":"Pay first two days where applicable and report payroll/social insurance data.","employeeResp":"Submit claim and medical evidence.","payrollImpact":"Payroll must separate employer-paid first 2 days and state-funded period from day 3.","authority":"Ministry of Social Security and Labour / Sodra","sourceUrl":"https://socmin.lrv.lt/en/activities/social-insurance-1/social-insurance-benefits/sickness-benefit-sickness-and-maternity-social-insurance/","notes":"Official ministry page states employer first 2 days and state benefit from day 3."},{"category":"Work Injury / Occupational Disease","schemeName":"Accidents at work and occupational disease sickness/compensation benefits","claimableBy":"Employee claimant","eligible":"Insured person temporarily unable to work or losing participation due to accident at work, on way to/from work or occupational disease recognised as insured event.","amount":"Sickness benefit for accident/occupational disease is 77.58% of compensatory wage; further lump-sum/periodic compensation depends on lost participation assessment.","duration":"For incapacity/compensation period based on medical and participation assessment.","howToClaim":"Claim through Sodra/social insurance process after accident/occupational disease is recognised.","documents":"Accident/occupational disease investigation, medical certificate, work/wage data and disability/participation assessment if relevant.","deadline":"Submit according to Sodra process after insured event recognition.","employerResp":"Report/investigate accident and provide employment/wage data.","employeeResp":"Attend assessment and submit evidence.","payrollImpact":"HR must track accident absence and coordinate statutory insurance process.","authority":"Ministry of Social Security and Labour / Sodra","sourceUrl":"https://socmin.lrv.lt/en/activities/social-insurance-1/social-insurance-benefits/social-insurance-against-accidents-at-work-and-occupational-diseases/ | https://socmin.lrv.lt/en/activities/social-insurance-1/social-insurance-benefits/sickness-benefit-social-insurance-against-accidents-at-work-and-occupational-diseases/","notes":"Official ministry source states work injury sickness benefit is 77.58% and compensation types are available."},{"category":"Unemployment / Partial Work","schemeName":"Unemployment insurance benefit / Partial work benefit","claimableBy":"Employee claimant; employer relevant for partial work","eligible":"Unemployed person registered with Employment Service and with at least 12 months unemployment insurance record in last 30 months; partial work applies when employer lawfully declares partial work.","amount":"Unemployment benefit paid 9 months: fixed component 23.27% of minimum monthly wage plus variable component: 38.79%, 31.03%, then 23.27% of average insured income by period; cap applies. Partial work benefit can be up to 50% of unemployment benefit.","duration":"Unemployment benefit for 9 months; partial work benefit up to 3 months.","howToClaim":"Register with Employment Service and apply for benefit through Sodra/social insurance process.","documents":"Unemployed status, contribution record, insured income data, termination or partial-work evidence.","deadline":"After unemployed status or partial work is established.","employerResp":"Provide leaver or partial-work payroll records where relevant.","employeeResp":"Register/apply and keep Employment Service status.","payrollImpact":"Leaver and partial-work payroll data directly affects benefit calculation.","authority":"Ministry of Social Security and Labour / Employment Service / Sodra","sourceUrl":"https://socmin.lrv.lt/en/activities/social-insurance-1/social-insurance-benefits/unemployment-social-insurance/ | https://uzt.lt/en","notes":"Official ministry page provides 9-month duration and benefit formula."},{"category":"Hiring / Wage Subsidy / Job Adaptation","schemeName":"Employment support policy - subsidised employment and job adaptation","claimableBy":"Employer","eligible":"Employers participating in Employment Service active labour market measures such as subsidised employment, job assistant subsidy, job adaptation, apprenticeship or other approved measures.","amount":"Amount depends on measure and Employment Service approval; official ministry lists supported employment and job creation/adaptation measures.","duration":"Programme-specific; depends on measure agreement and worker category.","howToClaim":"Apply through Employment Service / relevant labour market programme.","documents":"Employer registration, jobseeker referral, employment contract, payroll/cost evidence, adaptation cost proof and programme forms.","deadline":"During active programme/application window.","employerResp":"Apply, hire/retain eligible worker and keep payroll/evidence records.","employeeResp":"Participate if registered/referred through Employment Service.","payrollImpact":"Can reduce wage/adaptation costs but only after approval; not a universal statutory reimbursement.","authority":"Ministry of Social Security and Labour / Employment Service","sourceUrl":"https://socmin.lrv.lt/en/activities/labour-and-employment/employment-and-labour-market/employment-support-policy/ | https://uzt.lt/en","notes":"Official ministry page lists subsidized employment, job assistant subsidy, job adaptation and business creation support."}],"Luxembourg":[{"category":"Maternity / Parental","schemeName":"Maternity leave allowance / maternity benefits","claimableBy":"Employee claimant; employer supports leave/payroll records","eligible":"Pregnant employee, apprentice or self-employed person covered by Luxembourg social security and meeting maternity leave conditions.","amount":"CNS maternity benefit replaces income during statutory maternity leave; exact amount is calculated under social security rules and wage record.","duration":"Prenatal and postnatal maternity leave period under Luxembourg rules.","howToClaim":"Employee applies/communicates through CNS/Guichet process; employer keeps payroll/leave records and follows pregnancy protection obligations.","documents":"Medical certificate/expected due date, employment/social security details, payroll/wage data and any CNS-requested evidence.","deadline":"Apply/notify when pregnancy and leave timing are confirmed; follow CNS/Guichet procedure.","employerResp":"Respect maternity protection and provide employment/payroll information where needed.","employeeResp":"Provide medical evidence and complete claim/notification steps.","payrollImpact":"Payroll must distinguish statutory maternity absence from normal working salary and coordinate CNS-funded benefit period.","authority":"CNS / Guichet.lu","sourceUrl":"https://guichet.public.lu/en/citoyens/travail/conges-jours-feries/situation-personnelle/conge-maternite.html | https://cns.public.lu/en/employeur/maladie-accident-conges.html","notes":"Official public pages confirm maternity leave and CNS employer procedures; amount is case-calculated."},{"category":"Maternity / Parental","schemeName":"Parental leave allowance","claimableBy":"Employee claimant, paid by CAE","eligible":"Parent taking first or second parental leave for birth/adoption and meeting Luxembourg parental leave conditions.","amount":"Replacement income allowance paid by Caisse pour l'avenir des enfants (CAE); amount depends on leave arrangement and income rules.","duration":"First parental leave after maternity/adoption leave or second parental leave before the child's age limit; full-time, part-time or split options may apply.","howToClaim":"Apply for parental leave through the official process; employer must handle leave request and employment protection.","documents":"Child/adoption evidence, employment and social security details, leave request, CAE application details.","deadline":"Must respect parental leave application timing before intended leave; exact timing depends on first/second leave route.","employerResp":"Process/approve eligible leave request and maintain job protection.","employeeResp":"Submit CAE claim and coordinate leave request with employer.","payrollImpact":"Payroll must pause/reduce salary according to leave arrangement because CAE pays the replacement allowance.","authority":"Guichet.lu / CAE","sourceUrl":"https://guichet.public.lu/en/entreprises/ressources-humaines/conges/situation-perso/conge-parental.html | https://guichet.public.lu/en/citoyens/life-event/famille-education/travail-bebe.html","notes":"Official Guichet pages state CAE pays parental leave allowance as replacement income."},{"category":"Sickness / Medical Leave","schemeName":"Sickness benefit for employees","claimableBy":"Employee claimant; employer manages absence reporting","eligible":"Employee temporarily unable to work due to illness/accident and covered under Luxembourg social security.","amount":"Income-continuity protection under Luxembourg sickness benefit rules; amount and employer/CNS split depend on statutory wage-continuation and CNS calculation rules.","duration":"For certified incapacity period subject to Luxembourg social security limits.","howToClaim":"Employee obtains incapacity certificate and follows CNS/employer reporting process.","documents":"Medical incapacity certificate, employee identification/social security data, employer wage/absence records.","deadline":"Employee must respect the official medical certificate/reporting timelines and CNS/employer procedure.","employerResp":"Record absence, respect sick leave rules and provide payroll/absence data where needed.","employeeResp":"Submit medical certificate/notification and follow medical control rules.","payrollImpact":"Payroll/HR must track certified sickness and coordinate employer-paid and CNS-paid periods correctly.","authority":"CNS Luxembourg","sourceUrl":"https://cns.public.lu/en/employeur/maladie-accident-conges/indemnite-maladie-salaries.html | https://cns.public.lu/en/assure/droits-demarches/dossiers-thematiques/salaries-independants/indemnite-maladie-salaries.html","notes":"Official CNS pages are used; detailed amount depends on individual wage and statutory calculation."},{"category":"Hiring / Wage Subsidy","schemeName":"Employment Support Contract (CAE)","claimableBy":"Employer","eligible":"Public-sector employers hiring a jobseeker under age 30 registered with ADEM for at least 3 months, under CAE rules.","amount":"Reimbursement of part of salary and the total amount of social security contributions; if hired permanently after CAE, employer may receive reimbursement of employer social security contributions for 12 months.","duration":"CAE contract is generally 12 months with possible 6-month extension; post-hire support can last 12 months.","howToClaim":"Contact ADEM employer service and follow CAE approval process before/when hiring.","documents":"Employer application, jobseeker ADEM registration, contract, payroll/social contribution evidence and training/tutor plan if required.","deadline":"Before/at programme hiring; follow ADEM approval timing.","employerResp":"Apply through ADEM, host/tutor worker, maintain contract and payroll evidence.","employeeResp":"Be registered with ADEM and participate in placement.","payrollImpact":"Can reduce salary/social contribution cost for eligible approved hires.","authority":"ADEM Luxembourg","sourceUrl":"https://adem.public.lu/en/employeurs/demander-aides-financieres/embaucher-jeune/cae.html | https://adem.public.lu/en/demandeurs-demploi/aides-financieres-mesures/mesures-emploi/mesures-jeunes/contrats-speciaux/cae.html","notes":"Official ADEM page states public-sector employer reimbursement and post-hire contribution reimbursement."},{"category":"Hiring / Employer Support","schemeName":"Financial support for employers - ADEM schemes","claimableBy":"Employer","eligible":"Employers meeting ADEM scheme conditions, such as hiring people with disabilities/reduced work capacity, long-term unemployed workers, redeployed employees or using short-time work.","amount":"Amount depends on the specific ADEM scheme; may include financial aid, tax relief, reimbursement of lump-sum allowances or short-time work support.","duration":"Programme-specific; depends on approved measure and worker/company situation.","howToClaim":"Apply through ADEM/official procedure for the specific scheme.","documents":"Employer and employee eligibility proof, contract/payroll records, disability/redeployment/jobseeker evidence, programme forms.","deadline":"Before the relevant hire/support period or within official scheme deadline.","employerResp":"Confirm eligibility before hiring/support use and maintain evidence for reimbursement.","employeeResp":"Provide jobseeker/beneficiary evidence where required.","payrollImpact":"Can reduce employment cost but only for approved ADEM measures; not a universal claim.","authority":"ADEM Luxembourg","sourceUrl":"https://adem.public.lu/content/adem/en/employeurs/demander-aides-financieres.html","notes":"Official ADEM employer aid portal lists supported employer financial-aid categories."}],"Malaysia":[{"category":"Work Injury / Occupational Disease","schemeName":"PERKESO Employment Injury Scheme","claimableBy":"Employee claimant; employer reports/supports claim","eligible":"Employee covered by SOCSO/PERKESO who suffers an accident arising out of and in the course of employment, commuting accident or occupational disease.","amount":"Benefits may include medical care, temporary/permanent disablement benefits, dependants benefits and rehabilitation; amount depends on contribution wage and benefit type.","duration":"For treatment/incapacity/compensation period based on injury assessment.","howToClaim":"Report accident and submit claim through PERKESO channels/ASSIST/Benefit Portal as applicable.","documents":"Accident report, medical certificate/report, employer report, identity and contribution details, bank details and supporting evidence.","deadline":"Report immediately and follow PERKESO claim timing; late reporting may affect processing.","employerResp":"Register/pay contributions, report accident and provide employment/wage records.","employeeResp":"Seek treatment and submit required medical/claim documents.","payrollImpact":"HR must classify as employment injury and coordinate SOCSO claim rather than ordinary sick leave only.","authority":"PERKESO / SOCSO","sourceUrl":"https://www.perkeso.gov.my/en/our-services/protection/employment-injury-scheme.html | https://www.perkeso.gov.my/en/contact-us/pejabat-perkeso-new/frequently-asked-question.html","notes":"Official PERKESO pages are used; benefit amount is assessment-based."},{"category":"Invalidity / Disability","schemeName":"PERKESO Invalidity Scheme / Invalidity Grant","claimableBy":"Employee claimant","eligible":"Insured employee who meets PERKESO invalidity conditions; invalidity grant applies where eligible under scheme rules.","amount":"Invalidity Grant is a one-time lump sum equivalent to employee and employer contributions paid under Invalidity Scheme plus interest; other invalidity benefits depend on eligibility.","duration":"One-time grant or ongoing benefit depending on scheme approval.","howToClaim":"Apply through PERKESO benefit application channels with medical/invalidity evidence.","documents":"Medical board/invalidity evidence, contribution record, identity and bank details, employment details.","deadline":"Submit once invalidity condition/medical evidence is available; follow PERKESO process.","employerResp":"Maintain accurate contribution history and provide employer records if requested.","employeeResp":"Apply and attend medical assessment/process.","payrollImpact":"May affect payroll status, termination/medical retirement handling and benefit coordination.","authority":"PERKESO / SOCSO","sourceUrl":"https://www.perkeso.gov.my/en/uncategorised/56-invalidity-scheme.html | https://perkeso.gov.my/en/","notes":"Official PERKESO page states the invalidity grant basis."},{"category":"Unemployment / Job Loss","schemeName":"Employment Insurance System (EIS / SIP)","claimableBy":"Employee claimant","eligible":"Insured employee who loses employment and satisfies EIS contribution/eligibility conditions.","amount":"Benefits can include Job Search Allowance, Reduced Income Allowance, Training Allowance and related re-employment support; amount depends on insured wage/contribution and benefit type.","duration":"Usually limited benefit period after loss of employment under EIS rules.","howToClaim":"Apply through EIS Benefits Portal / PERKESO after loss of employment.","documents":"Termination/loss-of-employment evidence, identity, contribution record, bank details, job-search/training evidence where relevant.","deadline":"Apply soon after loss of employment within EIS rules.","employerResp":"Contribute monthly, provide termination and wage details where requested.","employeeResp":"Submit claim and comply with job-search/training requirements.","payrollImpact":"Payroll/leaver records directly affect benefit eligibility and calculation.","authority":"PERKESO / SOCSO","sourceUrl":"https://www.perkeso.gov.my/en/our-services/protection/employment-insurance.html | https://www.perkeso.gov.my/en/employment-insurance-system-office.html","notes":"Official PERKESO EIS pages are used; detailed rates require current EIS calculation."},{"category":"Training / Upskilling","schemeName":"HRD Corp training grants / claimable training cost","claimableBy":"Employer","eligible":"HRD Corp-registered employer contributing HRD levy and sending eligible employees to approved/claimable training.","amount":"Training costs can be claimed by employers upon completion through grant disbursements from HRD levy collection; amount depends on approved grant, allowable cost matrix and levy balance.","duration":"Per approved training grant and employer levy/grant balance.","howToClaim":"Apply for grant and submit claim through HRD Corp process/portal after training completion.","documents":"Approved grant, invoice/receipt, attendance, course approval, employee list, proof of payment and claim forms.","deadline":"Follow HRD Corp claim deadline and query/resubmission deadlines in employer guidelines.","employerResp":"Register/contribute levy, get grant approval, ensure training completion and submit evidence.","employeeResp":"Attend approved training and provide attendance/supporting evidence.","payrollImpact":"Can offset training spend; claim should not be treated as automatic until approved/disbursed.","authority":"HRD Corp","sourceUrl":"https://hrdcorp.gov.my/employers | https://hrdcorp.gov.my/employer-guidelines","notes":"Official HRD Corp pages state employer levy-funded training grants and claim procedures."}],"Malta":[{"category":"Maternity / Adoption","schemeName":"Maternity Benefit / Maternity Leave Benefit","claimableBy":"Employee or self-occupied claimant","eligible":"Pregnant/adopting claimant who does not receive paid maternity/adoption leave from employer, or employed woman using full employer-paid maternity leave for leave benefit.","amount":"Maternity Benefit up to 14 weeks; Maternity Leave Benefit up to 4 weeks; amount follows Social Security benefit rates and claimant situation.","duration":"Up to 14 weeks for maternity/adoption benefit; up to 4 weeks for maternity leave benefit.","howToClaim":"Apply online through Social Security maternity/adoption benefit service.","documents":"Identity, social security details, pregnancy/adoption evidence, bank details and declaration on paid leave status.","deadline":"Apply according to Social Security service timing around maternity/adoption leave.","employerResp":"Confirm employer-paid leave status where relevant.","employeeResp":"Submit claim/declaration and supporting evidence.","payrollImpact":"Payroll must distinguish employer-paid maternity leave from Social Security-paid benefit where applicable.","authority":"Malta Department of Social Security","sourceUrl":"https://socialsecurity.gov.mt/en/information-and-applications-for-benefits-and-services/family-benefits/maternity-benefit/ | https://socialsecurity.gov.mt/en/maternityadoptionbenefit/","notes":"Official DSS page describes four maternity/adoption benefit types."},{"category":"Maternity / Adoption","schemeName":"Maternity / Adoption Leave Trust Claim","claimableBy":"Employer","eligible":"Employer claiming under Social Security employer trust process for maternity/adoption leave-related payments and statutory leave framework.","amount":"Claim/reimbursement depends on trust claim assessment and statutory pay rules; part-time irregular hours are calculated using basic weekly wage.","duration":"For relevant maternity/adoption leave period.","howToClaim":"Submit online employer trust claim through Social Security.","documents":"Employer declaration, payroll/basic wage evidence, leave details, employee details and any Social Security requested evidence.","deadline":"After/around eligible leave payment according to the online claim process.","employerResp":"Pay/manage statutory leave and submit accurate claim/evidence.","employeeResp":"Provide leave and employment details; return-to-work condition may be relevant.","payrollImpact":"Can reimburse/offset employer leave cost depending on approved claim; track against payroll records.","authority":"Malta Department of Social Security","sourceUrl":"https://socialsecurity.gov.mt/en/information-and-applications-for-benefits-and-services/family-benefits/maternity-adoption-leave-trust-claim/ | https://socialsecurity.gov.mt/en/maternityadoptionleave/","notes":"Official DSS page states employee six-month return-to-work obligation and employer reimbursement context."},{"category":"Sickness / Medical Leave","schemeName":"Sickness Benefit","claimableBy":"Employee claimant","eligible":"Employee satisfying Social Security sickness benefit conditions and medically certified sick.","amount":"Paid from the 4th working day of sickness; first 3 working days are payable by employer. Benefit rate depends on Social Security rules.","duration":"For certified sickness period subject to Social Security limits.","howToClaim":"Apply through Social Security with medical certificate and claim details.","documents":"Blue medical certificate, identity/social security details, bank details and employer information.","deadline":"Submit according to DSS sickness benefit process from certified sickness date.","employerResp":"Pay first 3 working days and provide employment details where needed.","employeeResp":"Submit medical certificate/claim and comply with certification rules.","payrollImpact":"Payroll must separate first 3 employer-paid working days and Social Security benefit period.","authority":"Malta Department of Social Security","sourceUrl":"https://socialsecurity.gov.mt/en/information-and-applications-for-benefits-and-services/medical-assistance/sickness-benefit/","notes":"Official DSS page states benefit starts from fourth working day."},{"category":"Work Injury / Occupational Disease","schemeName":"Injury Benefit / Injury on Duty Grant or Pension","claimableBy":"Employee claimant","eligible":"Person injured on duty with inability to work over 3 calendar days; grant/pension may apply after percentage disability from work injury/disease is assessed.","amount":"Injury Benefit paid per Social Security rules; Injury Grant/Pension depends on specialist medical report and percentage disablement.","duration":"For injury absence/disablement period according to assessment.","howToClaim":"Apply online through Social Security injury benefit or injury-on-duty grant/pension service.","documents":"Medical report/certificate, employer declaration, incident details, specialist report for disability percentage, identity and bank details.","deadline":"Submit after injury and when medical/disability evidence is available.","employerResp":"Complete employer declaration and cooperate if DSS/OHSA investigation is requested.","employeeResp":"Submit medical evidence and application.","payrollImpact":"HR must document accident and support investigation/claim records.","authority":"Malta Department of Social Security / OHSA where investigated","sourceUrl":"https://socialsecurity.gov.mt/en/information-and-applications-for-benefits-and-services/medical-assistance/injury-benefit/ | https://socialsecurity.gov.mt/en/information-and-applications-for-benefits-and-services/medical-assistance/injury-on-duty-grant-pension/","notes":"Official DSS page states injury must compromise ability to work for over 3 calendar days."},{"category":"Hiring / Wage Subsidy","schemeName":"Access to Employment (A2E) Scheme 2021-2027","claimableBy":"Employer","eligible":"Employer in Malta/Gozo hiring eligible disadvantaged, unemployed or inactive jobseeker categories under Jobsplus A2E rules.","amount":"Financial assistance to employer; exact aid intensity/amount depends on category, wage cost and scheme guidance notes.","duration":"Scheme/programme period 2021-2027; individual support duration depends on approved worker category.","howToClaim":"Employer applies through Jobsplus employer scheme portal before/around hiring.","documents":"Employer registration, vacancy/contract, candidate eligibility evidence, payroll/wage cost documents and scheme application.","deadline":"Must apply within scheme rules before claiming aid.","employerResp":"Apply and retain eligible employee/payroll evidence.","employeeResp":"Participate as eligible candidate/jobseeker.","payrollImpact":"Can subsidize wage cost for approved hires only; payroll evidence is needed for claims.","authority":"Jobsplus Malta","sourceUrl":"https://jobsplus.gov.mt/funding-employer/access-to-employment-a2e-scheme-2021-2027 | https://jobsplus.gov.mt/media/o0qduuyq/employmentscheme20212027guidancenotes22022023v2july23.pdf","notes":"Official Jobsplus page and guidance notes are used."},{"category":"Training / Upskilling","schemeName":"Skills Development Scheme","claimableBy":"Employer","eligible":"SMEs and large enterprises investing in eligible employee/new-employee training under Malta Enterprise scheme.","amount":"Support for eligible training costs; amount depends on incentive guidelines, undertaking size, eligible costs and approval.","duration":"Programme-specific according to approval and guideline validity.","howToClaim":"Apply to Malta Enterprise before starting/claiming supported training.","documents":"Application, training plan, trainer/course details, invoices/receipts, attendance and payroll/training evidence.","deadline":"Follow Malta Enterprise application/claim deadlines; generally approval before supported activity.","employerResp":"Submit application, ensure training eligibility and keep cost/attendance evidence.","employeeResp":"Attend approved training.","payrollImpact":"Can offset training spend but mandatory/routine training is generally ineligible under guidelines.","authority":"Malta Enterprise","sourceUrl":"https://maltaenterprise.com/SkillsDevelopment | https://maltaenterprise.com/sites/default/files/Skills%20Development%20Incentive%20Guidelines%20%28V1.0%20%2001.2024%29.pdf","notes":"Official Malta Enterprise guidelines exclude routine/mandatory training."}],"Mauritius":[{"category":"Work Injury / Occupational Disease","schemeName":"Industrial Injury Benefit (IIB)","claimableBy":"Employee or self-employed claimant","eligible":"Employee or self-employed person suffering personal injury caused by industrial accident or prescribed occupational disease resulting in temporary total incapacity for work.","amount":"Benefit amount follows Social Contribution and Social Benefits Act / Industrial Injuries Regulations and assessment.","duration":"For temporary total incapacity or assessed industrial-injury benefit period.","howToClaim":"Apply through Social Security Division / official industrial injury process.","documents":"Accident/injury report, medical evidence, employment/self-employment evidence, identity and bank details.","deadline":"Submit after industrial accident/disease and certification; follow Social Security office process.","employerResp":"Document accident and provide employment/wage evidence where relevant.","employeeResp":"Submit medical and claim evidence.","payrollImpact":"HR must document work injury and coordinate absence/benefit process.","authority":"Ministry of Social Integration, Social Security and National Solidarity","sourceUrl":"https://socialsecurity.govmu.org/socialsecurity/?page_id=1547 | https://socialsecurity.govmu.org/socialsecurity/?page_id=1551 | https://socialsecurity.govmu.org/socialsecurity/wp-content/uploads/2026/02/no-152-social-contribution-and-social-benefits-industrial-injuries-regulations-2022.pdf","notes":"Official source states IIB is payable for industrial accident/prescribed disease."},{"category":"Unemployment / Workfare","schemeName":"Transition Unemployment Benefit","claimableBy":"Employee claimant","eligible":"Mauritian private-sector worker whose contract is terminated under Workers’ Rights Act 2019 and who is registered in the Workfare Programme.","amount":"Benefit amount depends on Workfare/official benefit rules and claimant situation.","duration":"Transition period under the Workfare/official programme rules.","howToClaim":"Register in Workfare Programme and apply through Social Security Division process.","documents":"Termination evidence, identity/NIC, employment history, Workfare registration and bank details.","deadline":"After termination and Workfare registration within official process.","employerResp":"Provide termination/employment documents if requested.","employeeResp":"Register and submit claim evidence.","payrollImpact":"Leaver documentation affects benefit access.","authority":"Ministry of Social Integration, Social Security and National Solidarity","sourceUrl":"https://socialsecurity.govmu.org/socialsecurity/?page_id=1037","notes":"Official source states benefit applies to registered Workfare Programme workers."},{"category":"Training / Upskilling","schemeName":"HRDC Training Grant System - local training / grant refund","claimableBy":"Employer","eligible":"Employer contributing the HRDC training levy and using eligible approved training under the Training Grant System.","amount":"Refund is limited by employer annual grant ceiling calculated from annual training levy paid in previous financial year; exact refund follows HRDC formula and scheme.","duration":"Per approved training and financial-year grant ceiling.","howToClaim":"Submit G1/G3 applications through HRDC online training grant system.","documents":"Training application, attendance sheets, invoices/receipts, proof of payment, course approval/MQA/HEC details and HRDC forms.","deadline":"Follow HRDC grant application and missing-document deadlines.","employerResp":"Pay levy, seek approval, submit refund claim and evidence.","employeeResp":"Attend approved training.","payrollImpact":"Training refund offsets employer training cost after approval; not automatic without HRDC claim.","authority":"HRDC Mauritius","sourceUrl":"https://www.hrdc.mu/index.php/training-grant-system/levy-grant-incentive-schemes | https://www.levy.hrdc.mu/ | https://hrdc.mu/index.php/training-grant-system/tax-rate-and-grant-refund-formula","notes":"Official HRDC pages state online G1/G3 grant applications and annual grant ceiling formula."},{"category":"Training / Upskilling","schemeName":"HRDC 90% refund for AI courses up to Diploma level","claimableBy":"Employer","eligible":"Employer contributing to training levy and sending employees to eligible AI-focused courses starting from 1 July 2024.","amount":"Up to 90% refund of training costs for courses explicitly focused on Artificial Intelligence, subject to HRDC conditions.","duration":"For eligible AI courses under the published HRDC measure.","howToClaim":"Apply/claim through HRDC Training Grant System.","documents":"Course details proving AI focus, attendance, invoice/receipt, proof of payment, employer levy/grant documents.","deadline":"Follow HRDC grant application/claim deadline.","employerResp":"Confirm course eligibility and submit refund claim.","employeeResp":"Attend approved AI course.","payrollImpact":"Higher refund rate may significantly offset AI training cost for eligible employers.","authority":"HRDC Mauritius","sourceUrl":"https://www.hrdc.mu/ | https://www.hrdc.mu/index.php/news/90-refund-of-training-costs-for-ai-courses-up-to-diploma-level","notes":"Official HRDC page states up to 90% refund for AI courses."},{"category":"Unemployment / Social Assistance","schemeName":"Unemployment Hardship Relief","claimableBy":"Individual claimant","eligible":"Citizen of Mauritius meeting unemployment hardship relief eligibility and income/means conditions under the Act and Regulations.","amount":"Relief amount follows the Unemployment Hardship Relief Act/Regulations; minimum amounts are set in schedules.","duration":"For eligible hardship period according to assessment.","howToClaim":"Apply through Social Security office/approved form process.","documents":"Identity/citizenship, income/unemployment evidence, household details and approved form/supporting documents.","deadline":"Apply when unemployed and facing hardship; follow Ministry process.","employerResp":"Provide employment/termination evidence where requested.","employeeResp":"Submit application and income/household information.","payrollImpact":"HR impact is mainly leaver documentation; benefit is individual-facing, not employer reimbursement.","authority":"Ministry of Social Integration, Social Security and National Solidarity","sourceUrl":"https://socialsecurity.govmu.org/socialsecurity/wp-content/uploads/2024/07/THE-UNEMPLOYMENT-HARDSHIP-RELIEF-ACT-1983.pdf | https://socialsecurity.govmu.org/socialsecurity/wp-content/uploads/2024/07/Unemployment-Hardship-Relief-Regulations-1983.pdf","notes":"Official law/regulation sources used because benefit details are statutory."}],"Mexico":[{"category":"Maternity / Parental","schemeName":"IMSS maternity incapacity subsidy","claimableBy":"Employee claimant","eligible":"Pregnant insured worker registered with IMSS who obtains maternity incapacity certificate and meets IMSS requirements.","amount":"Up to 84 calendar days of maternity rest with subsidy paid in one payment if requirements are met; exact amount follows IMSS/Ley del Seguro Social rules.","duration":"Up to 84 calendar days; prenatal days may be transferred to postnatal under IMSS process.","howToClaim":"Obtain maternity incapacity certificate through IMSS; collect subsidy by bank/authorized route or payroll agreement if company has IMSS payment agreement.","documents":"Official ID, Social Security Number, ultrasound interpretation if external doctor, certificate copy, bank/payment documents as required.","deadline":"Claim/payment after IMSS issues certificate; subsidy can be collected from third business day after certificate according to IMSS FAQ.","employerResp":"Register employee with IMSS and support payroll-payment agreement where applicable.","employeeResp":"Attend IMSS process, provide documents and collect/register payment route.","payrollImpact":"Payroll must not duplicate IMSS-subsidized incapacity payments unless under formal payment agreement.","authority":"IMSS","sourceUrl":"https://www.imss.gob.mx/maternidad | https://www.imss.gob.mx/_maternidad2/incapacidad/proceso-incapacidad-maternidad | https://www.imss.gob.mx/_maternidad2/incapacidad/toma-en-cuenta","notes":"Official IMSS pages state 84-day rest and one-time subsidy payment if requirements are met."},{"category":"Sickness / Work Injury","schemeName":"IMSS temporary incapacity subsidies - general sickness, maternity or work risk","claimableBy":"Employee claimant","eligible":"Insured worker with IMSS-certified temporary incapacity for general illness, maternity or work risk.","amount":"IMSS pays subsidies for certified temporary incapacity; amount depends on incapacity type and social-security wage/rules.","duration":"For IMSS-certified incapacity period.","howToClaim":"Register bank CLABE through IMSS online process or collect through authorized payment route.","documents":"IMSS incapacity certificate, official ID, Social Security Number, bank CLABE/FIEL for online registration and supporting medical evidence.","deadline":"After certificate issuance; follow IMSS payment process.","employerResp":"Ensure IMSS registration/contributions and use company payment agreement only if formally arranged.","employeeResp":"Submit certificate/payment details and comply with IMSS medical certification.","payrollImpact":"Payroll must classify incapacity reason and coordinate IMSS subsidy/payment handling.","authority":"IMSS","sourceUrl":"https://www.imss.gob.mx/derechoH/pago-incapacidades | https://www.imss.gob.mx/tramites/imss01036a | https://www.imss.gob.mx/conoce-al-imss/seguros-prestaciones","notes":"Official IMSS pages cover subsidy payment for general sickness, maternity and work risks."},{"category":"Family / Social Security Allowance","schemeName":"IMSS marriage and funeral assistance","claimableBy":"Employee/beneficiary claimant","eligible":"IMSS insured person or beneficiary meeting statutory conditions for marriage expense aid or funeral expense aid.","amount":"Aid amount follows IMSS/Ley del Seguro Social rules and specific benefit type.","duration":"One-time assistance per qualifying event.","howToClaim":"Apply through IMSS benefit/payment process.","documents":"Official ID, Social Security Number, event evidence such as marriage/funeral documents, bank/payment details and beneficiary documents.","deadline":"Apply after qualifying event within IMSS procedure.","employerResp":"Maintain IMSS registration/contributions; provide employment records if requested.","employeeResp":"Submit claim and event evidence.","payrollImpact":"Limited payroll impact; mainly employee-benefit guidance and records support.","authority":"IMSS","sourceUrl":"https://www.imss.gob.mx/derechoH/pago-incapacidades","notes":"Official IMSS page lists help for marriage expenses and funeral expenses as IMSS benefits."},{"category":"Employment / Training Support","schemeName":"Servicio Nacional de Empleo - Programa de Apoyo al Empleo / training and employment supports","claimableBy":"Jobseeker / worker; employer may participate in placement/training route","eligible":"People seeking employment or affected workers under SNE/STPS programme rules; employers may be involved in work placement/training modalities.","amount":"Support can include economic or in-kind support for training, self-employment, labour mobility and repatriated workers; exact amount depends on programme/modalidad and budget.","duration":"Programme-specific; 2026 operation is through SNE/STPS systems.","howToClaim":"Access through Servicio Nacional de Empleo / STPS systems such as SISPAEW or official programme channels.","documents":"Applicant registration, identity, employment/training details, programme-specific forms and evidence.","deadline":"During programme call/application window.","employerResp":"If participating, provide training/placement information and comply with programme terms.","employeeResp":"Register/apply and provide evidence.","payrollImpact":"Can support training/employability; not a universal employer payroll subsidy.","authority":"STPS / Servicio Nacional de Empleo","sourceUrl":"https://www.stps.gob.mx/gobmx/cgsne/index.html | https://sispaew.stps.gob.mx/ | https://www.stps.gob.mx/bp/secciones/conoce/areas_atencion/areas_atencion/servicio_empleo/resultados_programas.html","notes":"Official STPS/SNE pages used; detailed current amount may require programme login/call documents."}],"Morocco":[{"category":"Maternity / Parental","schemeName":"CNSS daily maternity indemnity (Indemnités journalières de maternité)","claimableBy":"Employee / insured mother","eligible":"Salaried woman registered with CNSS who stops paid work for childbirth and has at least 54 contribution days during the 10 months before maternity work stoppage.","amount":"CNSS pays daily maternity indemnity; exact amount is based on insured salary rules.","duration":"14 weeks.","howToClaim":"Submit through CNSS Taawidaty / macnss.ma or CNSS channel.","documents":"CNSS form 312-1-16, ID/residence card if not already filed, RIB/bank evidence if not already filed, birth certificate or medical birth certificate, other case documents.","deadline":"Submit once maternity work stoppage / birth evidence is available; no fixed universal deadline found on the public page.","employerResp":"Keep employee declared with CNSS and provide payroll/employment confirmation where required.","employeeResp":"Submit claim and supporting documents.","payrollImpact":"Payroll should coordinate leave and CNSS benefit; this is not a normal employer-funded wage claim.","authority":"CNSS","sourceUrl":"https://www.cnss.ma/fr/content/indemnites-journalieres-de-maternite","notes":"Official CNSS page confirms 14 weeks and 54 contribution-day eligibility."},{"category":"Sick Leave / Medical","schemeName":"CNSS daily sickness indemnity (Indemnités journalières de maladie)","claimableBy":"Employee / insured worker","eligible":"CNSS-insured worker with 54 contribution days in the 6 months before incapacity; for non-work accidents, being insured at accident date is sufficient.","amount":"CNSS daily sickness indemnity; public page states benefit starts from the 4th day and can run up to 52 weeks within the 24 months after incapacity starts.","duration":"From day 4; maximum 52 weeks within 24 months.","howToClaim":"Submit through CNSS Taawidaty / macnss.ma or official CNSS channel.","documents":"Work interruption notice, medical evidence and CNSS-requested forms/documents.","deadline":"Work interruption notice within 30 days; sickness indemnity request within 6 months from work stoppage.","employerResp":"Declare wages/contributions correctly and support absence documentation if needed.","employeeResp":"File claim and medical documents on time.","payrollImpact":"Coordinate unpaid/paid sickness absence with CNSS benefit timing.","authority":"CNSS","sourceUrl":"https://www.cnss.ma/fr/content/indemnites-journalieres-de-maladie","notes":"Official CNSS page gives timing, contribution and deadline rules."},{"category":"Unemployment / Job Loss","schemeName":"Indemnité pour Perte d’Emploi (IPE)","claimableBy":"Employee / insured worker; can apply via employer route","eligible":"CNSS-insured employee who loses job involuntarily, actively seeks work, and has 780 declared salary days in the prior 36 months including 260 days in the last 12 months.","amount":"CNSS job-loss indemnity; paid for up to 6 months.","duration":"Up to 6 months.","howToClaim":"Apply through CNSS Taawidaty / CNSS portal or through employer.","documents":"Form 310-1-26 completed by last employer, CNSS registration card, national ID and other requested evidence.","deadline":"Within 60 days from job loss.","employerResp":"Complete employer part of claim form and provide accurate last-employer information.","employeeResp":"Apply within deadline and show involuntary job loss/active job search where required.","payrollImpact":"Offboarding payroll/HR must provide correct CNSS and employer data.","authority":"CNSS","sourceUrl":"https://cnss.ma/fr/content/c_est_quoi_ipe?language_content_entity=fr | https://cnss.ma/fr/content/quelles-sont-les-conditions-pour-bénéficier-des-indemnités-pour-perte-d’emploi?language_content_entity=fr","notes":"Official CNSS pages define IPE and main eligibility/deadline conditions."},{"category":"Family / Dependent","schemeName":"CNSS family allowances (Allocations familiales)","claimableBy":"Employee / insured parent","eligible":"CNSS-insured worker meeting declared-day and wage conditions; CNSS FAQ states 108 declared days over 6 calendar months and monthly wage at least 60% of SMIG/SMAG.","amount":"Family allowance amount depends on CNSS rules and eligible children.","duration":"Ongoing while eligibility remains.","howToClaim":"Submit through CNSS/Taawidaty or CNSS local agency depending on case.","documents":"Child birth certificate, ID/residence card and CNSS-requested family documents.","deadline":"No fixed universal deadline found on public FAQ; submit when child/family eligibility arises.","employerResp":"Maintain CNSS declarations and wage records.","employeeResp":"Submit child/family documents and keep details updated.","payrollImpact":"May affect employee net family-benefit handling but is public social security support, not employer salary.","authority":"CNSS","sourceUrl":"https://cnss.ma/fr/content/quelles-sont-les-conditions-pour-bénéficier-des-allocations-familiales?language_content_entity=fr | https://cnss.ma/fr/content/je-suis-une-mère-célibataire-est-ce-que-je-peux-bénéficier-des-allocations-familiales-et?language_content_entity=fr","notes":"CNSS FAQ pages used because the main page may be JavaScript-protected."},{"category":"Hiring / Wage Subsidy / Tax Relief","schemeName":"ANAPEC IDMAJ / TAHFIZ employment programmes","claimableBy":"Employer","eligible":"Employers using ANAPEC employer space and eligible contracts/programme tracks; TAHFIZ targets newly created companies/associations for fiscal and social charge exemption.","amount":"Programme-based relief/subsidy; TAHFIZ provides exemption from tax and social charges under official programme conditions.","duration":"Depends on contract/programme and current ANAPEC rules.","howToClaim":"Use ANAPEC employer space to propose insertion contracts, TAHFIZ protocols or related programme forms.","documents":"Employer account, job offer/contract, employee/jobseeker details, programme protocol/forms.","deadline":"Programme-specific; apply before or during eligible hiring process.","employerResp":"Register on ANAPEC employer portal and follow programme protocol.","employeeResp":"Provide candidate/worker data where required.","payrollImpact":"Can reduce employer hiring cost but must be validated through ANAPEC before payroll assumptions.","authority":"ANAPEC","sourceUrl":"https://www.anapec.org/sigec-app-rv/fr/entreprises/recrutement_etrangers | https://anapec.org/newsletter/emp915/pages/focus.html","notes":"Official ANAPEC pages list employer portal programme functions and TAHFIZ purpose."}],"Myanmar":[{"category":"Social Security / Medical","schemeName":"Social Security Board health and social care benefits","claimableBy":"Employee / insured person","eligible":"Insured person registered under Myanmar Social Security Law and rules; SSB operates the social security system and claim forms/documents.","amount":"Medical care and cash benefit support as provided under the Social Security Law/Rules; exact rate depends on contribution history and benefit type.","duration":"During covered illness/medical event under SSB rules.","howToClaim":"Apply through SSB office / SSB system with required claim documents.","documents":"SSB claim documents, insured person details, employer/workplace registration details, medical evidence.","deadline":"Benefit-specific; confirm with current SSB office/portal before filing.","employerResp":"Register covered workplace and insured workers, pay contributions and support claim documents.","employeeResp":"Submit claim and medical evidence.","payrollImpact":"Payroll must track SSB-covered absence separately from ordinary company sick leave.","authority":"Social Security Board, Ministry of Labour","sourceUrl":"https://www.ssb.gov.mm/portal/home | https://www.ssb.gov.mm/portal/assets/attachment/The-Social-Security-Rules-English%20Version.pdf","notes":"Official SSB portal/law documents are used; operational pages are mostly Myanmar-language."},{"category":"Maternity / Parental","schemeName":"SSB maternity benefit","claimableBy":"Employee / insured mother","eligible":"Insured woman meeting contribution/registration requirements under SSB rules.","amount":"SSB maternity cash benefit; official SSB formula document gives benefit calculation examples and rates.","duration":"Maternity period under Social Security Rules; exact days/rate should be confirmed with current SSB office.","howToClaim":"Apply to SSB with maternity claim evidence.","documents":"Claim form, insured-person evidence, employer/workplace documents, medical/birth evidence.","deadline":"Benefit-specific; check current SSB claim instructions.","employerResp":"Maintain SSB registrations and contributions; verify absence details.","employeeResp":"Submit maternity documents and claim.","payrollImpact":"Separate payroll maternity leave from public SSB benefit where applicable.","authority":"Social Security Board, Ministry of Labour","sourceUrl":"https://www.ssb.gov.mm/Portal/assets/attachment/Benefit_Calculation%28Formula%29.pdf | https://ssb.gov.mm/Portal/assets/attachment/Documents%20for%20Benefit%20Claim.pdf","notes":"Formula/claim-document PDFs are official SSB files."},{"category":"Work Injury / Occupational Disease","schemeName":"SSB employment injury benefit insurance","claimableBy":"Employee / insured worker","eligible":"Worker with employment injury, accident or occupational disease covered by the Social Security Law and Employment Injury Benefit Insurance System.","amount":"Employment injury benefits under SSB system; amount depends on injury/disability/death assessment and law/rules.","duration":"For treatment, temporary incapacity, disability or survivor case under law.","howToClaim":"Report and claim through SSB office/system using employment injury documents.","documents":"Work injury report, medical evidence, insured details, employer/workplace registration, SSB forms.","deadline":"Report/claim timing depends on SSB rules and office instructions; report immediately.","employerResp":"Report workplace injury and maintain employment injury contributions/records.","employeeResp":"Attend medical assessment and provide evidence.","payrollImpact":"Work-injury absence should be tracked separately; coordinate SSB benefit and employer duty.","authority":"Social Security Board, Ministry of Labour","sourceUrl":"https://myanmar.gov.mm/documents/20143/0/8.Social-Security-Law-2012.pdf/dca488e3-d436-2af7-2b8c-eb200efcfbc9?t=1676884635030 | https://ssb.gov.mm/portal/assets/attachment/monthly_form_13.pdf","notes":"Official law confirms employment injury benefit system; SSB monthly form shows contribution categories."},{"category":"Employer Registration / Contributions","schemeName":"SSB employer and worker registration / contribution process","claimableBy":"Employer","eligible":"Covered workplaces must register with SSB and register insured workers according to Social Security Law/Rules.","amount":"Not a claim payment, but required gateway for employees to access SSB benefits.","duration":"Ongoing monthly contribution compliance.","howToClaim":"Register through SSB e-registration / office process and submit monthly contributions.","documents":"Employer registration form, worker list/payroll, business licence copy and SSB forms.","deadline":"Official SSB claim document states workplace registration within 30 days of starting operation.","employerResp":"Register, withhold/pay contributions and keep records.","employeeResp":"Provide personal details for worker registration.","payrollImpact":"Required before social security claimability can work correctly.","authority":"Social Security Board, Ministry of Labour","sourceUrl":"https://ssb.gov.mm/Portal/assets/attachment/Documents%20for%20Benefit%20Claim.pdf | https://user.ssb.gov.mm/","notes":"Included because registration is the practical prerequisite for claim eligibility."}],"Nepal":[{"category":"Medical / Maternity","schemeName":"SSF medical, health and maternity protection scheme","claimableBy":"Employee / contributor; family coverage in specified cases","eligible":"Contributor under Social Security Fund formal-sector scheme; includes OPD/IPD treatment, maternity care and child treatment as defined by SSF.","amount":"Claim of eligible treatment expenses and maternity-related benefits under SSF scheme rules; amount depends on scheme limits and documents.","duration":"During covered medical/maternity event; SSF page notes maternity care around pregnancy and child treatment up to 3 months after birth.","howToClaim":"Submit SSF claim online/through SSF process with required documents.","documents":"Claim form, OPD/emergency ticket, original bills, leave proof if applicable, employer recommendation, birth/marriage certificate where relevant, discharge summary and SSF card.","deadline":"Benefit-specific; SSF notice states maternity care, maternity leave and sick leave allowance claims are online only.","employerResp":"Register employer/contributor, pay contributions, provide recommendation/leave proof.","employeeResp":"Submit claim, bills and personal/family documents.","payrollImpact":"Payroll should coordinate SSF benefit with leave and medical reimbursement policy.","authority":"Social Security Fund Nepal","sourceUrl":"https://ssf.gov.np/pages/scheme-1-services | https://ssf.gov.np/pages/scheme-1-claim-required-documents | https://www.ssf.gov.np/list/Information/notice-regarding-allowance-claim-through-online-process-only","notes":"Official SSF service and document pages are used."},{"category":"Work Injury / Disability","schemeName":"SSF accident and disability protection scheme","claimableBy":"Employee / contributor","eligible":"SSF contributor with workplace or covered accident/disability case under SSF scheme.","amount":"Accident/disability claim amount depends on SSF scheme rules and assessment.","duration":"During treatment, disability or incapacity period as approved by SSF.","howToClaim":"Submit accident claim form through SSF claim process.","documents":"Accident claim form, employer confirmation/recommendation, medical and accident documents, SSF/contributor ID.","deadline":"Benefit-specific; submit as soon as accident/disability evidence is available.","employerResp":"Report accident and support claim paperwork.","employeeResp":"Submit medical/accident evidence and attend assessments.","payrollImpact":"HR must classify absence/injury accurately and coordinate SSF claim.","authority":"Social Security Fund Nepal","sourceUrl":"https://ssf.gov.np/list/claim-forms/accident-scheme-claim-form | https://ssf.gov.np/","notes":"Official SSF claim form page and SSF fund dashboard/statistics used."},{"category":"Dependent / Survivor","schemeName":"SSF dependent family protection scheme","claimableBy":"Dependent family of contributor","eligible":"Eligible dependents of a contributor under SSF dependent family protection rules.","amount":"Dependent family benefit limits/conditions apply under SSF scheme; amount depends on family status and scheme rules.","duration":"Ongoing or case-based depending on survivor/dependent category.","howToClaim":"Apply through SSF dependent-family claim route.","documents":"Dependent family claim form, relationship/death documents, contributor records and SSF-required evidence.","deadline":"Benefit-specific; file after qualifying event.","employerResp":"Provide employment/contribution confirmation if requested.","employeeResp":"Dependents submit family and contributor evidence.","payrollImpact":"Important for death/offboarding HR support and final payroll coordination.","authority":"Social Security Fund Nepal","sourceUrl":"https://www.ssf.gov.np/services/dependent-family-protection-scheme-facility-limits-and-conditions","notes":"Official SSF dependent-family scheme page used."},{"category":"Retirement / Old Age","schemeName":"SSF old age / retirement claim","claimableBy":"Employee / contributor","eligible":"Contributor reaching retirement/withdrawal conditions under SSF retirement scheme.","amount":"Retirement/old-age claim amount depends on accumulated contributions and SSF scheme rules.","duration":"At retirement/eligible withdrawal event.","howToClaim":"Apply through SSF retirement claim process/portal.","documents":"Retirement claim form, contributor ID, bank/account and SSF-required documents.","deadline":"Benefit-specific; apply when retirement condition is met.","employerResp":"Maintain contribution records and support separation data.","employeeResp":"Submit retirement claim documents.","payrollImpact":"Payroll/offboarding should verify SSF contributions and final records.","authority":"Social Security Fund Nepal","sourceUrl":"https://ssf.gov.np/list/claim-forms | https://ssf.gov.np/","notes":"Included because SSF dashboard tracks retirement claim payments and claim forms are official."},{"category":"Employment / Public Works","schemeName":"Prime Minister Employment Programme / National Employment Promotion Programme","claimableBy":"Unemployed worker / local level programme; not a standard private-employer claim","eligible":"Registered unemployed workers and eligible households/local programmes under Nepal government employment programme.","amount":"Programme aims to guarantee minimum employment of 100 days of labour-intensive public works or provide subsistence wage in absence of work; current amount is programme/local-budget dependent.","duration":"Annual/programme-based.","howToClaim":"Register/use employment service centre / PMEP systems.","documents":"Unemployment registration and programme documents required by local employment service centre.","deadline":"Programme-specific annual deadlines/notices.","employerResp":"Private employers generally do not claim this as payroll subsidy; local government/programme manages employment.","employeeResp":"Register with employment service centre where eligible.","payrollImpact":"Useful as labour-market support reference, but not an employer payroll reimbursement.","authority":"National Employment Promotion Programme / MOLESS","sourceUrl":"https://www.pmep.gov.np/ | https://pmep.gov.np/uploads/employment_oriented_service/1672986960-LifeSkillsTrainingEoI.pdf","notes":"Official PMEP/MOLESS source says flagship programme guarantees 100 days or subsistence wage support."}],"Netherlands":[{"category":"Maternity / Parental","schemeName":"WAZO maternity pay (zwangerschaps- en bevallingsuitkering)","claimableBy":"Employer applies for employee; payment usually to employer","eligible":"Pregnant employee with employment contract; employer arranges maternity pay through UWV.","amount":"UWV maternity pay; in most cases transferred to employer every 4 weeks, then employer continues paying salary. Amount based on UWV WAZO rules.","duration":"Statutory maternity/birth leave period.","howToClaim":"Employer reports absence through UWV employer portal Verzuimmelder selecting WAZO-verlof, or via Digipoort HR system.","documents":"Employee details, leave dates, expected/actual birth details and UWV-requested payroll data.","deadline":"Apply around maternity leave timing; follow UWV portal process.","employerResp":"Apply to UWV and continue salary payment if benefit goes to employer.","employeeResp":"Provide pregnancy/birth and leave information.","payrollImpact":"Payroll should treat UWV receipt as public benefit/reimbursement, not normal employer grant.","authority":"UWV","sourceUrl":"https://www.uwv.nl/en/employers/forms/arranging-maternity-pay-for-your-employee | https://www.uwv.nl/en/employers/maternity-and-parental-leave/about-maternity-pay","notes":"Official UWV employer pages confirm application route and payment routing."},{"category":"Maternity / Parental","schemeName":"WAZO paid parental leave","claimableBy":"Employer applies for employee","eligible":"Employee with employment contract taking paid parental leave within 1 year of birth/adoption/foster placement and meeting legal parent/care conditions.","amount":"70% of average daily income, including 8% holiday pay, according to UWV.","duration":"Paid parental leave must be taken within 1 year; leave entitlement depends on statutory rules.","howToClaim":"Employer applies through UWV Verzuimmelder selecting WAZO-verlof or via Digipoort HR system.","documents":"Employee details, child/birth/adoption data, leave dates and payment request details.","deadline":"Apply/payment request according to UWV portal timing.","employerResp":"Apply to UWV and manage leave/payroll processing.","employeeResp":"Request leave and provide child/care details.","payrollImpact":"Payroll must calculate salary continuation/top-up and reconcile UWV benefit.","authority":"UWV","sourceUrl":"https://www.uwv.nl/en/individuals/maternity-and-parental-leave/paid-parental-leave | https://www.uwv.nl/en/employers/forms/arranging-paid-parental-leave-for-an-employee","notes":"Official UWV pages confirm 70% rate and employer application process."},{"category":"Maternity / Parental","schemeName":"Additional partner’s leave benefit","claimableBy":"Employer applies for employee","eligible":"Employee whose partner gave birth, has taken 1 week standard leave within 4 weeks, and qualifies as partner/parent under UWV criteria.","amount":"Up to 5 further weeks paid leave; UWV benefit applies under WAZO rules.","duration":"Additional partner leave after birth; statutory period under UWV rules.","howToClaim":"Employer applies to UWV for additional partner leave.","documents":"Employee/partner/child details, leave dates and UWV-required information.","deadline":"Follow UWV application timing after standard birth leave.","employerResp":"Apply to UWV and process payroll/leave.","employeeResp":"Provide partner/birth details and leave request.","payrollImpact":"Payroll must handle benefit payment and possible employer top-up.","authority":"UWV","sourceUrl":"https://www.uwv.nl/en/employers/maternity-and-parental-leave/additional-partners-leave | https://www.uwv.nl/en/individuals/maternity-and-parental-leave/additional-partners-leave","notes":"Official UWV pages describe entitlement and employer application duty."},{"category":"Sick Leave / Medical","schemeName":"UWV sickness benefit (Ziektewet-uitkering) in special cases","claimableBy":"Employer arranges for employee","eligible":"Employee may qualify when illness is linked to pregnancy/childbirth, organ donation or other UWV-covered special cases.","amount":"UWV sickness benefit; amount depends on case. Employer may still need minimum-wage top-up in first year if pay falls below minimum wage.","duration":"Benefit can last up to 104 weeks in relevant sickness-benefit cases.","howToClaim":"Employer reports illness through UWV employer portal Verzuimmelder selecting Ziekmelding.","documents":"Illness/absence report, employee data, medical/administrative details required by UWV.","deadline":"Report through UWV process as soon as qualifying sickness situation occurs.","employerResp":"Report sickness, manage return-to-work plan and monitor absence.","employeeResp":"Cooperate in return-to-work plan and provide required information.","payrollImpact":"Payroll/HR must distinguish ordinary employer-paid sickness from UWV-covered Ziektewet cases.","authority":"UWV","sourceUrl":"https://www.uwv.nl/en/employers/sickness/if-your-employee-becomes-ill | https://www.uwv.nl/en/employers/forms/arranging-a-sickness-benefit-for-your-employee","notes":"Official UWV pages state qualifying situations and employer application route."},{"category":"Hiring / Wage Subsidy / Payroll Tax Credit","schemeName":"Wage expense allowance (Loonkostenvoordeel / LKV)","claimableBy":"Employer","eligible":"Employer hiring or retaining employees in eligible groups such as older workers, disabled workers, target group of Access to Work programme, or new placement of disabled employee.","amount":"Payroll tax allowance; exact amount/duration depends on LKV type and current tax rules.","duration":"Usually annual calculation/payment cycle via payroll taxes, subject to LKV type.","howToClaim":"Apply through payroll tax return; UWV calculates provisional/definitive LKV and Belastingdienst pays/handles objections.","documents":"Target group declaration where required, payroll tax return data and employee eligibility evidence.","deadline":"Claim through payroll tax returns for the relevant year and follow annual LKV calculation process.","employerResp":"Identify eligibility and include LKV in wage tax return.","employeeResp":"Apply for/provide target group declaration where required.","payrollImpact":"Direct payroll tax cost reduction; requires payroll administration accuracy.","authority":"UWV / Belastingdienst","sourceUrl":"https://www.uwv.nl/nl/loonkostenvoordeel | https://www.belastingdienst.nl/wps/wcm/connect/bldcontenten/belastingdienst/business/payroll_taxes/you_are_not_established_in_the_netherlands_are_you_required_to_withhold_payroll_taxes/when_you_are_going_to_withhold_payroll_taxes/wage-expense-allowance-low-income-allowance-and-youth-low-income-allowance/wage-expense-allowance-low-income-allowance-and-youth-low-income-allowance","notes":"Official UWV and Tax Administration sources used."}],"New Zealand":[{"category":"Maternity / Parental","schemeName":"Paid parental leave","claimableBy":"Employee / self-employed primary carer","eligible":"Primary carer taking time off work to care for a new baby or child under 6 and meeting New Zealand work requirements.","amount":"Government-funded paid parental leave; IRD issues entitlement notice with payment amount and fortnightly payment dates.","duration":"Generally up to 26 weeks under current NZ rules; verify current entitlement in IRD before filing.","howToClaim":"Apply in myIR through Inland Revenue.","documents":"Employee/self-employed details, child/care details, work history and IRD-required documents.","deadline":"IRD page provides when-to-apply/deadline guidance; apply according to start date and IRD rules.","employerResp":"Confirm employment/work information if requested; coordinate unpaid parental leave.","employeeResp":"Apply through myIR and choose correct tax code if also receiving employer payments.","payrollImpact":"Payroll must avoid double-count/tax-code issues if employer also pays top-up/other payments.","authority":"Inland Revenue","sourceUrl":"https://www.ird.govt.nz/paid-parental-leave | https://www.ird.govt.nz/paid-parental-leave/qualifying | https://www.ird.govt.nz/paid-parental-leave/applications","notes":"Official IRD pages used; amount/dates are entitlement-specific."},{"category":"Work Injury / Occupational Disease","schemeName":"ACC weekly compensation","claimableBy":"Employee / self-employed / shareholder-employee","eligible":"Person employed/self-employed/shareholder-employee at time of covered injury and medically unable to work some/all duties.","amount":"ACC weekly compensation is up to 80% of average weekly earnings; for work injury, employer pays 80% of usua
