,"source":"https://socmin.lrv.lt/en/activities/labour-and-employment/labour-law/guarantees-for-parents-in-the-new-labour-code/"},{"category":"Severance & End-of-Service","benefit":"Termination notice and severance protection","mandatory":"Conditional","basis":"Conditional Statutory Benefit","employer":"Provide statutory termination notice, settlement and any severance/termination compensation when conditions apply.","employee":"Employee receives legal protection and potential termination compensation depending on termination reason, tenure and Labour Code rules.","cost":"Case-by-case; depends on termination basis, tenure and employment facts.","costBasis":"Applies during qualifying termination situations under the Labour Code.","compliance":"Keep as conditional employee protection; verify termination reason and current Labour Code text.","source":"https://e-seimas.lrs.lt/rs/legalact/TAD/TAIS.391384/"},{"category":"Social Security & Protection","benefit":"Social insurance protection","mandatory":"Yes","basis":"Statutory Benefit","employer":"Register and administer employment-related social insurance coverage.","employee":"Employees with labour relations are covered by social insurance branches including pensions, sickness, maternity, unemployment, accidents at work and occupational diseases.","cost":"Exact employer/employee contribution rates belong in Labor Cost Calculator.","costBasis":"Employment contract or equivalent labour relationship covered by Lithuanian social insurance law.","compliance":"This is employee-facing protection, but cost rates are excluded from the Benefits Plan page.","source":"https://socmin.lrv.lt/en/activities/social-insurance-1/social-insurance-contributions/"},{"category":"Work Injury & Insurance","benefit":"Accidents at work and occupational disease protection","mandatory":"Yes","basis":"Statutory Benefit","employer":"Maintain required statutory insurance coverage and occupational safety compliance.","employee":"Employee is protected through social insurance for accidents at work and occupational diseases.","cost":"Premium/rate details should be handled in Labor Cost Calculator.","costBasis":"Work-related accident or occupational disease, subject to statutory process.","compliance":"Keep as protection benefit; do not present as employer tax.","source":"https://socmin.lrv.lt/en/activities/social-insurance-1/social-insurance-contributions/"}],"Luxembourg":[{"category":"Health & Medical","benefit":"Sickness benefit and income continuity","mandatory":"Yes","basis":"Statutory Benefit","employer":"Continue salary/coordinate sickness benefit process according to statutory rules.","employee":"Employee has income-continuity protection during certified incapacity for work; CNS takes over sickness benefits after the statutory employer continuation period.","cost":"Exact salary continuation and reimbursement treatment depends on incapacity period and statutory rules.","costBasis":"Certified sickness/incapacity for work.","compliance":"Keep as health/income-protection benefit; exact payroll cost belongs in Labor Cost Calculator.","source":"https://cns.public.lu/en/employeur/maladie-accident-conges/indemnite-maladie-salaries.html"},{"category":"Leave & Time Off","benefit":"Annual paid leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Grant and pay statutory annual leave.","employee":"Employee is entitled to a minimum of 26 working days of paid annual leave per year.","cost":"Paid leave is normally part of salary planning; exact accrual and carryover depend on rules and employment facts.","costBasis":"Employees including salaried workers/apprentices; collective agreements may improve entitlement.","compliance":"Keep as employee-facing leave benefit.","source":"https://guichet.public.lu/en/entreprises/ressources-humaines/conges/annuel/conge-annuel.html"},{"category":"Leave & Time Off","benefit":"Public holiday entitlement","mandatory":"Yes","basis":"Statutory Benefit","employer":"Grant statutory public holiday treatment and compensatory leave/pay where required.","employee":"Employee is entitled to legal holiday protections, including compensatory leave/pay treatment where public holidays fall in certain ways.","cost":"Usually part of salary/calendar planning; premium pay depends on work pattern.","costBasis":"Employees working in Luxembourg, subject to labour law rules.","compliance":"Keep as employee-facing time-off benefit.","source":"https://www.csl.lu/en/your-rights/employees/legal-holidays/"},{"category":"Parental & Family","benefit":"Maternity leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Protect employment and administer maternity leave documentation.","employee":"Maternity leave generally consists of antenatal and postnatal leave; official guidance describes 8 weeks before birth and 12 weeks after birth.","cost":"Benefit/cost depends on CNS and salary rules; do not duplicate payroll contribution rates here.","costBasis":"Pregnant employee meeting statutory documentation and eligibility rules.","compliance":"Keep as family benefit; verify special health/safety protections where applicable.","source":"https://guichet.public.lu/en/citoyens/travail/conges-jours-feries/situation-personnelle/conge-maternite.html"},{"category":"Severance & End-of-Service","benefit":"Severance pay after qualifying service","mandatory":"Conditional","basis":"Conditional Statutory Benefit","employer":"Pay severance when statutory dismissal and service conditions are met.","employee":"A dismissed employee with notice and at least five years of service may be entitled to severance pay.","cost":"Case-by-case; depends on tenure, termination type and statutory/contractual rules.","costBasis":"Dismissal with notice; statutory qualifying service and conditions.","compliance":"Keep as conditional termination benefit.","source":"https://www.csl.lu/en/your-rights/employees/end-of-employment-contracts/dismissal/"},{"category":"Social Security & Protection","benefit":"Social security protection","mandatory":"Yes","basis":"Statutory Benefit","employer":"Affiliate employees and administer social security coverage through CCSS.","employee":"Employees are protected through Luxembourg social security institutions covering health, pension, accident and related statutory schemes.","cost":"Exact contribution rates are excluded from Benefits Plan and should sit in Labor Cost Calculator.","costBasis":"Employees subject to Luxembourg social security affiliation.","compliance":"Keep as employee-facing protection. Do not present as payroll tax.","source":"https://ccss.public.lu/"}],"Malaysia":[{"category":"Leave & Time Off","benefit":"Annual leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Grant and pay statutory annual leave under the Employment Act framework.","employee":"Employee receives paid annual leave; entitlement is set by statutory service bands under the Employment Act.","cost":"Paid leave is part of normal salary planning; exact entitlement depends on length of service and employee coverage.","costBasis":"Employees covered by the Employment Act; service length affects entitlement.","compliance":"Keep as employee-facing leave benefit. Verify Sabah/Sarawak or sector-specific rules where applicable.","source":"https://jtksm.mohr.gov.my/en/borang/employment-act-1955"},{"category":"Leave & Time Off","benefit":"Sick leave and hospitalisation leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide statutory paid sick leave/hospitalisation leave where conditions are met.","employee":"Employee receives paid sick leave protection under the Employment Act, with entitlement depending on service length and medical certification.","cost":"Part of absence/salary planning; exact days depend on service length and whether hospitalisation applies.","costBasis":"Covered employees with valid medical certification and statutory eligibility.","compliance":"Keep as employee-facing health leave benefit.","source":"https://jtksm.mohr.gov.my/en/borang/employment-act-1955"},{"category":"Parental & Family","benefit":"Maternity leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide maternity leave and maternity allowance where statutory conditions are met.","employee":"Minimum maternity leave is 98 consecutive days under the amended Employment Act framework.","cost":"Maternity pay depends on statutory eligibility and wage rules.","costBasis":"Pregnant employee meeting service/notice eligibility conditions.","compliance":"Keep as employee-facing parental benefit.","source":"https://www.malaysia.gov.my/en/categories/career/employee-rights-and-benefits"},{"category":"Parental & Family","benefit":"Paternity leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide paid paternity leave where statutory conditions are met.","employee":"Eligible married male employees receive 7 days of paid paternity leave, subject to statutory conditions.","cost":"Short paid leave cost is part of salary planning.","costBasis":"Statutory conditions include marriage, service length, notification and birth limit rules.","compliance":"Keep as employee-facing parental benefit.","source":"https://jtksm.mohr.gov.my/ms/soalan-lazim/akta-kerja-1955-pindaan-2022/cuti-paterniti/apakah-syarat-syarat-yang-perlu-dipenuhi"},{"category":"Retirement & Pension","benefit":"EPF retirement savings","mandatory":"Yes","basis":"Statutory Benefit","employer":"Register, deduct/remit and contribute to EPF where required.","employee":"Employee receives retirement savings protection through EPF contributions for employees working under contract/apprenticeship.","cost":"Exact contribution rates should be handled in Labor Cost Calculator.","costBasis":"Generally employees under contract/apprenticeship; rules differ for employee category, age and citizenship/residency.","compliance":"Keep as retirement benefit; avoid duplicating payroll rate table here.","source":"https://www.kwsp.gov.my/en/employer/responsibilities/mandatory-contribution"},{"category":"Severance & End-of-Service","benefit":"Termination and lay-off benefits","mandatory":"Conditional","basis":"Conditional Statutory Benefit","employer":"Pay statutory termination/lay-off benefits when employee qualifies.","employee":"Employee may receive termination or lay-off benefits if statutory service and termination conditions are met.","cost":"Case-by-case; depends on tenure and termination/lay-off facts.","costBasis":"Statutory rules generally require qualifying service and covered employment conditions.","compliance":"Keep as conditional employee benefit; verify exact rate under applicable regulations.","source":"https://jtksm.mohr.gov.my/en/borang/employment-act-1955"},{"category":"Social Security & Protection","benefit":"Employment Insurance System unemployment protection","mandatory":"Yes","basis":"Statutory Benefit","employer":"Administer required EIS coverage where applicable.","employee":"Employee may receive unemployment-related protection through EIS when qualifying loss-of-employment conditions are met.","cost":"Exact EIS contribution rates should be handled in Labor Cost Calculator.","costBasis":"Eligible employees subject to EIS rules.","compliance":"Keep as employee-facing income protection benefit.","source":"https://www.perkeso.gov.my/en/our-services/employer-employee/contributions.html"},{"category":"Work Injury & Insurance","benefit":"SOCSO employment injury and invalidity protection","mandatory":"Yes","basis":"Statutory Benefit","employer":"Register and contribute/administer SOCSO coverage where required.","employee":"Employee receives employment injury and invalidity protection through SOCSO/PERKESO schemes.","cost":"Exact contribution rates and wage classes belong in Labor Cost Calculator.","costBasis":"Private-sector employees subject to SOCSO rules; exemptions may apply.","compliance":"Keep as employee-facing insurance/protection benefit.","source":"https://www.perkeso.gov.my/en/our-services/employer-employee/contributions.html"}],"Malta":[{"category":"Leave & Time Off","benefit":"Sick leave and sickness benefit","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide paid sick leave/coordinate sickness benefit according to law and applicable sector rules.","employee":"Employee has sickness leave and sickness benefit protection; official social security guidance describes employer payment options and DSS benefit process.","cost":"Exact employer payment and DSS offset treatment depends on rules, certificates and sectoral conditions.","costBasis":"Certified sickness and statutory/sectoral eligibility.","compliance":"Keep as employee-facing health/income protection benefit.","source":"https://socialsecurity.gov.mt/en/information-and-applications-for-benefits-and-services/medical-assistance/sickness-benefit/"},{"category":"Leave & Time Off","benefit":"Vacation leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Grant paid vacation leave under Maltese employment rules.","employee":"Employee receives statutory vacation leave entitlement.","cost":"Paid leave is part of salary/absence planning; exact entitlement depends on working pattern and annual rules.","costBasis":"Employees under Maltese employment law; part-time/pro-rata rules may apply.","compliance":"Keep as employee-facing leave benefit.","source":"https://dier.gov.mt/en/services/employment-conditions/leave/"},{"category":"Parental & Family","benefit":"Family and special leave types","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide statutory family/special leave where conditions apply.","employee":"DIER lists statutory leave types including paternity, parental, carers, urgent family, adoption and related leave categories.","cost":"Usually paid/unpaid entitlement depends on leave type and conditions.","costBasis":"Applies when the relevant family/special event and statutory conditions are met.","compliance":"Keep as employee-facing family/work-life benefit.","source":"https://dier.gov.mt/en/services/employment-conditions/leave/"},{"category":"Parental & Family","benefit":"Maternity leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide statutory maternity leave/pay according to Maltese employment rules.","employee":"Pregnant employee may take 18 weeks maternity leave; official guidance states first 14 weeks are paid by employer, with further entitlement subject to social security rules.","cost":"Maternity leave budgeting depends on statutory pay and social security reimbursement/benefit rules.","costBasis":"Pregnant employee meeting statutory conditions.","compliance":"Keep as parental benefit; verify current DSS/DIER rules before implementation.","source":"https://dier.gov.mt/en/services/employment-conditions/leave/maternity-leave/"},{"category":"Severance & End-of-Service","benefit":"Termination notice and redundancy protection","mandatory":"Conditional","basis":"Conditional Statutory Benefit","employer":"Provide notice and comply with redundancy/re-engagement protections where applicable.","employee":"Employee receives statutory termination protections; redundancy rules include re-engagement protection if the post becomes available within one year.","cost":"Case-by-case; depends on termination reason, notice, contract and statutory rules.","costBasis":"Termination or redundancy situations covered by Maltese law.","compliance":"Keep as conditional employee protection rather than a payroll cost item.","source":"https://dier.gov.mt/en/services/employment-conditions/termination-of-employment/"},{"category":"Social Security & Protection","benefit":"Social security benefits protection","mandatory":"Yes","basis":"Statutory Benefit","employer":"Administer social security registration/contribution process where required.","employee":"Employees may access social benefits including sickness benefits, maternity leave/benefits, injury benefits, pensions and medical assistance.","cost":"Exact contribution rates and payroll treatment belong in Labor Cost Calculator.","costBasis":"Employees covered by Malta social security rules.","compliance":"Keep as employee-facing protection; exclude pure contribution-rate details.","source":"https://www.gov.mt/en/Life%20Events/Pages/Looking%20for%20a%20Job/Social-Security-and-Health-Services.aspx"},{"category":"Work Injury & Insurance","benefit":"Injury benefit / work-related injury protection","mandatory":"Yes","basis":"Statutory Benefit","employer":"Support statutory injury benefit process and employer declarations where required.","employee":"Employee may receive injury benefit if a work-related injury compromises ability to work for over three calendar days.","cost":"Exact benefit handled by social security; employer process and pay treatment should be checked case-by-case.","costBasis":"Work-related injury or occupational disease with required medical documentation.","compliance":"Keep as work injury protection benefit.","source":"https://socialsecurity.gov.mt/en/information-and-applications-for-benefits-and-services/medical-assistance/injury-benefit/"}],"Mauritius":[{"category":"Optional / Market Practice","benefit":"Private medical / transport / meal / wellness benefits","mandatory":"No","basis":"Optional / Market Practice","employer":"May provide additional medical insurance, meal, transport or wellness allowance under company policy.","employee":"Additional company benefit if offered.","cost":"Optional employer budget item; cost depends on company policy, vendor premium, allowance amount or local tax treatment.","costBasis":"Employer policy / employment contract","compliance":"Review PAYE/CSG treatment if provided as cash or benefit-in-kind.","source":"https://www.mra.mu/index.php/business/csg"},{"category":"Leave & Time Off","benefit":"Paid annual leave and sick leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Grant paid annual leave and sick leave according to statutory eligibility.","employee":"Paid annual and sick leave under statutory minimums.","cost":"Salary continuation during leave; cost depends on utilization.","costBasis":"Paid time off","compliance":"Check latest consolidated Workers Rights Act and any sector remuneration regulations.","source":"https://labour.govmu.org/Pages/The-Workers%27-Rights-Act-2019-and-Regulations.aspx"},{"category":"Parental & Family","benefit":"Maternity / paternity / parental protections","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide protected family leave according to statutory conditions.","employee":"Maternity, paternity and related family leave entitlements.","cost":"Salary continuation or statutory benefit treatment depending on leave type and eligibility.","costBasis":"Family leave event","compliance":"Check latest consolidated Act for duration and eligibility changes.","source":"https://labour.govmu.org/Pages/The-Workers%27-Rights-Act-2019-and-Regulations.aspx"},{"category":"Retirement & Pension","benefit":"Contribution Sociale Generalisee (CSG)","mandatory":"Yes","basis":"Statutory Benefit","employer":"Deduct applicable employee contribution and pay it together with employer contribution to MRA.","employee":"Social benefits funded through CSG system.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Monthly payroll contribution","compliance":"Use current MRA CSG rate table for the exact employee category and remuneration level.","source":"https://www.mra.mu/index.php/business/csg"},{"category":"Severance & End-of-Service","benefit":"End of year bonus / gratuity","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay end-of-year bonus/gratuity to eligible private sector employees.","employee":"Generally 1/12 of yearly earnings or gratuity calculation, whichever applies.","cost":"Approx. 8.33% of annual earnings, plus applicable social contributions.","costBasis":"Annual statutory payment","compliance":"Include in payroll accrual; CSG may apply to prescribed bonus.","source":"https://labour.govmu.org/Documents/Legislations/End%20of%20year%20gratuity%20%20act/end%20of%20year%20grauity%20act.pdf"},{"category":"Severance & End-of-Service","benefit":"Portable Retirement Gratuity Fund (PRGF)","mandatory":"Yes","basis":"Statutory Benefit","employer":"Submit monthly PRGF return and pay PRGF contribution for covered workers.","employee":"Portable retirement gratuity benefit.","cost":"Generally 4.5% of monthly remuneration for covered workers, subject to exemptions/rules.","costBasis":"Monthly payroll contribution","compliance":"Validate worker exclusions and small/micro employer relief rules in current MRA guidance.","source":"https://www.mra.mu/index.php/eservices1/corporate/prgf"}],"Mexico":[{"category":"Allowances / Market Benefits","benefit":"INFONAVIT housing fund benefit","mandatory":"Yes","basis":"Statutory Benefit","employer":"Make required housing fund contributions/administer employee housing credit obligations.","employee":"Employees build housing fund rights; Infonavit official guidance states employer contributions support the worker’s right to own housing or improve retirement savings.","cost":"Exact 5% contribution calculation belongs in Labor Cost Calculator; benefits page should describe the employee housing benefit.","costBasis":"Formal workers with employer Infonavit contributions.","compliance":"Keep as employee-facing housing benefit, not just employer cost.","source":"https://portalmx.infonavit.org.mx/wps/portal/infonavitmx/mx2/derechohabientes/centro_ayuda/11_aportaciones_credito/10_aportaciones_patron?pestaniaSelect=49e52e39-68fe-49f7-a174-9b5934e46906&subtemaSelect=042bb25e-f7fe-4c3e-98ad-9de61382c7ea"},{"category":"Bonus & Statutory Payments","benefit":"Christmas bonus / aguinaldo","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay annual statutory Christmas bonus.","employee":"Employee receives aguinaldo as a statutory annual payment under the Federal Labour Law.","cost":"Budget as statutory annual employee payment; exact prorating depends on service period.","costBasis":"Employees in formal employment, including prorated entitlement where applicable.","compliance":"Keep as statutory bonus benefit.","source":"https://www.diputados.gob.mx/LeyesBiblio/pdf/LFT.pdf"},{"category":"Bonus & Statutory Payments","benefit":"Profit sharing / PTU","mandatory":"Conditional","basis":"Conditional Statutory Benefit","employer":"Pay employee profit sharing when employer is subject to PTU and has distributable profit.","employee":"Eligible employees participate in company profits under Federal Labour Law rules.","cost":"Case-by-case; depends on employer profit, exemptions and statutory distribution rules.","costBasis":"Applies to qualifying employers/employees; exclusions and caps may apply.","compliance":"Keep as conditional employee-facing statutory payment.","source":"https://www.diputados.gob.mx/LeyesBiblio/pdf/LFT.pdf"},{"category":"Health & Medical","benefit":"IMSS health and maternity coverage","mandatory":"Yes","basis":"Statutory Benefit","employer":"Register eligible workers for IMSS and administer coverage.","employee":"Employees receive medical care and benefits through IMSS sickness and maternity insurance.","cost":"Exact contributions belong in Labor Cost Calculator.","costBasis":"Formal workers enrolled in IMSS mandatory regime.","compliance":"Keep as employee-facing health benefit.","source":"https://www.imss.gob.mx/conoce-al-imss/seguros-prestaciones"},{"category":"Leave & Time Off","benefit":"Paid vacation and vacation premium","mandatory":"Yes","basis":"Statutory Benefit","employer":"Grant paid vacation and the statutory vacation premium.","employee":"Employee receives statutory paid vacation and vacation premium under the Federal Labour Law.","cost":"Budget depends on salary, tenure and vacation premium rules; keep detailed rates in payroll model if needed.","costBasis":"Formal employment relationship; entitlement grows with service under the law.","compliance":"Keep as employee-facing paid time-off/statutory payment benefit.","source":"https://www.diputados.gob.mx/LeyesBiblio/pdf/LFT.pdf"},{"category":"Parental & Family","benefit":"Maternity and paternity leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide maternity/paternity leave and coordinate with social security where applicable.","employee":"Employee receives maternity and paternity leave protections under Federal Labour Law and social security framework.","cost":"Cost/payment depends on IMSS eligibility and employer obligations; keep payroll contribution rates out of this page.","costBasis":"Pregnancy/childbirth or paternity event with statutory eligibility.","compliance":"Keep as parental benefit.","source":"https://www.diputados.gob.mx/LeyesBiblio/pdf/LFT.pdf"},{"category":"Retirement & Pension","benefit":"Retirement, old-age and disability protection","mandatory":"Yes","basis":"Statutory Benefit","employer":"Register/administer social security pension coverage.","employee":"Employees receive retirement, old-age, disability and life protection through IMSS mandatory insurance branches.","cost":"Contribution rates belong in Labor Cost Calculator.","costBasis":"Formal workers enrolled in the mandatory social security regime.","compliance":"Keep as retirement/social protection benefit.","source":"https://www.imss.gob.mx/conoce-al-imss/seguros-prestaciones"},{"category":"Severance & End-of-Service","benefit":"Termination indemnity and settlement benefits","mandatory":"Conditional","basis":"Conditional Statutory Benefit","employer":"Pay statutory termination amounts when required.","employee":"Employee may receive termination indemnity/settlement payments depending on termination reason and Federal Labour Law rules.","cost":"Case-by-case; depends on termination type, seniority, salary and legal facts.","costBasis":"Qualifying termination situations under Federal Labour Law.","compliance":"Keep as conditional end-of-service benefit.","source":"https://www.diputados.gob.mx/LeyesBiblio/pdf/LFT.pdf"},{"category":"Work Injury & Insurance","benefit":"Work risk protection","mandatory":"Yes","basis":"Statutory Benefit","employer":"Maintain mandatory work-risk social security coverage through IMSS.","employee":"Employees receive protection for occupational risks under IMSS social insurance schemes.","cost":"Exact premium class/rate belongs in Labor Cost Calculator.","costBasis":"Formal workers in the IMSS mandatory regime; occupational risk conditions apply.","compliance":"Keep as work injury protection benefit.","source":"https://www.imss.gob.mx/conoce-al-imss/seguros-prestaciones"}],"Morocco":[{"category":"Health & Medical","benefit":"AMO mandatory health insurance contributions","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay employer AMO contributions and remit employee contribution where applicable.","employee":"Covered employees receive mandatory health insurance coverage through AMO/CNSS.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Monthly payroll for employees subject to AMO","compliance":"AMO is uncapped on remuneration according to CNSS; confirm employee category and insurer status.","source":"https://cnss.ma/fr/content/quel-est-le-taux-de-cotisation-de-lamo-pour-les-salari%C3%A9s?language_content_entity=fr"},{"category":"Leave & Time Off","benefit":"Paid annual leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide statutory paid annual leave and pay leave allowance according to the Labour Code.","employee":"Employees receive statutory paid annual leave calculated by service and legal rules.","cost":"Approx. 4.93% of annual salary if 1.5 days per month accrues; may vary with seniority","costBasis":"Paid time off / salary continuation","compliance":"Apply seniority increases and collective agreements where more favorable.","source":"https://www.sgg.gov.ma/P ck CNSS eligibility and Labour Code protection before payroll treatment.","source":"https://www.sgg.gov.ma/Portals/0/lois/code_travail_fr.pdf"},{"category":"Social Security & Protection","benefit":"CNSS social security contributions","mandatory":"Yes","basis":"Statutory Benefit","employer":"Affiliate eligible employees with CNSS and remit employer / employee social security contributions.","employee":"Employees receive CNSS family, short-term, long-term and related social security benefits according to eligibility.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Monthly payroll for covered employees","compliance":"Use current CNSS contribution table and wage ceiling for exact payroll cost.","source":"https://cnss.ma/fr/content/comment-s%E2%80%99effectue-le-calcul-des-cotisations-cnss?language_content_entity=fr"},{"category":"Work Injury & Insurance","benefit":"Work accident / occupational disease coverage","mandatory":"Yes","basis":"Statutory Benefit","employer":"Maintain legally required work accident / occupational disease coverage where applicable.","employee":"Employees receive protection for occupational accidents / disease under Moroccan law.","cost":"Employer must provide/maintain coverage; premium varies by risk, location, insurer or industry.","costBasis":"Employment / workplace injury risk","compliance":"CNSS sickness form notes work accidents and occupational diseases are not covered by CNSS social security; separate coverage must be considered.","source":"https://www.cnss.ma/sites/default/files/2025-07/312-1-16%20%20avis%20d%E2%80%99interruption%20de%20travail%20et%20demande%20d%E2%80%99indemnit%C3%A9s%20journali%C3%A8res.pdf"}],"Myanmar":[{"category":"Leave & Time Off","benefit":"Casual leave and medical leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide casual leave and medical leave according to statutory limits and documentation requirements.","emplo ce":"If an establishment is outside SSB coverage, separate compensation obligations may apply under labour laws.","source":"https://www.ssb.gov.mm/Portal/assets/attachment/The-Social-Security-Rules-English%20Version.pdf"}],"Nepal":[{"category":"Bonus & Statutory Payments","benefit":"Festival expense / festival bonus","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay statutory festival expense where eligibility conditions are met.","employee":"Eligible employees receive festival expense according to the Labour Act.","cost":"Commonly one month basic salary annually for eligible employees; verify eligibility and base","costBasis":"Annual festival payment","compliance":"Budget as an annual recurring payroll cost for eligible employees.","source":"https://lawcommission.gov.np/content/13309/labor-act--2017/"},{"category":"Leave & Time Off","benefit":"Paid annual / home leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide statutory paid annual/home leave according to the Labour Act.","employee":"Employees receive annual/home leave entitlement under the Labour Act.","cost":"Approx. 4.93% of annual salary if 18 paid days are fully accrued","costBasis":"Paid time off / salary continuation","compliance":"Entitlement and carry-forward treatment should be checked against current Labour Act rules and company policy.","source":"https://lawcommission.gov.np/content/13309/labor-act--2017/"},{"category":"Leave & Time Off","benefit":"Paid public holidays","mandatory":"Yes","basis":"Statutory Benefit","employer":"Observe paid public holidays according to the government calendar and Labour Act.","employee":"Employees receive paid public holidays as officially declared.","cost":"Variable; depends on official holiday calendar and work on holidays","costBasis":"Public holiday calendar","compliance":"Use current government holiday calendar for each Nepali year.","source":"https://lawcommission.gov.np/content/13309/labor-act--2017/"},{"category":"Leave & Time tutory Benefit","employer":"Remit contributions so covered employees can access SSF medical, accident and dependent family schemes.","employee":"Covered employees receive scheme benefits subject to contribution history and claim rules.","cost":"Included within SSF contribution structure; no separate flat employer cost listed here","costBasis":"SSF contribution / claim event","compliance":"Coverage depends on proper registration and timely contributions.","source":"https://sosys.ssf.gov.np/"}],"Netherlands":[{"category":"Health & Medical","benefit":"Employee insurance protection","mandatory":"Yes","basis":"Statutory Benefit","employer":"Calculate and pay employer contributions for unemployment, incapacity/invalidity, return-to-work and childcare surcharge through payroll tax returns.","employee":"Employees are covered by statutory schemes for unemployment, illness/incapacity and return-to-work protections.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Payroll percentage, capped by contribution wage and employer classification","compliance":"Use Belastingdienst 2026 tables. Whk is employer-specific, so do not use a generic fixed rate for final payroll setup.","source":"https://www.belastingdienst.nl/wps/wcm/connect/bldcontenten/belastingdienst/business/payroll_taxes/you_are_not_established_in_the_netherlands_are_you_required_to_withhold_payroll_taxes/when_you_are_going_to_withhold_payroll_taxes/calculating_payroll_taxes/rates/rates-2026/table-9-employed-persons-insurance-scheme-contributrions-2026"},{"category":"Health & Medical","benefit":"Employer levy under Health Care Insurance Act (Zvw)","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay employer levy Zvw for regular employees where applicable.","employee":"Employees remain insured under the Dutch healthcare system and normally also pay nominal premiums to an insurer.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Payroll percentage up to annual Zvw cap","compliance":"Some employee categories require withholding instead of employer levy; verify worker category and cap before payroll.","source":"https://www.belastingdienst.nl/wps/wcm/connect/bldcontenten/belastingdienst/business/payroll_taxes/you_are_not_established_in_the_netherlands_are_you_required_to_withhold_payroll_taxes/when_you_are_going_to_withhold_payroll_taxes/calculating_payroll_taxes/rates/rates-2026/table-12-other-amounts-2026"},{"category":"Leave & Time Off","benefit":"Paid annual leave / statutory holidays","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide minimum statutory paid holiday days and keep leave records.","employee":"Minimum statutory leave is 4 times weekly working hours per year.","cost":"Salary continuation during paid leave; roughly 7.7% of annual working time for 20 days on a 5-day week","costBasis":"Paid time off","compliance":"Public holidays are not a universal statutory paid entitlement unless agreed in employment contract or CAO.","source":"https://business.gov.nl/regulations/holiday-entitlement/"},{"category":"Leave & Time Off","benefit":"Sick pay / wage continuation","mandatory":"Yes","basis":"Statutory Benefit","employer":"Continue paying sick employee wages and manage reintegration obligations for up to 104 weeks.","employee":"Employee receives at least 70% of last earned wages; first year must not fall below minimum wage.","cost":"At least 70% wage continuation for up to 2 years; higher if CAO/contract applies","costBasis":"Sickness event","compliance":"Employer also has reintegration duties. Budget carefully because cost exposure can be significant.","source":"https://business.gov.nl/staff/health-and-safety/sick-leave-your-employee-calls-in-sick/"},{"category":"Leave & Time Off","benefit":"Statutory holiday allowance","mandatory":"Yes","basis":"Statutory Benefit","employer":"Reserve and pay holiday allowance annually unless valid CAO/payroll arrangement states otherwise.","employee":"Employee receives statutory holiday allowance, commonly 8% of gross annual salary.","cost":"Typically 8% of gross salary","costBasis":"Payroll accrual / annual payment","compliance":"CAO may set different arrangements, but the minimum holiday allowance requirement remains a core payroll obligation.","source":"https://business.gov.nl/staff/terms-of-employment/paying-holiday-allowance-to-your-staff/"},{"category":"Parental & Family","benefit":"Maternity, partner, parental and care leave schemes","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide statutory leave access and administer UWV/government benefit processes where applicable.","employee":"Employees may access pregnancy/maternity, partner, parental, adoption/foster, short-term and long-term care leave subject to eligibility.","cost":"Employer cost varies; some leave is UWV-paid/government-paid, some requires wage continuation or unpaid leave","costBasis":"Leave event / statutory eligibility","compliance":"Check exact leave type, employee eligibility and CAO top-up obligations.","source":"https://business.gov.nl/regulations/leave-schemes/"},{"category":"Severance & End-of-Service","benefit":"Transition payment / severance compensation","mandatory":"Conditional","basis":"Conditional Statutory Benefit","employer":"Pay transition payment when dismissal/non-renewal triggers the statutory entitlement.","employee":"Employee may receive transition payment from first day of employment if statutory conditions apply.","cost":"Formula based on monthly salary and length of service; statutory cap may apply","costBasis":"Termination event","compliance":"Not due in some cases such as mutual consent or serious culpable conduct by employee; validate termination route.","source":"https://business.gov.nl/regulations/transition-payment/"}],"New Zealand":[{"category":"Optional / Market Practice","benefit":"Accommodation, meal, transport and other allowances","mandatory":"No","basis":"Optional / Market Practice","employer":"No universal legal requirement to provide these allowances, but tax/PAYE treatment must be correct if provided.","employee":"Employees may receive allowances if agreed by contract/policy; some may be taxable or exempt depending on circumstances.","cost":"Optional employer budget item; cost depends on company policy, vendor premium, allowance amount or local tax treatment.","costBasis":"Company policy / tax treatment","compliance":"Do not treat allowances as mandatory unless required by contract, collective agreement or specific work arrangement.","source":"https://www.business.govt.nz/tax-and-money/paying-employees/employee-allowances"},{"category":"Leave & Time Off","benefit":"Annual holidays","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide at least 4 weeks paid annual holidays after 12 months continuous employment and maintain records.","employee":"Employee gets at least 4 weeks paid annual leave after 12 months service.","cost":"Salary continuation; roughly 8% of gross earnings for holiday pay concepts","costBasis":"Paid time off / holiday pay calculation","compliance":"Current Holidays Act remains in force while Employment Leave Bill reform progresses.","source":"https://www.employment.govt.nz/leave-and-holidays/annual-holidays"},{"category":"Leave & Time Off","benefit":"Public holidays and alternative holidays","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay employees correctly for public holidays; provide time-and-a-half and alternative holiday when required.","employee":"Employees receive public holiday entitlements when the day would otherwise be a working day; work on public holiday is paid at least time-and-a-half.","cost":"Salary continuation for qualifying public holidays; premium pay if worked","costBasis":"Public holiday event","compliance":"Entitlement depends on whether the public holiday is an otherwise working day for the employee.","source":"https://www.employment.govt.nz/pay-and-hours/pay-and-wages/leave-and-holiday-pay"},{"category":"Leave & Time Off","benefit":"Sick leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide paid sick leave to eligible employees.","employee":"Most eligible employees receive 10 days paid sick leave each year after meeting service/work pattern tests.","cost":"Up to 10 paid days per year for eligible employees","costBasis":"Paid time off","compliance":"Eligibility depends on six months continuous service or qualifying work pattern.","source":"https://www.employment.govt.nz/leave-and-holidays/sick-leave/taking-sick-leave"},{"category":"Parental & Family","benefit":"Paid parental leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide job-protected parental leave handling and complete employer verification when needed; payment is generally made by Inland Revenue.","employee":"Eligible parents/primary carers can receive government-funded paid parental leave payments.","cost":"Direct employer wage cost usually 0% for government-paid PPL; admin and contractual top-ups may apply","costBasis":"Leave event / government entitlement","compliance":"Employer may offer optional top-up, but statutory payment is generally administered through Inland Revenue.","source":"https://www.ird.govt.nz/paid-parental-leave"},{"category":"Retirement & Pension","benefit":"KiwiSaver compulsory employer contribution","mandatory":"Conditional","basis":"Conditional Statutory Benefit","employer":"Make employer contributions for eligible contributing KiwiSaver members each payday and deduct ESCT where required.","employee":"Eligible employees in KiwiSaver receive employer contributions in addition to employee deductions.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Payroll percentage of gross pay; ESCT applies","compliance":"KiwiSaver is voluntary for individuals, but empl , disability or disease.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Monthly payroll / covered employment","compliance":"NSITF states employee contribution is prohibited; cost is employer-funded.","source":"https://nsitf.gov.ng/services/"},{"category":"Leave & Time Off","benefit":"Paid annual leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide statutory annual leave after qualifying service.","employee":"Employees receive statutory annual leave under the Labour Act / employment terms.","cost":"Variable; minimum leave cost depends on wage and entitlement under applicable law/contract","costBasis":"Paid time off / salary continuation","compliance":"Use official law text and employment contract; some categories may have different terms.","source":"https://nigeria-law.org/"},{"category":"Leave & Time Off","benefit":"Sick leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide statutory sick leave where employee meets conditions and medical certification requirements.","employee":"Employees receive sick leave protection according to the Labour Act / employment terms.","cost":"Variable; depends on actual sickness and statutory/contractual pay rules","costBasis":"Sick leave event","compliance":"Confirm current official Labour Act wording and contract terms before pricing.","source":"https://nigeria-law.org/"},{"category":"Parental & Family","benefit":"Maternity leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide statutory maternity leave and protect eligible female employees according to law.","employee":"Female employees receive maternity leave protection and pay treatment under statutory rules.","cost":"Variable; depends on wage and statutory maternity pay entitlement","costBasis":"Maternity leave event","compliance":"Confirm whether federal/state or sector-specific rules apply to the employee category.","source":"https://nigeria-law.org/"},{"category":"Retirement & Pension","benefit":"Contributory Pension Scheme","mandatory":"Conditional","basis":"Conditional Statutory Benefit","employer":"Register covered employees with a PFA and remit employer and employee pension contributions.","employee":"Covered employees receive pension contributions in their Retirement Savings Account.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Monthly payroll for covered employers/employees","compliance":"PenCom FAQ says mandatory for covered employers/employees; confirm coverage threshold and monthly emolument definition.","source":"https://www.pencom.gov.ng/wp-content/uploads/2020/06/FREQUENTLY-ASK-QUESTION-2020-ENGLISH-MAIN-VISUAL.pdf"}],"Norway":[{"category":"Optional / Market Practice","benefit":"Housing, meal, transport and wellness allowances","mandatory":"No","basis":"Optional / Market Practice","employer":"No general obligation to provide these allowances unless contract, CBA, posting/industry rules or tax-free reimbursement rules apply.","employee":"Employees receive only if agreed or required by specific arrangement.","cost":"Optional employer budget item; cost depends on company policy, vendor premium, allowance amount or local tax treatment.","costBasis":"Company policy / contract / CBA","compliance":"Do not classify as mandatory across Norway; verify sector collective agreement.","source":"https://info.altinn.no/en/start-and-run-business/working-conditions/employment/what-obligations-do-you-have-as-an-employer/"},{"category":"Health & Medical","benefit":"Employer national insurance contributions","mandatory":"Yes","basis":"Statutory Benefit","employer":"Calculate and pay employer national insurance contributions on salary, holiday pay and other remuneration.","employee":"Employees are covered by Norway’s national insurance system.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled y","costBasis":"Leave event / NAV eligibility","compliance":"Check collective agreements and company policy for salary top-ups.","source":"https://www.nav.no/en/home/benefits-and-services/relatert-informasjon/parental-benefit"},{"category":"Work Injury & Insurance","benefit":"Mandatory occupational pension scheme (OTP)","mandatory":"Yes","basis":"Statutory Benefit","employer":"Set up and fund mandatory occupational pension for eligible employees.","employee":"Employees accrue occupational pension rights in addition to National Insurance pension.","cost":"Minimum 2% of salary for defined contribution schemes; higher plans possible","costBasis":"Payroll percentage / pensionable salary","compliance":"Confirm eligibility thresholds and scheme design with pension provider.","source":"https://info.altinn.no/starte-og-drive/arbeidsforhold/ansettelse/obligatorisk-tjenestepensjon/"},{"category":"Work Injury & Insurance","benefit":"Occupational injury insurance","mandatory":"Yes","basis":"Statutory Benefit","employer":"Take out occupational injury insurance for employees.","employee":"Employees are insured for occupational injury and occupational illness.","cost":"Employer must provide/maintain coverage; premium varies by risk, location, insurer or industry.","costBasis":"Insurance premium","compliance":"All employers must take out this insurance; industry-specific insurance may also apply.","source":"https://info.altinn.no/en/start-and-run-business/working-conditions/employment/obligatory-and-voluntary-insurance/"}],"Oman":[{"category":"Leave & Time Off","benefit":"Paid annual leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide statutory paid annual leave and pay comprehensive wage during statutory leave.","employee":"Employees receive statutory paid annual leave under the Labour Law.","cost":"Approx. 8.22% of annual salary if 30 paid calendar days are fully accrued","costBasis":"Paid time off / salary continuation","compliance":"Confirm service eligibility and any more generous contract/company policy.","source":"https://decree.om/2023/rd20230053/"},{"category":"Leave & Time Off","benefit":"Paid official holidays","mandatory":"Yes","basis":"Statutory Benefit","employer":"Observe legally prescribed official holidays and pay comprehensive wage during holidays.","employee":"Employees receive paid official holidays; holiday work requires statutory treatment.","cost":"Variable; depends on official holiday calendar and holiday work","costBasis":"Public holiday calendar / holiday work","compliance":"Use annual official holiday announcements for calendar-year payroll.","source":"https://decree.om/2023/rd20230053/"},{"category":"Leave & Time Off","benefit":"Paid sick leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide sick leave according to statutory medical certification and pay-stage rules.","employee":"Employees receive statutory sick leave protection with pay stages under the Labour Law.","cost":"Variable; depends on sickness length and statutory pay stage","costBasis":"Sick leave event","compliance":"Use payroll rules by leave stage; do not price as one flat percentage.","source":"https://decree.om/2023/rd20230053/"},{"category":"Parental & Family","benefit":"Maternity / childcare leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide statutory maternity / childcare-related leave and employment protection.","employee":"Female employees receive maternity leave and related leave protections according to the Labour Law.","cost":"Variable; depends on leave event and statutory pay treatment","costBasis":"Maternity / childcare leave event","compliance":"Confirm current implementing regulations and employee category before payroll treatment.","source":"https://decree.om/2023/rd20230053/"},{"category":"Retirement & Pension","benefit":"Provident / savings scheme for non-Omani workers","mandatory":"Conditional","basis":"Conditional Statutory Benefit","employer":"Comply with the non-Omani e type and law","costBasis":"Leave event","compliance":"Province-specific rules are material; do not price as one uniform national entitlement.","source":"https://pakistancode.gov.pk/english/UY2FqaJw2-apaUY2Fqa-b56X-con-1454-sg-jjjjjjjjjjjjj"},{"category":"Leave & Time Off","benefit":"Paid annual leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide paid annual leave to eligible workers after qualifying service.","employee":"Paid annual leave, commonly at least 14 days after qualifying continuous service for factory workers; provincial rules may differ.","cost":"Salary continuation during paid leave; approx. 3.8%+ of annual salary if 14 days","costBasis":"Paid time off accrual","compliance":"Validate under the governing province and establishment type.","source":"https://pakistancode.gov.pk/english/UY2FqaJw2-apaUY2Fqa-b56X-con-1454-sg-jjjjjjjjjjjjj"},{"category":"Other Employee Benefit","benefit":"Workers Welfare Fund","mandatory":"Conditional","basis":"Conditional Statutory Benefit","employer":"Covered industrial establishments must comply with welfare fund obligations.","employee":"Worker welfare benefits may be funded through statutory welfare fund mechanisms.","cost":"Variable; linked to covered industrial establishment/profit/income thresholds","costBasis":"Entity and income/profit trigger","compliance":"Not a universal payroll contribution; validate applicability for the legal entity.","source":"https://www.pakistancode.gov.pk/english/UY2FqaJw1-apaUY2Fqa-apaUY2Fuaps%3D-sg-jjjjjjjjjjjjj"},{"category":"Parental & Family","benefit":"Maternity leave / maternity benefit","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide maternity leave/benefit protection to eligible female employees.","employee":"Paid maternity protection/benefit according to applicable law and provincial updates.","cost":"Employer-paid wage continuation where applicable; event-based","costBasis":"Maternity event; eligibility and province","compliance":"Some provinces have updated rules; final payroll setup should check local provincial law.","source":"https://pakistancode.gov.pk/english/UY2FqaJw1-apaUY2Fqa-apaUY2Npa5plbA%3D%3D-sg-jjjjjjjjjjjjj"},{"category":"Retirement & Pension","benefit":"Employees Old-Age Benefits Institution (EOBI)","mandatory":"Yes","basis":"Statutory Benefit","employer":"Register eligible establishment/employees and pay employer EOBI contribution; withhold employee portion where applicable.","employee":"Old-age pension, invalidity, survivors and related EOBI benefits for eligible insured employees.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Statutory contribution; threshold and wage base apply","compliance":"Applicability and base can depend on establishment size and current provincial/federal notifications.","source":"https://pakistancode.gov.pk/english/UY2FqaJw1-apaUY2Fqa-bpuUY2Rt-sg-jjjjjjjjjjjjj"}],"Peru":[{"category":"Bonus & Statutory Payments","benefit":"Employee profit sharing / participación en utilidades","mandatory":"Conditional","basis":"Conditional Statutory Benefit","employer":"Distribute profits to employees if the company meets activity/headcount/profit conditions.","employee":"Eligible employees receive profit-sharing payment based on statutory formula.","cost":"Variable percentage of taxable income depending on business activity","costBasis":"Annual profit event","compliance":"Usually applies to companies with more than 20 workers and taxable profits, with activity-specific percentages.","source":"https://www.gob.pe/institucion/mtpe/informes-publicaciones/2123662-participacion-en-las-utilidades"},{"category":"Bonus & Statutory Payments","benefit":"Statutory gratificaciones","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay statutory bonuses in July and December to eligible employees.","employee":"Employee receives two annual bonuses, usually one monthly salary each, when eligibility is met.","cost":"Up to 2 monthly salaries per year plus applicable extraordinary bonus linked to EsSalud non-contribution treatment","costBasis":"Semi-annual statutory bonus","compliance":"Eligibility and proportional payments depend on service in the relevant semester.","source":"https://www.gob.pe/institucion/mtpe/informes-publicaciones/2123664-gratificaciones-legales"},{"category":"Health & Medical","benefit":"Complementary risk work insurance (SCTR)","mandatory":"Conditional","basis":"Conditional Statutory Benefit","employer":"Purchase SCTR health and pension coverage when employees perform legally listed high-risk activities.","employee":"Employees in high-risk activities receive additional occupational accident/disease coverage.","cost":"Variable insurance premium; depends on high-risk activity and insurer","costBasis":"Insurance premium / activity trigger","compliance":"Mandatory only for listed risk activities such as mining/construction and similar regulated activities.","source":"https://www.gob.pe/294-seguro-complementario-de-trabajo-de-riesgo-sctr"},{"category":"Health & Medical","benefit":"EsSalud employer contribution","mandatory":"Yes","basis":"Statutory Benefit","employer":"Register employees and pay monthly EsSalud contributions through payroll.","employee":"Employees receive public health insurance coverage through EsSalud.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Payroll percentage; minimum base rules apply","compliance":"Agrarian/aquaculture regimes and other special regimes may use different rates; verify worker regime.","source":"https://www.gob.pe/7942-aportes-a-essalud-recaudados-por-sunat"},{"category":"Leave & Time Off","benefit":"Paid annual vacation","mandatory":"Yes","basis":"Statutory Benefit","employer":"Grant paid annual vacation to eligible employees.","employee":"Employees under the general regime generally receive 30 calendar days paid vacation after ic holidays, subject to permitted work exceptions.","cost":"Salary continuation; overtime/holiday work cost where applicable","costBasis":"Calendar and work schedule","compliance":"Check sector exceptions and compensatory rest rules.","source":"https://www.gov.pl/web/family/working-days-and-days-off-work"},{"category":"Leave & Time Off","benefit":"Sick pay and sickness allowance","mandatory":"Yes","basis":"Statutory Benefit","employer":"Employer finances sick pay for the first 33 days of incapacity in a calendar year; 14 days for employees aged 50+. ZUS allowance applies after employer period.","employee":"Paid sickness protection during certified incapacity for work.","cost":"Direct employer cost: first 33 days or 14 days at applicable sick-pay rate","costBasis":"Event-based salary continuation","compliance":"Check allowance basis and special cases such as pregnancy or work accidents.","source":"https://lang.zus.pl/benefits/sick-pay-and-sickness-allowance"},{"category":"Parental & Family","benefit":"Maternity and parental leave allowances","mandatory":"Yes","basis":"Statutory Benefit","employer":"Grant protected leave and process documentation; allowance is generally social-insurance funded through ZUS/payroll settlement.","employee":"Maternity leave and parental leave with maternity allowance based on statutory rules.","cost":"Usually 0% direct salary cost during ZUS-funded allowance; admin/cashflow may apply","costBasis":"Leave event / social insurance benefit","compliance":"Employer must reinstate employee on no less favourable terms after leave.","source":"https://www.gov.pl/web/family/maternity-leave"},{"category":"Severance & End-of-Service","benefit":"Severance for redundancy / employer-side non-employee reasons","mandatory":"Conditional","basis":"Conditional Statutory Benefit","employer":"Pay statutory severance when dismissals fall under qualifying redundancy rules.","employee":"Severance protection where termination is not attributable to the employee and statutory thresholds apply.","cost":"Conditional; statutory severance depends on length of service and salary cap","costBasis":"Trigger: employer size and redundancy reason","compliance":"Not a universal termination payment for every individual dismissal.","source":"https://www.gov.pl/web/family/termination-of-a-contract-of-employment-for-the-reasons-unrelated-to-the-employee2"},{"category":"Work Injury & Insurance","benefit":"Accident insurance / occupational injury coverage","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay the employer-funded accident insurance contribution to ZUS.","employee":"Coverage for employment accident and occupational disease benefits through social insurance.","cost":"Employer must provide/maintain coverage; premium varies by risk, location, insurer or industry.","costBasis":"Payroll percentage / risk classification","compliance":"Rate can be adjusted by ZUS based on activity and claims profile.","source":"https://lang.zus.pl/finances/contributions"}],"Portugal":[{"category":"Bonus & Statutory Payments","benefit":"Christmas subsidy / 13th month","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay Christmas subsidy by statutory deadline unless lawful payment arrangement applies.","employee":"One month of remuneration, proportionate in admission/termination years.","cost":"Approx. 8.33% of annual base remuneration","costBasis":"Statutory annual allowance","compliance":"Usually treated as mandatory 13th month salary element.","source":"https://diariodarepublica.pt/dr/lexionario/termo/subsidio-natal"},{"category":"Leave & Time Off","benefit":"Paid annual leave and holiday subsidy","mandatory":"Yes","basis":"Statutory Benefit","employer":"Grant paid annual leave and pay holiday subsidy.","employee":"22 working days of annual leave in a full year plus holiday subsidy broadly equal to remuneration for leave period.","cost":"Approx. 8.5% leave time + one monthly salary holiday subsidy","costBasis":"Paid time off plus stat plicable.","source":"https://www.mol.gov.qa/admin/LawsDocuments/Law%20No.%20%2814%29%20of%202004%20Promulgating%20the%20Labour%20Law.pdf"}],"Romania":[{"category":"Health & Medical","benefit":"Work insurance contribution / employer payroll contribution","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay employer work insurance contribution and withhold/remit employee pension and health contributions.","employee":"Coverage supports labour, unemployment, medical leave and workplace risk-related systems.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Payroll percentage","compliance":"Validate current Fiscal Code and any special work conditions before implementation.","source":"https://www.mmuncii.ro/j33/index.php/ro/legislatie/protectie-sociala?catid=0&id=118"},{"category":"Leave & Time Off","benefit":"Paid annual leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Grant paid annual rest leave.","employee":"Minimum 20 working days of annual leave.","cost":"Approx. 7.7% of annual working time","costBasis":"Paid time off / salary continuation","compliance":"Collective agreements or contracts may provide higher leave.","source":"https://legislatie.just.ro/Public/DetaliiDocument/197013"},{"category":"Leave & Time Off","benefit":"Public holidays","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide paid days off on statutory public holidays or compensation where work is permitted.","employee":"Paid rest on statutory public holidays.","cost":"Salary continuation; premium/compensatory rest if work is required","costBasis":"Calendar / schedule-based","compliance":"Check annual holiday calendar and sector exceptions.","source":"https://legislatie.just.ro/Public/DetaliiDocument/197013"},{"category":"Leave & Time Off","benefit":"Sick leave and medical leave indemnity","mandatory":"Yes","basis":"Statutory Benefit","employer":"Administer certified medical leave; emp function getParent(k) { return k.includes(' - ') ? k.split(' - ')[0] : null; }
function getSubName(k) { return k.includes(' - ') ? k.split(' - ')[1] : k; }
function getParentDisplay(p) { return PARENT_NAMES[p] || p; }
function getRegion(k) { const p = getParent(k) || k; return REGION_MAP[p] || 'Other'; }
function getISO(k) { const p = getParent(k) || k; return ISO_MAP[p] || ''; }
function getDisplayName(k) { return k.includes(' - ') ? k.split(' - ')[1] : k; }

function getBroadCat(cat) {
  const c = (cat || '').toLowerCase();
  if (/leave|maternity|paternity|family.*leave|sick.*leave|parental/.test(c)) return 'Leave';
  if (/insurance|health(?! fund| levy)|safety|injury|worker welfare/.test(c)) return 'Insurance & Health';
  if (/social security|payroll tax|levy|employer statutory|fund contribution|housing|training|cba|union|unemployment/.test(c)) return 'Social Security';
  if (/pension|retirement|provident|saving|gratuity/.test(c)) return 'Pension & Retirement';
  if (/bonus|allowance|market benefit|profit sharing|service bonus|transport/.test(c)) return 'Bonus & Allowances';
  if (/termination|severance|deferred pay|end.of.service/.test(c)) return 'Termination';
  return 'Other';
}

function getFilteredKeys() {
  const search = (document.getElementById('sidebarSearch').value || '').toLowerCase();
  const region = document.getElementById('regionFilter').value;
  return ALL_KEYS.filter(k => {
    if (search && !k.toLowerCase().includes(search)) return false;
    if (region && getRegion(k) !== region) return false;
    return true;
  });
}

function buildSidebar(filtered) {
  const list = document.getElementById('countryList');
  if (!filtered.length) { list.innerHTML = '<div class="sidebar-empty">No results found</div>'; return; }

  const groups = {};
  const singles = [];
  filtered.forEach(k => {
    const p = getParent(k);
    if (p) { if (!groups[p]) groups[p] = []; groups[p].push(k); }
    else singles.push(k);
  });

  const allItems = [
    ...Object.keys(groups).map(p => ({ type: 'group', key: p, sort: getParentDisplay(p) })),
    ...singles.map(s => ({ type: 'single', key: s, sort: s }))
  ].sort((a, b) => a.sort.localeCompare(b.sort));

  let html = '';
  allItems.forEach(item => {
    if (item.type === 'group') {
      const p = item.key;
      const children = groups[p].slice().sort();
      const isOpen = openGroups.has(p);
      html += `<div class="accordion-item">
        <div class="sb-row accordion-trigger${isOpen ? ' open' : ''}" data-group="${p}">
          <span class="sb-code">${getISO(p)}</span>
          <span class="sb-label">${getParentDisplay(p)}</span>
          <span class="sb-profiles">${children.length} state${children.length !== 1 ? 's' : ''}</span>
          <span class="sb-chevron">&#9662;</span>
        </div>
        <div class="accordion-panel${isOpen ? ' open' : ''}">
          ${children.map(c => `
            <div class="sb-row sub-item${currentKey === c ? ' active' : ''}" data-key="${c}">
              <span class="sb-code"></span>
              <span class="sb-label">${getSubName(c)}</span>
              <span class="sb-badge">${BENEFITS[c].length}</span>
            </div>`).join('')}
        </div>
      </div>`;
    } else {
      const s = item.key;
      html += `<div class="accordion-item">
        <div class="sb-row${currentKey === s ? ' active' : ''}" data-key="${s}">
          <span class="sb-code">${getISO(s)}</span>
          <span class="sb-label">${s}</span>
          <span class="sb-badge">${BENEFITS[s].length}</span>
        </div>
      </div>`;
    }
  });

  list.innerHTML = html;
}

function filterSidebar() { buildSidebar(getFilteredKeys()); }
function clearFilters() {
  document.getElementById('sidebarSearch').value = '';
  document.getElementById('regionFilter').value = '';
  buildSidebar(ALL_KEYS);
}

document.getElementById('countryList').addEventListener('click', function(e) {
  const row = e.target.closest('.sb-row');
  if (!row) return;
  if (row.classList.contains('accordion-trigger')) {
    const g = row.dataset.group;
    if (openGroups.has(g)) openGroups.delete(g); else openGroups.add(g);
    buildSidebar(getFilteredKeys());
  } else if (row.dataset.key) {
    currentKey = row.dataset.key;
    currentBroadCat = 'all';
    mobileCloseDrawer();
    buildSidebar(getFilteredKeys());
    renderDetail(currentKey);
  }
});

document.getElementById('mainContent').addEventListener('click', function(e) {
  const pill = e.target.closest('.cat-pill');
  if (!pill || !currentKey) return;
  currentBroadCat = pill.dataset.cat;
  renderDetail(currentKey);
});

function renderDetail(key) {
  const benefits = BENEFITS[key];
  if (!benefits) return;

  const displayName = getDisplayName(key);
  const parent = getParent(key);
  const region = getRegion(key);
  const metaParts = [];
  if (parent) metaParts.push(`<strong>${getParentDisplay(parent)}</strong>`);
  metaParts.push(region);
  metaParts.push(`${benefits.length} benefit${benefits.length !== 1 ? 's' : ''}`);

  const BROAD_ORDER = ['Leave','Insurance & Health','Social Security','Pension & Retirement','Bonus & Allowances','Termination','Other'];
  const broadCount = {};
  benefits.forEach(b => { const bc = getBroadCat(b.category); broadCount[bc] = (broadCount[bc]||0)+1; });
  const presentCats = BROAD_ORDER.filter(c => broadCount[c]);

  let pillsHtml = `<div class="cat-pills">
    <span class="cat-pill${currentBroadCat==='all'?' active':''}" data-cat="all">All (${benefits.length})</span>`;
  presentCats.forEach(c => {
    pillsHtml += `<span class="cat-pill${currentBroadCat===c?' active':''}" data-cat="${c}">${c} (${broadCount[c]})</span>`;
  });
  pillsHtml += '</div>';

  const grouped = {};
  benefits.forEach(b => {
    const bc = getBroadCat(b.category);
    if (!grouped[bc]) grouped[bc] = {};
    if (!grouped[bc][b.category]) grouped[bc][b.category] = [];
    grouped[bc][b.category].push(b);
  });

  let contentHtml = '';
  BROAD_ORDER.forEach(bc => {
    if (!grouped[bc]) return;
    if (currentBroadCat !== 'all' && currentBroadCat !== bc) return;
    Object.keys(grouped[bc]).sort().forEach(rawCat => {
      contentHtml += `<div class="cat-group">
        <div class="cat-group-label">${escHtml(rawCat)}</div>
        ${grouped[bc][rawCat].map(b => renderBenefit(b)).join('')}
      </div>`;
    });
  });

  if (!contentHtml) contentHtml = '<div class="no-results">No benefits in this category.</div>';

  document.getElementById('mainContent').innerHTML = `
    <div class="detail-header">
      <div>
        <h1>${escHtml(displayName)}</h1>
        <div class="meta">${metaParts.join(' &middot; ')}</div>
      </div>
      <div class="benefit-count">${benefits.length}<span>benefits</span></div>
    </div>
    ${pillsHtml}
    <div id="benefitContent">${contentHtml}</div>`;
}

function renderBenefit(b) {
  const mandMap = {'Yes':'tag-m-yes','No':'tag-m-no','Conditional':'tag-m-cond','Case-by-case':'tag-m-case','Jurisdiction-dependent':'tag-m-juris'};
  const mandClass = mandMap[b.mandatory] || 'tag-m-no';

  let detailsHtml = '';
  if (b.employer) detailsHtml += `<div class="detail-block"><div class="detail-label">Employer Obligation</div><div class="detail-value">${escHtml(b.employer)}</div></div>`;
  if (b.employee) detailsHtml += `<div class="detail-block"><div class="detail-label">Employee Entitlement</div><div class="detail-value">${escHtml(b.employee)}</div></div>`;
  if (b.cost) detailsHtml += `<div class="detail-block"><div class="detail-label">Estimated Cost</div><div class="detail-value">${escHtml(b.cost)}</div></div>`;
  if (b.costBasis) detailsHtml += `<div class="detail-block"><div class="detail-label">Cost Basis</div><div class="detail-value">${escHtml(b.costBasis)}</div></div>`;

  const compHtml = b.compliance
    ? `<div class="compliance-note"><strong>Compliance: </strong>${escHtml(b.compliance)}</div>` : '';

  return `<div class="benefit-card">
    <div class="benefit-header">
      <span class="benefit-name">${escHtml(b.benefit)}</span>
      <span class="mandatory-tag ${mandClass}">Mandatory: ${escHtml(b.mandatory||'—')}</span>
    </div>
    <div class="benefit-details">${detailsHtml}</div>
    ${compHtml}
  </div>`;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function mobileOpenDrawer() {
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('sidebarOverlay').classList.add('active');
}
function mobileCloseDrawer() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('expanded'); }

buildSidebar(ALL_KEYS);
</script>
<script src="assets/lang/lang-loader.js"></script>
