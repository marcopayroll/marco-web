<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Benefits — Global Benefits Plan</title>
<style>
@import url('https://fonts.cdnfonts.com/css/euclid-circular-b');

:root {
  --navy: #0a1628;
  --navy-mid: #102040;
  --navy-light: #1a3055;
  --blue-bright: #2e7dd1;
  --blue-glow: #4a9eff;
  --white: #ffffff;
  --off-white: #f0f4f8;
  --text-muted: #8aa0b8;
  --border: #1e3a5f;
  --sb-pad-x: 16px;
  --sb-code-w: 34px;
  --sb-full-w: 280px;
  --sb-collapsed-w: 56px;
  --banner-h: 90px;
  --filter-h: 53px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Euclid Circular B', sans-serif;
  background: var(--off-white);
  color: #1a2a3a;
  display: flex; flex-direction: column;
}

/* ══ BANNER ══ */
.banner {
  background: var(--navy);
  position: relative; overflow: hidden;
  padding: 0 24px; height: var(--banner-h);
  flex-shrink: 0;
  display: flex; align-items: center;
}
.banner::before {
  content: ''; position: absolute; right: -60px; top: -60px;
  width: 280px; height: 280px; border-radius: 50%;
  border: 1.5px solid rgba(74,158,255,0.12);
  box-shadow: 0 0 0 28px rgba(74,158,255,0.04), 0 0 0 56px rgba(74,158,255,0.03);
  pointer-events: none;
}
.banner-left { display: flex; align-items: center; gap: 16px; z-index: 1; min-width: 0; }
.banner-logo { height: 44px; width: auto; display: block; flex-shrink: 0; }
.banner-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
.banner-text { min-width: 0; }
.banner-title { font-size: 17px; font-weight: 700; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.banner-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ══ FILTER BAR ══ */
.filter-bar {
  background: var(--navy-mid);
  border-bottom: 1px solid var(--border);
  padding: 0 16px; height: var(--filter-h);
  flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
}
.btn-hamburger {
  display: none;
  align-items: center; justify-content: center;
  width: 36px; height: 36px; flex-shrink: 0;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--white); font-size: 16px; cursor: pointer;
  transition: background 0.2s;
}
.btn-hamburger:hover { background: rgba(255,255,255,0.14); }
.filter-label {
  font-size: 11px; font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px; white-space: nowrap;
}
.search-wrap { position: relative; flex: 1; min-width: 0; max-width: 300px; }
.search-icon {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px; pointer-events: none;
  color: var(--text-muted);
}
.search-input {
  width: 100%; padding: 8px 10px 8px 32px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--white); font-size: 13px;
  font-family: 'Euclid Circular B', sans-serif;
  outline: none; transition: border-color 0.2s, background 0.2s;
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { border-color: var(--blue-bright); background: rgba(255,255,255,0.1); }
.select-wrap { position: relative; flex-shrink: 0; min-width: 150px; }
.select-wrap select {
  width: 100%; padding: 8px 28px 8px 11px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--white); font-size: 13px;
  font-family: 'Euclid Circular B', sans-serif;
  appearance: none; cursor: pointer; outline: none;
}
.select-wrap select option { background: #1a2a3a; color: #fff; }
.select-wrap select:focus { border-color: var(--blue-bright); }
.select-wrap::after {
  content: '▾'; position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted); pointer-events: none; font-size: 12px;
}
.btn-clear {
  padding: 8px 14px; flex-shrink: 0;
  background: rgba(255,60,60,0.12);
  border: 1px solid rgba(255,60,60,0.25); border-radius: 8px;
  color: #ff8888; font-size: 12px; font-weight: 600;
  font-family: 'Euclid Circular B', sans-serif;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.btn-clear:hover { background: rgba(255,60,60,0.22); color: #ffbbbb; }
.btn-clear .clear-icon { display: none; }

/* ══ LAYOUT ══ */
.layout { display: flex; flex: 1; overflow: hidden; position: relative; }

/* ══ SIDEBAR ══ */
.sidebar {
  width: var(--sb-full-w); min-width: var(--sb-full-w);
  background: var(--navy);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  transition: width 0.25s ease, min-width 0.25s ease;
  flex-shrink: 0; z-index: 10;
}
.sidebar-header {
  padding: 11px var(--sb-pad-x);
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: var(--navy-mid); flex-shrink: 0;
  overflow: hidden;
}
.sidebar-header-text {
  font-size: 10px; font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1.2px;
  white-space: nowrap; overflow: hidden;
  transition: opacity 0.2s;
}
.btn-sb-toggle {
  display: none;
  align-items: center; justify-content: center;
  flex-shrink: 0;
  background: transparent; border: none;
  color: var(--text-muted); cursor: pointer;
  padding: 6px; transition: color 0.2s;
}
.btn-sb-toggle:hover { color: var(--white); }
.sidebar-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
.sidebar-scroll::-webkit-scrollbar { width: 4px; }
.sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(74,158,255,0.2); border-radius: 2px; }
.sb-row {
  display: flex; align-items: center;
  padding: 9px var(--sb-pad-x);
  border-left: 3px solid transparent;
  cursor: pointer;
  transition: background 0.13s, border-color 0.13s;
  user-select: none; gap: 8px;
}
.sb-row:hover { background: rgba(74,158,255,0.09); }
.sb-row.active { background: rgba(46,125,209,0.16); border-left-color: var(--blue-bright); }
.sb-code {
  width: var(--sb-code-w); flex-shrink: 0;
  font-size: 10.5px; font-weight: 700;
  color: #8aa0b8; letter-spacing: 0.8px;
  font-family: 'Euclid Circular B', sans-serif;
  text-align: left; line-height: 1;
}
.sb-label {
  flex: 1; font-size: 13px; font-weight: 500;
  color: #b8cce0; line-height: 1.25;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0; transition: opacity 0.2s, max-width 0.2s;
}
.sb-row:hover .sb-label { color: var(--white); }
.sb-row.active .sb-label { color: var(--white); font-weight: 600; }
.sb-row.accordion-trigger .sb-label { font-weight: 600; color: var(--white); }
.sb-chevron {
  font-size: 9px; color: var(--text-muted);
  transition: transform 0.2s, opacity 0.2s; flex-shrink: 0; margin-left: 2px;
}
.sb-row.accordion-trigger.open .sb-chevron { transform: rotate(180deg); }
.sb-profiles {
  font-size: 10px; color: var(--text-muted);
  font-family: 'Euclid Circular B', sans-serif;
  flex-shrink: 0; white-space: nowrap; transition: opacity 0.2s;
}
.sb-badge {
  font-size: 10.5px;
  background: rgba(74,158,255,0.12);
  color: var(--text-muted);
  padding: 2px 7px; border-radius: 8px;
  font-family: 'Euclid Circular B', sans-serif;
  flex-shrink: 0; transition: opacity 0.2s;
}
.sb-row.active .sb-badge { background: rgba(46,125,209,0.3); color: var(--blue-glow); }
.accordion-item { border-bottom: 1px solid rgba(255,255,255,0.03); }
.accordion-panel { display: none; background: rgba(0,0,0,0.22); border-top: 1px solid rgba(74,158,255,0.07); }
.accordion-panel.open { display: block; }
.sb-row.sub-item { padding-top: 7px; padding-bottom: 7px; }
.sb-row.sub-item .sb-label { font-size: 12.5px; font-weight: 400; color: #94b0c8; }
.sb-row.sub-item:hover .sb-label { color: var(--white); font-weight: 500; }
.sb-row.sub-item.active .sb-label { color: var(--white); font-weight: 600; }
.sidebar-empty { padding: 30px var(--sb-pad-x); text-align: center; color: var(--text-muted); font-size: 13px; }

/* ══ MOBILE OVERLAY ══ */
.sidebar-overlay {
  display: none; position: fixed; inset: 0; z-index: 30;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(2px);
}
.sidebar-overlay.active { display: block; }

/* ══ MAIN CONTENT ══ */
.main {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 24px 28px; background: var(--off-white);
}
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: rgba(0,30,80,0.18); border-radius: 3px; }
.welcome-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 60vh; text-align: center; color: var(--text-muted);
  padding: 20px;
}
.welcome-state .big-icon { font-size: 48px; margin-bottom: 14px; opacity: 0.6; }
.welcome-state h2 { font-size: 20px; font-weight: 600; color: #3a5070; margin-bottom: 8px; }
.welcome-state p { font-size: 14px; max-width: 360px; line-height: 1.6; }

/* ══ DETAIL HEADER ══ */
.detail-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 20px; padding-bottom: 16px;
  border-bottom: 2px solid #dde5ef;
  flex-wrap: wrap; gap: 12px;
}
.detail-header h1 { font-size: 22px; font-weight: 700; color: #0e2040; line-height: 1.3; }
.detail-header .meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.benefit-count {
  background: var(--navy); color: var(--blue-glow);
  padding: 8px 16px; border-radius: 20px;
  font-size: 20px; font-weight: 700;
  font-family: 'Euclid Circular B', sans-serif;
  text-align: center; flex-shrink: 0;
}
.benefit-count span { display: block; font-size: 10px; font-weight: 500; color: var(--text-muted); margin-top: 1px; }

/* ══ CATEGORY FILTER PILLS ══ */
.cat-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
.cat-pill {
  padding: 5px 13px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1px solid #c8d8e8;
  background: #e0e8f0; color: #3a5070;
  transition: all 0.15s; user-select: none;
}
.cat-pill:hover { background: #ccd8e8; color: #1a2a3a; }
.cat-pill.active { background: var(--navy); color: var(--white); border-color: var(--navy); }

/* ══ CATEGORY GROUP ══ */
.cat-group { margin-bottom: 28px; }
.cat-group-label {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 2px;
  color: #6080a0; margin-bottom: 10px;
  padding-bottom: 6px; border-bottom: 1px solid #dde5ef;
}

/* ══ BENEFIT CARD ══ */
.benefit-card {
  background: var(--white);
  border: 1px solid #e8eef4;
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 8px;
  transition: box-shadow 0.15s, border-color 0.15s;
}
.benefit-card:hover { box-shadow: 0 2px 10px rgba(0,30,80,0.09); border-color: #c0d4e8; }
.benefit-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 12px; margin-bottom: 10px;
}
.benefit-name {
  font-size: 14px; font-weight: 600; color: #1a2a3a; flex: 1; line-height: 1.4;
}
.mandatory-tag {
  font-size: 10.5px; font-weight: 700;
  padding: 3px 9px; border-radius: 10px;
  white-space: nowrap; flex-shrink: 0; letter-spacing: 0.2px;
}
.tag-m-yes    { background: #e4f5ec; color: #1a5c3a; }
.tag-m-no     { background: #e8eef4; color: #4a6070; }
.tag-m-cond   { background: #fff0e8; color: #7c3a1a; }
.tag-m-case   { background: #f5e8ff; color: #5a1a7a; }
.tag-m-juris  { background: #e4f0fa; color: #1a4a6a; }
.benefit-details {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px;
}
.detail-block {}
.detail-full { grid-column: 1 / -1; }
.detail-label {
  font-size: 9.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: #9ab0c8; margin-bottom: 3px;
}
.detail-value {
  font-size: 13px; color: #2a3a4a; line-height: 1.55;
}
.compliance-note {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid #eef2f6;
  font-size: 12px; color: #6a8098; line-height: 1.55;
}
.compliance-note strong { color: #4a6a88; font-weight: 600; }
.no-results { text-align: center; padding: 48px 20px; color: var(--text-muted); font-size: 14px; }

/* ══ TABLET ══ */
@media (max-width: 1024px) and (min-width: 600px) {
  .btn-sb-toggle { display: flex; }
  .filter-label { display: none; }
  .sidebar { width: var(--sb-collapsed-w); min-width: var(--sb-collapsed-w); }
  .sidebar-header-text { opacity: 0; width: 0; overflow: hidden; }
  .sidebar .sidebar-header { justify-content: center; }
  .sidebar .sb-label, .sidebar .sb-badge, .sidebar .sb-profiles, .sidebar .sb-chevron { display: none !important; }
  .sidebar .sb-code { width: var(--sb-collapsed-w) !important; text-align: center !important; font-size: 11px; }
  .sidebar .sb-row { padding: 11px 0 !important; border-left: none !important; gap: 0; }
  .sidebar .accordion-panel { display: none !important; }
  .sidebar.expanded { width: var(--sb-full-w); min-width: var(--sb-full-w); }
  .sidebar.expanded .sidebar-header { justify-content: space-between; }
  .sidebar.expanded .sidebar-header-text { opacity: 1; width: auto; }
  .sidebar.expanded .sb-label { display: block !important; }
  .sidebar.expanded .sb-badge, .sidebar.expanded .sb-profiles, .sidebar.expanded .sb-chevron { display: flex !important; opacity: 1; width: auto; }
  .sidebar.expanded .sb-code { width: var(--sb-code-w) !important; text-align: left !important; font-size: 10.5px; }
  .sidebar.expanded .sb-row { padding: 9px var(--sb-pad-x) !important; border-left: 3px solid transparent !important; gap: 8px; }
  .sidebar.expanded .sb-row.active { border-left-color: var(--blue-bright) !important; }
  .sidebar.expanded .accordion-panel.open { display: block !important; }
  .benefit-details { grid-template-columns: 1fr; }
}

/* ══ MOBILE ══ */
@media (max-width: 599px) {
  :root { --filter-h: 52px; }
  .banner { padding: 12px 16px; height: auto; align-items: flex-start; }
  .banner-logo { height: 32px; margin-top: 2px; }
  .banner-divider { height: 26px; margin-top: 4px; }
  .banner-title { font-size: 13px; white-space: normal; line-height: 1.35; }
  .banner-subtitle { font-size: 10.5px; white-space: normal; line-height: 1.45; margin-top: 3px; }
  .btn-hamburger { display: flex; }
  .filter-label { display: none; }
  .btn-clear .clear-text { display: none; }
  .btn-clear .clear-icon { display: inline; }
  .btn-clear { padding: 0; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
  .filter-bar { gap: 8px; padding: 0 12px; }
  .search-wrap { flex: 1; min-width: 0; max-width: none; }
  .search-input { font-size: 12px; padding: 7px 8px 7px 28px; }
  .select-wrap { width: 110px; min-width: 0; }
  .select-wrap select { font-size: 12px; padding: 7px 22px 7px 8px; }
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: min(85vw, 300px); min-width: 0; z-index: 40;
    transform: translateX(-110%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 4px 0 32px rgba(0,0,0,0.4);
  }
  .sidebar.mobile-open { transform: translateX(0); }
  .btn-sb-toggle { display: flex; }
  .main { padding: 16px; }
  .detail-header h1 { font-size: 18px; }
  .benefit-details { grid-template-columns: 1fr; }
  .benefit-card { padding: 12px 14px; }
}
</style>
</head>
<body>

<!-- BANNER -->
<div class="banner">
  <div class="banner-left">
    <a href="index.html"><img class="banner-logo" src="https://marcowallpaper.s3.ap-southeast-1.amazonaws.com/Marco+logo+white+(tall).png" alt="Marco"></a>
    <div class="banner-divider"></div>
    <div class="banner-text">
      <div class="banner-title">Global Employee Benefits Plan</div>
      <div class="banner-subtitle">Statutory obligations, employer costs &amp; compliance notes</div>
    </div>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <button class="btn-hamburger" id="btnMobileOpen" onclick="mobileOpenDrawer()" aria-label="Open menu">&#9776;</button>
  <span class="filter-label">FILTER</span>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M21 21L16.65 16.65M19 11C19 15.4183 15.4183 19 11 19C6.58172 19 3 15.4183 3 11C3 6.58172 6.58172 3 11 3C15.4183 3 19 6.58172 19 11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <input type="text" class="search-input" id="sidebarSearch" placeholder="Search country..." oninput="filterSidebar()">
  </div>
  <div class="select-wrap">
    <select id="regionFilter" onchange="filterSidebar()">
      <option value="">All Regions</option>
      <option value="Africa">Africa</option>
      <option value="Americas">Americas</option>
      <option value="Asia Pacific">Asia Pacific</option>
      <option value="Europe">Europe</option>
      <option value="Middle East">Middle East</option>
    </select>
  </div>
  <button class="btn-clear" onclick="clearFilters()"><span class="clear-text">&#10005; Clear</span><span class="clear-icon">&#10005;</span></button>
</div>

<!-- LAYOUT -->
<div class="layout">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="mobileCloseDrawer()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-header-text">SELECT A COUNTRY</span>
      <button class="btn-sb-toggle" id="btnSbToggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 8H14M2 4H14M2 12H14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="sidebar-scroll" id="countryList"></div>
  </div>
  <div class="main" id="mainContent">
    <div class="welcome-state">
      <div class="big-icon">&#127775;</div>
      <h2>Select a country to view its employee benefits</h2>
      <p>Choose any country or state from the left panel. You can search by name, filter by region, or browse by benefit category once selected.</p>
    </div>
  </div>
</div>

inuation; additional pay/substitute day if work is required depending on legal treatment","costBasis":"Holiday calendar / worked holiday event","compliance":"Update annually against official government holiday notifications and sector-specific rules.","source":"https://mole.gov.bd/site/page/7d40b10e-3605-4186-a00c-8c958324c781/%E0%A6%86%E0%A6%87%E0%A6%A8"},{"category":"Leave & Time Off","benefit":"Paid annual leave / earned leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide paid earned leave to eligible workers and maintain leave records.","employee":"Paid leave accrues based on days worked; entitlement depends on worker category and sector.","cost":"Salary continuation during paid leave; approx. 4% to 6%+ of annual salary depending on accrual and sector","costBasis":"Paid time off accrual","compliance":"Validate worker category, establishment type and any sector wage board/CBA rules before payroll setup.","source":"https://mole.gov.bd/site/page/1acc251b-d520-4619-8de2-c6e8afa2c07f/%E0%A6%AC%E0%A6%BE%E0%A6%82%E0%A6%B2%E0%A6%BE%E0%A6%A6%E0%A7%87%E0%A6%B6-%E0%A6%B6%E0%A7%8D%E0%A6%B0%E0%A6%AE-%28%E0%A6%B8%E0%A6%82%E0%A6%B6%E0%A7%8B%E0%A6%A7%E0%A6%A8%29-%E0%A6%86%E0%A6%87%E0%A6%A8-%E0%A7%A8%E0%A7%A6%E0%A7%A7%E0%A7%A9"},{"category":"Leave & Time Off","benefit":"Sick leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide statutory sick leave according to the applicable worker category and medical certification rules.","employee":"Paid/part-paid sick leave entitlement under labour law, subject to eligibility and documentation.","cost":"Salary continuation or partial salary continuation; exact cost depends on absence usage","costBasis":"Leave event","compliance":"Confirm current Labour Act text and Bangladesh Labour Rules for category-specific payment treatment.","source":"https://mole.gov.bd/site/page/1acc251b-d520-4619-8de2-c6e8afa2c07f/%E0%A6%AC%E0%A6%BE%E0%A6%82%E0%A6%B2%E0%A6%BE%E0%A6%A6%E0%A7%87%E0%A6%B6-%E0%A6%B6%E0%A7%8D%E0%A6 re legally required and coordinate benefit process.","employee":"Birth leave must be taken within four months after birth; Belgian rules set entitlement and payment split.","cost":"Variable; usually employer-paid first days plus social security benefit for remaining days","costBasis":"Leave event","compliance":"Verify current entitlement days and worker status before payroll processing.","source":"https://employment.belgium.be/en/themes/international/posting/working-conditions-be-respected-case-posting-belgium/birth-leave"},{"category":"Leave & Time Off","benefit":"Paid annual leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide statutory annual holiday entitlement and holiday pay according to worker category.","employee":"Full-time employees normally receive four weeks annual leave per year, based on prior year work.","cost":"Approx. 7.7% of base salary for leave days; holiday pay can add material cost depending category","costBasis":"Paid leave and holiday pay rules","compliance":"Holiday pay calculation differs for manual workers, employees and other categories.","source":"https://www.belgium.be/fr/emploi/conges_et_interruption_de_carriere/vacances_annuelles"},{"category":"Leave & Time Off","benefit":"Public holidays","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay salary for statutory public holidays, substitute days and compensatory rest where required.","employee":"10 statutory public holidays per calendar year, subject to legal rules.","cost":"Approx. 3.8% of annual salary for 10 paid days, depending work schedule","costBasis":"Paid public holidays","compliance":"Work on public holidays is restricted except derogations.","source":"https://employment.belgium.be/en/themes/international/posting/working-conditions-be-respected-case-posting-belgium/public-holidays"},{"category":"Leave & Time Off","benefit":"Sickness / guaranteed salary","mandatory":"Yes","basis":"Statutory Benefit","employer":"Continue salary for a statutory initial period of incapacity, depending on worker status and rules.","employee":"Contract suspended during illness; first phase salary remains employer's responsibility, then mandatory sickness insurance may pay replacement income.","cost":"Variable; depends on status, duration and salary","costBasis":"Sickness event","compliance":"Rules differ by blue-collar/white-collar status and contract type.","source":"https://www.belgium.be/fr/emploi/sante_et_bien-etre/incapacite_de_travail"},{"category":"Parental & Family","benefit":"Maternity leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Respect maternity protection, leave and dismissal protection; coordinate with mutuality where benefits apply.","employee":"15 weeks maternity leave, generally 6 prenatal and 9 postnatal weeks.","cost":"Employer direct salary cost limited where mutuality pays maternity allowance; admin/replacement cost varies","costBasis":"Leave event / social insurance benefit","compliance":"Specific pre/postnatal rules and medical certificate timing apply.","source":"https://employment.belgium.be/en/themes/international/posting/working-conditions-be-respected-case-posting-belgium/protective"},{"category":"Severance & End-of-Service","benefit":"Notice / termination pay","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide statutory notice or pay in lieu where dismissal rules require it.","employee":"Notice period for dismissal by employer depends mainly on seniority and contract start date.","cost":"Event-based; varies by seniority and salary","costBasis":"Termination event","compliance":"Use official notice tables for employment contracts started on or after 1 Jan 2014.","source":"https://employment.belgium.be/en/themes/employment-and-labor-market/employment-contracts/notice-periods-employment-contract-01012014"},{"category":"Social Security & Protection","benefit":"Social security protection","mandatory":"Yes","basis":"Statutory Benefit","employer":"Register as employer, declare workers, and pay employer social security contributions to NSSO/ONSS/RSZ.","employee":"Coverage through Belgian social security branches.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Payroll percentage, subject to reductions/special contributions","compliance":"Employee contribution is generally 13.07%; employer rate varies by sector and reductions.","source":"https://www.socialsecurity.be/site_nl/employer/infos/employers_nsso/which-contributions.htm"}],"Brazil":[{"category":"Bonus & Statutory Payments","benefit":"13th salary","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay statutory annual Christmas bonus/13th salary according to legal timing and calculation rules.","employee":"Annual additional salary, generally 1/12 per month worked, paid with statutory deadlines.","cost":"Approx. 8.33% of annual base salary, plus payroll charges/FGTS","costBasis":"Recurring annual statutory bonus","compliance":"FGTS is also due on 13th salary according to FGTS Digital guidance.","source":"https://www.planalto.gov.br/ccivil_03/leis/l4090.htm"},{"category":"Health & Medical","benefit":"Private health, meal/food voucher, transport, life insurance, wellness","mandatory":"Conditional","basis":"Optional / Market Practice","employer":"Provide if required by collective bargaining agreement, internal policy or specific statutory rule.","employee":"Additional benefits depending on employer and collective agreement.","cost":"Variable; fixed voucher/allowance or insurance premium","costBasis":"CBA / employer policy","compliance":"Meal vouchers and private health are common but not automatically universal statutory benefits.","source":"https://www.gov.br/trabalho-e-emprego/pt-br"},{"category":"Leave & Time Off","benefit":"Paid annual vacation + vacation bonus","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide paid annual vacation after qualifying period and pay constitutional/CLT vacation premium.","employee":"Generally 30 calendar days annual vacation plus one-third vacation bonus after 12 months of work.","cost":"Approx. 11.11% of annual salary for 30 days + 1/3 bonus, plus charges","costBasis":"Paid leave after qualifying period","compliance":"Vacation may be split under CLT rules; payroll timing must be observed.","source":"https://www.planalto.gov.br/ccivil_03/decreto-lei/del5452.htm"},{"category":"Parental & Family","benefit":"Maternity leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide maternity leave and employment protection; process salary-maternity according to social security rules.","employee":"120 days maternity leave without loss of employment and salary; 2025 law may extend in hospitalization cases.","cost":"Usually funded/offset through social security mechanisms, but payroll processing required","costBasis":"Leave event","compliance":"Confirm current reimbursement/offset mechanism and any Citizen Company extension if applicable.","source":"https://www.planalto.gov.br/ccivil_03/leis/2002/l10421.htm"},{"category":"Retirement & Pension","benefit":"FGTS deposits","mandatory":"Yes","basis":"Statutory Benefit","employer":"Deposit FGTS monthly into employee linked account.","employee":"Employee accumulates FGTS balance usable in legally allowed events.","cost":"8% of salary paid to employee","costBasis":"Monthly payroll percentage","compliance":"Termination without cause may trigger additional FGTS-related costs/fine.","source":"https://www.gov.br/trabalho-e-emprego/pt-br/servicos/trabalhador/fgts"},{"category":"Severance & End-of-Service","benefit":"Termination without cause costs","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay statutory termination amounts, including notice, accrued items and FGTS termination fine where applicable.","employee":"Employee receives statutory termination payments when legal trigger applies.","cost":"Event-based; commonly includes 40% FGTS fine for dismissal without cause","costBasis":"Termination event","compliance":"Exact settlement depends on contract type, reason for termination and accrued balances.","source":"https://www.planalto.gov.br/ccivil_03/leis/l8036consol.htm"},{"category":"Social Security & Protection","benefit":"Social security protection","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay employer social security contributions and related payroll taxes according to company regime and activity.","employee":"Coverage under Brazilian social security system.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Payroll percentage","compliance":"Rates vary heavily by tax regime, sector and payroll relief rules. Verify before payroll implementation.","source":"https://www.planalto.gov.br/ccivil_03/leis/l8212compilado.htm"},{"category":"Work Injury & Insurance","benefit":"Work accident insurance / RAT and occupational safety","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay RAT/SAT-related contribution and comply with occupational health and safety obligations.","employee":"Coverage for occupational accidents/diseases through statutory system.","cost":"Commonly 1% to 3% RAT before modifiers, plus compliance cost","costBasis":"Payroll percentage / risk class","compliance":"Exact rate depends on activity and FAP/RAT classification.","source":"https://www.planalto.gov.br/ccivil_03/leis/l8212compilado.htm"}],"Bulgaria":[{"category":"Allowances / Market Benefits","benefit":"Meal vouchers, transport, supplemental benefits","mandatory":"Optional / Tax-sensitive","basis":"Conditional / Verify","employer":"Not generally mandatory unless agreed in contract/CBA/internal rules.","employee":"No required employee contribution unless plan design requires it.","cost":"Employer budget-defined; some benefits may have tax/social contribution rules or exemptions.","costBasis":"Meal vouchers and in-kind benefits require local tax review.","compliance":"Meal vouchers, supplemental health, transport support and wellness benefits are common.","source":"Avoid labelling optional allowances as statutory entitlements."},{"category":"Health & Medical","benefit":"Compulsory health insurance contribution","mandatory":"Mandatory","basis":"Statutory Benefit","employer":"Employer pays statutory employer share.","employee":"Employee pays statutory employee share withheld by employer.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Subject to monthly insurance income minimums and maximums.","compliance":"Private health insurance may be offered as supplemental benefit.","source":"Confirm if expatriates/local assignments are subject to Bulgarian health insurance or covered by totalization rules."},{"category":"Health & Medical","benefit":"State social insurance and pension contributions","mandatory":"Mandatory","basis":"Statutory Benefit","employer":"Register and pay employer share of state social insurance, pension and related funds through payroll.","employee":"Employee share withheld via payroll.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Rates depend on annual statutory tables, salary caps and occupational accident class.","compliance":"Supplemental pension and private medical plans are common optional enhancements.","source":"Do not use one flat rate for all employees; confirm annual NRA rates and risk category."},{"category":"Leave & Time Off","benefit":"Employer-paid initial sickness period and social insurance cash benefit","mandatory":"Mandatory","basis":"Statutory Benefit","employer":"Pay the employer-responsible initial sick days according to current law and process social insurance documentation for benefits.","employee":"Employee must provide medical certificate and contributes to social insurance.","cost":"Initial employer-paid days plus mandatory social insurance contributions; exact employer-paid rate should be confirmed for current year.","costBasis":"Sick pay treatment depends on payroll/social insurance rules.","compliance":"Enhanced company sick pay can be offered.","source":"Require proper medical certificates; incorrect coding can affect NSSI benefit reimbursement."},{"category":"Leave & Time Off","benefit":"Paid annual leave and official/public holidays","mandatory":"Mandatory","basis":"Statutory Benefit","employer":"Provide statutory annual paid leave, generally at least 20 working days, plus official holidays.","employee":"No employee contribution.","cost":"Wage continuation cost; no separate contribution except replacement/resourcing cost.","costBasis":"Paid leave remains payroll taxable/insurable as salary unless specific exemption applies.","compliance":"Additional vacation days can be provided by contract or internal policy.","source":"Track accrual and carry-over/postponement rules in writing."},{"category":"Parental & Family","benefit":"Pregnancy, childbirth, maternity/paternity and parental leave","mandatory":"Mandatory","basis":"Statutory Benefit","employer":"Provide statutory job-protected leaves and payroll/social insurance processing.","employee":"Employee must satisfy eligibility/contribution conditions for cash benefits.","cost":"Mostly funded through social insurance once conditions are met; employer cost includes contributions/admin and any top-up if offered.","costBasis":"Cash benefits are administered under social insurance; payroll handling varies by benefit.","compliance":"Salary top-up during leave may be offered but is not generally mandatory.","source":"Protect job position and document leave orders correctly."},{"category":"Severance & End-of-Service","benefit":"Severance in specific statutory cases","mandatory":"Conditional mandatory","basis":"Conditional Statutory Benefit","employer":"Pay statutory severance only where Labour Code conditions are triggered, e.g. closure/redundancy, illness, retirement or other covered cases.","employee":"No employee contribution.","cost":"Case-specific; commonly measured by monthly remuneration multiples depending on termination ground.","costBasis":"Tax/social insurance treatment depends on payment type and limits.","compliance":"Additional contractual severance may be offered.","source":"Do not apply the same severance formula to every termination ground."}],"Cambodia":[{"category":"Health & Medical","benefit":"NSSF health care scheme","mandatory":"Yes","basis":"Statutory Benefit","employer":"Register and pay health care scheme contributions for covered employees.","employee":"Medical care, sickness allowance and maternity-related NSSF benefits according to scheme rules.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"NSSF contribution rate / wage ceiling","compliance":"Check current NSSF Prakas and contribution table before payroll implementation.","source":"https://www.nssf.gov.kh/law-and-order-2/prakas/"},{"category":"Leave & Time Off","benefit":"Paid annual leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide annual leave accrual and pay according to Labour Law.","employee":"Paid annual leave, commonly accruing at 1.5 working days per month of continuous service.","cost":"Approx. 6.9% of annual salary if 18 working days per year; higher with seniority if applicable","costBasis":"Paid time off accrual","compliance":"Check seniority/service increases and sector/CBA rules.","source":"https://www.mlvt.gov.kh/index.php/en/official-docs/royal-code/86-2025-03-24-06-32-19/2767.html"},{"category":"Leave & Time Off","benefit":"Paid public holidays","mandatory":"Yes","basis":"Statutory Benefit","employer":"Observe paid public holidays or provide compliant holiday work treatment.","employee":"Paid public holiday entitlement according to official annual calendar.","cost":"Salary continuation; additional payment/rest treatment if work on holiday depending on rule","costBasis":"Holiday calendar / worked holiday event","compliance":"Update annually against MLVT public holiday Prakas.","source":"https://www.mlvt.gov.kh/index.php/en/official-docs/laws-related-to-labour%2C-social-security-vocational-training.html"},{"category":"Parental & Family","benefit":"Maternity leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide statutory maternity leave and coordinate NSSF maternity/health benefits where applicable.","employee":"Maternity leave and NSSF maternity-related benefits for eligible workers.","cost":"Employer wage continuation/benefit coordination; event-based","costBasis":"Maternity event; NSSF eligibility","compliance":"Validate employer pay obligation vs NSSF benefit reimbursement/current practice.","source":"https://www.mlvt.gov.kh/index.php/en/official-docs/royal-code/86-2025-03-24-06-32-19/2767.html"},{"category":"Retirement & Pension","benefit":"NSSF pension scheme","mandatory":"Yes","basis":"Statutory Benefit","employer":"Register/pay pension scheme contributions when applicable.","employee":"Pension/social security benefits under Cambodia NSSF pension scheme.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"NSSF pension contribution","compliance":"Confirm current phase-in rate, employer/employee split and ceiling from NSSF before pricing.","source":"https://nssf.gov.kh/wp-content/uploads/2023/02/5.-Law-on-Social-Security-Schemes-EN-1.pdf"},{"category":"Severance & End-of-Service","benefit":"Seniority indemnity / termination payments","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay seniority/termination amounts when legally triggered.","employee":"Seniority indemnity or termination compensation depending on contract type and termination context.","cost":"Variable; depends on contract type, tenure and termination reason","costBasis":"Termination/seniority trigger","compliance":"Use current MLVT legal collection and Prakas for exact calculation.","source":"https://www.mlvt.gov.kh/index.php/en/official-docs/laws-related-to-labour%2C-social-security-vocational-training.html"},{"category":"Work Injury & Insurance","benefit":"NSSF occupational risk scheme","mandatory":"Yes","basis":"Statutory Benefit","employer":"Register covered enterprise/workers and pay NSSF occupational risk contributions.","employee":"Work injury and occupational disease protection through NSSF.","cost":"Approx. 0.8% of contributable wage subject to NSSF wage ceiling; verify current ceiling","costBasis":"NSSF contribution rate / wage ceiling","compliance":"NSSF guidance requires employers/owners of covered enterprises to register and pay contributions.","source":"https://www.nssf.gov.kh/employment-injury-scheme-2/contribution-payment/"}],"Canada - Alberta":[{"category":"Leave & Time Off","benefit":"Alberta vacation, general holidays and employment standards leaves","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide Alberta vacation, vacation pay, general holiday pay and protected leaves.","employee":"Minimum Alberta employment standards leave and general holiday entitlements.","cost":"Salary continuation / vacation pay; general holiday pay as applicable","costBasis":"Alberta work location and standards eligibility","compliance":"Alberta rules are province-specific; public/general holiday rules differ from other provinces.","source":"https://open.alberta.ca/publications/e09"},{"category":"Social Security & Protection","benefit":"CPP, EI and federal payroll deductions","mandatory":"Yes","basis":"Statutory Benefit","employer":"Deduct/remit CPP and EI plus employer EI share where applicable.","employee":"Pensionable/insurable earnings protection through CPP and EI.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Federal payroll contribution caps and employee earnings","compliance":"Use CRA current-year payroll guide for rates, caps and remittance frequency.","source":"https://www.canada.ca/en/revenue-agency/services/forms-publications/publications/t4001.html"},{"category":"Work Injury & Insurance","benefit":"WCB Alberta workers compensation","mandatory":"Yes","basis":"Statutory Benefit","employer":"Maintain WCB coverage and pay premiums based on industry/rate group and assessable earnings.","employee":"Workplace injury/illness compensation and return-to-work support.","cost":"Employer must provide/maintain coverage; premium varies by risk, location, insurer or industry.","costBasis":"Industry classification, assessable earnings and claims experience","compliance":"Use WCB Alberta 2026 premium rate guide for exact industry rate.","source":"https://www.wcb.ab.ca/assets/pdfs/employers/2026_premium_rate_guide.pdf"}],"Canada - British Columbia":[{"category":"Leave & Time Off","benefit":"B.C. vacation, statutory holidays and employment standards leaves","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide B.C. vacation pay/time, statutory holiday pay and protected leaves.","employee":"Minimum B.C. employment standards leave and holiday entitlements.","cost":"Salary continuation / vacation pay; statutory holiday pay as applicable","costBasis":"B.C. work location and employment standards eligibility","compliance":"B.C. has province-specific leaves and statutory holiday rules.","source":"https://www2.gov.bc.ca/gov/content/employment-business/employment-standards-advice/employment-standards/time-off/vacation"},{"category":"Social Security & Protection","benefit":"CPP, EI and federal payroll deductions","mandatory":"Yes","basis":"Statutory Benefit","employer":"Deduct/remit CPP and EI plus employer EI share where applicable.","employee":"Pensionable/insurable earnings protection through CPP and EI.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Federal payroll contribution caps and employee earnings","compliance":"Use CRA current-year payroll guide for rates, caps and remittance frequency.","source":"https://www.canada.ca/en/revenue-agency/services/forms-publications/publications/t4001.html"},{"category":"Work Injury & Insurance","benefit":"Workers’ compensation / work injury protection","mandatory":"Yes","basis":"Statutory Benefit","employer":"Register and pay WorkSafeBC premiums based on classification and assessable payroll.","employee":"Workplace injury compensation, health care and return-to-work benefits.","cost":"Employer must provide/maintain coverage; premium varies by risk, location, insurer or industry.","costBasis":"Industry classification and assessable payroll","compliance":"Use exact WorkSafeBC classification unit and 2026 base rate for employer pricing.","source":"https://www.worksafebc.com/en/insurance/know-coverage-costs/industry-premium-rates/2026-rates"}],"Canada - Ontario":[{"category":"Leave & Time Off","benefit":"Ontario vacation, public holidays and statutory leaves","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide Ontario ESA vacation time/pay, public holiday pay and protected leaves.","employee":"Minimum vacation and public holiday rights plus job-protected leaves.","cost":"Salary continuation / vacation pay; public holiday pay formula applies","costBasis":"Ontario work location and ESA eligibility","compliance":"Ontario has province-specific public holiday and leave rules; do not rely only on federal Canada row.","source":"https://www.ontario.ca/document/your-guide-employment-standards-act-0/vacation"},{"category":"Social Security & Protection","benefit":"CPP, EI and federal payroll deductions","mandatory":"Yes","basis":"Statutory Benefit","employer":"Deduct/remit Canada Pension Plan and Employment Insurance plus employer EI share where applicable.","employee":"Pensionable/insurable earnings protection through CPP and EI.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Federal payroll contribution caps and employee earnings","compliance":"Use CRA current-year payroll guide for rates, caps and remittance frequency.","source":"https://www.canada.ca/en/revenue-agency/services/forms-publications/publications/t4001.html"},{"category":"Work Injury & Insurance","benefit":"Ontario workers compensation / WSIB","mandatory":"Yes","basis":"Statutory Benefit","employer":"Register/maintain WSIB coverage unless exempt and pay premiums based on classification and insurable payroll.","employee":"Workplace injury/illness wage-loss, health care and return-to-work benefits.","cost":"Employer must provide/maintain coverage; premium varies by risk, location, insurer or industry.","costBasis":"Industry classification, payroll and claims experience","compliance":"Use employer-specific WSIB classification and rate, not the average rate, for pricing.","source":"https://www.wsib.ca/en/2026premiumrates"}],"Canada - Quebec":[{"category":"Leave & Time Off","benefit":"Quebec annual vacation, statutory holidays and labour standards leaves","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide minimum vacation, statutory holiday treatment and protected leaves under Quebec standards.","employee":"Minimum Quebec labour standard leave and holiday entitlements.","cost":"Salary continuation / holiday pay / vacation pay as applicable","costBasis":"Quebec work location and statutory eligibility","compliance":"Quebec standards are province-specific and must be checked separately from federal Canada rules.","source":"https://www.cnesst.gouv.qc.ca/en/working-conditions/leave/annual-vacation"},{"category":"Social Security & Protection","benefit":"QPP, QPIP, EI and Quebec payroll deductions","mandatory":"Yes","basis":"Statutory Benefit","employer":"Deduct/remit Quebec Pension Plan, Quebec Parental Insurance Plan and EI where applicable.","employee":"Pension, parental insurance and employment insurance coverage.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Quebec payroll, pensionable/insurable earnings and annual caps","compliance":"Quebec differs from other provinces; validate QPP, QPIP, EI and Revenu Quebec tables each year.","source":"https://www.revenuquebec.ca/en/businesses/source-deductions-and-employer-contributions/employers-principal-changes-for-2026/"},{"category":"Work Injury & Insurance","benefit":"CNESST occupational health and safety insurance","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay CNESST OHS insurance premium, generally via Revenu Quebec remittances, based on classification/rate.","employee":"Work-related injury/illness compensation and prevention support.","cost":"Employer must provide/maintain coverage; premium varies by risk, location, insurer or industry.","costBasis":"CNESST classification, insurable wages and periodic payment rules","compliance":"Use the current CNESST schedule and employer classification for exact costing.","source":"https://www.cnesst.gouv.qc.ca/en/forms-and-publications/periodic-payment-calculation-guide"}],"Chile":[{"category":"Health & Medical","benefit":"AFP pension, health, unemployment insurance and related payroll contributions","mandatory":"Mandatory","basis":"Statutory Benefit","employer":"Employers must enroll/pay applicable employer-funded components such as unemployment insurance and disability/survivorship insurance where applicable; withhold employee pension/health contributions.","employee":"Employee generally funds AFP pension contribution and mandatory health contribution; unemployment contribution may be shared for indefinite contracts.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Payroll rates and caps are updated periodically; confirm using official current tables.","compliance":"Suppl ounting; statutory deposit timing applies.","compliance":"Enhanced severance can be offered.","source":"Late deposit can trigger penalties; ensure salary base is correct."},{"category":"Severance & End-of-Service","benefit":"Interest on cesantías","mandatory":"Mandatory","basis":"Statutory Benefit","employer":"Pay annual interest on severance to employee.","employee":"No employee contribution.","cost":"12% annually on severance balance, proportional for partial year.","costBasis":"Paid directly to employee, usually by statutory annual deadline.","compliance":"None; statutory benefit.","source":"Separate this payment from cesantías fund deposit."},{"category":"Work Injury & Insurance","benefit":"Sistema General de Riesgos Laborales / ARL","mandatory":"Mandatory","basis":"Statutory Benefit","employer":"Affiliate employees to an ARL and pay risk-class-based contribution.","employee":"No normal employee contribution.","cost":"Employer must provide/maintain coverage; premium varies by risk, location, insurer or industry.","costBasis":"Paid via payroll/PILA.","compliance":"Supplemental accident/life insurance can be added.","source":"Misclassification of risk class can cause underpayment and penalties."}],"Costa Rica":[{"category":"Bonus & Statutory Payments","benefit":"Aguinaldo / 13th month salary","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay annual aguinaldo within the statutory December deadline based on qualifying remuneration.","employee":"Mandatory additional salary payment for employees.","cost":"Approx. 8.33% of annual salary","costBasis":"Annual statutory bonus","compliance":"Budget separately from base salary and benefits; verify calculation period and excluded payments.","source":"https://www.mtss.go.cr/temas-laborales/aguinaldo/aguinaldo.html"},{"category":"Optional / Market Practice","benefit":"Private medical, meal, transport, remote work and wellness benefits","mandatory":"No","basis":"Optional / Market Practice","employer":"Optional unles ry Benefit","employer":"Support employer declarations and maintain statutory maternity protection obligations.","employee":"Eligible employees may receive maternity benefit if contribution conditions are met.","cost":"Primarily through social insurance contributions; employer admin obligations apply","costBasis":"Maternity/adoption/surrogacy event and eligibility","compliance":"Application deadlines and employer declarations are important for benefit processing.","source":"https://www.gov.cy/en/service/maternity-allowance-benefit/"},{"category":"Severance & End-of-Service","benefit":"Redundancy Fund / termination protection","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay redundancy fund contribution and comply with termination/redundancy rules.","employee":"Potential redundancy payment protection subject to statutory criteria.","cost":"1.2% employer contribution to Redundancy Fund, subject to insurable earnings rules","costBasis":"Payroll percentage / fund contribution","compliance":"Separate from individual termination notice/pay obligations under labour law.","source":"https://www.businessincyprus.gov.cy/social-insurance-registration-and-contributions/"}],"Czech Republic":[{"category":"Optional / Market Practice","benefit":"Meal allowance, pension top-up, private medical, wellness and flexible benefits","mandatory":"No","basis":"Optional / Market Practice","employer":"Optional unless required by contract, CBA or internal policy.","employee":"Additional benefits according to employer offering.","cost":"Optional employer budget item; cost depends on company policy, vendor premium, allowance amount or local tax treatment.","costBasis":"Employer policy / CBA","compliance":"Tax-preferred treatment may depend on current Czech tax rules and benefit limits.","source":"https://mpsv.gov.cz/en/labour-law"},{"category":"Health & Medical","benefit":"Public health insurance contribution","mandatory":"Yes","basis":"Statutory Benefit","employer":"Withhold and remit health insurance contributions; employer bears two-thirds of the 13.5% total contribution.","employee":"Participation in public health insurance system.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Payroll percentage","compliance":"Employer must notify health insurer of employee entry/termination within required timelines.","source":"https://www.vzp.cz/platci/informace/zamestnavatel/povinnosti-zamestnavatele/odvod-pojistneho-za-zamestnance"},{"category":"Leave & Time Off","benefit":"Paid annual leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide at least the statutory annual leave entitlement.","employee":"Basic leave assessment is at least 4 weeks per calendar year; some public/education roles have higher statutory levels.","cost":"Approx. 7.69% of annual salary for 4 weeks paid leave","costBasis":"Paid time off / salary continuation","compliance":"Contract, collective agreement or internal regulation may extend leave.","source":"https://portal.gov.cz/en/informace/the-right-to-leave-INF-14"},{"category":"Leave & Time Off","benefit":"Sick leave and sickness insurance benefits","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide wage compensation for initial sickness period where applicable and coordinate social insurance documents for benefits.","employee":"Sickness insurance benefits protect insured workers during temporary incapacity, maternity or care events.","cost":"Employer wage compensation for initial period plus 2.1% sickness insurance within social security premium","costBasis":"Sickness event / insurance contribution","compliance":"Benefit eligibility and payment shift after initial period should be verified for the specific case.","source":"https://mpsv.gov.cz/en/sickness-insurance"},{"category":"Parental & Family","benefit":"Maternity, paternity, parental and care benefits","mandatory":"Yes","basis":"Statutory Benefit","employer":"Administer leave documentation and maintain protected employment rights during statutory family leave.","employee":"Eligible insured employees may receive maternity, paternity, caregiving and related sickness insurance benefits.","cost":"Primarily funded via social security; employer admin and job-protection obligations apply","costBasis":"Family leave event and insurance eligibility","compliance":"Exact duration/payment varies by leave type and contribution record.","source":"https://www.cssz.cz/web/lang/davky?lang=en"},{"category":"Severance & End-of-Service","benefit":"Notice, severance and statutory termination rules","mandatory":"Yes","basis":"Statutory Benefit","employer":"Follow statutory termination grounds, notice periods and severance rules where applicable.","employee":"Employee termination protections and severance where statutory triggers apply.","cost":"Event-based; depends on reason and service length","costBasis":"Termination event","compliance":"Use current Labour Code and collective agreement rules before termination.","source":"https://portal.gov.cz/kam-dal/zakony-vyhlasky/zakon-262-2006-zakonik-prace"},{"category":"Social Security & Protection","benefit":"Social security protection","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay employer social security premiums covering sickness insurance, pension insurance and state employment policy.","employee":"Coverage through Czech social security system.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Payroll percentage","compliance":"Higher rates may apply for specific categories such as high-risk employment; verify current CSSZ rates.","source":"https://www.cssz.cz/web/lang/sazby-pojistneho?lang=en"}],"Denmark":[{"category":"Leave & Time Off","benefit":"Holiday entitlement and holiday allowance","mandatory":"Yes","basis":"Statutory Benefit","employer":"Accrue, report and pay holiday allowance or salary during holiday according to the Holiday Act system.","employee":"Employees accrue paid holiday/holiday allowance and can claim holiday pay through official systems.","cost":"Holiday pay commonly 12.5% for hourly employees; salaried employees receive paid holiday plus holiday supplement depending on rules","costBasis":"Holiday accrual / salary continuation","compliance":"Confirm employee type and holiday-pay method; FerieKonto/Feriepengeinfo records must be correct.","source":"https://lifeindenmark.borger.dk/working/holiday-allowance-ny/holiday-allowance"},{"category":"Leave & Time Off","benefit":"Sickness absence and sickness benefits","mandatory":"Yes","basis":"Statutory Benefit","employer":"Manage sickness absence, reporting and potential reimbursement according to Danish rules.","employee":"Protection and sickness benefit rights subject to eligibility and reporting requirements.","cost":"Case-based; employer may pay salary/sick pay initially and seek reimbursement where eligible","costBasis":"Sickness event and reporting deadline","compliance":"Exact employer cost depends on contract, CBA, salaried/hourly status and reimbursement eligibility.","source":"https://businessindenmark.virk.dk/topics/Staff/Sickness%2C%20holiday%2C%20absence%20and%20maternity%20leave/"},{"category":"Other Employee Benefit","benefit":"Samlet Betaling employer contributions","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay permanent statutory employer contributions invoiced through Samlet Betaling.","employee":"Coverage/support for statutory labour market schemes.","cost":"Variable fixed/sector-based contributions; not a single payroll percentage","costBasis":"Quarterly/periodic statutory invoice","compliance":"Includes several schemes linked to ATP/full-time employee calculations; verify invoices and scheme coverage.","source":"https://businessindenmark.virk.dk/guidance/samlet-betaling-bid/"},{"category":"Parental & Family","benefit":"Maternity, paternity and parental benefits","mandatory":"Yes","basis":"Statutory Benefit","employer":"Administer leave and employer declarations; coordinate employee eligibility for public maternity/paternity benefits.","employee":"Eligible employees may receive maternity/paternity benefits during statutory leave.","cost":"Primarily public benefit-funded; employer top-up depends on employment contract/CBA and Barsel.dk coverage","costBasis":"Birth/adoption/parental leave event","compliance":"Many Danish employers have CBA or contract-based paid parental leave top-ups; validate sector rules.","source":"https://lifeindenmark.borger.dk/family-and-children/family-benefits/maternity-paternity-benefits"},{"category":"Retirement & Pension","benefit":"ATP Livslang Pension contribution","mandatory":"Yes","basis":"Statutory Benefit","employer":"Report and pay ATP contributions for eligible employees employed in Denmark.","employee":"Statutory lifelong pension coverage through ATP.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Fixed statutory contribution, not salary percentage","compliance":"Contribution rate/category can vary; verify current ATP contribution rate and working-hours threshold.","source":"https://businessindenmark.virk.dk/guidance/atp-livslang-pension-bid/atp-employer/"},{"category":"Work Injury & Insurance","benefit":"AES occupational diseases / industrial injury contributions","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay AES contributions and report work accidents through the official system where required.","employee":"Compensation protection for recognized occupational disease/industrial injury.","cost":"Employer must provide/maintain coverage; premium varies by risk, location, insurer or industry.","costBasis":"Contribution invoice / industry code","compliance":"Accident insurance obligations and occupational disease contributions must be handled separately.","source":"https://businessindenmark.virk.dk/guidance/aes-labour-market-insurance/AES-contribution/"},{"category":"Work Injury & Insurance","benefit":"Occupational pension top-up, private health, canteen, transport and wellness","mandatory":"Conditional","basis":"Optional / Market Practice","employer":"Not universally statutory, but often required by collective agreement or offered as market practice.","employee":"Additional benefits depending on CBA or employer policy.","cost":"Employer must provide/maintain coverage; premium varies by risk, location, insurer or industry.","costBasis":"CBA / employer policy","compliance":"Pension beyond ATP is usually CBA/contract-driven; do not mark as universal statutory unless applicable.","source":"https://businessindenmark.virk.dk/guidance/atp-livslang-pension-bid/atp-employer/atp-contribution-rates2024/"}],"Egypt":[{"category":"Health & Medical","benefit":"Employer social insurance registration and contributions","mandatory":"Yes","basis":"Statutory Benefit","employer":"Register private-sector workers with NOSI and pay statutory employer social insurance contributions; NOSI requires employer registration action within the required timeframe after employment starts.","employee":"Coverage under pension, work injury, sickness and unemployment social insurance branches, subject to eligibility rules.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Payroll percentage; capped contribution wage and statutory branch rules","compliance":"Use NOSI current wage ceilings and contribution branches before payroll go-live. The 2026 contribution wage minimum/maximum has been updated by NOSI.","source":"https://www.nosi.gov.eg/ar/News/Pages/4-10-2020.aspx"},{"category":"Optional / Market Practice","benefit":"Private medical, meal, transport, housing, wellness","mandatory":"No","basis":"Optional / Market Practice","employer":"Optional unless promised by employment contract, policy, collective agreement or sector rule.","employee":"Additional employee benefits depending on company policy.","cost":"Optional employer budget item; cost depends on company policy, vendor premium, allowance amount or local tax treatment.","costBasis":"Employer policy","compliance":"Avoid treating optional benefits as statutory unless required by current law, sector rule or contract.","source":"https://www.manpower.gov.eg/"},{"category":"Health & Medical","benefit":"Social insurance wage floor / ceiling validation","mandatory":"Yes","basis":"Statutory Benefit","employer":"Apply the official contribution wage minimum and maximum when calculating social insurance contributions.","employee":"Employee benefits are calculated by reference to insured contribution wages within statutory limits.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Annual contribution wage update","compliance":"NOSI announced 2026 contribution wage minimum of EGP 2,700 and maximum of EGP 16,700; verify before payroll processing.","source":"https://www.nosi.gov.eg/ar/News/Pages/2025-11-30.aspx"},{"category":"Leave & Time Off","benefit":"Paid annual leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide paid annual leave according to statutory entitlement and service conditions.","employee":"Employees are entitled to statutory paid annual leave; entitlement increases for long service / older workers under labour law rules.","cost":"Salary continuation during leave; roughly 5.8% to 8.2%+ of annual salary depending on entitlement","costBasis":"Paid time off","compliance":"Egypt enacted a new Labour Law in 2025; use official gazette / Ministry publication to validate final current wording before production payroll.","source":"https://www.manpower.gov.eg/%28S%285im05fa3hog5ttyodifpnfq4%29%29/PDF/WorkLow/law2003.pdf"},{"category":"Leave & Time Off","benefit":"Sick leave / sickness benefit","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide statutory sick leave treatment and coordinate social insurance documentation where applicable.","employee":"Income protection during certified sickness according to labour and social insurance rules.","cost":"Event-based; salary continuation / benefit reimbursement rules depend on duration and eligibility","costBasis":"Certified sickness absence","compliance":"Validate with current Labour Law 14/2025 official text and NOSI implementation rules; amounts can depend on sector and insurance status.","source":"https://www.nosi.gov.eg/"},{"category":"Parental & Family","benefit":"Maternity leave and employment protection","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide maternity leave and protect employment during statutory maternity absence.","employee":"Statutory maternity leave and related social insurance protection, subject to eligibility and current labour law.","cost":"Event-based; direct employer salary cost depends on social insurance reimbursement/benefit rules and employer policy","costBasis":"Pregnancy / childbirth","compliance":"Check current 2025 labour law official publication and social insurance rules before final payroll setup.","source":"https://www.manpower.gov.eg/%28S%285im05fa3hog5ttyodifpnfq4%29%29/PDF/WorkLow/law2003.pdf"}],"Estonia":[{"category":"Health & Medical","benefit":"Health promotion expenses","mandatory":"No","basis":"Optional / Market Practice","employer":"Optional; can provide tax-exempt health promotion expenses within the official limit.","employee":"Wellness / health promotion support if employer chooses to provide it.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Employer policy / tax-exempt limit","compliance":"Amounts above or outside conditions may be taxed as fringe benefits.","source":"https://www.emta.ee/en/private-client/taxes-and-payment/declaration-income/tax-rates"},{"category":"Optional / Market Practice","benefi "Employer pays 70% of average wages for sickness days 4-8; Health Insurance Fund generally pays from day 9.","cost":"Event-based; 70% of average wages for days 4-8","costBasis":"Certified sickness absence","compliance":"Employer-paid sickness benefit has specific tax treatment and limits.","source":"https://www.emta.ee/en/business-client/taxes-and-payment/income-and-social-taxes/social-tax"},{"category":"Parental & Family","benefit":"Maternity, paternity and parental leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Allow statutory family leaves and coordinate benefit documentation as needed.","employee":"Maternity leave 100 calendar days; paternity benefit 30 calendar days; parental leave until child age 3 with state benefit rules.","cost":"Mostly state benefit funded; employer cost mainly leave administration and replacement coverage","costBasis":"Pregnancy / childbirth / adoption","compliance":"Do not budget as normal salary continuation unless employer policy or contract adds top-up.","source":"https://www.tooelu.ee/en/26/types-holidays"},{"category":"Social Security & Protection","benefit":"Employer social tax","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay employer social tax on employment income and meet minimum monthly social tax obligation where applicable.","employee":"Finances pension insurance and state health insurance coverage.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Payroll percentage / minimum monthly base","compliance":"Some exceptions apply; minimum obligation can differ for special cases.","source":"https://www.emta.ee/en/business-client/taxes-and-payment/income-and-social-taxes/social-tax"}],"Finland":[{"category":"Health & Medical","benefit":"Earnings-related pension insurance / TyEL","mandatory":"Yes","basis":"Statutory Benefit","employer":"Insure eligible employees under TyEL and remit employer and employee pension contributions.","employee":"Earnings-related pension accrual.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled in Labor Cost Calculator.","costBasis":"Payroll percentage; threshold and employer type","compliance":"Employer withholds employee share from wages and pays total to pension insurer.","source":"https://www.etk.fi/en/finnish-pension-system/financing-and-investments/pension-contributions/private-sector/"},{"category":"Health & Medical","benefit":"Social insurance protection","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay statutory employer social insurance contributions and take out required insurance when thresholds/conditions are met.","employee":"Coverage across health insurance, earnings-related pension, unemployment, occupational accident/disease and applicable group life insurance.","cost":"2026 typical components include employer health insurance 1.91%, TyEL average 17.10%, unemployment 0.31% up to wage threshold / 1.23% above, plus accident insurance variable and possible group life insurance.","costBasis":"Payroll percentage plus insurance premiums","compliance":"Exact cost depends on employee age, total wages, occupational risk, pension insurer bonuses and collective agreement.","source":"https://www.vero.fi/en/businesses-and-corporations/taxes-and-charges/being-an-employer/social-insurance-contributions/"},{"category":"Leave & Time Off","benefit":"Paid annual holiday","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide paid annual holiday and holiday compensation; keep annual holiday records.","employee":"2 weekdays per full holiday credit month if employment has lasted less than one year; 2.5 weekdays after one year.","cost":"Approx. 8% to 10%+ of salary depending on accrual and collective agreement holiday bonus","costBasis":"Paid time off / holiday compensation","compliance":"Collective agreements may add holiday bonus and more favourable rules.","source":"https://tyosuojelu.fi/en/employment-relationship/annual-holidays/"},{"category":"Leave & Time Off","benefit":"Sick pay","mandatory":"Yes","basis":"Statutory Benefit","employer":"Pay statutory sick pay for employer-paid period.","employee":"Full sick pay for day of illness and following nine weekdays after one month of employment; 50% if employment under one month.","cost":"Event-based; up to day of illness + 9 weekdays at full/partial pay","costBasis":"Certified sickness absence","compliance":"Collective agreements often provide longer paid sick leave than the statutory minimum.","source":"https://tyosuojelu.fi/en/employment-relationship/pay/sick-pay"},{"category":"Parental & Family","benefit":"Pregnancy and parental leave","mandatory":"Yes","basis":"Statutory Benefit","employer":"Allow statutory pregnancy and parental leave and coordinate documentation.","employee":"Pregnancy leave normally begins 30 working days before due date; parental allowance maximum 320 working days, normally split 160/160 for two parents, plus 40 pregnancy allowance days.","cost":"Mostly Kela allowance funded; employer salary continuation depends on collective agreement/employer policy","costBasis":"Pregnancy / childbirth / adoption","compliance":"Many CBAs require paid family leave top-ups; check sector agreement.","source":"https://tyosuojelu.fi/en/employment-relationship/other-leave-from-employment/family-leave/pregnancy-and-parental-leave"},{"category":"Work Injury & Insurance","benefit":"Occupational accident and disease protection","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide occupational accident and disease insurance when annual wage threshold is exceeded.","employee":"Coverage for occupational accidents and diseases.","cost":"Employer must provide/maintain coverage; premium varies by risk, location, insurer or industry.","costBasis":"Insurance premium","compliance":"Required if total wages paid during calendar year exceed EUR 1,500.","source":"https://www.vero.fi/en/businesses-and-corporations/taxes-and-charges/being-an-employer/social-insurance-contributions/"},{"category":"Work Injury & Insurance","benefit":"Occupational health care, lunch, commuting, culture/sport benefits","mandatory":"Conditional","basis":"Optional / Market Practice","employer":"Arrange statutory preventive occupational health care; optional broader medical and fringe benefits may be offered under policy/tax rules.","employee":"Preventive occupational health care is statutory; broader benefits depend on employer policy.","cost":"Employer must provide/maintain coverage; premium varies by risk, location, insurer or industry.","costBasis":"Employment relationship / employer policy","compliance":"Separate statutory occupational health care from optional private medical coverage.","source":"https://www.vero.fi/en/businesses-and-corporations/taxes-and-charges/being-an-employer/social-insurance-contributions/"}],"France":[{"category":"Bonus & Statutory Payments","benefit":"Profit-sharing participation","mandatory":"Conditional","basis":"Conditional Statutory Benefit","employer":"Implement mandatory participation scheme if legal headcount threshold is met.","employee":"Employees participate financially in company results where scheme is mandatory/applicable.","cost":"Formula-based; depends on net profit and statutory reserve formula","costBasis":"Companies reaching statutory threshold, generally 50+ employees over required period","compliance":"Mandatory for eligible companies; optional below threshold.","source":"https://travail-emploi.gouv.fr/la-participation"},{"category":"Health & Medical","benefit":"Mandatory complementary health insurance / mutuelle","mandatory":"Yes","basis":"Statutory Benefit","employer":"Provide collective complementary health coverage unless an exemption applies.","employee":"Employees receive mandatory complementary health coverage for illness, maternity and accident expenses.","cost":"Statutory benefit coverage; exact employer contribution rate should be handled
